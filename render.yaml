# Render Blueprint (Infrastructure-as-Code).
# Render reads THIS file when you create a "Blueprint" from the repo. It provisions
# one Python web service that runs the Flask app (app.py), which now serves BOTH:
#   • the API  (/api/solve/*, /api/report/pdf, /api/meta/solvers, …)
#   • the live frontend — the multi-file app_v2/ build (index_v2.html + *.jsx),
#     served as the static root by Flask (static_folder='app_v2' in app.py).
# Gunicorn runs the WSGI app `app` from module `app` → `app:app`.
services:
  - type: web
    name: enterprise-simulator
    runtime: python
    plan: free               # 512 MB / shared CPU. Note: free instances SPIN DOWN
                             # after ~15 min idle — the first request then takes
                             # ~30–60 s to cold-start (the --timeout 120 covers it).
    buildCommand: pip install -r requirements.txt
    # 1 worker on free: the app imports numpy/scipy/scikit-learn/statsmodels/xgboost,
    # so each gunicorn worker is heavy — 2 workers would OOM the 512 MB free instance.
    # 120s timeout because MILP solves (procurement, profit-mix) can take tens of
    # seconds and a short timeout would 502 mid-solve.
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      # Optional - only needed if you use the /api/ai/* Claude endpoints.
      # Set the value in the Render dashboard (Environment), do NOT commit a key.
      - key: ANTHROPIC_API_KEY
        sync: false
