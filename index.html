      <div className="card-title">📦 Order Promising (ATP/CTP)</div>
      <div className="grid4">
        <Field label="Order Quantity"><input type="number" value={atpQty} onChange={e=>setAtpQty(+e.target.value)}/></Field>
        <Field label="Need-by Month"><select value={atpMonth} onChange={e=>setAtpMonth(+e.target.value)}>{MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}</select></Field>
        <div><button className="btn btn-primary btn-sm" style={{marginTop:18}} onClick={()=>{
          const prod=state.products[0];if(!prod)return;
          const weeklyDem=Math.round((prod.history[atpMonth]||0)/4);
          const weeklyProd=prod.capacity;const weeksInMonth=4;
          const availableInv=prod.initInventory+(weeklyProd-weeklyDem)*atpMonth*weeksInMonth;
          const canFulfill=availableInv>=atpQty;
          const ctpWeeks=canFulfill?0:Math.ceil((atpQty-Math.max(availableInv,0))/Math.max(weeklyProd-weeklyDem,1));
          setAtpResult({canFulfill,availableInv:Math.round(availableInv),ctpWeeks,ctpMonth:atpMonth+Math.ceil(ctpWeeks/4)});
        }}>Check ATP/CTP</button></div>
      </div>
      {atpResult&&<div style={{marginTop:8,padding:8,borderRadius:4,background:atpResult.canFulfill?'rgba(63,185,80,.08)':'rgba(248,81,73,.08)',border:`1px solid ${atpResult.canFulfill?'var(--gn)':'var(--dg)'}`}}>
        {atpResult.canFulfill?
          <div style={{color:'var(--gn)',fontWeight:600}}>✅ ATP: YES — {atpQty}u available by {MONTHS[atpMonth]}. Projected inventory: {atpResult.availableInv}u.</div>:
          <div><div style={{color:'var(--dg)',fontWeight:600}}>✗ ATP: NO — only {Math.max(0,atpResult.availableInv)}u available by {MONTHS[atpMonth]}. Short by {atpQty-Math.max(0,atpResult.availableInv)}u.</div>
          <div style={{color:'var(--a2)',marginTop:4}}>CTP: Can deliver by ~{MONTHS[Math.min(atpResult.ctpMonth,11)]} ({atpResult.ctpWeeks} additional weeks needed).</div></div>
        }
      </div>}
    </div>
  </div>
}

// ─── TAB 3: SUPPLY NETWORK ───
function SupplyTab({state,dispatch}){
  const cur=state.config.currency;
  const [lcResult,setLcResult]=useState(null);
  const [lcForm,setLcForm]=useState({foreign_value:10000,exchange_rate:84,freight:25000,insurance_pct:0.5,bcd_pct:7.5,sws_pct:10,igst_pct:18,cha_charges:5000,port_handling:8000,local_transport:12000,gst_registered:true});

  const calcLC=async()=>{
    try{const r=await fetch('/api/calc/landed-cost',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(lcForm)});setLcResult(await r.json())}catch(e){setLcResult({error:e.message})}
  };

  // Collect all BOM items across products as supplier view
  const allParts=state.products.flatMap(p=>p.bom.map(b=>({...b,productName:p.name,productId:p.id})));
  const importParts=allParts.filter(b=>b.supplierType==='import');
  const domesticParts=allParts.filter(b=>b.supplierType==='domestic');

  return <div className="animate-in">
    <div className="vgrid vgrid-supply" style={{marginBottom:14}}>
      <IndiaSupplyMapPanel state={state}/>
      <SupplierScorecardPanel state={state}/>
    </div>
    {/* Supplier Summary */}
    <div className="kpi-row">
      <KPI label="Total Suppliers" value={allParts.length} sub={`${domesticParts.length} domestic · ${importParts.length} import`}/>
      <KPI label="Total Material Cost/unit" value={`${cur}${state.products.reduce((a,p)=>a+p.bom.reduce((s,b)=>s+b.cost*b.qtyPer,0),0).toFixed(0)}`} sub="across all SKUs" color="var(--a2)"/>
      <KPI label="Avg Lead Time" value={`${(allParts.reduce((a,b)=>a+b.leadTime,0)/Math.max(allParts.length,1)).toFixed(1)} wk`} sub="weighted by part count" color="var(--a3)"/>
      <KPI label="Import Exposure" value={`${importParts.length>0?Math.round(importParts.length/allParts.length*100):0}%`} sub={`${importParts.length} imported parts`} color={importParts.length>0?'var(--a4)':'var(--gn)'}/>
    </div>

    {/* Multi-Echelon Network (v3.0 P9) */}
    <div className="card">
      <div className="card-title">🛣️ Physical Network — Nodes &amp; Lanes
        <span className="badge" style={{background:'rgba(79,168,240,.12)',color:'var(--a2)',marginLeft:6}}>v3.0 multi-echelon</span>
      </div>
      <div style={{fontSize:10,color:'var(--tx3)',marginBottom:8}}>
        Define the physical supply chain: Plants (where production happens), DCs (stock points), Customers (demand regions).
        Lanes connect nodes with lead time, mode, rate, capacity, CO₂ factor. This drives transport solver &amp; multi-echelon inventory pooling.
      </div>
      {(()=>{
        const net=state.network||{nodes:[],lanes:[]};
        const upNodes=(nds)=>dispatch({type:'SET_NETWORK',payload:{nodes:nds}});
        const upLanes=(lns)=>dispatch({type:'SET_NETWORK',payload:{lanes:lns}});
        return <>
          <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:6,flexWrap:'wrap'}}>
            <strong style={{fontSize:11,color:'var(--tx2)'}}>Nodes ({net.nodes.length})</strong>
            <button className="btn btn-secondary btn-sm" onClick={()=>upNodes([...net.nodes,{id:'n'+Date.now().toString(36),type:'dc',name:`Node ${net.nodes.length+1}`,location:'',lat:0,lon:0,capacity:1000}])}>+ Node</button>
          </div>
          <table className="data-table" style={{marginBottom:10}}>
            <thead><tr><th>Type</th><th>Name</th><th>Location</th><th>Lat</th><th>Lon</th><th>Cap / Share</th><th></th></tr></thead>
            <tbody>{net.nodes.map((n,i)=>{
              const upN=(patch)=>{const nds=[...net.nodes];nds[i]={...nds[i],...patch};upNodes(nds);};
              return <tr key={n.id}>
                <td><select value={n.type} onChange={e=>upN({type:e.target.value})} style={{fontSize:10}}><option value="plant">Plant</option><option value="dc">DC</option><option value="customer">Customer</option><option value="supplier">Supplier</option></select></td>
                <td><input value={n.name} onChange={e=>upN({name:e.target.value})} style={{width:90,fontSize:10}}/></td>
                <td><input value={n.location||''} onChange={e=>upN({location:e.target.value})} style={{width:85,fontSize:10}}/></td>
                <td><input type="number" step="0.01" value={n.lat||0} onChange={e=>upN({lat:+e.target.value})} style={{width:55,fontSize:10}}/></td>
                <td><input type="number" step="0.01" value={n.lon||0} onChange={e=>upN({lon:+e.target.value})} style={{width:55,fontSize:10}}/></td>
                <td>{n.type==='customer'
                  ?<input type="number" step="0.01" min={0} max={1} value={n.demandShare||0} onChange={e=>upN({demandShare:+e.target.value})} style={{width:55,fontSize:10}} title="Demand fraction (0-1)"/>
                  :<input type="number" value={n.capacity||0} onChange={e=>upN({capacity:+e.target.value})} style={{width:70,fontSize:10}}/>}
                </td>
                <td><button className="btn btn-danger btn-sm" onClick={()=>{upNodes(net.nodes.filter(x=>x.id!==n.id));upLanes(net.lanes.filter(l=>l.from!==n.id&&l.to!==n.id));}}>×</button></td>
              </tr>;
            })}</tbody>
          </table>

          <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:6,flexWrap:'wrap'}}>
            <strong style={{fontSize:11,color:'var(--tx2)'}}>Lanes ({net.lanes.length})</strong>
            <button className="btn btn-secondary btn-sm" disabled={net.nodes.length<2} onClick={()=>upLanes([...net.lanes,{id:'l'+Date.now().toString(36),from:net.nodes[0]?.id,to:net.nodes[1]?.id,mode:'FTL',leadDays:3,ratePerUnit:2.5,capacity:1000,co2:0.12,active:true}])}>+ Lane</button>
            <span style={{fontSize:9,color:'var(--tx3)'}}>Modes: FTL/LTL/Rail/Air/Sea/Courier. Cheapest valid path auto-selected by transport solver.</span>
          </div>
          <table className="data-table">
            <thead><tr><th>From</th><th>→</th><th>To</th><th>Mode</th><th>Lead (d)</th><th>Rate /u</th><th>Capacity</th><th>CO₂ kg/u</th><th>Active</th><th></th></tr></thead>
            <tbody>{net.lanes.map((lane,i)=>{
              const upL=(patch)=>{const ls=[...net.lanes];ls[i]={...ls[i],...patch};upLanes(ls);};
              return <tr key={lane.id}>
                <td><select value={lane.from} onChange={e=>upL({from:e.target.value})} style={{fontSize:10,width:85}}>{net.nodes.map(n=><option key={n.id} value={n.id}>{n.name}</option>)}</select></td>
                <td style={{color:'var(--tx3)'}}>→</td>
                <td><select value={lane.to} onChange={e=>upL({to:e.target.value})} style={{fontSize:10,width:85}}>{net.nodes.map(n=><option key={n.id} value={n.id}>{n.name}</option>)}</select></td>
                <td><select value={lane.mode} onChange={e=>upL({mode:e.target.value})} style={{fontSize:10,width:60}}><option>FTL</option><option>LTL</option><option>Rail</option><option>Air</option><option>Sea</option><option>Courier</option></select></td>
                <td><input type="number" step="0.5" value={lane.leadDays} onChange={e=>upL({leadDays:+e.target.value})} style={{width:45,fontSize:10}}/></td>
                <td><input type="number" step="0.1" value={lane.ratePerUnit} onChange={e=>upL({ratePerUnit:+e.target.value})} style={{width:50,fontSize:10}}/></td>
                <td><input type="number" value={lane.capacity} onChange={e=>upL({capacity:+e.target.value})} style={{width:65,fontSize:10}}/></td>
                <td><input type="number" step="0.01" value={lane.co2||0} onChange={e=>upL({co2:+e.target.value})} style={{width:50,fontSize:10}}/></td>
                <td><input type="checkbox" checked={lane.active!==false} onChange={e=>upL({active:e.target.checked})}/></td>
                <td><button className="btn btn-danger btn-sm" onClick={()=>upLanes(net.lanes.filter(x=>x.id!==lane.id))}>×</button></td>
              </tr>;
            })}</tbody>
          </table>
          <div style={{fontSize:10,color:'var(--tx3)',marginTop:6}}>
            Total lane capacity: <strong style={{color:'var(--ac)'}}>{net.lanes.filter(l=>l.active!==false).reduce((a,l)=>a+l.capacity,0).toLocaleString()} u/period</strong>
            {' | '}Avg freight rate: <strong>{cur}{(net.lanes.reduce((a,l)=>a+l.ratePerUnit,0)/Math.max(net.lanes.length,1)).toFixed(2)}/u</strong>
            {' | '}Weighted lead: <strong>{(net.lanes.reduce((a,l)=>a+l.leadDays*l.capacity,0)/Math.max(net.lanes.reduce((a,l)=>a+l.capacity,0),1)).toFixed(1)} days</strong>
          </div>
        </>;
      })()}
    </div>

    {/* Supplier Master */}
    <div className="card">
      <div className="card-title">📋 Supplier Master <span className="badge" style={{background:'rgba(56,189,248,.1)',color:'var(--a2)'}}>{allParts.length} parts across {state.products.length} SKUs</span></div>
      <div style={{fontSize:10,color:'var(--tx3)',marginBottom:8}}>Edit supplier details in Products tab → BOM section. This view shows all suppliers consolidated. Import parts trigger landed cost calculation.</div>
      <div style={{overflowX:'auto'}}>
        <table className="data-table">
          <thead><tr><th>Part</th><th>Product</th><th>Source</th><th>Cost</th><th>Qty/U</th><th>LT</th><th>MOQ</th><th>Incoterm</th><th>Backup</th><th>Sub-C</th></tr></thead>
          <tbody>{allParts.map((b,i)=>{
            return <tr key={`${b.productId}-${b.id}`}>
              <td style={{fontWeight:600}}>{b.name}</td>
              <td style={{color:'var(--tx2)',fontSize:10}}>{b.productName}</td>
              <td><span style={{padding:'1px 6px',borderRadius:8,fontSize:9,background:b.supplierType==='import'?'rgba(240,180,41,.15)':'rgba(63,185,80,.15)',color:b.supplierType==='import'?'var(--a4)':'var(--gn)'}}>{b.supplierType}</span></td>
              <td className="num">{cur}{b.cost}</td>
              <td className="num">{b.qtyPer}</td>
              <td className="num">{b.leadTime}w</td>
              <td className="num">{b.moq}</td>
              <td>{b.incoterm||'—'}</td>
              <td style={{fontSize:9}}>{b.backupSupplier?<span style={{color:'var(--gn)'}}>✓ {b.backupSupplier}</span>:<span style={{color:'var(--tx3)'}}>None</span>}</td>
              <td style={{fontSize:9}}>{b.subcontract?<span style={{color:'var(--a2)'}}>✓ {cur}{b.subcontractRate}/u</span>:<span style={{color:'var(--tx3)'}}>No</span>}</td>
            </tr>
          })}</tbody>
        </table>
        <div style={{marginTop:8,fontSize:10,color:'var(--tx3)'}}>
          Configure backup suppliers and sub-contracting in Products tab → BOM → expand each part.
          Backup suppliers activate when: primary fails OTD for 3+ orders, or LT exceeds 2× standard, or quality drops below threshold.
        </div>
      </div>
    </div>

    {/* Landed Cost Calculator — only when import parts exist */}
    {importParts.length>0&&<div className="card">
      <div className="card-title">🛃 Landed Cost Calculator <span className="badge" style={{background:'rgba(240,180,41,.1)',color:'var(--a4)'}}>{importParts.length} imported parts need this</span></div>
      <div style={{fontSize:10,color:'var(--tx3)',marginBottom:8}}>Calculates total landed cost for imported materials. Results can be applied back to BOM cost. Supports sea, air, and multimodal freight — change mode below.</div>
      <div className="grid4">
        <Field label="Freight Mode"><select value={lcForm.freight_mode||'sea'} onChange={e=>setLcForm(f=>({...f,freight_mode:e.target.value}))} style={{fontSize:10}}><option value="sea">🚢 Sea Freight</option><option value="air">✈️ Air Freight</option><option value="road">🚛 Road (cross-border)</option><option value="multimodal">🔄 Multimodal (sea+road)</option></select></Field>
        <Field label="Foreign Currency Value"><input type="number" value={lcForm.foreign_value} onChange={e=>setLcForm(f=>({...f,foreign_value:+e.target.value}))}/></Field>
        <Field label="Exchange Rate (₹/unit)"><input type="number" step="0.1" value={lcForm.exchange_rate} onChange={e=>setLcForm(f=>({...f,exchange_rate:+e.target.value}))}/></Field>
        <Field label={`${lcForm.freight_mode==='air'?'Air':'Sea'} Freight (₹)`}><input type="number" value={lcForm.freight} onChange={e=>setLcForm(f=>({...f,freight:+e.target.value}))}/></Field>
        <Field label="Insurance % of CIF"><input type="number" step="0.1" value={lcForm.insurance_pct} onChange={e=>setLcForm(f=>({...f,insurance_pct:+e.target.value}))}/></Field>
        <Field label="BCD % (Basic Customs Duty)"><input type="number" step="0.5" value={lcForm.bcd_pct} onChange={e=>setLcForm(f=>({...f,bcd_pct:+e.target.value}))}/></Field>
        <Field label="SWS % (of BCD)"><input type="number" value={lcForm.sws_pct} onChange={e=>setLcForm(f=>({...f,sws_pct:+e.target.value}))}/></Field>
        <Field label="IGST %"><input type="number" value={lcForm.igst_pct} onChange={e=>setLcForm(f=>({...f,igst_pct:+e.target.value}))}/></Field>
        <Field label="GST Registered"><select value={lcForm.gst_registered?'yes':'no'} onChange={e=>setLcForm(f=>({...f,gst_registered:e.target.value==='yes'}))}><option value="yes">Yes (ITC recoverable)</option><option value="no">No</option></select></Field>
        <Field label="CHA Charges (₹)"><input type="number" value={lcForm.cha_charges} onChange={e=>setLcForm(f=>({...f,cha_charges:+e.target.value}))}/></Field>
        <Field label="Port Handling (₹)"><input type="number" value={lcForm.port_handling} onChange={e=>setLcForm(f=>({...f,port_handling:+e.target.value}))}/></Field>
        <Field label="Local Transport (₹)"><input type="number" value={lcForm.local_transport} onChange={e=>setLcForm(f=>({...f,local_transport:+e.target.value}))}/></Field>
      </div>
      <button className="btn btn-primary" style={{marginTop:8}} onClick={calcLC}>Calculate Landed Cost</button>

      {lcResult&&!lcResult.error&&<div style={{marginTop:12}}>
        <div className="kpi-row">
          <KPI label="Assessable Value" value={`₹${lcResult.assessable_value?.toLocaleString()}`} sub="CIF value"/>
          <KPI label="Total Duty" value={`₹${lcResult.total_duty?.toLocaleString()}`} sub={`BCD:₹${lcResult.bcd?.toLocaleString()} + SWS:₹${lcResult.sws?.toLocaleString()} + IGST:₹${lcResult.igst?.toLocaleString()}`} color="var(--a4)"/>
          <KPI label="Total Landed" value={`₹${lcResult.total_landed?.toLocaleString()}`} sub="before ITC" color="var(--dg)"/>
          <KPI label="Net Landed" value={`₹${lcResult.net_landed?.toLocaleString()}`} sub={`ITC recovery: ₹${lcResult.itc_recovery?.toLocaleString()}`} color="var(--ac)"/>
          <KPI label="Effective Duty %" value={`${lcResult.effective_duty_pct}%`} sub="net cost above CIF" color="var(--a3)"/>
        </div>
        <div style={{marginTop:8,padding:8,background:'var(--bg3)',borderRadius:4,fontSize:10,fontFamily:'JetBrains Mono',color:'var(--tx2)',lineHeight:1.8}}>
          FOB (₹) = {lcForm.foreign_value} × {lcForm.exchange_rate} = ₹{(lcForm.foreign_value*lcForm.exchange_rate).toLocaleString()}<br/>
          + Freight = ₹{lcForm.freight.toLocaleString()} + Insurance = ₹{Math.round(lcResult.assessable_value*lcForm.insurance_pct/100).toLocaleString()}<br/>
          = <strong>CIF = ₹{lcResult.assessable_value?.toLocaleString()}</strong><br/>
          BCD @ {lcForm.bcd_pct}% = ₹{lcResult.bcd?.toLocaleString()} | SWS @ {lcForm.sws_pct}% of BCD = ₹{lcResult.sws?.toLocaleString()}<br/>
          IGST base = CIF + BCD + SWS = ₹{lcResult.igst_base?.toLocaleString()} | IGST @ {lcForm.igst_pct}% = <span style={{color:'var(--a4)'}}>₹{lcResult.igst?.toLocaleString()}</span>{lcForm.gst_registered&&<span style={{color:'var(--gn)'}}> ← recoverable as ITC</span>}
        </div>
        {lcResult&&!lcResult.error&&importParts.length>0&&<div style={{marginTop:8}}>
          <div style={{fontSize:10,fontWeight:600,color:'var(--ac)',marginBottom:4}}>Apply to import BOM parts:</div>
          <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
            {importParts.map((b,i)=><button key={i} className="btn btn-secondary btn-sm" onClick={()=>{
              const netPerUnit=Math.round(lcResult.net_landed/Math.max(lcForm.foreign_value,1)*b.cost);
              dispatch({type:'UPDATE_BOM_ITEM',productId:b.productId,bomId:b.id,payload:{cost:netPerUnit}});
            }}>Update {b.name} → ₹{Math.round(lcResult.net_landed/Math.max(lcForm.foreign_value,1)*b.cost)}/u</button>)}
          </div>
        </div>}
      </div>}
    </div>}
    {importParts.length>0&&<div className="card">
      <div className="card-title">📖 Incoterms 2020 Quick Reference</div>
      <table className="data-table">
        <thead><tr><th>Term</th><th>Seller Delivers To</th><th>Buyer Pays From</th><th>Risk Transfer</th><th>Best For</th></tr></thead>
        <tbody>
          <tr><td style={{color:'var(--ac)',fontWeight:700}}>EXW</td><td>Seller's premises</td><td>Everything from factory door</td><td>At seller's door</td><td>When buyer has global forwarder</td></tr>
          <tr><td style={{color:'var(--ac)',fontWeight:700}}>FOB</td><td>On board vessel at origin port</td><td>Freight + insurance + duties</td><td>Ship's rail at origin</td><td>Most common for Indian imports</td></tr>
          <tr><td style={{color:'var(--ac)',fontWeight:700}}>CIF</td><td>Destination port (cost+insurance+freight)</td><td>Duties + local transport</td><td>Ship's rail at origin</td><td>Simple landed-at-port pricing</td></tr>
          <tr><td style={{color:'var(--ac)',fontWeight:700}}>DDP</td><td>Buyer's premises (all inclusive)</td><td>Nothing — seller handles all</td><td>At buyer's door</td><td>When seller has Indian entity</td></tr>
        </tbody>
      </table>
      <div style={{marginTop:6,fontSize:9,color:'var(--tx3)'}}>⚠️ Indian customs always calculates duty on CIF value regardless of Incoterm. If purchased FOB, customs adds notional freight + insurance.</div>
    </div>}

    {/* No import parts message */}
    {importParts.length===0&&<div className="card" style={{opacity:0.6}}>
      <div className="card-title">🛃 Import Tools</div>
      <div style={{fontSize:10,color:'var(--tx3)'}}>No imported parts detected. Set any BOM part's Source to "Import" in Tab 2 to enable the landed cost calculator, Incoterms reference, and duty computations.</div>
    </div>}

    {/* ─── TRANSPORT ALLOCATION MATRIX ─── */}
    <TransportAllocationCard state={state} dispatch={dispatch}/>

    {/* ─── SUPPLIER SCORECARD ─── */}
    <div className="card">
      <div className="card-title">📊 Supplier Scorecard <span className="badge" style={{background:'rgba(0,212,170,.1)',color:'var(--ac)'}}>Performance Tracking</span></div>
      <div style={{fontSize:10,color:'var(--tx3)',marginBottom:6}}>Rate each supplier on Quality, Delivery, Cost, Service. Traffic light: Green (≥80%) → preferred. Amber (60-79%) → corrective action. Red (&lt;60%) → phase-out.</div>
      <div style={{overflowX:'auto'}}>
        <table className="data-table">
          <thead><tr><th>Part</th><th>Product</th><th>Source</th><th>Trans Mode</th><th>Rate/u</th><th>Pay Terms</th><th>Hold%</th><th>Yield%</th><th>Shelf (d)</th><th>Contract Px</th><th>Change Day</th><th>VMI</th></tr></thead>
          <tbody>{allParts.map((b,i)=><tr key={i}>
            <td style={{fontWeight:600}}>{b.name}</td>
            <td style={{color:'var(--tx2)',fontSize:10}}>{b.productName}</td>
            <td><span style={{padding:'1px 6px',borderRadius:8,fontSize:9,background:b.supplierType==='import'?'rgba(240,180,41,.15)':'rgba(63,185,80,.15)',color:b.supplierType==='import'?'var(--a4)':'var(--gn)'}}>{b.supplierType}</span></td>
            <td style={{fontSize:9,color:'var(--a2)'}}>{(b.transMode||'perUnit').toUpperCase()}</td>
            <td className="num">{cur}{b.transRate||0.5}/u</td>
            <td className="num">Net {b.payTermDays||30}d {(b.earlyPayDisc||0)>0&&<span style={{color:'var(--gn)',fontSize:8}}>({b.earlyPayDisc}% disc)</span>}</td>
            <td className="num">{b.holdPct||24}%</td>
            <td className="num" style={{color:(b.partYield||98)<95?'var(--dg)':'var(--gn)'}}>{b.partYield||98}%</td>
            <td className="num" style={{color:(b.rmShelf||90)<30?'var(--dg)':'var(--tx)'}}>{b.rmShelf||90}d</td>
            <td className="num">{b.nextCost&&b.nextCost!==b.cost?<span style={{color:'var(--a4)'}}>{cur}{b.cost}→{cur}{b.nextCost}</span>:<span>{cur}{b.cost}</span>}</td>
            <td className="num" style={{color:(b.changeDay||999)<180?'var(--a4)':'var(--tx3)'}}>{(b.changeDay||999)<999?`Day ${b.changeDay}`:'—'}</td>
            <td>{b.vmi?<span style={{color:'var(--ac)',fontSize:9}}>✓ VMI</span>:<span style={{color:'var(--tx3)',fontSize:9}}>No</span>}</td>
          </tr>)}</tbody>
        </table>
      </div>
    </div>
  </div>
}

// ─── TAB 4: FINANCE & COSTS ───
function FinanceTab({state,dispatch}){
  const cur=state.config.currency;
  const [deprForm,setDeprForm]=useState({purchase_price:8000000,residual_value:400000,useful_life:10,method:'SLM',wdv_rate:20,total_units:80000,annual_units:'3000,5200,4800,3500,1200'});
  const [deprResult,setDeprResult]=useState(null);
  const [npvForm,setNpvForm]=useState({cash_flows:'-200,15,22,30,42,42,42,42,42,42,42',wacc:8.5});
  const [npvResult,setNpvResult]=useState(null);
  const [waccForm,setWaccForm]=useState({equity_pct:30,debt_pct:70,cost_equity:12,cost_debt:6.5,tax_rate:25});
  const [waccResult,setWaccResult]=useState(null);
  const [bvl,setBvl]=useState({assetCost:5000000,residual:500000,life:10,leaseCost:60000,leaseYears:10,maintBuy:100000,maintLease:0,taxRate:25,wacc:10});

  const calcDepr=async()=>{
    const p={...deprForm,wdv_rate:deprForm.wdv_rate/100};
    if(deprForm.method==='UoP')p.annual_units=deprForm.annual_units.split(',').map(Number);
    try{const r=await fetch('/api/calc/depreciation',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});setDeprResult(await r.json())}catch(e){}
  };
  const calcNPV=async()=>{
    try{const r=await fetch('/api/calc/npv',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cash_flows:npvForm.cash_flows.split(',').map(Number),wacc:npvForm.wacc/100})});setNpvResult(await r.json())}catch(e){}
  };
  const calcWACC=async()=>{
    try{const r=await fetch('/api/calc/wacc',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(waccForm)});setWaccResult(await r.json())}catch(e){}
  };

  // Cost structure summary across SKUs
  const skuCosts=state.products.map(p=>{
    const matCost=p.bom.reduce((a,b)=>a+b.cost*b.qtyPer,0);
    return{name:p.name,matCost,varCost:p.variableCost,setupCost:p.setupCost,sellPrice:p.sellPrice,margin:p.sellPrice-matCost-p.variableCost,marginPct:((p.sellPrice-matCost-p.variableCost)/Math.max(p.sellPrice,1)*100).toFixed(1)}
  });

  // CCC calculation
  const dio=state.products.length>0?Math.round(state.products[0].shelfLife*7/2):15;

  return <div className="animate-in">
    <CashflowWaterfallPanel state={state}/>
    {/* Cost Structure */}
    <div className="card">
      <div className="card-title">📊 Cost Structure per SKU</div>
      <table className="data-table">
        <thead><tr><th>Product</th><th>Material Cost</th><th>Variable Cost</th><th>Setup/Batch</th><th>Unit Cost</th><th>Sell Price</th><th>Margin</th><th>Margin %</th></tr></thead>
        <tbody>{skuCosts.map((s,i)=><tr key={i}>
          <td style={{fontWeight:600}}>{s.name}</td>
          <td className="num">{cur}{s.matCost.toFixed(1)}</td>
          <td className="num">{cur}{s.varCost}</td>
          <td className="num">{cur}{s.setupCost}</td>
          <td className="num" style={{fontWeight:600}}>{cur}{(s.matCost+s.varCost).toFixed(1)}</td>
          <td className="num">{cur}{s.sellPrice}</td>
          <td className="num" style={{color:s.margin>0?'var(--gn)':'var(--dg)',fontWeight:700}}>{cur}{s.margin.toFixed(1)}</td>
          <td className="num" style={{color:+s.marginPct>20?'var(--gn)':+s.marginPct>0?'var(--a4)':'var(--dg)'}}>{s.marginPct}%</td>
        </tr>)}</tbody>
      </table>
    </div>

    {/* Working Capital & CCC */}
    <div className="card">
      <div className="card-title">💳 Working Capital & Cash Conversion Cycle</div>
      <div className="grid4">
        <Field label="DSO (Days Sales Outstanding)"><input type="number" value={state.workingCapital.dso} onChange={e=>dispatch({type:'SET_WC',payload:{dso:+e.target.value}})}/></Field>
        <Field label="DIO (Days Inventory Outstanding)"><input type="number" value={dio} readOnly style={{opacity:0.7}}/></Field>
        <Field label="DPO (Days Payables Outstanding)"><input type="number" value={state.workingCapital.dpo} onChange={e=>dispatch({type:'SET_WC',payload:{dpo:+e.target.value}})}/></Field>
        <Field label="CCC (calculated)"><input value={`${state.workingCapital.dso+dio-state.workingCapital.dpo} days`} readOnly style={{color:'var(--ac)',fontWeight:700}}/></Field>
      </div>
      {(()=>{const ccc=state.workingCapital.dso+dio-state.workingCapital.dpo;return <div style={{fontSize:10,color:'var(--tx3)',marginTop:4}}>CCC = DSO + DIO − DPO = {state.workingCapital.dso} + {dio} − {state.workingCapital.dpo} = <strong style={{color:ccc<30?'var(--gn)':ccc<60?'var(--a4)':'var(--dg)'}}>{ccc} days</strong>. {ccc<0?'Negative CCC — suppliers finance your operations.':ccc<30?'Healthy working capital cycle.':'Consider extending DPO or reducing DSO.'}</div>})()}
    </div>

    {/* Asset Register */}
    <div className="card">
      <div className="card-title">🏭 Asset Register <span className="badge" style={{background:'rgba(56,189,248,.1)',color:'var(--a2)'}}>{state.assets.length} assets</span></div>
      {state.assets.map(a=><div key={a.id} className="bom-row">
        <Field label="Asset Name"><input value={a.name} onChange={e=>dispatch({type:'UPDATE_ASSET',id:a.id,payload:{name:e.target.value}})}/></Field>
        <Field label={`Purchase Price (${cur})`}><input type="number" value={a.purchasePrice} onChange={e=>dispatch({type:'UPDATE_ASSET',id:a.id,payload:{purchasePrice:+e.target.value}})}/></Field>
        <Field label="Residual Value"><input type="number" value={a.residualValue} onChange={e=>dispatch({type:'UPDATE_ASSET',id:a.id,payload:{residualValue:+e.target.value}})}/></Field>
        <Field label="Useful Life (yr)"><input type="number" value={a.usefulLife} onChange={e=>dispatch({type:'UPDATE_ASSET',id:a.id,payload:{usefulLife:+e.target.value}})}/></Field>
        <Field label="Method"><select value={a.method} onChange={e=>dispatch({type:'UPDATE_ASSET',id:a.id,payload:{method:e.target.value}})}><option value="SLM">SLM</option><option value="WDV">WDV</option><option value="UoP">UoP</option></select></Field>
        <Field label="Annual Depr"><input value={`${cur}${Math.round(a.method==='SLM'?(a.purchasePrice-a.residualValue)/a.usefulLife:a.method==='WDV'?a.purchasePrice*(a.wdvRate||20)/100:0).toLocaleString()}`} readOnly style={{color:'var(--a4)',fontWeight:600}}/></Field>
        <button className="btn btn-danger btn-sm" onClick={()=>dispatch({type:'DELETE_ASSET',id:a.id})}>×</button>
      </div>)}
      <button className="btn btn-secondary btn-sm" onClick={()=>dispatch({type:'ADD_ASSET'})}>+ Add Asset</button>
      {state.assets.length>0&&<div style={{marginTop:6,fontSize:10,color:'var(--tx2)'}}>
        Total annual depreciation: <strong style={{color:'var(--a4)'}}>{cur}{state.assets.reduce((s,a)=>s+Math.round(a.method==='SLM'?(a.purchasePrice-a.residualValue)/a.usefulLife:a.purchasePrice*(a.wdvRate||20)/100),0).toLocaleString()}</strong> | 
        Tax shield ({state.config.taxRate}%): <strong style={{color:'var(--gn)'}}>{cur}{Math.round(state.assets.reduce((s,a)=>s+Math.round(a.method==='SLM'?(a.purchasePrice-a.residualValue)/a.usefulLife:a.purchasePrice*(a.wdvRate||20)/100),0)*state.config.taxRate/100).toLocaleString()}</strong>/yr
      </div>}
    </div>

    {/* Buy vs Lease Comparison */}
    {(()=>{
      const annDepr=(bvl.assetCost-bvl.residual)/bvl.life;
      const taxShield=annDepr*bvl.taxRate/100;
      const annBuyCost=annDepr+bvl.maintBuy-taxShield;
      const buyNPV=-bvl.assetCost+Array.from({length:bvl.life},(_,t)=>(-bvl.maintBuy+taxShield)/Math.pow(1+bvl.wacc/100,t+1)).reduce((a,b)=>a+b,0)+bvl.residual/Math.pow(1+bvl.wacc/100,bvl.life);
      const leaseNPV=Array.from({length:bvl.leaseYears},(_,t)=>(-(bvl.leaseCost*12)-bvl.maintLease)/Math.pow(1+bvl.wacc/100,t+1)).reduce((a,b)=>a+b,0);
      return <div className="card">
        <div className="card-title">🔄 Buy vs Lease Comparison <span className="badge" style={{background:'rgba(0,212,170,.1)',color:'var(--ac)'}}>NPV Analysis</span></div>
        <div className="grid2">
          <div style={{padding:8,background:'rgba(56,189,248,.05)',borderRadius:4,border:'1px solid rgba(56,189,248,.2)'}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--a2)',marginBottom:6}}>OPTION A: BUY</div>
            <Field label="Purchase Price"><input type="number" value={bvl.assetCost} onChange={e=>setBvl(v=>({...v,assetCost:+e.target.value}))}/></Field>
            <Field label="Residual Value"><input type="number" value={bvl.residual} onChange={e=>setBvl(v=>({...v,residual:+e.target.value}))}/></Field>
            <Field label="Useful Life (yr)"><input type="number" value={bvl.life} onChange={e=>setBvl(v=>({...v,life:+e.target.value}))}/></Field>
            <Field label="Annual Maintenance"><input type="number" value={bvl.maintBuy} onChange={e=>setBvl(v=>({...v,maintBuy:+e.target.value}))}/></Field>
            <div style={{fontSize:10,color:'var(--tx2)',marginTop:4}}>Annual depreciation: {cur}{Math.round(annDepr).toLocaleString()} | Tax shield: {cur}{Math.round(taxShield).toLocaleString()}/yr</div>
            <div style={{fontSize:13,fontWeight:700,color:buyNPV>leaseNPV?'var(--gn)':'var(--tx)',marginTop:6}}>NPV(Buy): {cur}{Math.round(buyNPV).toLocaleString()}</div>
          </div>
          <div style={{padding:8,background:'rgba(240,180,41,.05)',borderRadius:4,border:'1px solid rgba(240,180,41,.2)'}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--a4)',marginBottom:6}}>OPTION B: LEASE</div>
            <Field label="Monthly Lease Cost"><input type="number" value={bvl.leaseCost} onChange={e=>setBvl(v=>({...v,leaseCost:+e.target.value}))}/></Field>
            <Field label="Lease Term (yr)"><input type="number" value={bvl.leaseYears} onChange={e=>setBvl(v=>({...v,leaseYears:+e.target.value}))}/></Field>
            <Field label="Annual Maintenance"><input type="number" value={bvl.maintLease} onChange={e=>setBvl(v=>({...v,maintLease:+e.target.value}))}/></Field>
            <div style={{fontSize:10,color:'var(--tx2)',marginTop:4}}>Annual lease: {cur}{(bvl.leaseCost*12).toLocaleString()} | No tax shield (IFRS 16: on balance sheet)</div>
            <div style={{fontSize:13,fontWeight:700,color:leaseNPV>buyNPV?'var(--gn)':'var(--tx)',marginTop:6}}>NPV(Lease): {cur}{Math.round(leaseNPV).toLocaleString()}</div>
          </div>
        </div>
        <div style={{marginTop:8,padding:8,background:buyNPV>leaseNPV?'rgba(56,189,248,.08)':'rgba(240,180,41,.08)',borderRadius:4,border:`1px solid ${buyNPV>leaseNPV?'var(--a2)':'var(--a4)'}`,textAlign:'center'}}>
          <strong style={{color:buyNPV>leaseNPV?'var(--a2)':'var(--a4)',fontSize:13}}>RECOMMENDATION: {buyNPV>leaseNPV?'BUY':'LEASE'}</strong>
          <div style={{fontSize:10,color:'var(--tx2)'}}>Savings: {cur}{Math.abs(Math.round(buyNPV-leaseNPV)).toLocaleString()} over {Math.max(bvl.life,bvl.leaseYears)} years (NPV at {bvl.wacc}% WACC)</div>
        </div>
      </div>
    })()}

    {/* Cash Flow Timeline */}
    <div className="card">
      <div className="card-title">💸 Projected Cash Flow Timeline</div>
      {(()=>{
        const data=MONTHS.map((m,i)=>{
          const revenue=state.products.reduce((s,p)=>s+(p.history[i]||0)*p.sellPrice,0);
          const matCost=state.products.reduce((s,p)=>s+(p.history[i]||0)*p.bom.reduce((bs,b)=>bs+b.cost*b.qtyPer,0),0);
          const varCost=state.products.reduce((s,p)=>s+(p.history[i]||0)*p.variableCost,0);
          const depr=state.assets.reduce((s,a)=>s+Math.round((a.method==='SLM'?(a.purchasePrice-a.residualValue)/a.usefulLife:a.purchasePrice*(a.wdvRate||20)/100)/12),0);
          const hedgeCost=state.hedges.reduce((s,h)=>s+Math.round(h.notional*h.forwardRate*0.01/12),0);
          const outflow=matCost+varCost+depr+hedgeCost;
          return{name:m,revenue,outflow,net:revenue-outflow,material:matCost};
        });
        const cumData=[];let cum=0;data.forEach(d=>{cum+=d.net;cumData.push({...d,cumulative:cum})});
        return <div style={{height:200}}>
          <ResponsiveContainer width="100%" height="100%">
            <ComposedChart data={cumData}>
              <CartesianGrid strokeDasharray="3 3" stroke="#21262d"/>
              <XAxis dataKey="name" tick={{fill:'#8b949e',fontSize:9}} stroke="#21262d"/>
              <YAxis tick={{fill:'#8b949e',fontSize:9}} stroke="#21262d"/>
              <Tooltip contentStyle={{background:'#1c2333',border:'1px solid #30363d',borderRadius:4,fontSize:10}}/>
              <Bar dataKey="revenue" fill="#3fb950" opacity={0.5} name="Revenue"/>
              <Bar dataKey="outflow" fill="#f85149" opacity={0.5} name="Outflow"/>
              <Line type="monotone" dataKey="cumulative" stroke="#00d4aa" strokeWidth={2} dot={false} name="Cumulative Net"/>
            </ComposedChart>
          </ResponsiveContainer>
        </div>
      })()}
    </div>

    {/* Currency Hedging */}
    <div className="card">
      <div className="card-title">🛡️ Currency Hedging <span className="badge" style={{background:'rgba(240,180,41,.1)',color:'var(--a4)'}}>{state.hedges.length} hedges</span></div>
      <div style={{fontSize:10,color:'var(--tx3)',marginBottom:6}}>Forward contracts lock exchange rates for future purchases. Hedging cost ≈ 0.5-2% premium. Hedge 50-80% of known exposure; leave 20-50% unhedged to benefit from favorable movements.</div>
      {state.hedges.map(h=><div key={h.id} className="bom-row">
        <Field label="Currency"><select value={h.currency} onChange={e=>dispatch({type:'UPDATE_HEDGE',id:h.id,payload:{currency:e.target.value}})}><option>USD</option><option>EUR</option><option>GBP</option><option>JPY</option><option>CNY</option></select></Field>
        <Field label="Forward Rate"><input type="number" step="0.01" value={h.forwardRate} onChange={e=>dispatch({type:'UPDATE_HEDGE',id:h.id,payload:{forwardRate:+e.target.value}})}/></Field>
        <Field label="Hedge %"><input type="number" value={h.hedgePct} min={0} max={100} onChange={e=>dispatch({type:'UPDATE_HEDGE',id:h.id,payload:{hedgePct:+e.target.value}})}/></Field>
        <Field label={`Notional (${h.currency})`}><input type="number" value={h.notional} onChange={e=>dispatch({type:'UPDATE_HEDGE',id:h.id,payload:{notional:+e.target.value}})}/></Field>
        <Field label="Expiry"><input type="month" value={h.expiry} onChange={e=>dispatch({type:'UPDATE_HEDGE',id:h.id,payload:{expiry:e.target.value}})}/></Field>
        <Field label={`Hedged (${cur})`}><input value={`${cur}${Math.round(h.notional*h.forwardRate*h.hedgePct/100).toLocaleString()}`} readOnly style={{color:'var(--ac)'}}/></Field>
        <button className="btn btn-danger btn-sm" onClick={()=>dispatch({type:'DELETE_HEDGE',id:h.id})}>×</button>
      </div>)}
      <button className="btn btn-secondary btn-sm" onClick={()=>dispatch({type:'ADD_HEDGE'})}>+ Add Hedge</button>
      {state.hedges.length>0&&<div style={{marginTop:6,fontSize:10,color:'var(--tx2)'}}>
        Total hedged exposure: <strong style={{color:'var(--ac)'}}>{cur}{state.hedges.reduce((s,h)=>s+Math.round(h.notional*h.forwardRate*h.hedgePct/100),0).toLocaleString()}</strong> | 
        Unhedged: <strong style={{color:'var(--dg)'}}>{cur}{state.hedges.reduce((s,h)=>s+Math.round(h.notional*h.forwardRate*(100-h.hedgePct)/100),0).toLocaleString()}</strong>
      </div>}
    </div>

    {/* WACC Calculator */}
    <div className="card">
      <div className="card-title">📐 WACC Calculator <span className="badge" style={{background:'rgba(167,139,250,.1)',color:'var(--a3)'}}>For NPV discounting</span></div>
      <div className="grid4">
        <Field label="Equity % of Capital"><input type="number" value={waccForm.equity_pct} onChange={e=>setWaccForm(f=>({...f,equity_pct:+e.target.value,debt_pct:100-e.target.value}))}/></Field>
        <Field label="Debt % of Capital"><input type="number" value={waccForm.debt_pct} onChange={e=>setWaccForm(f=>({...f,debt_pct:+e.target.value,equity_pct:100-e.target.value}))}/></Field>
        <Field label="Cost of Equity %"><input type="number" step="0.1" value={waccForm.cost_equity} onChange={e=>setWaccForm(f=>({...f,cost_equity:+e.target.value}))}/></Field>
        <Field label="Cost of Debt % (pre-tax)"><input type="number" step="0.1" value={waccForm.cost_debt} onChange={e=>setWaccForm(f=>({...f,cost_debt:+e.target.value}))}/></Field>
      </div>
      <button className="btn btn-primary btn-sm" onClick={calcWACC}>Calculate WACC</button>
      {waccResult&&<div className="kpi-row" style={{marginTop:8}}>
        <KPI label="WACC" value={`${waccResult.wacc}%`} sub={`Equity: ${waccResult.equity_component}% + Debt: ${waccResult.debt_component}%`}/>
      </div>}
    </div>

    {/* NPV Calculator */}
    <div className="card">
      <div className="card-title">💎 NPV / IRR Calculator <span className="badge" style={{background:'rgba(63,185,80,.1)',color:'var(--gn)'}}>Investment Decision</span></div>
      <div className="grid2">
        <Field label="Cash Flows (comma separated: Year0,Year1,...)" hint="Negative = outflow. Ex: -200,15,22,30,42,42,42"><input value={npvForm.cash_flows} onChange={e=>setNpvForm(f=>({...f,cash_flows:e.target.value}))}/></Field>
        <Field label="Discount Rate / WACC (%)" hint={waccResult?`Computed WACC: ${waccResult.wacc}%`:'Calculate WACC above or enter manually'}><input type="number" step="0.1" value={npvForm.wacc} onChange={e=>setNpvForm(f=>({...f,wacc:+e.target.value}))}/></Field>
      </div>
      <button className="btn btn-primary btn-sm" onClick={calcNPV}>Calculate NPV</button>
      {npvResult&&!npvResult.error&&<div style={{marginTop:8}}>
        <div className="kpi-row">
          <KPI label="NPV" value={`${cur}${npvResult.npv?.toLocaleString()}`} sub={npvResult.npv>0?'Value creating':'Value destroying'} color={npvResult.npv>0?'var(--gn)':'var(--dg)'}/>
          <KPI label="IRR" value={npvResult.irr!==null?`${npvResult.irr}%`:'N/A'} sub={npvResult.irr>npvForm.wacc?`>${npvForm.wacc}% hurdle ✓`:`<${npvForm.wacc}% hurdle ✗`} color={npvResult.irr>npvForm.wacc?'var(--gn)':'var(--dg)'}/>
          <KPI label="Payback" value={npvResult.payback_discounted!==null?`${npvResult.payback_discounted} yrs`:'Never'} sub="discounted" color="var(--a2)"/>
          <KPI label="Decision" value={npvResult.decision} color={npvResult.decision==='INVEST'?'var(--gn)':'var(--dg)'}/>
        </div>
        <div style={{fontSize:10,color:'var(--tx3)',marginTop:4}}>Rule: NPV {'>'} 0 AND IRR {'>'} WACC → INVEST. NPV = Σ(CF_t / (1+r)^t)</div>
      </div>}
    </div>

    {/* Depreciation Calculator */}
    <div className="card">
      <div className="card-title">📉 Asset Depreciation Calculator <span className="badge" style={{background:'rgba(56,189,248,.1)',color:'var(--a2)'}}>IAS 16</span></div>
      <div className="grid4">
        <Field label="Purchase Price"><input type="number" value={deprForm.purchase_price} onChange={e=>setDeprForm(f=>({...f,purchase_price:+e.target.value}))}/></Field>
        <Field label="Residual Value"><input type="number" value={deprForm.residual_value} onChange={e=>setDeprForm(f=>({...f,residual_value:+e.target.value}))}/></Field>
        <Field label="Useful Life (years)"><input type="number" value={deprForm.useful_life} onChange={e=>setDeprForm(f=>({...f,useful_life:+e.target.value}))}/></Field>
        <Field label="Method"><select value={deprForm.method} onChange={e=>setDeprForm(f=>({...f,method:e.target.value}))}><option value="SLM">Straight-Line (SLM)</option><option value="WDV">Written Down Value (WDV)</option><option value="UoP">Units of Production</option></select></Field>
        {deprForm.method==='WDV'&&<Field label="WDV Rate %"><input type="number" value={deprForm.wdv_rate} onChange={e=>setDeprForm(f=>({...f,wdv_rate:+e.target.value}))}/></Field>}
        {deprForm.method==='UoP'&&<><Field label="Total Lifetime Units"><input type="number" value={deprForm.total_units} onChange={e=>setDeprForm(f=>({...f,total_units:+e.target.value}))}/></Field>
        <Field label="Annual Units (comma sep)"><input value={deprForm.annual_units} onChange={e=>setDeprForm(f=>({...f,annual_units:e.target.value}))}/></Field></>}
      </div>
      <button className="btn btn-primary btn-sm" onClick={calcDepr}>Calculate Depreciation</button>
      {deprResult&&deprResult.schedule&&<div style={{marginTop:8}}>
        <div style={{fontSize:10,color:'var(--tx2)',marginBottom:4}}>Depreciable amount: {cur}{deprResult.depreciable_amount?.toLocaleString()} | Method: {deprResult.method}</div>
        <div style={{overflowX:'auto',maxHeight:200}}>
          <table className="data-table">
            <thead><tr><th>Year</th>{deprForm.method==='UoP'&&<th>Units</th>}<th>Depreciation</th><th>Book Value</th><th>Tax Shield ({state.config.taxRate}%)</th></tr></thead>
            <tbody>{deprResult.schedule.map(s=><tr key={s.year}>
              <td>{s.year}</td>
              {deprForm.method==='UoP'&&<td className="num">{s.units?.toLocaleString()}</td>}
              <td className="num" style={{color:'var(--a4)'}}>{cur}{s.depreciation?.toLocaleString()}</td>
              <td className="num">{cur}{s.book_value?.toLocaleString()}</td>
              <td className="num" style={{color:'var(--gn)'}}>{cur}{Math.round(s.depreciation*state.config.taxRate/100).toLocaleString()}</td>
            </tr>)}</tbody>
          </table>
        </div>
        {deprResult.schedule.length>1&&<div style={{height:160,marginTop:8}}>
          <ResponsiveContainer width="100%" height="100%">
            <ComposedChart data={deprResult.schedule.map(s=>({year:`Yr${s.year}`,dep:s.depreciation,bv:s.book_value}))}>
              <CartesianGrid strokeDasharray="3 3" stroke="#21262d"/>
              <XAxis dataKey="year" tick={{fill:'#8b949e',fontSize:9}} stroke="#21262d"/>
              <YAxis tick={{fill:'#8b949e',fontSize:9}} stroke="#21262d"/>
              <Tooltip contentStyle={{background:'#1c2333',border:'1px solid #30363d',borderRadius:4,fontSize:10}}/>
              <Bar dataKey="dep" fill="#f0b429" opacity={0.6} name="Depreciation"/>
              <Line type="monotone" dataKey="bv" stroke="#38bdf8" strokeWidth={2} dot={false} name="Book Value"/>
            </ComposedChart>
          </ResponsiveContainer>
        </div>}
      </div>}
    </div>
  </div>
}

// ─── TAB 6: ANALYSIS & REPORTS ───
function AnalysisTab({state,dispatch}){
  const cur=state.config.currency;
  const [mcResult,setMcResult]=useState(null);
  const [sensResult,setSensResult]=useState(null);
  const [researchResult,setResearchResult]=useState(null);
  const [mcRuns,setMcRuns]=useState(1000);
  const [researchN,setResearchN]=useState(200);
  const [loading,setLoading]=useState('');
  const [alerts,setAlerts]=useState([]);
  const [evm,setEvm]=useState({bac:1000000,pctPlanned:40,pctActual:35,actualCost:380000});
  const [wiQuery,setWiQuery]=useState('');
  const [wiResult,setWiResult]=useState(null);
  const [wiLoading,setWiLoading]=useState(false);

  const buildPayload=()=>({
    products:state.products.map(p=>({
      name:p.name,demand:p.history.flatMap(m=>{const w=Math.round(m/4);return[w,w,w,m-3*w]}).slice(0,state.planning.periods),
      capacity:p.capacity,setup_cost:p.setupCost,variable_cost:p.variableCost,sell_price:p.sellPrice,shelf_life:p.shelfLife,yield_pct:p.yieldPct,init_inventory:p.initInventory,mape_pct:15,
      parts:p.bom.map(b=>({name:b.name,cost:b.cost,qty_per:b.qtyPer,cost_cv:0.05,lead_time:b.leadTime,moq:b.moq,max_order:b.maxOrder,hold_pct:b.holdPct,ordering_cost:b.orderingCost})),
    })),
    params:{periods:state.planning.periods,carry_rate:0.24,service_level:state.config.serviceLevel},
  });

  const runMC=async()=>{
    setLoading('mc');
    try{const r=await fetch('/api/solve/montecarlo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...buildPayload(),n_runs:mcRuns})});setMcResult(await r.json())}catch(e){}
    setLoading('');
  };

  const runSens=async()=>{
    setLoading('sens');
    try{const r=await fetch('/api/solve/sensitivity',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      base_data:buildPayload(),
      param_ranges:{
        'service_level':[0.85,0.90,0.95,0.99],
        'carry_rate':[0.15,0.20,0.24,0.30,0.40],
      },
    })});setSensResult(await r.json())}catch(e){}
    setLoading('');
  };

  const runResearch=async(mode)=>{
    setLoading('research');
    try{const r=await fetch('/api/solve/researcher',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({base_data:buildPayload(),mode:mode||'fixed',n_experiments:researchN})});setResearchResult(await r.json())}catch(e){}
    setLoading('');
  };

  // Generate alerts
  useEffect(()=>{
    const a=[];
    state.products.forEach(p=>{
      if(p.shelfLife<8)a.push({sev:'warn',msg:`${p.name}: short shelf life (${p.shelfLife}wk) — high expiry risk`});
      if(p.bom.length===1)a.push({sev:'info',msg:`${p.name}: single-source material (${p.bom[0].name}) — consider backup supplier`});
      p.bom.forEach(b=>{
        if(b.leadTime>4)a.push({sev:'warn',msg:`${p.name}/${b.name}: long lead time (${b.leadTime}wk) — maintain higher safety stock`});
        if(b.supplierType==='import'&&!b.incoterm)a.push({sev:'info',msg:`${p.name}/${b.name}: import part without Incoterm set`});
      });
      const avgDemand=p.history.reduce((s,v)=>s+v,0)/12;
      if(p.capacity*4<avgDemand)a.push({sev:'critical',msg:`${p.name}: monthly capacity (${p.capacity*4}) < avg demand (${Math.round(avgDemand)}) — capacity shortage!`});
    });
    setAlerts(a);
  },[state.products]);

  return <div className="animate-in">
    <ScenarioComparePanel state={state}/>
    {/* Control Tower */}
    <div className="card">
      <div className="card-title">🚨 Control Tower <span className="badge" style={{background:alerts.some(a=>a.sev==='critical')?'rgba(248,81,73,.15)':'rgba(63,185,80,.15)',color:alerts.some(a=>a.sev==='critical')?'var(--dg)':'var(--gn)'}}>{alerts.length} alerts</span></div>
      {alerts.length===0?<div style={{color:'var(--gn)',fontSize:11}}>✅ All clear — no alerts</div>:
        alerts.map((a,i)=><div key={i} style={{padding:'4px 8px',marginBottom:3,borderRadius:4,fontSize:11,borderLeft:`3px solid ${a.sev==='critical'?'var(--dg)':a.sev==='warn'?'var(--a4)':'var(--a2)'}`,background:a.sev==='critical'?'rgba(248,81,73,.05)':a.sev==='warn'?'rgba(240,180,41,.05)':'rgba(56,189,248,.05)'}}>
          {a.sev==='critical'?'🔴':a.sev==='warn'?'🟡':'🔵'} {a.msg}
        </div>)
      }
    </div>

    {/* MC + Sensitivity + Researcher buttons */}
    <div className="card">
      <div className="card-title">🔬 Analysis Engine</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
        <button className="btn btn-primary" onClick={runMC} disabled={!!loading}>{loading==='mc'?'Running MC...':'🎲 Monte Carlo'}</button>
        <span style={{fontSize:10,color:'var(--tx3)'}}>Runs:</span><input type="number" value={mcRuns} onChange={e=>setMcRuns(+e.target.value)} style={{width:60,padding:'4px 6px',fontSize:10}} min={100} max={10000} step={100}/>
        <span style={{margin:'0 8px',color:'var(--br2)'}}>|</span>
        <button className="btn btn-secondary" onClick={runSens} disabled={!!loading}>{loading==='sens'?'Sweeping...':'📊 Sensitivity'}</button>
        <span style={{margin:'0 8px',color:'var(--br2)'}}>|</span>
        <button className="btn btn-secondary" onClick={()=>runResearch('fixed')} disabled={!!loading}>{loading==='research'?'Researching...':'🔬 Researcher (Fixed)'}</button>
        <button className="btn btn-secondary" onClick={()=>runResearch('upgrade')} disabled={!!loading}>🔬 Upgrade</button>
        <span style={{fontSize:10,color:'var(--tx3)'}}>N:</span><input type="number" value={researchN} onChange={e=>setResearchN(+e.target.value)} style={{width:60,padding:'4px 6px',fontSize:10}} min={20} max={500} step={10}/>
      </div>
    </div>

    {/* MC Results */}
    {mcResult&&!mcResult.error&&<div className="card">
      <div className="card-title">🎲 Monte Carlo Results <span className="badge" style={{background:'rgba(248,81,73,.1)',color:'var(--dg)'}}>{mcResult.n_runs} runs · {mcResult.solve_time}s</span></div>
      <div className="kpi-row">
        <KPI label="Avg Cost" value={`${cur}${mcResult.avg_cost?.toLocaleString()}`} sub="expected"/>
        <KPI label="P10" value={`${cur}${mcResult.p10?.toLocaleString()}`} sub="best 10%" color="var(--gn)"/>
        <KPI label="P90" value={`${cur}${mcResult.p90?.toLocaleString()}`} sub="worst 10%" color="var(--a4)"/>
        <KPI label="VaR₉₅" value={`${cur}${mcResult.var95?.toLocaleString()}`} sub="95% confidence" color="var(--dg)"/>
        <KPI label="CVaR₉₅" value={`${cur}${mcResult.cvar95?.toLocaleString()}`} sub="avg worst 5%" color="var(--dg)"/>
        <KPI label="Fragility" value={`${mcResult.fragility}×`} sub={mcResult.fragility<1.3?'Robust':mcResult.fragility<1.8?'Moderate':'Fragile'} color={mcResult.fragility<1.3?'var(--gn)':'var(--dg)'}/>
        <KPI label="Fill Rate" value={`${mcResult.avg_fill}%`} sub={`min: ${mcResult.min_fill}%`} color="var(--a2)"/>
      </div>
      {mcResult.histogram&&<div style={{height:180,marginTop:8}}>
        <ResponsiveContainer width="100%" height="100%">
          <BarChart data={mcResult.histogram.counts.map((c,i)=>({bin:`${cur}${Math.round(mcResult.histogram.bins[i]/1000)}K`,count:c}))}>
            <CartesianGrid strokeDasharray="3 3" stroke="#21262d"/>
            <XAxis dataKey="bin" tick={{fill:'#8b949e',fontSize:8}} stroke="#21262d" interval={2}/>
            <YAxis tick={{fill:'#8b949e',fontSize:9}} stroke="#21262d"/>
            <Tooltip contentStyle={{background:'#1c2333',border:'1px solid #30363d',borderRadius:4,fontSize:10}}/>
            <Bar dataKey="count" fill="#a78bfa" opacity={0.7} name="Frequency"/>
          </BarChart>
        </ResponsiveContainer>
      </div>}
      <div style={{fontSize:9,color:'var(--tx3)',marginTop:4}}>Reading: "95% of the time, annual cost stays below {cur}{mcResult.var95?.toLocaleString()}. In the worst 5%, it averages {cur}{mcResult.cvar95?.toLocaleString()}." Fragility = VaR/Avg = {mcResult.fragility}×</div>
    </div>}

    {/* Sensitivity Results */}
    {sensResult&&sensResult.results&&<div className="card">
      <div className="card-title">📊 Sensitivity Analysis <span className="badge" style={{background:'rgba(167,139,250,.1)',color:'var(--a3)'}}>{sensResult.results.length} scenarios</span></div>
      <table className="data-table">
        <thead><tr><th>Parameter</th><th>Value</th><th>Avg Cost</th><th>VaR₉₅</th><th>Fill %</th></tr></thead>
        <tbody>{sensResult.results.map((r,i)=><tr key={i}>
          <td>{r.param.replace(/_/g,' ')}</td><td className="num">{typeof r.value==='number'&&r.value<1?(r.value*100).toFixed(0)+'%':r.value}</td>
          <td className="num">{cur}{r.avg_cost?.toLocaleString()}</td>
          <td className="num" style={{color:'var(--dg)'}}>{cur}{r.var95?.toLocaleString()}</td>
          <td className="num" style={{color:r.fill>95?'var(--gn)':'var(--a4)'}}>{r.fill}%</td>
        </tr>)}</tbody>
      </table>
      {/* Tornado Chart */}
      {(()=>{
        // Group by parameter and compute range
        const params={};
        sensResult.results.forEach(r=>{if(!params[r.param])params[r.param]={min:Infinity,max:-Infinity,minVal:null,maxVal:null};
          if(r.avg_cost<params[r.param].min){params[r.param].min=r.avg_cost;params[r.param].minVal=r.value}
          if(r.avg_cost>params[r.param].max){params[r.param].max=r.avg_cost;params[r.param].maxVal=r.value}
        });
        const tornado=Object.entries(params).map(([name,d])=>({name:name.replace(/_/g,' '),low:Math.round(d.min),high:Math.round(d.max),range:Math.round(d.max-d.min)})).sort((a,b)=>b.range-a.range);
        if(tornado.length<1)return null;
        const midpoint=Math.round(tornado.reduce((s,t)=>s+(t.low+t.high)/2,0)/tornado.length);
        return <div style={{marginTop:10}}>
          <div style={{fontSize:11,fontWeight:600,color:'var(--a3)',marginBottom:6}}>Tornado Chart — Cost Impact by Parameter</div>
          {tornado.map((t,i)=>{
            const maxRange=tornado[0].range||1;
            const leftPct=Math.max(5,((t.low-midpoint+maxRange/2)/maxRange)*45);
            const rightPct=Math.max(5,((t.high-midpoint+maxRange/2)/maxRange)*45);
            return <div key={i} style={{display:'flex',alignItems:'center',marginBottom:4,fontSize:10}}>
              <div style={{width:100,textAlign:'right',paddingRight:8,color:'var(--tx2)',flexShrink:0}}>{t.name}</div>
              <div style={{flex:1,display:'flex',alignItems:'center',height:20,position:'relative'}}>
                <div style={{position:'absolute',left:'50%',width:1,height:'100%',background:'var(--br2)'}}/>
                <div style={{marginLeft:`${50-leftPct/2}%`,width:`${leftPct}%`,height:14,background:'var(--a2)',borderRadius:'3px 0 0 3px',opacity:0.7}}/>
                <div style={{width:`${rightPct}%`,height:14,background:'var(--dg)',borderRadius:'0 3px 3px 0',opacity:0.7}}/>
              </div>
              <div style={{width:80,textAlign:'left',paddingLeft:8,color:'var(--tx3)',flexShrink:0,fontFamily:'JetBrains Mono'}}>{cur}{t.range.toLocaleString()}</div>
            </div>
          })}
          <div style={{fontSize:9,color:'var(--tx3)',marginTop:4}}>Wider bar = higher cost sensitivity. Focus optimization on the top parameter(s).</div>
        </div>
      })()}
    </div>}

    {/* Researcher Results */}
    {researchResult&&researchResult.experiments&&<div className="card">
      <div className="card-title">🔬 Auto-Researcher Results <span className="badge" style={{background:'rgba(0,212,170,.1)',color:'var(--ac)'}}>{researchResult.total_run} experiments · {researchResult.mode}</span></div>
      <div style={{fontSize:10,color:'var(--tx2)',marginBottom:6}}>Baseline cost: {cur}{researchResult.baseline_cost?.toLocaleString()}</div>
      <table className="data-table">
        <thead><tr><th>#</th><th>Configuration</th><th>Avg Cost</th><th>VaR₉₅</th><th>Fill %</th><th>Savings</th></tr></thead>
        <tbody>{researchResult.experiments.slice(0,10).map((e,i)=><tr key={i}>
          <td style={{color:i===0?'var(--ac)':'var(--tx)',fontWeight:i===0?700:400}}>{i+1}</td>
          <td style={{fontSize:9,maxWidth:300}}>{Object.entries(e.config).map(([k,v])=>`${k}=${typeof v==='number'&&v<1?(v*100).toFixed(0)+'%':v}`).join(' · ')}</td>
          <td className="num" style={{fontWeight:i===0?700:400,color:i===0?'var(--ac)':'var(--tx)'}}>{cur}{e.avg_cost?.toLocaleString()}</td>
          <td className="num" style={{color:'var(--dg)'}}>{cur}{e.var95?.toLocaleString()}</td>
          <td className="num">{e.fill}%</td>
          <td className="num" style={{color:e.savings_pct>0?'var(--gn)':'var(--dg)',fontWeight:600}}>{e.savings_pct>0?'+':''}{e.savings_pct}%</td>
        </tr>)}</tbody>
      </table>
    </div>}

    {/* TCO Waterfall */}
    <div className="card">
      <div className="card-title">🏗️ Total Cost of Ownership per SKU</div>
      {state.products.map(p=>{
        const mat=p.bom.reduce((a,b)=>a+b.cost*b.qtyPer,0);
        const annDemand=p.history.reduce((a,b)=>a+b,0);
        const annMat=mat*annDemand;
        const annVar=p.variableCost*annDemand;
        const annSetup=p.setupCost*Math.ceil(annDemand/p.capacity);
        const annHold=annMat*0.24/2; // avg inv * carry rate
        const total=annMat+annVar+annSetup+annHold;
        const bars=[{name:'Material',val:annMat,pct:annMat/total*100},{name:'Production',val:annVar,pct:annVar/total*100},{name:'Setup',val:annSetup,pct:annSetup/total*100},{name:'Holding',val:annHold,pct:annHold/total*100}];
        return <div key={p.id} style={{marginBottom:8}}>
          <div style={{fontSize:11,fontWeight:600,marginBottom:4}}>{p.name} — Annual TCO: <span style={{color:'var(--ac)'}}>{cur}{Math.round(total).toLocaleString()}</span></div>
          <div style={{display:'flex',height:20,borderRadius:4,overflow:'hidden'}}>
            {bars.map(b=><div key={b.name} title={`${b.name}: ${cur}${Math.round(b.val).toLocaleString()} (${b.pct.toFixed(0)}%)`} style={{width:b.pct+'%',minWidth:b.pct>3?'auto':0,background:b.name==='Material'?'#38bdf8':b.name==='Production'?'#a78bfa':b.name==='Setup'?'#f0b429':'#f85149',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,color:'#000',fontWeight:600}}>{b.pct>8?`${b.name} ${b.pct.toFixed(0)}%`:''}</div>)}
          </div>
          <div style={{display:'flex',gap:12,marginTop:3,fontSize:9,color:'var(--tx2)'}}>
            {bars.map(b=><span key={b.name}>■ {b.name}: {cur}{Math.round(b.val).toLocaleString()}</span>)}
          </div>
        </div>
      })}
    </div>

    {/* EVM Tracker */}
    {(()=>{
      const pv=evm.bac*evm.pctPlanned/100,ev=evm.bac*evm.pctActual/100,ac=evm.actualCost;
      const cv=ev-ac,sv=ev-pv,cpi=ac>0?ev/ac:1,spi=pv>0?ev/pv:1;
      const eac=cpi>0?evm.bac/cpi:evm.bac,vac=evm.bac-eac;
      return <div className="card">
        <div className="card-title">📈 EVM — Earned Value Management <span className="badge" style={{background:'rgba(56,189,248,.1)',color:'var(--a2)'}}>Project Mode</span></div>
        <div className="grid4">
          <Field label={`BAC — Budget at Completion (${cur})`}><input type="number" value={evm.bac} onChange={e=>setEvm(v=>({...v,bac:+e.target.value}))}/></Field>
          <Field label="% Planned Complete"><input type="number" value={evm.pctPlanned} min={0} max={100} onChange={e=>setEvm(v=>({...v,pctPlanned:+e.target.value}))}/></Field>
          <Field label="% Actual Complete"><input type="number" value={evm.pctActual} min={0} max={100} onChange={e=>setEvm(v=>({...v,pctActual:+e.target.value}))}/></Field>
          <Field label={`Actual Cost Incurred (${cur})`}><input type="number" value={evm.actualCost} onChange={e=>setEvm(v=>({...v,actualCost:+e.target.value}))}/></Field>
        </div>
        <div className="kpi-row">
          <KPI label="PV (Planned Value)" value={`${cur}${Math.round(pv).toLocaleString()}`}/>
          <KPI label="EV (Earned Value)" value={`${cur}${Math.round(ev).toLocaleString()}`} color="var(--a2)"/>
          <KPI label="AC (Actual Cost)" value={`${cur}${Math.round(ac).toLocaleString()}`} color="var(--a3)"/>
          <KPI label="CV (Cost Var)" value={`${cur}${Math.round(cv).toLocaleString()}`} sub={cv>=0?'Under budget':'Over budget!'} color={cv>=0?'var(--gn)':'var(--dg)'}/>
          <KPI label="SV (Sched Var)" value={`${cur}${Math.round(sv).toLocaleString()}`} sub={sv>=0?'Ahead':'Behind!'} color={sv>=0?'var(--gn)':'var(--dg)'}/>
          <KPI label="CPI" value={cpi.toFixed(2)} sub={cpi>=1?'Cost efficient':'Cost overrun'} color={cpi>=1?'var(--gn)':'var(--dg)'}/>
          <KPI label="SPI" value={spi.toFixed(2)} sub={spi>=1?'On/ahead of sched':'Behind schedule'} color={spi>=1?'var(--gn)':'var(--dg)'}/>
          <KPI label="EAC" value={`${cur}${Math.round(eac).toLocaleString()}`} sub={eac<=evm.bac?'Within budget':'Budget overrun'} color={eac<=evm.bac?'var(--gn)':'var(--dg)'}/>
        </div>
        <div style={{height:120,marginTop:8}}>
          <ResponsiveContainer width="100%" height="100%">
            <BarChart data={[{name:'PV',v:pv},{name:'EV',v:ev},{name:'AC',v:ac},{name:'EAC',v:eac},{name:'BAC',v:evm.bac}]}>
              <CartesianGrid strokeDasharray="3 3" stroke="#21262d"/>
              <XAxis dataKey="name" tick={{fill:'#8b949e',fontSize:10}} stroke="#21262d"/>
              <YAxis tick={{fill:'#8b949e',fontSize:9}} stroke="#21262d"/>
              <Tooltip contentStyle={{background:'#1c2333',border:'1px solid #30363d',borderRadius:4,fontSize:10}}/>
              <Bar dataKey="v" fill="#38bdf8" name="Value"/>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>
    })()}

    {/* ─── COST WATERFALL PER SKU ─── */}
    <div className="card">
      <div className="card-title">📊 Cost Waterfall — TCO per SKU</div>
      {(()=>{
        const data=state.products.map(p=>{
          const annDem=(p.history||[]).slice(-12).reduce((a,b)=>a+b,0);
          const matCost=p.bom.reduce((s,b)=>s+b.cost*b.qtyPer,0)*annDem;
          const transCost=p.bom.reduce((s,b)=>s+(b.transRate||0.5)*b.qtyPer,0)*annDem;
          const laborCost=(p.laborPerUnit||5)*annDem;
          const setupCost=(p.setupCost||50)*Math.ceil(annDem/Math.max(p.capacity||50,1));
          const holdCost=matCost*(p.carryRate||24)/100;
          const fixedCost=(p.fixedFactory||100)*((state.planning.workDays||6)*52);
          const wastePct=(1-(p.yieldPct||0.95))+(p.shelfLife<30?0.05:0.01);
          const wasteCost=matCost*wastePct;
          const total=matCost+transCost+laborCost+setupCost+holdCost+fixedCost+wasteCost;
          const revenue=(p.sellPrice||100)*annDem;
          return{name:p.name,revenue,matCost,transCost,laborCost,setupCost,holdCost,fixedCost,wasteCost,total,margin:revenue-total,marginPct:Math.round((revenue-total)/Math.max(revenue,1)*100)};
        });
        return <div style={{overflowX:'auto'}}>
          <table className="data-table">
            <thead><tr><th>Category</th>{data.map(d=><th key={d.name} style={{color:'var(--ac)'}}>{d.name}</th>)}<th style={{color:'var(--a3)'}}>TOTAL</th></tr></thead>
            <tbody>
              {[['Revenue','revenue','var(--gn)'],['Material','matCost','var(--a2)'],['Transport','transCost','var(--a4)'],['Labor','laborCost','var(--tx2)'],['Setup/Batch','setupCost','var(--a3)'],['Holding','holdCost','var(--a4)'],['Fixed Overhead','fixedCost','var(--tx3)'],['Waste/Expiry','wasteCost','var(--dg)'],['Total Cost','total','var(--dg)'],['Net Margin','margin','var(--gn)']].map(([label,key,color])=>{
                const tot=data.reduce((s,d)=>s+d[key],0);
                return <tr key={key}><td style={{color,fontWeight:key==='margin'||key==='revenue'?700:400}}>{label}</td>
                  {data.map(d=><td key={d.name} className="num" style={{color:key==='margin'?(d[key]>0?'var(--gn)':'var(--dg)'):undefined}}>{cur}{Math.round(d[key]).toLocaleString()}</td>)}
                  <td className="num" style={{fontWeight:700,color:key==='margin'?(tot>0?'var(--gn)':'var(--dg)'):'var(--a3)'}}>{cur}{Math.round(tot).toLocaleString()}</td>
                </tr>
              })}
              <tr><td style={{fontWeight:700,color:'var(--ac)'}}>Margin %</td>{data.map(d=><td key={d.name} className="num" style={{fontWeight:700,color:d.marginPct>0?'var(--gn)':'var(--dg)'}}>{d.marginPct}%</td>)}<td className="num" style={{fontWeight:700}}>{Math.round(data.reduce((s,d)=>s+d.margin,0)/Math.max(data.reduce((s,d)=>s+d.revenue,0),1)*100)}%</td></tr>
            </tbody>
          </table>
        </div>
      })()}
    </div>

    {/* ─── MULTI-SKU COMPARISON ─── */}
    {state.products.length>1&&<div className="card">
      <div className="card-title">📋 Multi-SKU Comparison <span className="badge" style={{background:'rgba(167,139,250,.1)',color:'var(--a3)'}}>{state.products.length} products</span></div>
      <table className="data-table">
        <thead><tr><th>Metric</th>{state.products.map(p=><th key={p.id} style={{color:'var(--ac)'}}>{p.name}</th>)}</tr></thead>
        <tbody>{[
          ['Annual Demand',p=>(p.history||[]).slice(-12).reduce((a,b)=>a+b,0).toLocaleString()+'u'],
          ['Sell Price',p=>cur+p.sellPrice],
          ['Unit Mat Cost',p=>cur+p.bom.reduce((s,b)=>s+b.cost*b.qtyPer,0).toFixed(2)],
          ['Margin/u',p=>{const m=p.sellPrice-p.variableCost-p.bom.reduce((s,b)=>s+b.cost*b.qtyPer,0);return cur+m.toFixed(0)}],
          ['Capacity (u/wk)',p=>p.capacity],
          ['Yield %',p=>Math.round((p.yieldPct||0.95)*100)+'%'],
          ['Shelf Life',p=>(p.shelfLife||52)+' days'],
          ['MAPE %',p=>(p.mape||15)+'%'],
          ['BOM Parts',p=>p.bom.length],
          ['Prod Mode',p=>(p.prodMode||'mts').toUpperCase()],
          ['MTO Orders',p=>p.mtoOrders?.length||0],
          ['Events',p=>p.events?.length||0],
        ].map(([label,fn])=><tr key={label}><td style={{fontWeight:600}}>{label}</td>{state.products.map(p=><td key={p.id} className="num">{fn(p)}</td>)}</tr>)}</tbody>
      </table>
    </div>}

    {/* ─── WORKING CAPITAL PANEL ─── */}
    <div className="card">
      <div className="card-title">💳 Working Capital — Cash Tied Up</div>
      {(()=>{
        const wc=state.products.map(p=>{
          const annDem=(p.history||[]).slice(-12).reduce((a,b)=>a+b,0);
          const monthlyDem=Math.round(annDem/12);
          const matCostPerUnit=p.bom.reduce((s,b)=>s+b.cost*b.qtyPer,0);
          const avgInv=Math.round(monthlyDem/2); // approximate
          const invValue=avgInv*matCostPerUnit;
          // Accounts payable per supplier
          const ap=p.bom.reduce((s,b)=>{
            const monthlySpend=monthlyDem*b.qtyPer*b.cost;
            return s+monthlySpend*(b.payTermDays||30)/30;
          },0);
          // Accounts receivable
          const monthlyRev=monthlyDem*p.sellPrice;
          const ar=monthlyRev*(p.dso||30)/30;
          const netWC=invValue+ar-ap;
          return{name:p.name,invValue:Math.round(invValue),ap:Math.round(ap),ar:Math.round(ar),netWC:Math.round(netWC)};
        });
        const totals={invValue:wc.reduce((s,w)=>s+w.invValue,0),ap:wc.reduce((s,w)=>s+w.ap,0),ar:wc.reduce((s,w)=>s+w.ar,0),netWC:wc.reduce((s,w)=>s+w.netWC,0)};
        return <table className="data-table">
          <thead><tr><th>Item</th>{wc.map(w=><th key={w.name}>{w.name}</th>)}<th style={{color:'var(--a3)'}}>Total</th></tr></thead>
          <tbody>
            <tr><td>Inventory Value</td>{wc.map(w=><td key={w.name} className="num">{cur}{w.invValue.toLocaleString()}</td>)}<td className="num" style={{fontWeight:700}}>{cur}{totals.invValue.toLocaleString()}</td></tr>
            <tr><td>Accts Receivable (DSO)</td>{wc.map(w=><td key={w.name} className="num" style={{color:'var(--a2)'}}>{cur}{w.ar.toLocaleString()}</td>)}<td className="num" style={{fontWeight:700,color:'var(--a2)'}}>{cur}{totals.ar.toLocaleString()}</td></tr>
            <tr><td>Accts Payable (DPO)</td>{wc.map(w=><td key={w.name} className="num" style={{color:'var(--gn)'}}>{cur}{w.ap.toLocaleString()}</td>)}<td className="num" style={{fontWeight:700,color:'var(--gn)'}}>{cur}{totals.ap.toLocaleString()}</td></tr>
            <tr style={{fontWeight:700}}><td>Net Working Capital</td>{wc.map(w=><td key={w.name} className="num" style={{color:w.netWC<0?'var(--gn)':'var(--a4)'}}>{cur}{w.netWC.toLocaleString()}</td>)}<td className="num" style={{color:totals.netWC<0?'var(--gn)':'var(--a4)'}}>{cur}{totals.netWC.toLocaleString()}</td></tr>
          </tbody>
        </table>
      })()}
      <div style={{fontSize:9,color:'var(--tx3)',marginTop:4}}>NWC = Inventory + AR − AP. Negative = suppliers finance your operations. Each supplier's AP uses their payment terms (PayDays in BOM). AR uses product DSO.</div>
    </div>

    {/* ─── FVA (Forecast Value Add) ─── */}
    {state.products.some(p=>(p.actuals||[]).filter(a=>a!==null&&a!==undefined).length>=3)&&<div className="card">
      <div className="card-title">📐 FVA — Forecast Value Add</div>
      <div style={{fontSize:10,color:'var(--tx3)',marginBottom:6}}>Did human overrides improve or degrade forecast accuracy vs the statistical models?</div>
      <table className="data-table">
        <thead><tr><th>Product</th><th>Stat MAPE</th><th>Override MAPE</th><th>FVA</th><th>Verdict</th></tr></thead>
        <tbody>{state.products.map(p=>{
          const actuals=(p.actuals||[]).filter(a=>a!==null&&a!==undefined);
          if(actuals.length<3)return null;
          const indices=[];(p.actuals||[]).forEach((a,i)=>{if(a!==null&&a!==undefined)indices.push(i)});
          // Stat forecast MAPE (from consensus)
          const consensus2=runAllForecasts(p.history).slice(0,3);
          const consFcst=consensus2.length?consensus2[0].forecast:p.history.slice(-12);
          const statMape=indices.reduce((s,idx,j)=>s+Math.abs(actuals[j]-(consFcst[idx]||0))/Math.max(actuals[j],1),0)/actuals.length*100;
          // Override MAPE (if overrides exist)
          const overridden=(p.overrides||[]).some(o=>o!==null);
          const ovrMape=overridden?indices.reduce((s,idx,j)=>{
            const ovrVal=p.overrides?.[idx]!==null?p.overrides[idx]:(consFcst[idx]||0);
            return s+Math.abs(actuals[j]-ovrVal)/Math.max(actuals[j],1);
          },0)/actuals.length*100:statMape;
          const fva=Math.round(statMape-ovrMape);
          return <tr key={p.id}>
            <td style={{fontWeight:600}}>{p.name}</td>
            <td className="num">{statMape.toFixed(1)}%</td>
            <td className="num">{ovrMape.toFixed(1)}%</td>

          </tr>
        })}</tbody>
      </table>
    </div>}
