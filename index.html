      <div className="card" style={{borderColor:'var(--a3)'}}>
        <div className="card-title">🔄 Rolling-Horizon MPS — Nervousness Report
          <span className="badge" style={{background:'rgba(167,139,250,.12)',color:'var(--a3)',marginLeft:6}}>{result.waves?.length||0} waves</span>
        </div>
        <div style={{fontSize:10,color:'var(--tx2)',marginBottom:8}}>Re-ran procurement over {result.waves?.length} rolling waves, each shifted by {result.shift_weeks} weeks with first {result.frozen_weeks} weeks frozen. Total nervousness = total absolute qty delta across re-plans (lower = more stable).</div>
        <div className="kpi-row">
          <KPI label="Waves Solved" value={result.waves?.filter(w=>!w.error).length||0} color="var(--a2)"/>
          <KPI label="Nervousness" value={result.nervousness?.toLocaleString()||0} color={result.nervousness>500?'var(--dg)':result.nervousness>100?'var(--a4)':'var(--gn)'}/>
          <KPI label="Frozen Horizon" value={`${result.frozen_weeks}w`} color="var(--a3)"/>
          <KPI label="Shift Step" value={`${result.shift_weeks}w`}/>
          <KPI label="Final Cost" value={`${cur}${result.final_plan?.total_cost?.toLocaleString()||0}`} color="var(--gn)"/>
        </div>
      </div>

      {result.waves?.length>0&&<div className="card">
        <div className="card-title">📈 Wave-by-Wave Comparison</div>
        <table className="data-table" style={{fontSize:10}}>
          <thead><tr><th>Wave</th><th>Shift (wks)</th><th className="num">Total Cost</th><th className="num">Δ vs Wave 0</th><th className="num">Solve Time</th><th>Status</th></tr></thead>
          <tbody>{result.waves.map((w,i)=>{
            const base=result.waves[0]?.total_cost||0;
            const delta=w.total_cost-base;
            const pct=base?((delta/base)*100).toFixed(1):'0';
            return <tr key={i}>
              <td style={{fontWeight:600,color:'var(--ac)'}}>Wave {w.wave+1}</td>
              <td style={{fontFamily:'JetBrains Mono',fontSize:9}}>+{w.shift_weeks}w</td>
              <td className="num" style={{fontWeight:700}}>{cur}{w.total_cost?.toLocaleString()}</td>
              <td className="num" style={{color:delta>0?'var(--dg)':delta<0?'var(--gn)':'var(--tx3)'}}>{i===0?'baseline':`${delta>=0?'+':''}${cur}${delta.toLocaleString()} (${pct}%)`}</td>
              <td className="num" style={{fontSize:9,color:'var(--tx2)'}}>{w.solve_time}s</td>
              <td style={{color:w.error?'var(--dg)':'var(--gn)',fontSize:9,fontWeight:600}}>{w.error?`✗ ${w.error}`:'✓ Optimal'}</td>
            </tr>;
          })}</tbody>
        </table>
      </div>}

      {result.final_plan&&result.final_plan.materials?.length>0&&<div className="card">
        <div className="card-title">🧾 Final Wave — Settled PO Register
          <span className="badge" style={{background:'rgba(0,212,170,.12)',color:'var(--ac)',marginLeft:6}}>{result.final_plan.materials.reduce((a,m)=>a+(m.purchase_orders?.length||0),0)} POs</span>
        </div>
        <div style={{fontSize:10,color:'var(--tx3)',marginBottom:6}}>After all rolling re-plans converged, these are the POs to execute. Weeks 1-{result.frozen_weeks} are frozen; later weeks remain re-plannable.</div>
        <div style={{overflowX:'auto',maxHeight:400}}>
          <table className="data-table" style={{fontSize:10}}>
            <thead style={{position:'sticky',top:0,background:'var(--bg2)'}}>
              <tr><th>PO #</th><th>Material</th><th>Issue Wk</th><th>Arrive Wk</th><th className="num">Qty</th><th className="num">Ext Cost</th><th>Zone</th></tr>
            </thead>
            <tbody>{(()=>{
              let poNum=0;const rows=[];
              result.final_plan.materials.forEach(m=>{
                (m.purchase_orders||[]).forEach(po=>{
                  poNum++;
                  const frozen=po.period<(result.frozen_weeks||2);
                  rows.push(<tr key={poNum} style={frozen?{background:'rgba(167,139,250,.05)'}:{}}>
                    <td style={{fontFamily:'JetBrains Mono',fontSize:9,fontWeight:600,color:'var(--a2)'}}>PO-{String(poNum).padStart(4,'0')}</td>
                    <td style={{fontWeight:600}}>{m.name}</td>
                    <td style={{fontFamily:'JetBrains Mono',fontSize:9}}>W{po.period+1}</td>
                    <td style={{fontFamily:'JetBrains Mono',fontSize:9,color:'var(--ac)'}}>W{po.arrive_period+1}</td>
                    <td className="num" style={{color:'var(--ac)',fontWeight:700}}>{po.quantity.toLocaleString()}</td>
                    <td className="num" style={{fontWeight:700}}>{cur}{Math.round(po.cost).toLocaleString()}</td>
                    <td style={{fontSize:9,color:frozen?'var(--a3)':'var(--tx2)',fontWeight:frozen?700:400}}>{frozen?'🔒 FROZEN':'🔓 OPEN'}</td>
                  </tr>);
                });
              });
              return rows.length?rows:[<tr key="empty"><td colSpan={7} style={{textAlign:'center',color:'var(--tx3)',padding:12}}>No POs in final plan</td></tr>];
            })()}</tbody>
          </table>
        </div>
      </div>}

      <div className="card" style={{background:'rgba(167,139,250,.05)',borderColor:'var(--a3)'}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--a3)',marginBottom:4}}>💡 Interpretation Guide</div>
        <div style={{fontSize:10,color:'var(--tx)',lineHeight:1.5}}>
          <strong>Low nervousness (&lt;100):</strong> Plan is stable — frozen zone is long enough, or demand is well-predicted. Suppliers get consistent POs.<br/>
          <strong>Medium (100-500):</strong> Some re-planning churn — consider lengthening frozen zone or smoothing demand forecast.<br/>
          <strong>High (&gt;500):</strong> Plan thrash — suppliers receive conflicting signals. Widen frozen horizon, add safety stock, or improve demand sensing.
        </div>
      </div>
    </div>}

    {/* MILP Export */}
    <div className="card">
      <div className="card-title">📤 MILP Export & Data Management</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        <button className="btn btn-secondary btn-sm" onClick={()=>{
          let py='# Enterprise Simulator — MILP Export\n# Run: pip install pulp numpy && python this_file.py\nimport pulp, numpy as np\n\n';
          py+='# PRODUCTS\nproducts = '+JSON.stringify(state.products.map(p=>({name:p.name,demand:demandByPeriod(p,state.planning),capacity:p.capacity,setup_cost:p.setupCost,variable_cost:p.variableCost,sell_price:p.sellPrice,shelf_life_days:p.shelfLife,shelf_life_periods:shelfLifeToPeriods(p.shelfLife,state.planning),shelf_life:shelfLifeToPeriods(p.shelfLife,state.planning),demand_mode:p.demandMode||"mts-weekly",milk_run_per_period:milkRunPerPeriod(p),actuals_override:(p.actuals||null),yield_pct:p.yieldPct,parts:p.bom.map(b=>({name:b.name,cost:b.cost,qty_per:b.qtyPer,lead_time:b.leadTime,moq:b.moq,max_order:b.maxOrder,hold_pct:b.holdPct,ordering_cost:b.orderingCost}))})),null,2)+'\n\n';
          py+='# Copy into milp_v3_fixed.py or use the /api/solve/procurement endpoint\n';
          py+='print("Products:", len(products))\nfor p in products:\n    print(f"  {p[\'name\']}: demand={sum(p[\'demand\'])}u, parts={len(p[\'parts\'])}")\n';
          const blob=new Blob([py],{type:'text/python'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='milp_export.py';a.click();
        }}>📤 Export MILP (.py)</button>
        <button className="btn btn-secondary btn-sm" onClick={()=>{
          const data=JSON.stringify(state,null,2);const blob=new Blob([data],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='simulator_state.json';a.click();
        }}>💾 Save State (JSON)</button>
        <label className="btn btn-secondary btn-sm" style={{cursor:'pointer'}}>📂 Load State<input type="file" accept=".json" style={{display:'none'}} onChange={e=>{
          const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);Object.keys(d).forEach(k=>{if(k==='config')dispatch({type:'SET_CONFIG',payload:d[k]});else if(k==='products'){d[k].forEach((p,i)=>{if(i<state.products.length)dispatch({type:'UPDATE_PRODUCT',id:state.products[i].id,payload:p})})}});alert('State loaded')}catch(ex){alert('Invalid file')}};r.readAsText(f);
        }}/></label>
      </div>
    </div>

    {/* Scenario Save/Load */}
    <div className="card">
      <div className="card-title">📊 Scenarios <span className="badge" style={{background:'rgba(167,139,250,.1)',color:'var(--a3)'}}>{state.scenarios.length} saved</span></div>
      <div style={{display:'flex',gap:8,marginBottom:8}}>
        <button className="btn btn-primary btn-sm" onClick={()=>{const name=prompt('Scenario name:','Scenario '+(state.scenarios.length+1));if(name)dispatch({type:'SAVE_SCENARIO',name})}}>💾 Save Current</button>
      </div>
      {state.scenarios.map(sc=><div key={sc.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 8px',borderBottom:'1px solid var(--br)',fontSize:11}}>
        <span><strong>{sc.name}</strong> <span style={{color:'var(--tx3)',fontSize:9}}>{sc.time}</span></span>
        <span><button className="btn btn-secondary btn-sm" onClick={()=>dispatch({type:'LOAD_SCENARIO',id:sc.id})}>Load</button> <button className="btn btn-danger btn-sm" onClick={()=>dispatch({type:'DELETE_SCENARIO',id:sc.id})}>×</button></span>
      </div>)}
    </div>

    {/* ATP/CTP */}
    <MPSVizCard state={state} dispatch={dispatch}/>
    <InventoryProjectionCard state={state}/>
    <MILPFormCard state={state}/>
    <div className="card">
      <div className="card-title">📦 Order Promising (ATP/CTP)</div>
      <div className="grid4">
        <Field label="Order Quantity"><NumInput value={atpQty} onChange={v=>setAtpQty(v)}/></Field>
        <Field label="Need-by Month"><select value={atpMonth} onChange={e=>setAtpMonth(+e.target.value)}>{MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}</select></Field>
        <div><button className="btn btn-primary btn-sm" style={{marginTop:18}} onClick={()=>{
          const prod=state.products[0];if(!prod)return;
          const weeklyDem=Math.round((prod.history[atpMonth]||0)/4);
          const weeklyProd=prod.capacity;const weeksInMonth=4;
          const availableInv=prod.initInventory+(weeklyProd-weeklyDem)*atpMonth*weeksInMonth;
          const canFulfill=availableInv>=atpQty;
          const ctpWeeks=canFulfill?0:Math.ceil((atpQty-Math.max(availableInv,0))/Math.max(weeklyProd-weeklyDem,1));
          setAtpResult({canFulfill,availableInv:Math.round(availableInv),ctpWeeks,ctpMonth:atpMonth+Math.ceil(ctpWeeks/4)});
        }}>Check ATP/CTP</button></div>
      </div>
      {atpResult&&<div style={{marginTop:8,padding:8,borderRadius:4,background:atpResult.canFulfill?'rgba(63,185,80,.08)':'rgba(248,81,73,.08)',border:`1px solid ${atpResult.canFulfill?'var(--gn)':'var(--dg)'}`}}>
        {atpResult.canFulfill?
          <div style={{color:'var(--gn)',fontWeight:600}}>✅ ATP: YES — {atpQty}u available by {MONTHS[atpMonth]}. Projected inventory: {atpResult.availableInv}u.</div>:
          <div><div style={{color:'var(--dg)',fontWeight:600}}>✗ ATP: NO — only {Math.max(0,atpResult.availableInv)}u available by {MONTHS[atpMonth]}. Short by {atpQty-Math.max(0,atpResult.availableInv)}u.</div>
          <div style={{color:'var(--a2)',marginTop:4}}>CTP: Can deliver by ~{MONTHS[Math.min(atpResult.ctpMonth,11)]} ({atpResult.ctpWeeks} additional weeks needed).</div></div>
        }
      </div>}
    </div>
  </div>
}

// ════════════════════════════════════════════════
// Pillar 12 — Production Architecture (TAB 3)
// 6-step flow: Define SKUs → Define Lines/Stages → SKU↔Line mapping → Capacity derivation
//             → Stage-level outsourcing → Shifts/Labor + sensitivity ("+1 shift / +1 machine / +2 workers")
// Capacity derivation:
//   line_throughput[u/period] = (workdays_per_period × hoursPerShift × shiftsPerDay × 60 / cycleMin_bottleneck)
//                             × OEE_bottleneck × (1 − changeoverPct)
//   bottleneck stage = min(stage_throughput) where stage_throughput = (machines × 60 / cycleMin) × OEE
// ════════════════════════════════════════════════
function ProductionArchitectureTab({state,dispatch}){
  const cur=state.config.currency;
  const topo=state.production.topology||{lines:[]};
  const skuMap=state.production.skuMap||[];
  const capMode=state.production.capacityMode||'derived';
  const wd=state.planning.workDays||6;
  const hpr=hpr=>(state.production.lines[0]?.hoursPerShift||8);
  const shifts=()=>(state.production.lines[0]?.shiftsPerDay||1);
  const periodsPerYr=periodsPerYear(state.planning);
  const wdPerPeriod=()=>{const g=state.planning.timeGrain||'weekly';return g==='daily'?1:g==='monthly'?22:wd;};
  const setTopo=(next)=>dispatch({type:'SET_PRODUCTION',payload:{topology:next}});
  const setMap=(next)=>dispatch({type:'SET_PRODUCTION',payload:{skuMap:next}});
  const setMode=(m)=>dispatch({type:'SET_PRODUCTION',payload:{capacityMode:m}});
  // Capacity derivation per stage
  const stageThroughputPerHr=(s)=>{const m=+s.machines||1;const c=Math.max(+s.cycleMin||1,0.01);const oee=(+s.oeePct||80)/100;return (m*60/c)*oee;};
  const lineThroughputPerHr=(L)=>{
    if(!L.stages||!L.stages.length)return 0;
    return Math.min(...L.stages.map(stageThroughputPerHr));
  };
  const lineCapPerPeriod=(L)=>{
    const hrs=hpr()*shifts()*wdPerPeriod();
    return Math.round(lineThroughputPerHr(L)*hrs);
  };
  const bottleneckStage=(L)=>{
    if(!L.stages||!L.stages.length)return null;
    let best=null,bestT=Infinity;
    L.stages.forEach(s=>{const t=stageThroughputPerHr(s);if(t<bestT){bestT=t;best=s;}});
    return best;
  };
  // Sensitivity scenarios
  const sensitivityRows=(L)=>{
    const base=lineCapPerPeriod(L);
    const bs=bottleneckStage(L);
    if(!bs)return[];
    const cloneOne=(patch)=>({...L,stages:L.stages.map(s=>s.id===bs.id?{...s,...patch}:s)});
    const plusShift={...L,stages:L.stages.map(s=>({...s}))};
    const plusShiftCap=Math.round(lineThroughputPerHr(plusShift)*hpr()*(shifts()+1)*wdPerPeriod());
    const plusMach=cloneOne({machines:(+bs.machines||1)+1});
    const plusWk=cloneOne({workers:(+bs.workers||1)+2});
    return[
      {label:'Baseline',cap:base,delta:0,gate:bs.name},
      {label:'+1 shift (whole line)',cap:plusShiftCap,delta:plusShiftCap-base,gate:bs.name},
      {label:`+1 machine @ ${bs.name}`,cap:lineCapPerPeriod(plusMach),delta:lineCapPerPeriod(plusMach)-base,gate:'shifts to next-slowest if relieved'},
      {label:`+2 workers @ ${bs.name}`,cap:lineCapPerPeriod(plusWk),delta:lineCapPerPeriod(plusWk)-base,gate:'workers rarely lift cap unless current OEE labor-bound'},
    ];
  };
  // Helpers to mutate topology immutably
  const upStage=(lineId,stageId,patch)=>{
    const next={...topo,lines:topo.lines.map(L=>L.id!==lineId?L:{...L,stages:L.stages.map(s=>s.id!==stageId?s:{...s,...patch})})};
    setTopo(next);
  };
  const addStage=(lineId)=>{
    const id='S'+Math.random().toString(36).slice(2,6);
    const next={...topo,lines:topo.lines.map(L=>L.id!==lineId?L:{...L,stages:[...L.stages,{id,name:`Stage ${L.stages.length+1}`,machines:1,workers:1,cycleMin:5,oeePct:75,canOutsource:false,outsourceCostPerUnit:0,outsourceLeadDays:0}]})};
    setTopo(next);
  };
  const delStage=(lineId,stageId)=>setTopo({...topo,lines:topo.lines.map(L=>L.id!==lineId?L:{...L,stages:L.stages.filter(s=>s.id!==stageId)})});
  const addLine=()=>{
    const id='L'+Math.random().toString(36).slice(2,6);
    setTopo({...topo,lines:[...topo.lines,{id,name:`Line ${topo.lines.length+1}`,stages:[{id:'S'+Math.random().toString(36).slice(2,6),name:'Stage 1',machines:1,workers:1,cycleMin:5,oeePct:75,canOutsource:false,outsourceCostPerUnit:0,outsourceLeadDays:0}]}]});
  };
  const delLine=(lineId)=>setTopo({...topo,lines:topo.lines.filter(L=>L.id!==lineId)});
  const upLine=(lineId,patch)=>setTopo({...topo,lines:topo.lines.map(L=>L.id!==lineId?{...L}:{...L,...patch})});
  const upMap=(skuId,patch)=>{
    const cur=skuMap.find(m=>m.skuId===skuId);
    if(cur)setMap(skuMap.map(m=>m.skuId===skuId?{...m,...patch}:m));
    else setMap([...skuMap,{skuId,lineId:topo.lines[0]?.id||null,stageSeq:[],outsourceStages:[],...patch}]);
  };
  // Push derived caps into state.production.lines for solver consumption
  const pushDerivedCaps=()=>{
    const next=topo.lines.map((L,i)=>{
      const existing=state.production.lines[i]||{};
      return{
        id:existing.id||L.id,
        name:L.name,
        type:'shared',
        capacity:lineCapPerPeriod(L),
        shiftsPerDay:shifts(),
        hoursPerShift:hpr(),
        eligibleProducts:existing.eligibleProducts||[],
        dedicated:false,
      };
    });
    dispatch({type:'SET_PRODUCTION',payload:{lines:next}});
  };

  return <div className="animate-in">
    <div className="card" style={{marginBottom:12}}>
      <div className="card-title">🏭 Production Architecture <span className="badge" style={{background:'rgba(56,189,248,.12)',color:'var(--ac)'}}>Pillar 12 · 6-step flow</span><SectionInfo><strong>What it does:</strong> Defines the physical factory: lines → stages → machines/workers/cycle/OEE.<br/><strong>Capacity derivation:</strong> stage throughput/hr = (machines × 60/cycleMin × OEE); line throughput = min(stages) (bottleneck gates the line); per-period cap = throughput × hrs_per_shift × shifts × workdays.<br/><strong>Flows to:</strong> Solver line capacities (when "Apply derived caps" is clicked); RCCP; sensitivity (+1 shift / +1 machine / +2 workers @ bottleneck).</SectionInfo></div>
      <div style={{fontSize:11,color:'var(--tx2)'}}>Define how your physical factory turns raw materials into finished goods. Each stage feeds <strong>capacity derivation</strong> (cycle time + OEE → throughput), <strong>MILP min/max bounds</strong>, and <strong>cost waterfall</strong>. Bottleneck stage gates the line. Outsourcing per stage (e.g. powder coat) is a real lever. Sensitivity: "+1 shift / +1 machine / +2 workers" reveals where capital actually buys throughput.</div>
    </div>

    {/* Step 1 — SKU summary (define here OR in Products tab) */}
    <CollapsibleCard title="① SKUs / BOMs" defaultOpen={true} accent="var(--a4)" badge={`${state.products.length} SKUs · ${state.products.reduce((a,p)=>a+(p.bom||[]).length,0)} BOM lines`}>
      <div style={{fontSize:11,color:'var(--tx2)',marginBottom:6}}>Defined in Tab 02 (Products & Demand). Listed here so you can confirm what's flowing into the line architecture.</div>
      <table className="data-table">
        <thead><tr><th>SKU</th><th>Cycle (min/u)</th><th>Capacity (u/{grainLabel(state.planning).slice(0,1)})</th><th>BOM lines</th><th>Demand mode</th></tr></thead>
        <tbody>{state.products.map(p=><tr key={p.id}><td style={{fontWeight:600}}>{p.name}</td><td className="num">{p.cycleTime||19}</td><td className="num">{p.capacity||50}</td><td className="num">{(p.bom||[]).length}</td><td><span style={{color:'var(--a3)',fontWeight:600}}>{p.demandMode||'mts-weekly'}</span></td></tr>)}</tbody>
      </table>
    </CollapsibleCard>

    {/* Step 2 — Lines & Stages */}
    <CollapsibleCard title="② Production Lines & Stages" defaultOpen={true} accent="var(--ac)" badge={`${topo.lines.length} line${topo.lines.length===1?'':'s'} · ${topo.lines.reduce((a,L)=>a+L.stages.length,0)} stages`}>
      <div style={{fontSize:11,color:'var(--tx2)',marginBottom:8}}>Each line = a sequence of stages (operations). Each stage has machines, workers, cycle time (min/u), and OEE %. <strong>Bottleneck stage</strong> = min(stage throughput) — that's what gates the line. Click ⊕ Add Stage / Add Line. Industry typical OEE: 60-85%.</div>
      {topo.lines.map((L,Li)=><div key={L.id} style={{marginBottom:10,padding:8,background:'var(--bg2)',borderRadius:6,border:'1px solid var(--br)'}}>
        <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:6}}>
          <input value={L.name} onChange={e=>upLine(L.id,{name:e.target.value})} style={{fontWeight:700,color:'var(--ac)',fontSize:13,maxWidth:220}}/>
          <span style={{fontSize:10,color:'var(--tx3)'}}>· bottleneck: <strong>{bottleneckStage(L)?.name||'—'}</strong> @ {Math.round(stageThroughputPerHr(bottleneckStage(L)||{}))} u/hr ⇒ line throughput <strong style={{color:'var(--gn)'}}>{lineCapPerPeriod(L)} u/{grainLabel(state.planning).slice(0,-1)}</strong></span>
          <span style={{flex:1}}/>
          <button onClick={()=>addStage(L.id)} style={{fontSize:10,padding:'3px 8px',background:'var(--ac)',color:'#000',border:'none',borderRadius:3,cursor:'pointer',fontWeight:700}}>⊕ Stage</button>
          {topo.lines.length>1&&<button onClick={()=>delLine(L.id)} style={{fontSize:10,padding:'3px 8px',background:'transparent',color:'var(--dg)',border:'1px solid var(--dg)',borderRadius:3,cursor:'pointer'}}>− Line</button>}
        </div>
        <table className="data-table">
          <thead><tr><th>Stage</th><th>Machines</th><th>Workers</th><th>Cycle (min/u)</th><th>OEE %</th><th>Throughput (u/hr)</th><th>Bottleneck?</th><th></th></tr></thead>
          <tbody>{L.stages.map(s=>{const tput=stageThroughputPerHr(s);const isBN=bottleneckStage(L)?.id===s.id;return<tr key={s.id} style={isBN?{background:'rgba(255,90,90,0.06)'}:null}>
            <td><input value={s.name} onChange={e=>upStage(L.id,s.id,{name:e.target.value})} style={{maxWidth:120}}/></td>
            <td><NumInput value={s.machines||1} style={{width:50}} onChange={v=>upStage(L.id,s.id,{machines:v})}/></td>
            <td><NumInput value={s.workers||1} style={{width:50}} onChange={v=>upStage(L.id,s.id,{workers:v})}/></td>
            <td><NumInput value={s.cycleMin||5} style={{width:55}} step="0.5" onChange={v=>upStage(L.id,s.id,{cycleMin:v})}/></td>
            <td><NumInput value={s.oeePct||75} style={{width:50}} onChange={v=>upStage(L.id,s.id,{oeePct:v})}/></td>
            <td className="num" style={{color:isBN?'var(--dg)':'var(--gn)',fontWeight:600}}>{tput.toFixed(1)}</td>
            <td>{isBN?<span style={{color:'var(--dg)',fontWeight:700}}>⛔ BOTTLENECK</span>:<span style={{color:'var(--tx3)'}}>—</span>}</td>
            <td>{L.stages.length>1&&<button onClick={()=>delStage(L.id,s.id)} style={{fontSize:10,padding:'2px 6px',background:'transparent',color:'var(--tx3)',border:'1px solid var(--br)',borderRadius:3,cursor:'pointer'}}>×</button>}</td>
          </tr>})}</tbody>
        </table>
      </div>)}
      <button onClick={addLine} style={{marginTop:6,fontSize:11,padding:'4px 10px',background:'var(--ac)',color:'#000',border:'none',borderRadius:3,cursor:'pointer',fontWeight:700}}>⊕ Add Line</button>
    </CollapsibleCard>

    {/* Step 3 — SKU → Line mapping */}
    <CollapsibleCard title="③ Map SKUs to Lines" defaultOpen={true} accent="var(--a2)" badge={`${state.products.length} mappings`}>
      <div style={{fontSize:11,color:'var(--tx2)',marginBottom:8}}>Pick which line each SKU runs on. Stage sequence defaults to all line stages in order; uncheck stages this SKU skips (e.g. powder coat for non-painted parts).</div>
      <table className="data-table">
        <thead><tr><th>SKU</th><th>Line</th><th>Stage sequence</th></tr></thead>
        <tbody>{state.products.map(p=>{const m=skuMap.find(x=>x.skuId===p.id)||{lineId:topo.lines[0]?.id,stageSeq:topo.lines[0]?.stages.map(s=>s.id)||[],outsourceStages:[]};const L=topo.lines.find(l=>l.id===m.lineId)||topo.lines[0];return<tr key={p.id}>
          <td style={{fontWeight:600}}>{p.name}</td>
          <td><select value={m.lineId||''} onChange={e=>upMap(p.id,{lineId:e.target.value,stageSeq:topo.lines.find(l=>l.id===e.target.value)?.stages.map(s=>s.id)||[]})}>{topo.lines.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}</select></td>
          <td style={{fontSize:10}}>{(L?.stages||[]).map(s=>{const inSeq=(m.stageSeq||[]).includes(s.id);return<label key={s.id} style={{marginRight:8,cursor:'pointer'}}><input type="checkbox" checked={inSeq} onChange={e=>{const cur=m.stageSeq||[];const next=e.target.checked?[...cur,s.id]:cur.filter(x=>x!==s.id);upMap(p.id,{stageSeq:next});}}/> {s.name}</label>})}</td>
        </tr>})}</tbody>
      </table>
    </CollapsibleCard>

    {/* Step 4 — Capacity derivation mode */}
    <CollapsibleCard title="④ Capacity Derivation" defaultOpen={true} accent="var(--gn)" badge={capMode==='derived'?'auto from stages':'manual override'}>
      <div style={{fontSize:11,color:'var(--tx2)',marginBottom:8}}>Solver capacity comes from one of two sources:</div>
      <div style={{display:'flex',gap:14,marginBottom:8}}>
        <label style={{cursor:'pointer'}}><input type="radio" checked={capMode==='derived'} onChange={()=>setMode('derived')}/> <strong>Derived</strong> — bottleneck throughput × hours × OEE (recommended)</label>
        <label style={{cursor:'pointer'}}><input type="radio" checked={capMode==='manual'} onChange={()=>setMode('manual')}/> <strong>Manual override</strong> — use SKU-level capacity field</label>
      </div>
      <div style={{fontFamily:'JetBrains Mono',fontSize:10,padding:'8px 10px',background:'var(--bg3)',borderRadius:4,color:'var(--ac)',marginBottom:8}}>
        line_cap[u/{grainLabel(state.planning).slice(0,-1)}] = bottleneck.tput[u/hr] × hours_per_period<br/>
        bottleneck.tput = (machines × 60 / cycleMin) × OEE<br/>
        hours_per_period = hoursPerShift × shiftsPerDay × workdays_per_period &nbsp;= {hpr()} × {shifts()} × {wdPerPeriod()} = <strong>{hpr()*shifts()*wdPerPeriod()} hrs</strong>
      </div>
      <table className="data-table">
        <thead><tr><th>Line</th><th>Bottleneck stage</th><th>Stage tput (u/hr)</th><th>Period hrs</th><th>Derived cap (u/period)</th></tr></thead>
        <tbody>{topo.lines.map(L=>{const bs=bottleneckStage(L);return<tr key={L.id}>
          <td style={{fontWeight:600}}>{L.name}</td>
          <td>{bs?.name||'—'}</td>
          <td className="num">{stageThroughputPerHr(bs||{}).toFixed(1)}</td>
          <td className="num">{hpr()*shifts()*wdPerPeriod()}</td>
          <td className="num" style={{color:'var(--gn)',fontWeight:700}}>{lineCapPerPeriod(L)}</td>
        </tr>})}</tbody>
      </table>
      <button onClick={pushDerivedCaps} style={{marginTop:8,fontSize:11,padding:'5px 12px',background:'var(--gn)',color:'#000',border:'none',borderRadius:3,cursor:'pointer',fontWeight:700}}>↳ Apply derived caps to solver lines</button>
    </CollapsibleCard>

    {/* Step 5 — Stage-level outsourcing */}
    <CollapsibleCard title="⑤ Stage-level Outsourcing" defaultOpen={false} accent="var(--a3)" badge={topo.lines.flatMap(L=>L.stages).filter(s=>s.canOutsource).length+' outsourceable'}>
      <div style={{fontSize:11,color:'var(--tx2)',marginBottom:8}}>Mark stages that can be outsourced to a vendor (powder coat, plating, heat treatment, machining). Outsourced cost per unit + lead-time days flow into MPS and procurement payloads.</div>
      <table className="data-table">
        <thead><tr><th>Line / Stage</th><th>Can outsource?</th><th>Cost / unit ({cur})</th><th>Lead time (days)</th><th>Effect</th></tr></thead>
        <tbody>{topo.lines.flatMap(L=>L.stages.map(s=><tr key={L.id+s.id}>
          <td>{L.name} / <strong>{s.name}</strong></td>
          <td><input type="checkbox" checked={!!s.canOutsource} onChange={e=>upStage(L.id,s.id,{canOutsource:e.target.checked})}/></td>
          <td><NumInput value={s.outsourceCostPerUnit||0} disabled={!s.canOutsource} style={{width:70}} onChange={v=>upStage(L.id,s.id,{outsourceCostPerUnit:v})}/></td>
          <td><NumInput value={s.outsourceLeadDays||0} disabled={!s.canOutsource} style={{width:55}} onChange={v=>upStage(L.id,s.id,{outsourceLeadDays:v})}/></td>
          <td style={{fontSize:10,color:'var(--tx3)'}}>{s.canOutsource?`Removes ${s.name} from bottleneck calc; adds ${cur}${s.outsourceCostPerUnit||0}/u variable cost`:'In-house only'}</td>
        </tr>))}</tbody>
      </table>
    </CollapsibleCard>

    {/* Step 6 — Shifts/labor + sensitivity */}
    <CollapsibleCard title="⑥ Shifts & Sensitivity" defaultOpen={true} accent="var(--dg)" badge="+1 shift / +1 machine / +2 workers">
      <div style={{fontSize:11,color:'var(--tx2)',marginBottom:8}}>Shift configuration is set per line in Tab 05 (Optimize). Sensitivity reveals where extra capital actually buys throughput — usually only the bottleneck stage matters.</div>
      <div style={{fontSize:10,color:'var(--tx3)',marginBottom:6}}>Current: <strong>{hpr()} hrs × {shifts()} shifts × {wdPerPeriod()} workdays/period</strong> = <strong style={{color:'var(--ac)'}}>{hpr()*shifts()*wdPerPeriod()} hrs/period</strong></div>
      {topo.lines.map(L=><div key={L.id} style={{marginBottom:10}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--ac)',marginBottom:4}}>{L.name} — sensitivity</div>
        <table className="data-table">
          <thead><tr><th>Scenario</th><th>Capacity (u/period)</th><th>Δ vs baseline</th><th>Comment</th></tr></thead>
          <tbody>{sensitivityRows(L).map((r,i)=><tr key={i}>
            <td style={{fontWeight:i===0?700:400}}>{r.label}</td>
            <td className="num" style={{color:i===0?'var(--ac)':r.delta>0?'var(--gn)':'var(--tx3)',fontWeight:600}}>{r.cap}</td>
            <td className="num" style={{color:r.delta>0?'var(--gn)':r.delta<0?'var(--dg)':'var(--tx3)'}}>{r.delta>0?'+':''}{r.delta}</td>
            <td style={{fontSize:10,color:'var(--tx3)'}}>{r.gate}</td>
          </tr>)}</tbody>
        </table>
      </div>)}
      <div style={{fontSize:10,color:'var(--tx3)',padding:'6px 8px',background:'var(--bg3)',borderRadius:4,marginTop:6}}>💡 If "+1 machine @ bottleneck" yields a small lift, the next-slowest stage is now binding. Add machines there next, not on the original bottleneck.</div>
    </CollapsibleCard>
  </div>;
}

// ─── v3.6 P2 — CONSOLIDATED SUPPLIER MANAGEMENT ───
// Replaces three formerly-scattered sections:
//  (1) Tab 3 read-only Supplier Scorecard, (2) Command-Center scorecard methodology doc,
//  (3) Command-Center should-cost doc. All three are now editable and live in this single card.
function SupplierManagementCard({state,dispatch,allParts}){
  const cur=state.config.currency;
  const profiles=state.supplierProfiles||{};
  const weights=state.supplierWeights||{cost:30,quality:25,otd:20,reliability:15,leadTime:10};
  // Derive unique supplier names from BOM rows
  const supNameOf=(b)=>b.supplierName||b.supplier||b.vendor||(b.supplierType==='import'?`${b.country||'Foreign'} supplier`:'—');
  const supplierNames=[...new Set(allParts.map(b=>supNameOf(b)).filter(n=>n&&n!=='—'))];
  // Roster table — editable scorecard dimensions per supplier (quality%, OTD%, reliability%) + contract terms
  const setProf=(name,patch)=>dispatch({type:'SET_SUPPLIER_PROFILE',name,payload:patch});
  const setW=(k,v)=>dispatch({type:'SET_SUPPLIER_WEIGHTS',payload:{[k]:+v||0}});
  // Scorecard composite (per supplier, weighted across the parts they supply)
  const supplierRows=supplierNames.map(name=>{
    const parts=allParts.filter(b=>supNameOf(b)===name);
    const avg=(arr,key,def)=>arr.length?arr.reduce((a,b)=>a+(+b[key]||def),0)/arr.length:def;
    const prof=profiles[name]||{};
    const yieldPct=avg(parts,'partYield',98);              // from BOM (acceptance sampling proxy)
    const qualityPct=+prof.quality??Math.round(yieldPct);  // editable; default = avg yield
    const otdPct=+prof.otd??90;
    const relPct=+prof.reliability??88;
    const leadTime=avg(parts,'leadTime',1);
    const totalSpend=parts.reduce((s,b)=>s+(+b.cost||0)*(+b.qtyPer||1)*(+b.annDem||1000),0);
    const wSum=weights.cost+weights.quality+weights.otd+weights.reliability+weights.leadTime||1;
    // Cost/LT inverted (lower better); normalised against max in roster
    return {name,parts,prof,qualityPct,otdPct,relPct,leadTime,totalSpend,
      country:parts[0]?.country||'IN',supplierType:parts[0]?.supplierType||'domestic',wSum};
  });
  const maxLT=Math.max(...supplierRows.map(r=>r.leadTime),1);
  const maxSpend=Math.max(...supplierRows.map(r=>r.totalSpend),1);
  supplierRows.forEach(r=>{
    const costScore=r.totalSpend>0?(1-r.totalSpend/maxSpend)*100:0;
    const ltScore=r.leadTime>0?(1-r.leadTime/maxLT)*100:0;
    r.composite=(costScore*weights.cost+r.qualityPct*weights.quality+r.otdPct*weights.otd+r.relPct*weights.reliability+ltScore*weights.leadTime)/r.wSum;
    r.grade=r.composite>=80?'A (preferred)':r.composite>=60?'B (corrective)':'C (phase-out)';
  });
  supplierRows.sort((a,b)=>b.composite-a.composite);
  return <CollapsibleCard title="🏢 Supplier Management" badge="P2 · consolidated" accent="var(--a2)" defaultOpen={true} info={<><strong>What it does:</strong> Single source of truth for all supplier-related data. Replaces (1) the read-only Tab 3 scorecard, (2) the Command-Center scorecard methodology docs, and (3) the should-cost modeling docs.<br/><br/><strong>Three sub-cards:</strong> (a) <strong>Roster + Scorecard</strong> — editable quality / OTD / reliability per supplier; composite score derived from your weights; yield% pulled from BOM partYield (proxy for acceptance-sampling rejects); cost from BOM × annual demand; lead time from BOM. (b) <strong>Should-Cost Modeling</strong> — build raw-material + labor + overhead + margin from first principles; compare against quote; variance feeds landed cost / TCO. (c) <strong>Contract Definitions</strong> — per supplier: currency, contract type, hedge ratio, payment terms, expiry.<br/><br/><strong>P4/P6 will add:</strong> direct PO-history feeds for OTD %, acceptance-sampling-actuals overrides for quality %, currency hedge wiring to landed cost.</>}>
    {/* ── Sub-card 1: Roster + Scorecard ── */}
    <CollapsibleCard title="📊 Roster + Scorecard" accent="var(--ac)" defaultOpen={true} info={<><strong>How scoring works:</strong> Weights below sum to 100. Composite = (1−normCost)×wCost + Quality×wQ + OTD×wO + Reliability×wR + (1−normLT)×wL.<br/><strong>Quality default</strong> = average partYield% across the supplier's BOM rows (proxy for acceptance-sampling reject rate). You can override per supplier here. <strong>OTD/Reliability</strong> are user-set today; in P4 we'll auto-pull from PO history.</>}>
      {supplierRows.length===0?<div style={{fontSize:10,color:'var(--tx3)',padding:8}}>No suppliers found. Add suppliers to BOM rows in <strong>Tab 2 → Products → BOM</strong>; they will appear here automatically.</div>:<>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',padding:'6px 8px',background:'var(--bg3)',border:'1px solid var(--br2)',marginBottom:6,alignItems:'center',fontSize:10}}>
          <strong style={{color:'var(--tx3)',letterSpacing:.3}}>WEIGHTS (Σ=100%):</strong>
          {[['cost','Cost'],['quality','Quality'],['otd','OTD'],['reliability','Reliab.'],['leadTime','LT']].map(([k,lbl])=>
            <label key={k} style={{color:'var(--tx2)',display:'flex',alignItems:'center',gap:3}}>{lbl} <NumInput min={0} max={100} value={weights[k]} onChange={v=>setW(k,v)} style={{width:42,fontSize:10,padding:'1px 3px'}}/>%</label>)}
          <span style={{color:supplierRows[0]?.wSum===100?'var(--gn)':'var(--a4)',marginLeft:'auto'}}>Σ = {supplierRows[0]?.wSum||0}% {supplierRows[0]?.wSum===100?'✓':'(target 100)'}</span>
        </div>
        <div style={{overflowX:'auto'}}>
          <table className="data-table" style={{fontSize:10}}>
            <thead><tr><th>Supplier</th><th>Type</th><th>Parts</th><th>Annual Spend</th><th>LT (wk)</th><th>Quality % <span style={{color:'var(--tx3)',fontWeight:400}} title="Pulled from BOM partYield avg by default; editable per supplier here.">ⓘ</span></th><th>OTD %</th><th>Reliability %</th><th>Score</th><th>Grade</th><th>Hedge?</th></tr></thead>
            <tbody>{supplierRows.map(r=><tr key={r.name}>
              <td style={{fontWeight:700}}>{r.name}<div style={{fontSize:8,color:'var(--tx3)',fontWeight:400}}>{r.country}</div></td>
              <td><span style={{padding:'1px 5px',fontSize:9,borderRadius:8,background:r.supplierType==='import'?'rgba(240,180,41,.12)':'rgba(63,185,80,.12)',color:r.supplierType==='import'?'var(--a4)':'var(--gn)'}}>{r.supplierType}</span></td>
              <td style={{fontSize:9,color:'var(--tx2)'}}>{r.parts.length}</td>
              <td className="num">{cur}{Math.round(r.totalSpend).toLocaleString()}</td>
              <td className="num">{r.leadTime.toFixed(1)}</td>
              <td><NumInput min={0} max={100} step="0.1" value={r.qualityPct} onChange={v=>setProf(r.name,{quality:v})} style={{width:55,fontSize:10}}/></td>
              <td><NumInput min={0} max={100} step="0.1" value={r.otdPct} onChange={v=>setProf(r.name,{otd:v})} style={{width:55,fontSize:10}}/></td>
              <td><NumInput min={0} max={100} step="0.1" value={r.relPct} onChange={v=>setProf(r.name,{reliability:v})} style={{width:55,fontSize:10}}/></td>
              <td style={{fontWeight:700,color:r.composite>=80?'var(--gn)':r.composite>=60?'var(--a4)':'var(--dg)'}}>{r.composite.toFixed(1)}</td>
              <td style={{fontSize:9,color:r.composite>=80?'var(--gn)':r.composite>=60?'var(--a4)':'var(--dg)',fontWeight:700}}>{r.grade}</td>
              <td><input type="checkbox" checked={!!r.prof.hedged} onChange={e=>setProf(r.name,{hedged:e.target.checked})}/></td>
            </tr>)}</tbody>
          </table>
        </div>
        <div style={{fontSize:9,color:'var(--tx3)',marginTop:6,padding:'5px 8px',background:'var(--bg3)',borderRadius:3}}>
          <strong>Methodology footnote:</strong> Traffic light: <span style={{color:'var(--gn)'}}>A ≥80%</span> = preferred · <span style={{color:'var(--a4)'}}>B 60-79%</span> = corrective action 60d · <span style={{color:'var(--dg)'}}>C &lt;60%</span> = phase-out. Industry world-class quality &lt;50 PPM (≈99.995%); OTIF &gt;98%; YoY cost reduction 8-12%.
        </div>
      </>}
    </CollapsibleCard>

    {/* ── Sub-card 2: Should-Cost Modeling ── */}
    <CollapsibleCard title="🧮 Should-Cost Modeling" accent="var(--a3)" defaultOpen={false} info={<><strong>What it does:</strong> Build expected cost from first principles to benchmark supplier quotes. Use during negotiation. Variance ((quote − should-cost) / should-cost) feeds landed-cost transparency and TCO.<br/><br/><strong>Formula:</strong> Should-cost = (Material cost × scrap factor) + (Machine rate × cycle time) + Heat-treat + Inspection + Packaging + Factory overhead % + Margin %.</>}>
      <div style={{overflowX:'auto'}}>
        <table className="data-table" style={{fontSize:10}}>
          <thead><tr><th>Part</th><th>Supplier</th><th title="From BOM (the supplier's quote)">Quote {cur}</th><th title="Material weight × material price × scrap (1.05-1.15)">Material {cur}</th><th title="Machine rate × cycle time">Labor {cur}</th><th>Heat/Inspect/Pack {cur}</th><th>OH %</th><th>Margin %</th><th>Should-Cost {cur}</th><th>Variance %</th></tr></thead>
          <tbody>{allParts.map((b,i)=>{
            const sc=b.shouldCost||{material:b.cost*0.55,labor:b.cost*0.20,otherProc:b.cost*0.07,ohPct:15,marginPct:8};
            const baseCost=(+sc.material||0)+(+sc.labor||0)+(+sc.otherProc||0);
            const oh=baseCost*((+sc.ohPct||0)/100);
            const margin=(baseCost+oh)*((+sc.marginPct||0)/100);
            const shouldCost=baseCost+oh+margin;
            const quote=+b.cost||0;
            const variancePct=shouldCost>0?((quote-shouldCost)/shouldCost*100):0;
            const setSC=(patch)=>dispatch({type:'UPDATE_BOM_ITEM',productId:b.productId||b.pid,bomId:b.id,payload:{shouldCost:{...sc,...patch}}});
            return <tr key={b.id||i}>
              <td style={{fontWeight:600}}>{b.name}<div style={{fontSize:8,color:'var(--tx3)'}}>{b.productName}</div></td>
              <td style={{fontSize:9,color:'var(--tx2)'}}>{supNameOf(b)}</td>
              <td className="num" style={{color:'var(--a4)'}}>{cur}{quote.toFixed(2)}</td>
              <td><NumInput step="0.01" value={sc.material} onChange={v=>setSC({material:v})} style={{width:55,fontSize:10}}/></td>
              <td><NumInput step="0.01" value={sc.labor} onChange={v=>setSC({labor:v})} style={{width:55,fontSize:10}}/></td>
              <td><NumInput step="0.01" value={sc.otherProc} onChange={v=>setSC({otherProc:v})} style={{width:55,fontSize:10}}/></td>
              <td><NumInput step="0.5" value={sc.ohPct} onChange={v=>setSC({ohPct:v})} style={{width:42,fontSize:10}}/></td>
              <td><NumInput step="0.5" value={sc.marginPct} onChange={v=>setSC({marginPct:v})} style={{width:42,fontSize:10}}/></td>
              <td className="num" style={{color:'var(--ac)',fontWeight:700}}>{cur}{shouldCost.toFixed(2)}</td>
              <td className="num" style={{color:variancePct>15?'var(--dg)':variancePct>5?'var(--a4)':variancePct<-5?'var(--gn)':'var(--tx)',fontWeight:700}}>{variancePct>0?'+':''}{variancePct.toFixed(1)}%</td>
            </tr>;
          })}</tbody>
        </table>
      </div>
      <div style={{fontSize:9,color:'var(--tx3)',marginTop:6,padding:'5px 8px',background:'var(--bg3)',borderRadius:3}}>
        <strong>How to use:</strong> +15% variance → quote is materially over should-cost; renegotiate or seek alternative supplier. −5% variance → suspiciously low; verify quality compliance. Variance feeds the cost-waterfall analysis (under "Material" component) so you see where money is being left on the table.
      </div>
    </CollapsibleCard>

    {/* ── Sub-card 3: Contract Definitions ── */}
    <CollapsibleCard title="📝 Contract Definitions" accent="var(--a4)" defaultOpen={false} info={<><strong>What it does:</strong> Per-supplier contract metadata: currency, type (rate/blanket/fixed/cost-plus/AMC), payment terms, hedge ratio, start/end. Foreign-supplier hedge ratio + currency feed P6 currency-hedging into landed cost. Contract type seeds default payment behavior in the Payment Ledger.</>}>
      {supplierNames.length===0?<div style={{fontSize:10,color:'var(--tx3)',padding:8}}>Define suppliers in BOM first; their contracts will appear here.</div>:<table className="data-table" style={{fontSize:10}}>
        <thead><tr><th>Supplier</th><th>Currency</th><th>Contract Type</th><th>Pay Terms</th><th>Hedge %</th><th>Forward Rate</th><th>Effective FX</th><th>Start</th><th>End</th><th>Notes</th></tr></thead>
        <tbody>{supplierNames.map(name=>{
          const prof=profiles[name]||{};
          const supCcy=prof.currency||cur;
          const ccyKey=supCcy==='$'?'USD':supCcy==='€'?'EUR':supCcy==='¥'?'JPY':supCcy==='£'?'GBP':supCcy==='₹'?'INR':supCcy;
          const fxRates=state.config.fxRates||{};
          const spot=fxRates[ccyKey]||(supCcy===cur?1:1);
          const fwd=+prof.forwardRate||spot;
          const h=(+prof.hedgeRatio||0)/100;
          const eff=supCcy===cur?1:spot*(1-h)+fwd*h;
          return <tr key={name}>
          <td style={{fontWeight:600}}>{name}</td>
          <td><select value={prof.currency||cur} onChange={e=>setProf(name,{currency:e.target.value})} style={{fontSize:10,width:60}}><option value="₹">INR ₹</option><option value="USD">USD $</option><option value="EUR">EUR €</option><option value="JPY">JPY ¥</option><option value="GBP">GBP £</option><option value="CNY">CNY ¥</option><option value="SGD">SGD S$</option></select></td>
          <td><select value={prof.contractType||'rate'} onChange={e=>setProf(name,{contractType:e.target.value})} style={{fontSize:10,width:90}}>
            <option value="rate">Rate Contract</option>
            <option value="blanket">Blanket PO</option>
            <option value="fixed">Fixed Price</option>
            <option value="costplus">Cost Plus</option>
            <option value="amc">AMC</option>
            <option value="spot">Spot</option>
          </select></td>
          <td>Net <NumInput value={prof.paymentTerms||30} onChange={v=>setProf(name,{paymentTerms:v})} style={{width:42,fontSize:10}}/>d</td>
          <td><NumInput min={0} max={100} value={prof.hedgeRatio||0} onChange={v=>setProf(name,{hedgeRatio:v})} style={{width:42,fontSize:10}} disabled={supCcy===cur} title="% of FX exposure hedged via forward contracts. Effective FX = spot × (1−h) + forward × h."/></td>
          <td><NumInput step="0.01" value={prof.forwardRate||(supCcy===cur?'':spot)} placeholder={supCcy===cur?'—':String(spot)} onChange={v=>setProf(name,{forwardRate:v})} style={{width:55,fontSize:10}} disabled={supCcy===cur} title={`Forward rate locked-in for ${supCcy}→${cur}. Default = current spot ${spot}.`}/></td>
          <td className="num" style={{fontFamily:'JetBrains Mono',color:supCcy===cur?'var(--tx3)':eff<spot?'var(--gn)':eff>spot?'var(--dg)':'var(--tx)'}} title={`spot ${spot} · fwd ${fwd} · hedge ${(h*100).toFixed(0)}% → eff ${eff.toFixed(3)}`}>{supCcy===cur?'1.000':eff.toFixed(3)}</td>
          <td><input type="date" value={prof.startDate||''} onChange={e=>setProf(name,{startDate:e.target.value})} style={{fontSize:10}}/></td>
          <td><input type="date" value={prof.endDate||''} onChange={e=>setProf(name,{endDate:e.target.value})} style={{fontSize:10}}/></td>
          <td><input value={prof.notes||''} onChange={e=>setProf(name,{notes:e.target.value})} placeholder="e.g. JDA, GMP ceiling…" style={{fontSize:10,width:100}}/></td>
        </tr>;})}</tbody>
      </table>}
      <div style={{fontSize:9,color:'var(--tx3)',marginTop:6,padding:'5px 8px',background:'var(--bg3)',borderRadius:3}}>
        <strong>Contract types:</strong> <strong>Rate</strong> (fixed price 1-2y, no qty guarantee — commodities). <strong>Blanket PO</strong> (total qty/value cap, periodic releases — regular consumption). <strong>Fixed Price</strong> (all-inclusive defined scope — capital). <strong>Cost Plus</strong> (actual + 10-15% margin — uncertain scope). <strong>AMC</strong> (annual maintenance — equipment). Foreign-supplier currency + hedge ratio drives landed-cost FX risk in P6.
      </div>
    </CollapsibleCard>
  </CollapsibleCard>;
}

// ─── TAB 4: SUPPLY NETWORK ───
function SupplyTab({state,dispatch}){
  const cur=state.config.currency;
  // Pillar 3 — landed cost is now computed live from each BOM part via `landedCost(b, config, plant)` in the rollup panel. The /api/calc/landed-cost scratchpad is gone.

  // Collect all BOM items across products as supplier view
  const allParts=state.products.flatMap(p=>p.bom.map(b=>({...b,productName:p.name,productId:p.id})));
  const importParts=allParts.filter(b=>b.supplierType==='import');
  const domesticParts=allParts.filter(b=>b.supplierType==='domestic');

  return <div className="animate-in">
    <div className="vgrid vgrid-supply" style={{marginBottom:14}}>
      <IndiaSupplyMapPanel state={state}/>
      <SupplierScorecardPanel state={state} dispatch={dispatch}/>
    </div>
    {/* Supplier Summary */}
    <div className="kpi-row">
      <KPI label="Total Suppliers" value={allParts.length} sub={`${domesticParts.length} domestic · ${importParts.length} import`}/>
      <KPI label="Total Material Cost/unit" value={`${cur}${state.products.reduce((a,p)=>a+p.bom.reduce((s,b)=>s+b.cost*b.qtyPer,0),0).toFixed(0)}`} sub="across all SKUs" color="var(--a2)"/>
      <KPI label="Avg Lead Time" value={`${(allParts.reduce((a,b)=>a+b.leadTime,0)/Math.max(allParts.length,1)).toFixed(1)} wk`} sub="weighted by part count" color="var(--a3)"/>
      <KPI label="Import Exposure" value={`${importParts.length>0?Math.round(importParts.length/allParts.length*100):0}%`} sub={`${importParts.length} imported parts`} color={importParts.length>0?'var(--a4)':'var(--gn)'}/>
    </div>

    {/* Multi-Echelon Network (v3.0 P9) */}
    <div className="card">
      <div className="card-title">🛣️ Physical Network — Nodes &amp; Lanes
        <span className="badge" style={{background:'rgba(79,168,240,.12)',color:'var(--a2)',marginLeft:6}}>v3.0 multi-echelon</span>
      </div>
      <div style={{fontSize:10,color:'var(--tx3)',marginBottom:8}}>
        Define the physical supply chain: Plants (where production happens), DCs (stock points), Customers (demand regions).
        Lanes connect nodes with lead time, mode, rate, capacity, CO₂ factor. This drives transport solver &amp; multi-echelon inventory pooling.
      </div>
      {(()=>{
        const net=state.network||{nodes:[],lanes:[]};
        const upNodes=(nds)=>dispatch({type:'SET_NETWORK',payload:{nodes:nds}});
        const upLanes=(lns)=>dispatch({type:'SET_NETWORK',payload:{lanes:lns}});
        return <>
          <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:6,flexWrap:'wrap'}}>
            <strong style={{fontSize:11,color:'var(--tx2)'}}>Nodes ({net.nodes.length})</strong>
            <button className="btn btn-secondary btn-sm" onClick={()=>upNodes([...net.nodes,{id:'n'+Date.now().toString(36),type:'dc',name:`Node ${net.nodes.length+1}`,location:'',lat:0,lon:0,capacity:1000}])}>+ Node</button>
          </div>
          <table className="data-table" style={{marginBottom:10}}>
            <thead><tr><th>Type</th><th>Name</th><th>Location</th><th>Lat</th><th>Lon</th><th>Cap / Share</th><th></th></tr></thead>
            <tbody>{net.nodes.map((n,i)=>{
              const upN=(patch)=>{const nds=[...net.nodes];nds[i]={...nds[i],...patch};upNodes(nds);};
              return <tr key={n.id}>
                <td><select value={n.type} onChange={e=>upN({type:e.target.value})} style={{fontSize:10}}><option value="plant">Plant</option><option value="dc">DC</option><option value="customer">Customer</option><option value="supplier">Supplier</option></select></td>
                <td><input value={n.name} onChange={e=>upN({name:e.target.value})} style={{width:90,fontSize:10}}/></td>
                <td><input value={n.location||''} onChange={e=>upN({location:e.target.value})} style={{width:85,fontSize:10}}/></td>
                <td><NumInput step="0.01" value={n.lat||0} onChange={v=>upN({lat:v})} style={{width:55,fontSize:10}}/></td>
                <td><NumInput step="0.01" value={n.lon||0} onChange={v=>upN({lon:v})} style={{width:55,fontSize:10}}/></td>
                <td>{n.type==='customer'
                  ?<NumInput step="0.01" min={0} max={1} value={n.demandShare||0} onChange={v=>upN({demandShare:v})} style={{width:55,fontSize:10}} title="Demand fraction (0-1)"/>
                  :<NumInput value={n.capacity||0} onChange={v=>upN({capacity:v})} style={{width:70,fontSize:10}}/>}
                </td>
                <td><button className="btn btn-danger btn-sm" onClick={()=>{upNodes(net.nodes.filter(x=>x.id!==n.id));upLanes(net.lanes.filter(l=>l.from!==n.id&&l.to!==n.id));}}>×</button></td>
              </tr>;
            })}</tbody>
          </table>

          <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:6,flexWrap:'wrap'}}>
            <strong style={{fontSize:11,color:'var(--tx2)'}}>Lanes ({net.lanes.length})</strong>
            <button className="btn btn-secondary btn-sm" disabled={net.nodes.length<2} onClick={()=>upLanes([...net.lanes,{id:'l'+Date.now().toString(36),from:net.nodes[0]?.id,to:net.nodes[1]?.id,mode:'FTL',leadDays:3,ratePerUnit:2.5,capacity:1000,co2:0.12,active:true}])}>+ Lane</button>
            <span style={{fontSize:9,color:'var(--tx3)'}}>Modes: FTL/LTL/Rail/Air/Sea/Courier. Cheapest valid path auto-selected by transport solver.</span>
          </div>
          {/* v3.3.3 — mode-based rate + distance table (shown above lanes for reference) */}
          <div style={{marginBottom:6,padding:6,background:'var(--bg3)',borderRadius:3,fontSize:9,color:'var(--tx3)'}}>
            <strong style={{color:'var(--a2)'}}>Mode economics (typical Indian rates):</strong>
            {[['FTL','2.50 ₹/t·km · 50 km/h',1],['LTL','3.80 ₹/t·km · 40 km/h',2],['Rail','1.20 ₹/t·km · 35 km/h',5],['Sea','0.40 ₹/t·km · 20 km/h',20],['Air','18.0 ₹/t·km · 700 km/h',1],['Courier','8.00 ₹/t·km · next-day',0.5]].map(([m,detail,tr])=><span key={m} style={{marginLeft:8,color:'var(--tx2)'}}><strong style={{color:'var(--ac)'}}>{m}</strong>: {detail} · transit {tr}d/500km</span>)}
          </div>
          <table className="data-table">
            <thead><tr><th>From</th><th>→</th><th>To</th><th>Mode</th><th>Distance</th><th>Lead (d)</th><th>Rate /u</th><th>Cap/period</th><th>Demand u/wk</th><th>Units/ship</th><th>Freq /wk</th><th>CO₂ kg/u</th><th>Active</th><th></th></tr></thead>
            <tbody>{net.lanes.map((lane,i)=>{
              const upL=(patch)=>{const ls=[...net.lanes];ls[i]={...ls[i],...patch};upLanes(ls);};
              const demandWk=+lane.demandPerWk||0;
              const unitsPerShip=+lane.unitsPerShip||(lane.mode==='FTL'?1000:lane.mode==='Rail'?4000:lane.mode==='Sea'?10000:lane.mode==='Air'?200:500);
              const freq=demandWk>0?Math.max(1,Math.ceil(demandWk/Math.max(unitsPerShip,1))):(+lane.freqPerWk||1);
              // Distance & mode-aware suggested rate
              const fromN=net.nodes.find(n=>n.id===lane.from);
              const toN=net.nodes.find(n=>n.id===lane.to);
              let distKm=0;
              if(fromN?.lat&&fromN?.lon&&toN?.lat&&toN?.lon){
                const R=6371,toR=x=>x*Math.PI/180;
                const dLa=toR(toN.lat-fromN.lat),dLo=toR(toN.lon-fromN.lon);
                const a=Math.sin(dLa/2)**2+Math.cos(toR(fromN.lat))*Math.cos(toR(toN.lat))*Math.sin(dLo/2)**2;
                distKm=Math.round(2*R*Math.asin(Math.sqrt(a)));
              }
              const ratePerTKm={FTL:2.5,LTL:3.8,Rail:1.2,Sea:0.4,Air:18,Courier:8}[lane.mode]||2.5;
              const avgUnitWeightKg=1;
              const suggestedRate=+(distKm*ratePerTKm*avgUnitWeightKg/1000).toFixed(2); // per unit
              const rateDiverges=Math.abs((+lane.ratePerUnit||0)-suggestedRate)>suggestedRate*0.25&&suggestedRate>0;
              return <tr key={lane.id}>
                <td><select value={lane.from} onChange={e=>upL({from:e.target.value})} style={{fontSize:10,width:85}}>{net.nodes.map(n=><option key={n.id} value={n.id}>{n.name}</option>)}</select></td>
                <td style={{color:'var(--tx3)'}}>→</td>
                <td><select value={lane.to} onChange={e=>upL({to:e.target.value})} style={{fontSize:10,width:85}}>{net.nodes.map(n=><option key={n.id} value={n.id}>{n.name}</option>)}</select></td>
                <td><select value={lane.mode} onChange={e=>upL({mode:e.target.value})} style={{fontSize:10,width:60}}><option>FTL</option><option>LTL</option><option>Rail</option><option>Air</option><option>Sea</option><option>Courier</option></select></td>
                <td style={{fontSize:9,color:distKm>0?'var(--tx2)':'var(--tx3)'}}>{distKm>0?<span title={`Great-circle distance between ${fromN.name} and ${toN.name}`}>{distKm.toLocaleString()} km</span>:<span style={{color:'var(--tx3)'}}>—</span>}</td>
                <td><NumInput step="0.5" value={lane.leadDays} onChange={v=>upL({leadDays:v})} style={{width:45,fontSize:10}}/></td>
                <td>
                  <NumInput step="0.1" value={lane.ratePerUnit} onChange={v=>upL({ratePerUnit:v})} style={{width:50,fontSize:10,color:rateDiverges?'var(--a4)':'inherit',background:rateDiverges?'rgba(240,180,41,.08)':'inherit'}} title={suggestedRate>0?`Suggested (${lane.mode}, ${distKm}km): ${cur}${suggestedRate}/u — click ↻ to apply`:''}/>
                  {suggestedRate>0&&rateDiverges&&<button className="btn btn-secondary btn-sm" style={{fontSize:8,padding:'1px 4px',marginLeft:2}} title={`Apply ${cur}${suggestedRate} from mode×distance`} onClick={()=>upL({ratePerUnit:suggestedRate})}>↻{suggestedRate}</button>}
                </td>
                <td><NumInput value={lane.capacity} onChange={v=>upL({capacity:v})} style={{width:65,fontSize:10}}/></td>
                <td><NumInput value={demandWk} onChange={v=>upL({demandPerWk:v})} style={{width:60,fontSize:10,background:demandWk>0?'rgba(63,185,80,.08)':'var(--bg3)'}} placeholder="0"/></td>
                <td><NumInput value={unitsPerShip} onChange={v=>upL({unitsPerShip:v})} style={{width:55,fontSize:10}}/></td>
                <td><span style={{fontSize:10,fontWeight:700,color:freq>7?'var(--dg)':freq>=1?'var(--ac)':'var(--tx3)'}}>{freq}×</span></td>
                <td><NumInput step="0.01" value={lane.co2||0} onChange={v=>upL({co2:v})} style={{width:50,fontSize:10}}/></td>
                <td><input type="checkbox" checked={lane.active!==false} onChange={e=>upL({active:e.target.checked})}/></td>
                <td><button className="btn btn-danger btn-sm" onClick={()=>upLanes(net.lanes.filter(x=>x.id!==lane.id))}>×</button></td>
              </tr>;
            })}</tbody>
          </table>
          {(()=>{
            const act=net.lanes.filter(l=>l.active!==false);
            const totDem=act.reduce((a,l)=>a+(+l.demandPerWk||0),0);
            const totShips=act.reduce((a,l)=>{const d=+l.demandPerWk||0,u=+l.unitsPerShip||(l.mode==='Sea'?10000:l.mode==='Air'?200:1000);return a+(d>0?Math.ceil(d/Math.max(u,1)):(+l.freqPerWk||0));},0);
            const totFreight=act.reduce((a,l)=>a+(+l.demandPerWk||0)*(+l.ratePerUnit||0),0);
            const totCO2=act.reduce((a,l)=>a+(+l.demandPerWk||0)*(+l.co2||0),0);
            // v3.6 — auto-derive lane demand from product histories × customer.demandShare
            // (assumes history is monthly; convert to weekly via /4.33).
            const autoDeriveLaneDemand=()=>{
              const totWklyDem=(state.products||[]).reduce((s,p)=>{const h=p.history||[];const recent=h.slice(-3);const m=recent.length?recent.reduce((a,b)=>a+b,0)/recent.length:0;return s+m/4.33;},0);
              if(!totWklyDem){alert('No product history found. Add demand history in Tab 2 → Products.');return;}
              const updated=net.lanes.map(l=>{
                const toNode=net.nodes.find(n=>n.id===l.to);
                if(!toNode)return l;
                let share=0;
                if(toNode.type==='customer'){share=+toNode.demandShare||0;}
                else if(toNode.type==='dc'){
                  const downstream=net.lanes.filter(l2=>l2.from===toNode.id&&l2.active!==false);
                  share=downstream.reduce((s,l2)=>{const cust=net.nodes.find(n=>n.id===l2.to);return s+(cust?.type==='customer'?+cust.demandShare||0:0);},0);
                }
                else if(toNode.type==='plant')return l; // inbound, leave alone
                if(share>0)return {...l,demandPerWk:Math.round(totWklyDem*share)};
                return l;
              });
              upLanes(updated);
            };
            return <div style={{marginTop:10,padding:8,background:'var(--bg2)',border:'1px solid var(--br2)',borderRadius:3}}>
              <div style={{fontSize:10,fontWeight:700,color:'var(--tx)',marginBottom:6,display:'flex',alignItems:'center',gap:6}}><AssetIcon kind="truck" size={20} color="var(--ac)"/> Flow Summary — demand-driven ({act.length} active lanes)
                {totDem===0&&act.length>0&&<button className="btn btn-secondary btn-sm" style={{marginLeft:'auto',fontSize:9}} onClick={autoDeriveLaneDemand} title="Compute demandPerWk for each lane from product histories × customer.demandShare">↻ Auto-derive demand</button>}
              </div>
              <div className="grid4" style={{gap:6}}>
                <div style={{padding:6,background:'var(--bg)',border:'1px solid var(--br)'}}>
                  <div style={{fontSize:8,color:'var(--tx3)'}}>TOTAL DEMAND</div>
                  <div style={{fontSize:14,fontWeight:700,color:'var(--a2)'}}>{totDem.toLocaleString()}<span style={{fontSize:8,color:'var(--tx3)'}}> u/wk</span></div>
                </div>
                <div style={{padding:6,background:'var(--bg)',border:'1px solid var(--br)'}}>
                  <div style={{fontSize:8,color:'var(--tx3)'}}>SHIPMENTS/WK</div>
                  <div style={{fontSize:14,fontWeight:700,color:'var(--ac)'}}>{totShips}<span style={{fontSize:8,color:'var(--tx3)'}}> trips</span></div>
                </div>
                <div style={{padding:6,background:'var(--bg)',border:'1px solid var(--br)'}}>
                  <div style={{fontSize:8,color:'var(--tx3)'}}>FREIGHT SPEND</div>
                  <div style={{fontSize:14,fontWeight:700,color:'var(--a4)'}}>{cur}{Math.round(totFreight).toLocaleString()}<span style={{fontSize:8,color:'var(--tx3)'}}>/wk</span></div>
                </div>
                <div style={{padding:6,background:'var(--bg)',border:'1px solid var(--br)'}}>
                  <div style={{fontSize:8,color:'var(--tx3)'}}>CO₂</div>
                  <div style={{fontSize:14,fontWeight:700,color:totCO2>1000?'var(--dg)':'var(--gn)'}}>{totCO2.toFixed(0)}<span style={{fontSize:8,color:'var(--tx3)'}}> kg/wk</span></div>
                </div>
              </div>
              <div style={{fontSize:9,color:'var(--tx3)',marginTop:6}}>Avg lead: <strong>{(act.reduce((a,l)=>a+l.leadDays*(+l.demandPerWk||1),0)/Math.max(act.reduce((a,l)=>a+(+l.demandPerWk||1),0),1)).toFixed(1)} d</strong> · Rate: <strong>{cur}{(act.reduce((a,l)=>a+l.ratePerUnit,0)/Math.max(act.length,1)).toFixed(2)}/u</strong> · Enter <strong>demand u/wk</strong> per lane — shipments auto-computed from units/ship.</div>
            </div>;
          })()}
        </>;
      })()}
    </div>

    {/* Center of Gravity — optimal warehouse/DC location */}
    <div className="card">
      <div className="card-title">📍 Center of Gravity — Optimal DC/Warehouse Location <span className="badge" style={{background:'rgba(240,180,41,.1)',color:'var(--a4)'}}>weighted centroid</span></div>
      <div style={{fontSize:10,color:'var(--tx3)',marginBottom:8}}>
        Classic facility-location: given customer demand and supplier sources (with lat/lon), compute the <strong>cost-minimizing centroid</strong> where a new DC should sit.
        Formula: <em>lat* = Σ(wᵢ · latᵢ · rateᵢ) / Σ(wᵢ · rateᵢ)</em>. Freight cost ∝ demand × distance × rate. Compare the optimum against each existing node to find the biggest relocation saving.
      </div>
      {(()=>{
        const net=state.network||{nodes:[],lanes:[]};
        // Points with weight = demand (customers) or capacity (suppliers/plants) and rate = default ₹/unit-km
        const customers=net.nodes.filter(n=>n.type==='customer'&&n.lat&&n.lon);
        const plants=net.nodes.filter(n=>(n.type==='plant'||n.type==='supplier')&&n.lat&&n.lon);
        const dcs=net.nodes.filter(n=>n.type==='dc'&&n.lat&&n.lon);
        // Total network demand proxy: sum of product histories averaged × demandShare
        const totalMonthly=state.products.reduce((a,p)=>a+((p.history||[]).slice(-12).reduce((s,x)=>s+x,0)/12),0);
        const points=[];
        customers.forEach(c=>points.push({name:c.name,lat:c.lat,lon:c.lon,weight:(c.demandShare||1/Math.max(customers.length,1))*totalMonthly,rate:2.5,role:'demand'}));
        plants.forEach(p=>points.push({name:p.name,lat:p.lat,lon:p.lon,weight:(p.capacity||1000)*0.4,rate:1.5,role:'source'}));  // inbound weighted less
        if(points.length<2){
          return <div style={{padding:12,background:'var(--bg3)',borderRadius:4,fontSize:11,color:'var(--tx3)',textAlign:'center'}}>Need at least 2 nodes with lat/lon (customers, plants or suppliers) to compute center of gravity. Add them above.</div>;
        }
        // Weighted centroid
        const sumW=points.reduce((a,p)=>a+p.weight*p.rate,0);
        const cogLat=points.reduce((a,p)=>a+p.lat*p.weight*p.rate,0)/sumW;
        const cogLon=points.reduce((a,p)=>a+p.lon*p.weight*p.rate,0)/sumW;
        // Haversine distance in km
        const hav=(la1,lo1,la2,lo2)=>{const R=6371,toR=x=>x*Math.PI/180;const dLa=toR(la2-la1),dLo=toR(lo2-lo1);const a=Math.sin(dLa/2)**2+Math.cos(toR(la1))*Math.cos(toR(la2))*Math.sin(dLo/2)**2;return 2*R*Math.asin(Math.sqrt(a));};
        // Total cost at optimum vs at each existing DC vs naive midpoint
        const costAt=(lat,lon)=>points.reduce((a,p)=>a+p.weight*p.rate*hav(lat,lon,p.lat,p.lon),0);
        const optCost=costAt(cogLat,cogLon);
        const existingDCCosts=dcs.map(d=>({name:d.name,location:d.location,lat:d.lat,lon:d.lon,cost:costAt(d.lat,d.lon),dist:hav(d.lat,d.lon,cogLat,cogLon)}));
        existingDCCosts.sort((a,b)=>a.cost-b.cost);
        const bestExisting=existingDCCosts[0];
        const saving=bestExisting?(bestExisting.cost-optCost):0;
        const savingPct=bestExisting?(saving/bestExisting.cost*100):0;
        // Guess nearest Indian city for the optimum (hand-rolled; approximate)
        const cityGuess=[['Nagpur',21.15,79.09],['Hyderabad',17.38,78.49],['Pune',18.52,73.85],['Nashik',19.99,73.78],['Indore',22.72,75.86],['Bhopal',23.25,77.41],['Ahmedabad',23.03,72.58],['Jaipur',26.92,75.82],['Lucknow',26.85,80.95],['Bengaluru',12.97,77.59],['Chennai',13.08,80.27],['Delhi',28.7,77.1],['Mumbai',19.08,72.88],['Kolkata',22.57,88.36],['Guwahati',26.14,91.74],['Bhubaneswar',20.27,85.84]].map(([n,la,lo])=>({n,d:hav(cogLat,cogLon,la,lo)}));
        cityGuess.sort((a,b)=>a.d-b.d);
        const nearest=cityGuess[0];
        return <div>
          <div className="grid3" style={{marginBottom:10}}>
            <div style={{padding:10,background:'rgba(63,185,80,.08)',border:'2px solid var(--gn)',borderRadius:4}}>
              <div style={{fontSize:9,color:'var(--tx3)'}}>OPTIMAL CENTER OF GRAVITY</div>
              <div style={{fontSize:16,fontWeight:700,color:'var(--gn)'}}>{cogLat.toFixed(3)}°, {cogLon.toFixed(3)}°</div>
              <div style={{fontSize:10,color:'var(--tx2)',marginTop:2}}>Nearest city: <strong>{nearest.n}</strong> ({nearest.d.toFixed(0)} km)</div>
            </div>
            <div style={{padding:10,background:'var(--bg3)',border:'1px solid var(--br)',borderRadius:4}}>
              <div style={{fontSize:9,color:'var(--tx3)'}}>TOTAL FREIGHT @ OPTIMUM</div>
              <div style={{fontSize:16,fontWeight:700,color:'var(--a2)'}}>{cur}{Math.round(optCost).toLocaleString()}<span style={{fontSize:9,color:'var(--tx3)'}}>/mo</span></div>
              <div style={{fontSize:10,color:'var(--tx2)',marginTop:2}}>Σ demand × distance × rate across {points.length} nodes</div>
            </div>
            <div style={{padding:10,background:saving>0?'rgba(63,185,80,.08)':'rgba(248,81,73,.08)',border:`1px solid ${saving>0?'var(--gn)':'var(--dg)'}`,borderRadius:4}}>
              <div style={{fontSize:9,color:'var(--tx3)'}}>RELOCATION SAVING vs best DC</div>
              <div style={{fontSize:16,fontWeight:700,color:saving>0?'var(--gn)':'var(--dg)'}}>{saving>0?'+':''}{cur}{Math.round(saving).toLocaleString()}</div>
              <div style={{fontSize:10,color:'var(--tx2)',marginTop:2}}>{savingPct.toFixed(1)}% of current spend · {bestExisting?`vs ${bestExisting.name}`:'no DCs'}</div>
            </div>
          </div>
          {existingDCCosts.length>0&&<div>
            <div style={{fontSize:11,fontWeight:600,color:'var(--a3)',marginBottom:4}}>Existing DC comparison (sorted by total cost)</div>
            <table className="data-table">
              <thead><tr><th>DC</th><th>Location</th><th>Distance from COG (km)</th><th>Total Freight/mo</th><th>Premium vs Optimum</th><th>Verdict</th></tr></thead>
              <tbody>{existingDCCosts.map((d,i)=>{const prem=d.cost-optCost;const premPct=(prem/optCost*100);return <tr key={i} style={i===0?{background:'rgba(63,185,80,.04)'}:{}}>
                <td style={{fontWeight:600}}>{d.name}</td>
                <td>{d.location||`${d.lat.toFixed(2)},${d.lon.toFixed(2)}`}</td>
                <td className="num">{d.dist.toFixed(0)}</td>
                <td className="num">{cur}{Math.round(d.cost).toLocaleString()}</td>
                <td className="num" style={{color:premPct<5?'var(--gn)':premPct<15?'var(--a4)':'var(--dg)',fontWeight:600}}>+{cur}{Math.round(prem).toLocaleString()} ({premPct.toFixed(1)}%)</td>
                <td><span className="badge" style={{background:premPct<5?'rgba(63,185,80,.15)':premPct<15?'rgba(240,180,41,.15)':'rgba(248,81,73,.15)',color:premPct<5?'var(--gn)':premPct<15?'var(--a4)':'var(--dg)'}}>{premPct<5?'✓ near-optimum':premPct<15?'acceptable':'relocate'}</span></td>
              </tr>})}</tbody>
            </table>
          </div>}
          <div style={{marginTop:10,padding:8,background:'var(--bg3)',borderRadius:4,fontSize:10,color:'var(--tx2)'}}>
            <strong style={{color:'var(--a2)'}}>How to use:</strong> if the best existing DC is within 5% of optimum, stay put. If 5-15%, put relocation in the 3-yr capex roadmap. If {'>'}15%, run a Greenfield vs Brownfield NPV analysis in Tab 6. Center of Gravity is a <em>starting point</em>, not a decision — real siting must layer in land cost, labor, port access, and tax incentives.
          </div>
        </div>;
      })()}
    </div>

    {/* v3.3.3 — Incoterm × Mode duty responsibility matrix (reference + live import parts list) */}
    {(()=>{
      const importParts=state.products.flatMap(p=>p.bom.filter(b=>b.supplierType==='import').map(b=>({...b,skuName:p.name})));
      if(importParts.length===0)return null;
      const INCOTERMS=[
        {code:'EXW',seller:'Ex-Works (buyer picks up)',sellerPays:'Nothing',buyerPays:'Export clearance + all freight + import duty',bestFor:'Full buyer control — least common for sea/air'},
        {code:'FCA',seller:'Free Carrier',sellerPays:'To carrier at named place',buyerPays:'Main carriage + import duty',bestFor:'Any mode — safer than EXW (seller handles export)'},
        {code:'FAS',seller:'Free Alongside Ship',sellerPays:'Alongside vessel at port',buyerPays:'Loading + sea freight + import duty',bestFor:'Sea only (bulk)'},
        {code:'FOB',seller:'Free On Board',sellerPays:'On board vessel',buyerPays:'Sea freight + import duty',bestFor:'Sea only (containerized)'},
        {code:'CFR',seller:'Cost and Freight',sellerPays:'Sea freight to destination port',buyerPays:'Insurance + import duty',bestFor:'Sea only — buyer insures'},
        {code:'CIF',seller:'Cost, Insurance, Freight',sellerPays:'Sea freight + insurance',buyerPays:'Import duty + local',bestFor:'Sea only — most common Indian import'},
        {code:'CPT',seller:'Carriage Paid To',sellerPays:'Freight to destination',buyerPays:'Insurance + import duty',bestFor:'Air / multimodal'},
        {code:'CIP',seller:'Carriage + Insurance Paid',sellerPays:'Freight + insurance',buyerPays:'Import duty + local',bestFor:'Air / multimodal (default since 2020 = all-risk insurance)'},
        {code:'DAP',seller:'Delivered At Place',sellerPays:'All transport to named place',buyerPays:'Import duty + unloading',bestFor:'Simpler for buyer — seller takes the risk'},
        {code:'DPU',seller:'Delivered at Place Unloaded',sellerPays:'All transport + unloading',buyerPays:'Import duty only',bestFor:'Unique: only Incoterm where seller unloads'},
        {code:'DDP',seller:'Delivered Duty Paid',sellerPays:'Everything incl. import duty',buyerPays:'Nothing',bestFor:'Buyer-easy, seller-risky — rarely used by MSMEs'}
      ];
      return <div className="card">
        <div className="card-title">🛃 Incoterm Responsibility Matrix (2020) <span className="badge" style={{background:'rgba(240,180,41,.1)',color:'var(--a4)'}}>{importParts.length} import part{importParts.length>1?'s':''}</span></div>
        <div style={{fontSize:10,color:'var(--tx3)',marginBottom:8}}>
          Incoterm determines <em>who pays which cost leg</em> and where risk transfers. In India, imports via sea almost always use CIF; air imports default to CIP. DDP shifts everything — including BCD+SWS+IGST — to the seller.
          Landed cost = <strong>CIF value + BCD (7.5-10%) + SWS (10% of BCD) + IGST (18%) + CHA (₹5K) + Port (₹8K) + Local transport</strong>.
        </div>
        <div style={{overflowX:'auto',marginBottom:10}}>
          <table className="data-table">
            <thead><tr><th>Incoterm</th><th>Full name</th><th>Seller pays</th><th>Buyer pays</th><th>Best for / Note</th></tr></thead>
            <tbody>{INCOTERMS.map(ic=>{
              const used=importParts.some(p=>p.incoterm===ic.code);

                <td><span style={{fontFamily:'JetBrains Mono',fontWeight:700,color:used?'var(--gn)':'var(--tx2)'}}>{ic.code}</span>{used&&<span className="badge" style={{marginLeft:4,background:'rgba(63,185,80,.12)',color:'var(--gn)',fontSize:8}}>✓ in use</span>}</td>
                <td style={{fontSize:10}}>{ic.seller}</td>
                <td style={{fontSize:10,color:'var(--a2)'}}>{ic.sellerPays}</td>

          <tbody>{importParts.map((b,i)=>{
            const ic=b.incoterm||'—';
            // Rough uplift: CIF → BCD 7.5% → SWS 10%·BCD → IGST 18% of CIF+BCD+SWS
            const bcd=(ic==='DDP'?0:0.075);
            const sws=(ic==='DDP'?0:0.1*bcd);
            const igstBase=1+bcd+sws;
            const igst=ic==='DDP'?0:0.18*igstBase;
