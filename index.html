      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>DECISION VARIABLES:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>
        y[k,t] ∈ {'{ 0,1 }'} — setup binary (produce k in period t?)<br/>
        x[k,t] ≥ 0 — FG production qty of SKU k in period t<br/>
        I[k,t] ≥ 0 — FG ending inventory of k at end of t<br/>
        s[k,t] ≥ 0 — shortage / backorder of k in t<br/>
        q[i,t] ≥ 0 — purchase order qty for RM i in period t<br/>
        z[i,t] ∈ {'{ 0,1 }'} — PO binary (place order for i in t?)<br/>
        R[i,t] ≥ 0 — RM ending inventory of i at end of t
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>OBJECTIVE — MINIMIZE:</div>
      <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:4,color:'var(--ac)'}}>
        Z = Σ_k Σ_t [ setup_cost[k]·y[k,t] + h_fg[k]·I[k,t] + var_cost[k]·x[k,t] + penalty[k]·s[k,t] ]<br/>
          + Σ_i Σ_t [ mat_cost[i]·q[i,t] + S[i]·z[i,t] + trans_var[i,mode]·q[i,t] + h_rm[i]·R[i,t] ]<br/>
        <span style={{color:'var(--tx3)',fontSize:9}}>S[i] = total fixed cost per PO (admin + freight-fixed + receiving/QC + setup) — NOT per-unit transport. Per-unit transport (trans_var) is separately the variable cost on q[i,t].</span>
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>CONSTRAINTS — fixed display order:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>
        <span style={{color:'var(--a3)'}}>① FG balance:</span>&nbsp; I[k,t] = I[k,t-1] + x[k,t] − d[k,t] + s[k,t] &nbsp;&nbsp;∀ k,t<br/>
        <span style={{color:'var(--a3)'}}>② Capacity (per-line):</span>&nbsp; x[k,t] ≤ cap[k]·y[k,t] &nbsp;&nbsp;cap=[{state.products.map(p=>`${p.name}:${(p.capacity||50)*4}`).join(', ')}] u/mo<br/>
        <span style={{color:'var(--a3)'}}>③ Shared capacity (hours):</span>&nbsp; Σ_k (cycle_hrs[k]·x[k,t]) ≤ avail_hrs[t] &nbsp;<span style={{color:'var(--tx3)'}}>(cycle_hrs[k] = cycleTime_min[k] ÷ 60)</span><br/>
        <span style={{color:'var(--a3)'}}>④ BOM explosion:</span>&nbsp; consumed[i,t] = Σ_k x[k,t]·bom[i,k]·(1+scrap[i]) / yield[i] &nbsp;&nbsp;∀ i,t<br/>
        <span style={{color:'var(--a3)'}}>⑤ RM balance:</span>&nbsp; R[i,t] = R[i,t-1] + q[i,t−LT[i]] − consumed[i,t] &nbsp;&nbsp;∀ i,t<br/>
        <span style={{color:'var(--a3)'}}>⑥ MOQ / MaxOrd:</span>&nbsp; MOQ[i]·z[i,t] ≤ q[i,t] ≤ MaxOrd[i]·z[i,t] &nbsp;&nbsp;∀ i,t<br/>
        <span style={{color:'var(--a3)'}}>⑦ Shelf life (FG):</span>&nbsp; I[k,t] ≤ shelfLife_periods[k] · avg_d[k] &nbsp;<span style={{color:'var(--tx3)'}}>(shelfLife_days ÷ daysPerPeriod, ceil)</span><br/>
        <span style={{color:'var(--a3)'}}>⑧ Shelf life (RM):</span>&nbsp; R[i,t] ≤ rmShelf_periods[i] · avg_use[i]<br/>
        <span style={{color:'var(--a3)'}}>⑨ Working capital (HARD):</span>&nbsp; Σ_k (sell_price[k]·I[k,t]) + Σ_i (cost[i]·R[i,t]) ≤ WC_limit &nbsp;<span style={{color:'var(--tx3)'}}>(WC = {cur}{(+state.budget?.workingCapital||0).toLocaleString()} from Master Budget)</span><br/>
        <span style={{color:'var(--a3)'}}>⑩ Demand ceiling (robust):</span>&nbsp; x[k,t] ≤ d[k,t]·(1 + MAPE[k]) &nbsp;<span style={{color:'var(--tx3)'}}>(deterministic robust-optimization, Bertsimas-Sim style — worst-case inflation by empirical MAPE)</span><br/>
        <span style={{color:'var(--a3)'}}>⑪ Demand-mode variants:</span> &nbsp;<span style={{color:'var(--tx3)'}}>per-SKU: {state.products.map(p=>`${p.name}:${p.demandMode||'mts-weekly'}`).join(' · ')}</span><br/>
        &nbsp;&nbsp;&nbsp; • MTS-weekly (default): build-to-stock — no extra constraint (period balance applies)<br/>
        &nbsp;&nbsp;&nbsp; • Simultaneous: Σ_t x[k,t] + init_inv ≥ Σ_t d[k,t] (horizon meet)<br/>
        &nbsp;&nbsp;&nbsp; • Daily-spread: demand[t] = daily_rate × workdays(t) (no extra solver clause)<br/>
        &nbsp;&nbsp;&nbsp; • MTO: I[k,t] ≤ ss[k] AND x[k,t] ≤ d[k,t] + ss[k] (no build-ahead)<br/>
        <span style={{color:'var(--a3)'}}>⑫ Warehouse:</span>&nbsp; Σ_k I[k,t] ≤ WH_max<br/>
        <span style={{color:'var(--a3)'}}>⑬ Budget envelope (optional):</span>&nbsp; Σ_i Σ_t mat_cost[i]·q[i,t] ≤ Procurement_Budget<br/>
        <span style={{color:'var(--a3)'}}>⑭ Non-negativity:</span>&nbsp; x,I,s,q,R ≥ 0 &nbsp;;&nbsp; y,z ∈ {'{ 0,1 }'}
      </div>
      {state.solverResults?.procurement?.shadow_prices && <>
        <div style={{color:'var(--a4)',fontWeight:700,marginTop:8}}>SHADOW PRICES (last solve):</div>
        <div style={{paddingLeft:10,color:'var(--tx2)',fontSize:9}}>
          {Object.entries(state.solverResults.procurement.shadow_prices).slice(0,12).map(([cn,v],i)=><div key={i}>{cn}: <strong style={{color:Math.abs(+v)>0.01?'var(--dg)':'var(--tx3)'}}>{(+v).toFixed(3)}</strong></div>)}
          <div style={{color:'var(--tx3)',marginTop:4}}>Shadow price = marginal cost reduction per unit relaxation of constraint. Non-zero ⇒ that constraint is binding (the bottleneck).</div>
        </div>
      </>}
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>PARAMETERS FROM YOUR DATA:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)',fontSize:9}}>
        {state.products.map(p=>{const mc=p.bom.reduce((s,b)=>s+b.cost*b.qtyPer,0);const hfg=(mc*(p.carryRate||24)/100/52);return `${p.name}: cap=${p.capacity}u/wk, setup=${cur}${p.setupCost}, h_fg=${cur}${hfg.toFixed(4)}/u/wk, yield=${Math.round((p.yieldPct||0.95)*100)}%`}).join(' | ')}
      </div>
      <div style={{fontSize:9,color:'var(--tx3)',marginTop:6,padding:'4px 8px',background:'var(--bg3)',borderRadius:4}}>
        Solver: PuLP → CBC (COIN-OR) | {P.length*T} FG continuous + {allParts.length*T} RM continuous + {P.length*T+allParts.length*T} binaries | {P.length} SKUs × {T} periods × {allParts.length} parts
      </div>
    </div>;}},

    production:{label:'③ Production',color:'var(--a2)',content:()=><div style={{fontFamily:'JetBrains Mono',fontSize:10,lineHeight:2}}>
      <div style={{color:'var(--a4)',fontWeight:700}}>SETS:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>k ∈ K = {'{'+state.products.map(p=>p.name).join(', ')+'}'} &nbsp;|&nbsp; l ∈ L = {'{'+state.production.lines.map(l=>l.name).join(', ')+'}'} &nbsp;|&nbsp; t ∈ T = 1..{T}</div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>DECISION VARIABLES:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>
        x[k,l,t] ≥ 0 — units of product k on line l in period t<br/>
        δ[k,l,t] ∈ {'{ 0,1 }'} — changeover binary (product k starts on line l at t?)<br/>
        OT[l,t] ≥ 0 — overtime hours on line l in period t<br/>
        idle[l,t] ≥ 0 — idle hours on line l in period t
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>OBJECTIVE — MINIMIZE:</div>
      <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:4,color:'var(--ac)'}}>
        Z = Σ_l Σ_t [ Σ_k (changeover_cost·δ[k,l,t]) + OT_rate·OT[l,t] + idle_cost·idle[l,t] ]
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>CONSTRAINTS:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>
        Demand coverage: Σ_l x[k,l,t] ≥ req_qty[k] / T &nbsp;&nbsp;∀ k,t<br/>
        Line capacity:&nbsp; Σ_k (cycle_hrs[k]·x[k,l,t]) ≤ avail_hrs[l,t] + OT[l,t] &nbsp;&nbsp;∀ l,t &nbsp;<span style={{color:'var(--tx3)'}}>(cycle_hrs = cycleTime_min ÷ 60)</span><br/>
        Net avail hrs:&nbsp; avail_hrs[l,t] = (hrs/shift·shifts − breaks) · work_days &nbsp;=&nbsp; [{state.production.lines.map(l=>`${l.name}:${(((l.hoursPerShift||8)*l.shiftsPerDay)-(l.breakMins||30)*l.shiftsPerDay/60).toFixed(1)}h/day`).join(', ')}]<br/>
        OT limit:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; OT[l,t] ≤ OT_max[l] (if threshold exceeded)<br/>
        Changeover:&nbsp;&nbsp;&nbsp; changeover time δ[k,l,t]·changeover_mins deducted from avail<br/>
        Yield adj:&nbsp;&nbsp;&nbsp;&nbsp; gross_x[k,l,t] = x[k,l,t] / yield[k] &nbsp;&nbsp;∀ k,l,t<br/>
        Non-neg: x,OT,idle ≥ 0 ; δ ∈ {'{ 0,1 }'}
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>LINE DATA:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)',fontSize:9}}>
        {state.production.lines.map(l=>`${l.name}: ${l.capacity}u/wk, ${l.shiftsPerDay}sh×${l.hoursPerShift||8}h, OT×${l.otMult||1.5}, CO=${l.changeoverMins||30}min`).join(' | ')}
      </div>
    </div>},

    profitmix:{label:'① Profit Max',color:'var(--gn)',content:()=>{
      const P=state.products;
      const skuVar=(p,i)=>`x${(p.name||`P${i+1}`).replace(/[^a-zA-Z0-9]/g,'_').slice(0,8)}`;
      const margins=P.map(p=>{const mc=p.bom.reduce((s,b)=>s+b.cost*b.qtyPer,0);return{p,mc,margin:p.sellPrice-p.variableCost-mc,cycle:(p.cycleTime||19)/60};});
      const totalCap=state.production.lines.reduce((a,l)=>a+(l.capacity||0)*periodCount(state.planning),0);
      return <div style={{fontFamily:'JetBrains Mono',fontSize:10,lineHeight:2}}>
        <div style={{color:'var(--a4)',fontWeight:700}}>SETS (rendered from your <strong>{P.length}</strong> SKU{P.length!==1?'s':''}):</div>
        <div style={{paddingLeft:10,color:'var(--tx2)'}}>K = {'{'+P.map(p=>p.name).join(', ')+'}'} &nbsp;|&nbsp; |K| = {P.length}</div>
        <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>DECISION VARIABLES ({P.length}):</div>
        <div style={{paddingLeft:10,color:'var(--tx2)'}}>
          {P.map((p,i)=><div key={i}><span style={{color:'var(--ac)'}}>{skuVar(p,i)}</span> ≥ 0 &nbsp;— units of {p.name} to produce</div>)}
        </div>
        <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>OBJECTIVE — MAXIMIZE (expanded):</div>
        <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:4,color:'var(--ac)',whiteSpace:'pre-wrap'}}>
          Z = {margins.map((m,i)=>`${cur}${m.margin.toFixed(2)}·${skuVar(m.p,i)}`).join(' + ')}
        </div>
        <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>CONSTRAINTS ({P.length + (totalCap>0?1:0) + P.filter(p=>+p.minProd>0||+p.maxProd>0).length} active):</div>
        <div style={{paddingLeft:10,color:'var(--tx2)'}}>
          <div style={{color:'var(--tx3)',fontSize:9,marginTop:2}}>Demand ceiling (per SKU):</div>
          {P.map((p,i)=>{const mape=(p.mape||15)/100;const f=(p.history||[]).slice(-12).reduce((a,b)=>a+b,0);const ceil=Math.round(f*(1+mape));return <div key={i} style={{paddingLeft:8}}>{skuVar(p,i)} ≤ {ceil.toLocaleString()} &nbsp;<span style={{color:'var(--tx3)',fontSize:9}}>(forecast {f.toLocaleString()} × (1+{(mape*100).toFixed(0)}% MAPE))</span></div>})}
          {totalCap>0&&<div style={{color:'var(--tx3)',fontSize:9,marginTop:4}}>Shared capacity:</div>}
          {totalCap>0&&<div style={{paddingLeft:8}}>{margins.map((m,i)=>`${m.cycle.toFixed(3)}·${skuVar(m.p,i)}`).join(' + ')} ≤ {totalCap.toLocaleString()} hrs</div>}
          {P.filter(p=>+p.minProd>0).length>0&&<div style={{color:'var(--tx3)',fontSize:9,marginTop:4}}>Min prod bounds (user-set):</div>}
          {P.map((p,i)=>+p.minProd>0&&<div key={i} style={{paddingLeft:8,color:'var(--a3)'}}>{skuVar(p,i)} ≥ {p.minProd}</div>)}
          {P.filter(p=>+p.maxProd>0).length>0&&<div style={{color:'var(--tx3)',fontSize:9,marginTop:4}}>Max prod bounds (user-set):</div>}
          {P.map((p,i)=>+p.maxProd>0&&<div key={i} style={{paddingLeft:8,color:'var(--a3)'}}>{skuVar(p,i)} ≤ {p.maxProd}</div>)}
        </div>
        <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>MARGIN RANKING (allocates bottleneck hours to highest margin/hr first):</div>
        <div style={{paddingLeft:10,color:'var(--tx2)',fontSize:9}}>
          {margins.sort((a,b)=>(b.margin/b.cycle)-(a.margin/a.cycle)).map((m,i)=><div key={i}>
            <strong style={{color:'var(--ac)'}}>{i+1}. {m.p.name}</strong>: margin={cur}{m.margin.toFixed(2)}/u, cycle={(m.cycle*60).toFixed(0)}min → <strong>{cur}{(m.margin/m.cycle).toFixed(1)}/hr</strong>
          </div>)}
        </div>
        <div style={{fontSize:9,color:'var(--tx3)',marginTop:6,padding:'4px 8px',background:'var(--bg3)',borderRadius:4}}>
          <strong style={{color:'var(--a2)'}}>Problem size:</strong> {P.length} decision variables, {P.length + (totalCap>0?1:0) + P.filter(p=>+p.minProd>0||+p.maxProd>0).length} constraints. LP relaxation (qty continuous). Shadow prices surface the binding constraint; reduced costs tell you how much margin each excluded SKU is missing.
        </div>
      </div>;
    }},

    transport:{label:'Transport',color:'var(--a3)',content:()=><div style={{fontFamily:'JetBrains Mono',fontSize:10,lineHeight:2}}>
      <div style={{color:'var(--a4)',fontWeight:700}}>PROBLEM TYPE: Multi-modal mode selection + LP allocation</div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>SETS:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>s ∈ S = shipments (BOM parts flagged import or LT {'>'} 2wk)<br/>m ∈ M = {'{ road, rail, sea, air, multimodal }'} &nbsp;|&nbsp; r ∈ R = 25 Indian route pairs</div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>DECISION VARIABLES:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>
        select[s,m] ∈ {'{ 0,1 }'} — assign shipment s to mode m<br/>
        alloc[w,c] ≥ 0 — units allocated from warehouse w to customer c (transport matrix)
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>MODE SELECTION OBJECTIVE — MINIMIZE (per shipment):</div>
      <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:4,color:'var(--ac)'}}>
        {'cost[s] = min_m { freight_rate[m]·weight[s] + handling[m] + insurance_pct·value[s] }'}<br/>
        subject to: transit_days[m,r] ≤ deadline_days[s]
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>ALLOCATION LP OBJECTIVE — MINIMIZE:</div>
      <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:4,color:'var(--ac)'}}>
        Z = Σ_w Σ_c rate[w,c] · alloc[w,c]
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>ALLOCATION CONSTRAINTS:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>
        Supply:&nbsp; Σ_c alloc[w,c] ≤ supply[w] &nbsp;&nbsp;∀ w (warehouse stock)<br/>
        Demand:&nbsp; Σ_w alloc[w,c] ≥ demand[c] &nbsp;&nbsp;∀ c (customer requirement)<br/>
        Non-neg: alloc[w,c] ≥ 0 &nbsp;&nbsp;∀ w,c
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>DEMAND SENSING OVERRIDE:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>
        If actual[t] {'>'} forecast[t]: spike_flag = True → override to fastest feasible mode (air/express), compute cost premium = cost_new − cost_base
      </div>
    </div>},

    montecarlo:{label:'Monte Carlo',color:'var(--dg)',content:()=><div style={{fontFamily:'JetBrains Mono',fontSize:10,lineHeight:2}}>
      <div style={{color:'var(--a4)',fontWeight:700}}>METHOD: Stochastic simulation (not MILP — parametric sampling)</div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>RANDOM VARIABLE DISTRIBUTIONS:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>
        Demand noise: &nbsp;&nbsp; d̃[k,t] = d[k,t] · (1 + ε_d) &nbsp;&nbsp;&nbsp; ε_d ~ N(0, MAPE[k]/100)<br/>
        Lead time noise: LT̃[i] = LT[i] · (1 + ε_lt) &nbsp;&nbsp; ε_lt ~ N(0, LT_CV[i]/100)<br/>
        Material price: &nbsp; c̃[i] = c[i] · (1 + ε_c) &nbsp;&nbsp;&nbsp;&nbsp; ε_c ~ N(0, cost_CV[i]/100)<br/>
        Yield noise: &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ỹ[k] = yield[k] · (1 + ε_y) &nbsp;ε_y ~ N(0, yield_CV[k]/100)<br/>
        Cap noise: &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; cap̃[k] = cap[k] · (1 + ε_cap) &nbsp;ε_cap ~ N(0, cap_CV[k]/100)
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>SIMULATION LOOP (n=1000 runs):</div>
      <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:4,color:'var(--ac)'}}>
        For run r = 1..n:<br/>
        &nbsp;&nbsp;Sample ε vectors for all k,i,t<br/>
        &nbsp;&nbsp;Run deterministic procurement MILP with noisy inputs<br/>
        &nbsp;&nbsp;Record total_cost[r], fill_rate[r], inv_level[r]
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>OUTPUT STATISTICS:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>
        VaR₉₅ = percentile(costs, 95) &nbsp;&nbsp;— worst cost in 95% of scenarios<br/>
        CVaR₉₅ = E[cost | cost {'>'} VaR₉₅] — avg cost in worst 5%<br/>
        Fragility = CVaR₉₅ / E[cost] &nbsp;&nbsp;&nbsp;— how bad is the tail vs average?<br/>
        Fill rate = E[units_fulfilled / demand] across all runs
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>NOISE PARAMETERS FROM YOUR DATA:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)',fontSize:9}}>
        {state.products.map(p=>`${p.name}: MAPE=${p.mape||15}%, yield_CV=${p.yieldCV||0}%, cap_CV=${p.capCV||5}%`).join(' | ')}<br/>
        Parts: {state.products.flatMap(p=>p.bom.map(b=>`${b.name}: LT_CV=${b.ltCV||10}%, cost_CV=${b.costCV||10}%`)).join(' | ')}
      </div>
    </div>},

    capital:{label:'Capital Budget',color:'var(--a4)',content:()=><div style={{fontFamily:'JetBrains Mono',fontSize:10,lineHeight:2}}>
      <div style={{color:'var(--a4)',fontWeight:700}}>PROBLEM TYPE: Binary (0-1) Knapsack LP</div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>SETS:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>j ∈ J = investment candidates (production line upgrades + asset register)</div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>DECISION VARIABLE:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>select[j] ∈ {'{ 0,1 }'} — include investment j in portfolio?</div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>OBJECTIVE — MAXIMIZE:</div>
      <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:4,color:'var(--ac)'}}>
        Z = Σ_j NPV[j] · select[j]<br/><br/>
        NPV[j] = −CAPEX[j] + Σ_t (CF[j] / (1+WACC)^t) + Residual[j]/(1+WACC)^n
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>CONSTRAINTS:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>
        Budget: &nbsp;&nbsp;Σ_j CAPEX[j]·select[j] ≤ Budget ({cur}{(state.budget.capex||1000000).toLocaleString()})<br/>
        Binary: &nbsp;&nbsp;select[j] ∈ {'{ 0,1 }'} &nbsp;&nbsp;∀ j
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>DERIVED METRICS (post-solve):</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>
        IRR[j] = r such that NPV[j]=0 (bisection search)<br/>
        Payback[j] = min t such that Σ_τ≤t CF[j,τ] ≥ CAPEX[j]<br/>
        PI[j] = (NPV[j]+CAPEX[j]) / CAPEX[j] (profitability index)<br/>
        Shadow price = marginal value of relaxing budget by 1 unit<br/>
        WACC used: {WACC}%
      </div>
    </div>},

    pipeline:{label:'🔗 Pipeline',color:'var(--a3)',content:()=><div style={{fontFamily:'JetBrains Mono',fontSize:10,lineHeight:2}}>
      <div style={{color:'var(--a4)',fontWeight:700}}>ARCHITECTURE: Sequential solver chain (output of each feeds next)</div>
      <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:4,color:'var(--tx)',marginTop:4}}>
        <span style={{color:'var(--gn)',fontWeight:700}}>Step 1 — PROFIT MIX LP</span><br/>
        max Σ_k margin[k]·qty[k] &nbsp;s.t.&nbsp; qty[k] ≤ demand_ceiling[k], &nbsp;Σ(cycle_hrs·qty) ≤ shared_cap_hrs &nbsp;<span style={{color:'var(--tx3)'}}>(cycle_hrs = min ÷ 60; demand_ceiling via robust-optim forecast×(1+MAPE))</span><br/>
        ↓ outputs: optimal_qty[k] for each SKU<br/><br/>
        <span style={{color:'var(--ac)',fontWeight:700}}>Step 2 — PROCUREMENT MILP</span><br/>
        Replaces demand vector with qty[k] from Step 1 (not forecast)<br/>
        min Σ [setup + holding + material + ordering + transport] costs<br/>
        ↓ outputs: PO schedule, RM inventory trajectory, total procurement cost<br/><br/>
        <span style={{color:'var(--a2)',fontWeight:700}}>Step 3 — PRODUCTION MILP</span><br/>
        Schedules qty[k] across lines to minimize makespan + changeovers + OT<br/>
        ↓ outputs: Gantt schedule, line utilization, completion periods<br/><br/>
        <span style={{color:'var(--a3)',fontWeight:700}}>Summary:</span> Net profit = Revenue(Step1) − Procurement(Step2) − Production(Step3)
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>DATA FLOW:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)',fontSize:9}}>
        Pipeline uses annual demand from forecast (last 12 months history) as the ceiling for profit mix.<br/>
        Procurement receives weekly disaggregation of Step-1 quantities (÷52 per week, not forecast).<br/>
        Production receives total annual requirement from Step-1, schedules within {T}-period horizon.
      </div>
    </div>},
  };

  return <div className="card">
    <div onClick={()=>setOpen(o=>!o)} style={{cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div className="card-title" style={{marginBottom:0}}>📐 Complete MILP Formulations <span className="badge" style={{background:'rgba(167,139,250,.1)',color:'var(--a3)'}}>All 7 Solver Models</span></div>
      <span style={{color:'var(--tx3)',fontSize:18,marginLeft:8}}>{open?'▾':'▸'}</span>
    </div>
    {open&&<div style={{marginTop:10}}>
      {/* Mode tabs */}
      <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:10}}>
        {Object.entries(FORMS).map(([id,f])=><button key={id}
          onClick={()=>setActiveForm(id)}
          style={{padding:'4px 10px',borderRadius:4,fontSize:10,fontWeight:activeForm===id?700:500,
            border:`1px solid ${activeForm===id?f.color:'var(--br)'}`,
            background:activeForm===id?`rgba(0,0,0,0.15)`:'var(--bg3)',
            color:activeForm===id?f.color:'var(--tx2)',cursor:'pointer'}}>
          {f.label}
        </button>)}
      </div>
      {/* Active formulation */}
      <div style={{padding:'10px 12px',background:'var(--bg3)',borderRadius:6,border:`1px solid ${FORMS[activeForm]?.color||'var(--br)'}22`}}>
        {FORMS[activeForm]?.content()}
      </div>
    </div>}
  </div>;
}

function InsightEngineCard({state}){
  const [insights,setInsights]=useState(null);
  const [loading,setLoading]=useState(false);
  const cur=state.config.currency;
  const generate=async()=>{
    setLoading(true);setInsights(null);
    try{
      const P=state.products;
      const totRev=P.reduce((s,p)=>s+(p.history||[]).reduce((a,b)=>a+(+b||0),0)*p.sellPrice,0);
      const totMat=P.reduce((s,p)=>s+(p.history||[]).reduce((a,b)=>a+(+b||0),0)*p.bom.reduce((bs,b)=>bs+b.cost*b.qtyPer,0),0);
      const imp=P.flatMap(p=>p.bom.filter(b=>b.supplierType==='import'));
      const longLT=P.flatMap(p=>p.bom.filter(b=>b.leadTime>4));
      const noBack=P.flatMap(p=>p.bom.filter(b=>!b.backupSupplier));
      const avgMAPE=P.reduce((s,p)=>s+(p.mape||15),0)/Math.max(P.length,1);
      const ctx=`Supply chain for ${state.config.companyName}:
SKUs (${P.length}): ${P.map(p=>`${p.name}[dem:${(p.history||[]).reduce((a,b)=>a+(+b||0),0)}u/yr,px:${cur}${p.sellPrice},margin:${(((p.sellPrice-p.bom.reduce((s,b)=>s+b.cost*b.qtyPer,0)-p.variableCost)/p.sellPrice)*100).toFixed(0)}%,MAPE:${p.mape||15}%,cap:${p.capacity*4}u/mo,LT:${Math.max(...p.bom.map(b=>b.leadTime),0)}wk]`).join(' | ')}
Finance: Revenue=${cur}${Math.round(totRev).toLocaleString()} | MatCost=${cur}${Math.round(totMat).toLocaleString()} (${Math.round(totMat/Math.max(totRev,1)*100)}%) | WACC=${state.config.wacc}% | SL=${(state.config.serviceLevel*100).toFixed(0)}%
Supply risk: import_parts=${imp.length} | long_LT_parts(>4wk)=${longLT.length} | no_backup=${noBack.length} | avg_MAPE=${avgMAPE.toFixed(1)}%
Ops: ${state.production.lines.length} lines | ${state.planning.workDays}d/wk | ${periodCount(state.planning)}wk horizon
Return ONLY a JSON array (no markdown fences): [{title,insight,recommendation,priority:"high"|"medium"|"low",category}] with 6 specific actionable insights using numbers from the data above.`;
      const res=await fetch('/api/ai/insights',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:ctx,system:'Return only a raw JSON array. No preamble. No code fences.',model:'claude-sonnet-4-20250514',max_tokens:1000})});
      const data=await res.json();
      if(data.error)throw new Error(data.error);
      const txt=data.text||'[]';
      setInsights(JSON.parse(txt.replace(/```json|```/g,'').trim()));
    }catch(e){setInsights([{title:'Parse Error',insight:e.message,recommendation:'Try again',priority:'high',category:'Error'}]);}
    setLoading(false);
  };
  const pc={high:'var(--dg)',medium:'var(--a4)',low:'var(--gn)'};
  return <div className="card" style={{borderColor:'rgba(167,139,250,.25)'}}>
    <div className="card-title">🧠 Live Insight Engine <span className="badge" style={{background:'rgba(167,139,250,.2)',color:'var(--a3)'}}>Claude AI · Real-time</span></div>
    <div style={{fontSize:10,color:'var(--tx3)',marginBottom:8}}>Analyzes your current supply chain configuration and returns 6 quantified, actionable insights specific to your data.</div>
    <button className="btn btn-primary" onClick={generate} disabled={loading} style={{background:loading?'var(--bg4)':'linear-gradient(135deg,#a78bfa,#00d4aa)',color:'#000'}}>
      {loading?'⏳ Generating insights...':'✨ Generate Insights'}
    </button>
    {insights&&<div style={{marginTop:10}}>
      {insights.map((ins,i)=><div key={i} style={{marginBottom:8,padding:'8px 12px',background:'var(--bg3)',borderRadius:6,borderLeft:`3px solid ${pc[ins.priority]||'var(--br)'}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:3}}>
          <div style={{fontSize:12,fontWeight:700}}>{ins.title}</div>
          <div style={{display:'flex',gap:4,flexShrink:0,marginLeft:8}}>
            <span style={{fontSize:8,padding:'2px 6px',borderRadius:10,background:pc[ins.priority]||'var(--br)',color:'#000',fontWeight:700}}>{(ins.priority||'').toUpperCase()}</span>
            <span style={{fontSize:8,padding:'2px 6px',borderRadius:10,background:'var(--bg4)',color:'var(--tx3)'}}>{ins.category}</span>
          </div>
        </div>
        <div style={{fontSize:11,color:'var(--tx2)',marginBottom:3}}>{ins.insight}</div>
        <div style={{fontSize:10,color:'var(--ac)',fontStyle:'italic'}}>→ {ins.recommendation}</div>
      </div>)}
    </div>}
  </div>;
}

// ── Module-level: extracted from MultiSKU15 to prevent React identity instability ──
function MultiSec({id,title,children,openS,onToggle}){
  return <div style={{marginBottom:4,border:'1px solid var(--br)',borderRadius:4,overflow:'hidden'}}>
    <div onClick={()=>onToggle(id)} style={{padding:'7px 12px',background:'var(--bg3)',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div style={{fontSize:11,fontWeight:600}}>{title}</div>
      <span style={{color:'var(--tx3)',fontSize:14}}>{openS[id]?'▾':'▸'}</span>
    </div>
    {openS[id]&&<div style={{padding:'8px 12px',overflowX:'auto'}}>{children}</div>}
  </div>;
}
function MultiTable({rows,products}){
  return <table className="data-table">
    <thead><tr><th>Metric</th>{products.map(p=><th key={p.id} style={{color:'var(--ac)'}}>{p.name}</th>)}</tr></thead>
    <tbody>{rows.map(([l,fn])=><tr key={l}><td style={{fontWeight:600}}>{l}</td>{products.map(p=><td key={p.id} className="num">{fn(p)}</td>)}</tr>)}</tbody>
  </table>;
}

function MultiSKU15({state}){
  const [openS,setOpenS]=useState({});
  const tog=(k)=>setOpenS(o=>({...o,[k]:!o[k]}));
  const P=state.products;const cur=state.config.currency;
  if(P.length<2)return <div className="card"><div className="card-title">📋 Multi-SKU 15-Section View</div><div style={{fontSize:10,color:'var(--tx3)'}}>Add 2+ products to enable multi-SKU comparison across 15 analytical dimensions.</div></div>;
  // Aliases so JSX below is unchanged
  const Sec=({id,title,children})=><MultiSec id={id} title={title} openS={openS} onToggle={tog}>{children}</MultiSec>;
  const T=({rows})=><MultiTable rows={rows} products={P}/>;
  const ad=p=>(p.history||[]).reduce((a,b)=>a+b,0);
  const mc=p=>(p.bom||[]).reduce((s,b)=>s+b.cost*b.qtyPer,0);
  const mg=p=>p.sellPrice-mc(p)-(p.variableCost||0)-(p.laborPerUnit||5);
  const sd=p=>{const h=p.history||[];const mu=h.reduce((a,b)=>a+b,0)/Math.max(h.length,1);return Math.sqrt(h.reduce((s,v)=>s+Math.pow(v-mu,2),0)/Math.max(h.length,1));};
  const z=zVal(+(state.config.serviceLevel||0.95));
  return <div className="card">
    <div className="card-title">📋 Multi-SKU 15-Section Analysis <span className="badge" style={{background:'rgba(0,212,170,.1)',color:'var(--ac)'}}>{P.length} products</span></div>
    <div style={{display:'flex',gap:6,marginBottom:8}}>
      <button className="btn btn-secondary btn-sm" onClick={()=>setOpenS(Object.fromEntries(Array.from({length:15},(_,i)=>[`s${i+1}`,true])))}>Expand All</button>
      <button className="btn btn-secondary btn-sm" onClick={()=>setOpenS({})}>Collapse All</button>
    </div>
    <Sec id="s1" title="1. Demand Profile"><T rows={[
      ['Annual Demand',p=>ad(p).toLocaleString()+'u'],
      ['Monthly Avg',p=>Math.round(ad(p)/12)],
      ['Peak Month',p=>Math.max(...(p.history||[0]))],
      ['Trough Month',p=>Math.min(...(p.history||[0]))],
      ['Std Dev σ',p=>Math.round(sd(p))],
      ['CV%',p=>(sd(p)/Math.max(ad(p)/12,1)*100).toFixed(1)+'%'],
      ['Trend',p=>{const h=p.history||[];const n=h.length;if(n<2)return '?';const sx=h.reduce((s,_,i)=>s+i,0),sy=h.reduce((s,v)=>s+v,0),sxy=h.reduce((s,v,i)=>s+i*v,0),sx2=h.reduce((s,_,i)=>s+i*i,0);const b=(n*sxy-sx*sy)/(n*sx2-sx*sx||1);return b>2?'↑ Growing':b<-2?'↓ Declining':'→ Stable';}],
    ]}/></Sec>
    <Sec id="s2" title="2. Cost Structure"><T rows={[
      ['Material Cost/u',p=>cur+mc(p).toFixed(2)],
      ['Variable Cost/u',p=>cur+(p.variableCost||0)],
      ['Labor/u',p=>cur+(p.laborPerUnit||5)],
      ['Setup/batch',p=>cur+(p.setupCost||50)],
      ['Total Unit Cost',p=>cur+(mc(p)+(p.variableCost||0)+(p.laborPerUnit||5)).toFixed(2)],
      ['Sell Price',p=>cur+p.sellPrice],
      ['Contribution/u',p=><span style={{color:mg(p)>0?'var(--gn)':'var(--dg)',fontWeight:700}}>{cur+mg(p).toFixed(2)}</span>],
      ['Margin%',p=>(mg(p)/Math.max(p.sellPrice,1)*100).toFixed(1)+'%'],
    ]}/></Sec>
    <Sec id="s3" title="3. Forecast Accuracy"><T rows={[
      ['MAPE%',p=><span style={{color:(p.mape||15)<15?'var(--gn)':(p.mape||15)<25?'var(--a4)':'var(--dg)'}}>{p.mape||15}%</span>],
      ['History Points',p=>(p.history||[]).length],
      ['Overrides',p=>(p.overrides||[]).filter(o=>o!==null).length],
      ['Actuals',p=>(p.actuals||[]).filter(a=>a!=null).length],
      ['Events/Promos',p=>(p.events||[]).length],
      ['MTO Orders',p=>(p.mtoOrders||[]).length],
    ]}/></Sec>
    <Sec id="s4" title="4. Inventory Parameters"><T rows={[
      ['Init Inventory',p=>p.initInventory||0],
      ['Shelf Life',p=>(p.shelfLife||52)+' days'],
      ['WH Max (u)',p=>p.whMaxUnits||500],
      ['Carry Rate',p=>(p.carryRate||24)+'%/yr'],
      ['Prod Mode',p=>(p.prodMode||'mts').toUpperCase()],
      ['Backorder',p=>p.backorderOn?'Yes':'No'],
      ['Salvage%',p=>Math.round((p.salvageRate||0.8)*100)+'%'],
    ]}/></Sec>
    <Sec id="s5" title="5. Production Parameters"><T rows={[
      ['Capacity (u/wk)',p=>p.capacity||50],
      ['Monthly Cap',p=>(p.capacity||50)*4],
      ['Cap Utilization',p=>Math.round(ad(p)/((p.capacity||50)*52)*100)+'%'],
      ['Cycle Time',p=>(p.cycleTime||19)+' min/u'],
      ['Yield%',p=>Math.round((p.yieldPct||0.95)*100)+'%'],
      ['Setup Cost',p=>cur+(p.setupCost||50)],
      ['OT Threshold',p=>(p.optUtil||85)+'%'],
      ['Cap CV%',p=>(p.capCV||5)+'%'],
    ]}/></Sec>
    <Sec id="s6" title="6. BOM Summary"><T rows={[
      ['# Parts',p=>(p.bom||[]).length],
      ['# Import Parts',p=>(p.bom||[]).filter(b=>b.supplierType==='import').length],
      ['Total Mat Cost/u',p=>cur+mc(p).toFixed(2)],
      ['Max Lead Time',p=>Math.max(...(p.bom||[]).map(b=>b.leadTime),0)+'wk'],
      ['Avg MOQ',p=>Math.round((p.bom||[]).reduce((s,b)=>s+b.moq,0)/Math.max((p.bom||[]).length,1))],
      ['Parts w/ Backup',p=>(p.bom||[]).filter(b=>b.backupSupplier).length],
      ['Vol Disc Tiers',p=>(p.bom||[]).reduce((s,b)=>s+(b.volDisc||[]).length,0)],
    ]}/></Sec>
    <Sec id="s7" title="7. Safety Stock & ROP"><T rows={[
      ['Avg Monthly',p=>Math.round(ad(p)/12)],
      ['Std Dev σ',p=>Math.round(sd(p))],
      ['LT (1st part)',p=>(p.bom||[])[0]?.leadTime+'wk'||'N/A'],
      ['Safety Stock',p=>{const lt=(p.bom||[])[0]?.leadTime||2;return Math.round(z*sd(p)*Math.sqrt(lt));}],
      ['Reorder Point',p=>{const lt=(p.bom||[])[0]?.leadTime||2;const ss=Math.round(z*sd(p)*Math.sqrt(lt));return Math.round(ad(p)/12/4*lt+ss);}],
      ['EOQ',p=>{const D=ad(p);const S=(p.bom||[])[0]?.orderingCost||75;const mc2=(p.bom||[])[0]?.cost||10;const H=mc2*((p.bom||[])[0]?.holdPct||24)/100;return D>0&&H>0?Math.round(Math.sqrt(2*D*S/H)):'N/A';}],
    ]}/></Sec>
    <Sec id="s8" title="8. Outbound Logistics"><T rows={[
      ['Out Rate/u',p=>cur+(p.outRate||2)],
      ['Out Mode',p=>p.outMode||'perUnit'],
      ['Ship Cost',p=>cur+(p.outShipCost||50)],
      ['DSO (days)',p=>p.dso||30],
      ['Annual Trans',p=>cur+Math.round((p.outRate||2)*ad(p)).toLocaleString()],
    ]}/></Sec>
    <Sec id="s9" title="9. Working Capital">
      {(()=>{const wc=P.map(p=>{const m2=ad(p)/12;const invV=m2/2*mc(p);const ap=(p.bom||[]).reduce((s,b)=>s+m2*b.qtyPer*b.cost*(b.payTermDays||30)/30,0);const ar=m2*p.sellPrice*(p.dso||30)/30;return{n:p.name,invV:Math.round(invV),ap:Math.round(ap),ar:Math.round(ar),nwc:Math.round(invV+ar-ap)};});
      return <table className="data-table"><thead><tr><th>WC Item</th>{P.map(p=><th key={p.id}>{p.name}</th>)}<th>Total</th></tr></thead>
      <tbody>
        <tr><td>Inventory Value</td>{wc.map(w=><td key={w.n} className="num">{cur}{w.invV.toLocaleString()}</td>)}<td className="num">{cur}{wc.reduce((s,w)=>s+w.invV,0).toLocaleString()}</td></tr>
        <tr><td>Accounts Receivable</td>{wc.map(w=><td key={w.n} className="num" style={{color:'var(--a2)'}}>{cur}{w.ar.toLocaleString()}</td>)}<td className="num">{cur}{wc.reduce((s,w)=>s+w.ar,0).toLocaleString()}</td></tr>
        <tr><td>Accounts Payable</td>{wc.map(w=><td key={w.n} className="num" style={{color:'var(--gn)'}}>{cur}{w.ap.toLocaleString()}</td>)}<td className="num">{cur}{wc.reduce((s,w)=>s+w.ap,0).toLocaleString()}</td></tr>
        <tr style={{fontWeight:700}}><td>Net Working Capital</td>{wc.map(w=><td key={w.n} className="num" style={{color:w.nwc<0?'var(--gn)':'var(--a4)'}}>{cur}{w.nwc.toLocaleString()}</td>)}<td className="num">{cur}{wc.reduce((s,w)=>s+w.nwc,0).toLocaleString()}</td></tr>
      </tbody></table>;})()}
    </Sec>
    <Sec id="s10" title="10. Risk Profile"><T rows={[
      ['Forecast Risk',p=><span style={{color:(p.mape||15)<15?'var(--gn)':(p.mape||15)<25?'var(--a4)':'var(--dg)'}}>{p.mape||15}% MAPE</span>],
      ['Import Exposure',p=>{const im=(p.bom||[]).filter(b=>b.supplierType==='import').length;const tot=Math.max((p.bom||[]).length,1);return <span style={{color:im/tot>0.5?'var(--dg)':im>0?'var(--a4)':'var(--gn)'}}>{Math.round(im/tot*100)}%</span>;}],
      ['Single-Source',p=><span style={{color:(p.bom||[]).filter(b=>!b.backupSupplier).length>0?'var(--a4)':'var(--gn)'}}>{(p.bom||[]).filter(b=>!b.backupSupplier).length} parts</span>],
      ['Max LT Risk',p=>{const mx=Math.max(...(p.bom||[]).map(b=>b.leadTime),0);return <span style={{color:mx>6?'var(--dg)':mx>4?'var(--a4)':'var(--gn)'}}>{mx}wk</span>;}],
      ['Expiry Risk',p=>{const s=p.shelfLife||52;return <span style={{color:s<30?'var(--dg)':s<90?'var(--a4)':'var(--gn)'}}>{s<30?'HIGH':s<90?'MEDIUM':'LOW'}</span>;}],
      ['Cap Utilization',p=>{const u=Math.round(ad(p)/((p.capacity||50)*52)*100);return <span style={{color:u>90?'var(--dg)':u>80?'var(--a4)':'var(--gn)'}}>{u}%</span>;}],
    ]}/></Sec>
    <Sec id="s11" title="11. Profitability Ranking">
      {(()=>{const ranked=[...P].map(p=>{const m2=mg(p);const ch=(p.cycleTime||19)/60;return{...p,m2,annP:m2*ad(p),mPct:(m2/Math.max(p.sellPrice,1)*100).toFixed(1),mPH:ch>0?(m2/ch).toFixed(1):'N/A'};}).sort((a,b)=>b.m2-a.m2);
      return <table className="data-table"><thead><tr><th>Rank</th><th>Product</th><th>Margin/u</th><th>Margin%</th><th>Margin/hr</th><th>Annual Profit</th></tr></thead>
      <tbody>{ranked.map((p,i)=><tr key={p.id}><td style={{fontWeight:700,color:i===0?'var(--ac)':'var(--tx)'}}>{i+1}</td><td style={{fontWeight:600}}>{p.name}</td>
        <td className="num" style={{color:p.m2>0?'var(--gn)':'var(--dg)',fontWeight:700}}>{cur}{p.m2.toFixed(2)}</td>
        <td className="num" style={{color:+p.mPct>20?'var(--gn)':+p.mPct>0?'var(--a4)':'var(--dg)'}}>{p.mPct}%</td>
        <td className="num" style={{color:'var(--a2)'}}>{cur}{p.mPH}/hr</td>
        <td className="num" style={{color:p.annP>0?'var(--gn)':'var(--dg)',fontWeight:700}}>{cur}{Math.round(p.annP).toLocaleString()}</td>
      </tr>)}</tbody></table>;})()}
    </Sec>
    <Sec id="s12" title="12. Supplier Concentration">
      {(()=>{const allP=P.flatMap(p=>(p.bom||[]).map(b=>({...b,pn:p.name})));const top=allP.map(b=>({name:b.name,pn:b.pn,val:b.cost*b.qtyPer,lt:b.leadTime,hb:!!b.backupSupplier})).sort((a,b)=>b.val-a.val).slice(0,8);
      return <><div style={{display:'flex',gap:16,marginBottom:6,fontSize:11}}>
        <span>Domestic: <strong style={{color:'var(--gn)'}}>{allP.filter(b=>b.supplierType!=='import').length}</strong></span>
        <span>Import: <strong style={{color:'var(--a4)'}}>{allP.filter(b=>b.supplierType==='import').length}</strong></span>
        <span>No backup: <strong style={{color:'var(--dg)'}}>{allP.filter(b=>!b.backupSupplier).length}</strong></span>
      </div>
      <table className="data-table"><thead><tr><th>Part (by value)</th><th>Product</th><th>Unit Value</th><th>LT</th><th>Backup?</th></tr></thead>
      <tbody>{top.map((b,i)=><tr key={i}><td style={{fontWeight:600}}>{b.name}</td><td style={{color:'var(--tx2)',fontSize:10}}>{b.pn}</td><td className="num">{cur}{b.val.toFixed(2)}</td><td className="num" style={{color:b.lt>4?'var(--dg)':'var(--tx)'}}>{b.lt}wk</td><td style={{color:b.hb?'var(--gn)':'var(--dg)',fontSize:9}}>{b.hb?'✓ Yes':'✗ No'}</td></tr>)}</tbody></table></>;})()}
    </Sec>
    <Sec id="s13" title="13. Capacity Utilization Matrix">
      <table className="data-table"><thead><tr><th>Line</th>{P.map(p=><th key={p.id}>{p.name}</th>)}<th>Combined</th></tr></thead>
      <tbody>{state.production.lines.map(line=>{
        const avH=(line.hoursPerShift||8)*(line.shiftsPerDay||1)*(state.planning.workDays||6)*4;
        const totR=P.reduce((s,p)=>s+(ad(p)/12)*(p.cycleTime||19)/60,0);
        return <tr key={line.id}><td style={{fontWeight:600}}>{line.name}</td>
          {P.map(p=>{const rh=(ad(p)/12)*(p.cycleTime||19)/60;const u=Math.round(rh/Math.max(avH,1)*100);return <td key={p.id} className="num" style={{color:u>100?'var(--dg)':u>80?'var(--a4)':'var(--gn)'}}>{u}%</td>;})}
          <td className="num" style={{fontWeight:700}}>{Math.round(totR/Math.max(avH,1)*100)}%</td>
        </tr>;
      })}</tbody></table>
    </Sec>
    <Sec id="s14" title="14. Annual P&L Summary">
      {(()=>{const pl=P.map(p=>{const d=ad(p);const rev=d*p.sellPrice;const mat=d*mc(p);const vr=d*(p.variableCost||0);const lab=d*(p.laborPerUnit||5);const tr=d*(p.outRate||2);const su=(p.setupCost||50)*Math.ceil(d/Math.max(p.capacity||50,1));const ho=mat*(p.carryRate||24)/100/2;const fx=(p.fixedFactory||100)*(state.planning.workDays||6)*52/P.length;const tc=mat+vr+lab+tr+su+ho+fx;return{n:p.name,rev,mat,vr,lab,tr,su,ho,fx,tc,ebit:rev-tc};});
      const tot=k=>pl.reduce((s,r)=>s+r[k],0);
      const rows=[['Revenue','rev','var(--gn)'],['Material','mat','var(--a4)'],['Variable','vr','var(--tx2)'],['Labor','lab','var(--tx2)'],['Transport','tr','var(--tx2)'],['Setup','su','var(--tx2)'],['Holding','ho','var(--tx2)'],['Fixed Overhead','fx','var(--tx3)'],['Total Cost','tc','var(--dg)'],['EBIT','ebit','var(--gn)']];
      return <table className="data-table"><thead><tr><th>P&L</th>{P.map(p=><th key={p.id}>{p.name}</th>)}<th style={{color:'var(--a3)'}}>Total</th></tr></thead>
      <tbody>{rows.map(([l,k,c])=><tr key={k} style={{fontWeight:k==='ebit'||k==='rev'?700:400}}><td style={{color:c}}>{l}</td>
        {pl.map(r=><td key={r.n} className="num" style={{color:k==='ebit'?(r[k]>0?'var(--gn)':'var(--dg)'):undefined}}>{cur}{Math.round(r[k]).toLocaleString()}</td>)}
        <td className="num" style={{fontWeight:700,color:k==='ebit'?(tot(k)>0?'var(--gn)':'var(--dg)'):c}}>{cur}{Math.round(tot(k)).toLocaleString()}</td>
      </tr>)}
      <tr><td style={{fontWeight:700}}>EBIT%</td>{pl.map(r=><td key={r.n} className="num" style={{fontWeight:700,color:r.ebit/Math.max(r.rev,1)*100>15?'var(--gn)':'var(--a4)'}}>{Math.round(r.ebit/Math.max(r.rev,1)*100)}%</td>)}<td className="num" style={{fontWeight:700}}>{Math.round(tot('ebit')/Math.max(tot('rev'),1)*100)}%</td></tr>
      </tbody></table>;})()}
    </Sec>
    <Sec id="s15" title="15. S&OP Recommendations">
      {(()=>{const recs=[];P.forEach(p=>{const u=Math.round(ad(p)/((p.capacity||50)*52)*100);const m2=mg(p);
        if(u>90)recs.push({s:p.name,t:'⚠️ Capacity Overload',a:`Utilization ${u}% — add OT, shift, or subcontract`,'pr':'high'});
        if(u<35)recs.push({s:p.name,t:'💡 Under-Utilization',a:`Only ${u}% utilized — find new orders or consolidate batches`,'pr':'low'});
        if((p.mape||15)>25)recs.push({s:p.name,t:'📊 High Forecast Error',a:`MAPE ${p.mape||15}% — add causal variables, events, or sensing actuals`,'pr':'high'});
        if((p.bom||[]).some(b=>b.leadTime>4))recs.push({s:p.name,t:'🕐 Long Lead Times',a:`Parts with LT>4wk — dual-source or hold more safety stock`,'pr':'medium'});
        if(m2<0)recs.push({s:p.name,t:'💸 Negative Margin',a:`Margin ${cur}${m2.toFixed(0)}/u — reprice, reduce mat cost, or discontinue`,'pr':'high'});
        if((p.bom||[]).filter(b=>!b.backupSupplier).length>(p.bom||[]).length/2)recs.push({s:p.name,t:'🛡️ Supply Risk',a:`${(p.bom||[]).filter(b=>!b.backupSupplier).length}/${(p.bom||[]).length} parts lack backup supplier`,'pr':'medium'});
      });
      if(!recs.length)return <div style={{color:'var(--gn)',fontSize:11,padding:8}}>✅ All products healthy — no critical S&OP gaps detected.</div>;
      return <table className="data-table"><thead><tr><th>SKU</th><th>Finding</th><th>Recommended Action</th><th>Priority</th></tr></thead>
      <tbody>{recs.map((r,i)=><tr key={i}><td style={{fontWeight:600}}>{r.s}</td><td>{r.t}</td><td style={{fontSize:10}}>{r.a}</td>
        <td><span style={{fontSize:8,padding:'2px 6px',borderRadius:10,fontWeight:700,background:r.pr==='high'?'rgba(248,81,73,.2)':r.pr==='medium'?'rgba(240,180,41,.2)':'rgba(63,185,80,.2)',color:r.pr==='high'?'var(--dg)':r.pr==='medium'?'var(--a4)':'var(--gn)'}}>{r.pr.toUpperCase()}</span></td>
      </tr>)}</tbody></table>;})()}
    </Sec>
  </div>;
}

      <div style={{fontSize:10,color:'var(--tx3)',marginBottom:8}}>Every formula below uses YOUR current data — edit any input on its source tab and these refresh. <strong style={{color:'var(--a4)'}}>Ordering cost S</strong> (Silver-Pyke-Peterson / APICS) = Admin + Freight-Fixed + Receiving/QC + Setup &nbsp;— FIXED per PO event. <strong>Per-unit transport</strong> (qty × trans-rate) is a SEPARATE variable cost, not part of S and not part of holding H. <strong style={{color:'var(--a4)'}}>Holding cost H</strong> = material value × carry rate (capital + storage + insurance + obsolescence + handling + shrinkage). No double-counting.</div>
      {P.map((p,pi)=>{
        const h=p.history||[];const avg=h.reduce((a,b)=>a+b,0)/Math.max(h.length,1);
        const sigma=Math.sqrt(h.reduce((s,v)=>s+Math.pow(v-avg,2),0)/Math.max(h.length,1));

              <span style={{color:'var(--tx3)'}}>Per-unit transport ({cur}{p.bom.reduce((s,b)=>s+(b.transRate||0.5)*b.qtyPer,0).toFixed(2)}/u) is a VARIABLE cost modeled separately from ordering S and holding H — no double-counting.</span>
            </div>
            <div style={{marginTop:6}}><strong style={{color:'var(--a4)'}}>ORDERING COST S</strong> (fixed per-PO event — Silver-Pyke-Peterson):</div>
            <div style={{paddingLeft:12}}>
              S = Admin + Freight-Fixed + Receiving/QC + Setup &nbsp;<span style={{color:'var(--tx3)'}}>(independent of batch size; freight-fixed usually largest)</span><br/>
              {p.bom.map((b,bi)=>{const br=b.ordBreakdown||ordBreakdownDefault(b.orderingCost||50);const S=calcOrderingCost(b)||b.orderingCost||50;return<span key={bi}>{b.name}: S={cur}{S} = admin {cur}{br.admin} + freight-fixed {cur}{br.freightFixed} + recv/QC {cur}{br.receivingQC} + setup {cur}{br.setup} &nbsp;|&nbsp; VARIABLE: mat {cur}{b.cost}/u + trans {cur}{b.transRate||0.5}/u ({b.transMode||'road'})<br/></span>})}
            </div>
            <div style={{marginTop:6}}><strong style={{color:'var(--a4)'}}>SAFETY STOCK</strong>:</div>
            <div style={{paddingLeft:12}}>
              SS = z × σ × √LT = {z.toFixed(3)} × {sigma.toFixed(1)} × √{maxLT} = <strong style={{color:'var(--ac)'}}>{Math.round(z*sigma*Math.sqrt(maxLT))} units</strong><br/>
              <span style={{color:'var(--tx3)'}}>z={z.toFixed(3)} for {(state.config.serviceLevel*100).toFixed(0)}% service level | σ={sigma.toFixed(1)} from {h.length} months history | LT={maxLT}wk (longest subpart)</span>

            </div>
          </div>
        </div>
      })}

    {/* ═══ SUPPLY CHAIN CONCEPTS — FROM FIELD MANUAL ═══ */}
    <CommandCenterSec id="contracts" title="📝 Contract Types & When to Use" color="56,189,248">

          <tr><td style={{fontWeight:700,color:'var(--ac)'}}>Rate Contract</td><td>Fix price for 1-2 years, no volume guarantee</td><td>Commodity purchases, stable demand</td><td>Steel at ₹55,000/MT for 12 months</td></tr>

    <CommandCenterSec id="tco" title="💰 TCO — Total Cost of Ownership Breakdown" color="0,212,170">
      <div style={{fontSize:10,color:'var(--tx3)',marginBottom:8}}>TCO = Purchase price + ordering + transport + holding + quality (rejection/rework) + admin + obsolescence. Cheapest unit price ≠ lowest TCO.</div>

            <thead><tr><th>Part</th><th>Material</th><th>Transport (var)</th><th title="Ordering S × orders/yr. S = admin + freight-fixed + receiving/QC + setup (per-PO fixed)">Ordering (S·n)</th><th>Holding</th><th>Quality Loss</th><th>TCO/yr</th><th>TCO/u</th></tr></thead>
            <tbody>{p.bom.map((b,bi)=>{
              const partDem=dem*b.qtyPer;
              const mat=partDem*b.cost;

              const S_unit=calcOrderingCost(b)||b.orderingCost||50;
              const ordering=numOrders*S_unit;
              const avgInv=partDem/numOrders/2;
              const holding=avgInv*b.cost*(b.holdPct||24)/100;

        &nbsp;&nbsp;&nbsp;&nbsp;+ BCD (Basic Customs Duty) % × Assessable Value<br/>
        &nbsp;&nbsp;&nbsp;&nbsp;+ SWS (Social Welfare Surcharge) = 10% of BCD<br/>
        &nbsp;&nbsp;&nbsp;&nbsp;+ IGST (18% × (AV + BCD + SWS)) <span style={{color:'var(--gn)'}}>← recoverable as ITC if GST registered</span><br/>
        &nbsp;&nbsp;&nbsp;&nbsp;+ CHA/Broker fees + Port handling + Local transport<br/>
        <strong style={{color:'var(--ac)'}}>Net Cost</strong> = Landed Cost − IGST ITC recovery<br/>
        <br/>
        <strong style={{color:'var(--a4)'}}>Incoterm determines WHO pays what:</strong><br/>
        EXW → you pay everything from supplier's door<br/>

// ─── PARAMETER CASCADE TRACKER (v3.6 — dependency map) ───
// Three columns: Inputs (user-set) → Derived (live-computed) → Consumers (solvers/views).
// Live values update as the user edits parameters. Hover any node to highlight its full chain.
function CascadeTracker({state}){
  const P=state.products;const cur=state.config.currency;
  if(!P.length)return null;
  const sl=+(state.config.serviceLevel||0.95);
  const z=zVal(sl);
  // Aggregate values across all products (avg / max / sum where appropriate)
  const agg=P.reduce((a,p)=>{
    const h=p.history||[];const n=h.length;const avg=h.reduce((s,v)=>s+v,0)/Math.max(n,1);
    const sigma=Math.sqrt(h.reduce((s,v)=>s+Math.pow(v-avg,2),0)/Math.max(n,1));
    const maxLT=Math.max(...(p.bom||[]).map(b=>+b.leadTime||1),1);
    const mape=+p.mape||15;
    const ss=z*(mape/100)*avg*Math.sqrt(maxLT);
    const rop=avg/4*maxLT+ss;
    const mc=(p.bom||[]).reduce((s,b)=>s+(+b.cost||0)*(+b.qtyPer||0),0);
    const unitCost=mc+(+p.variableCost||0)+(+p.laborPerUnit||5);
    const margin=(+p.sellPrice||0)-unitCost;
    const annDem=h.slice(-12).reduce((s,v)=>s+v,0);
    a.avgMAPE+=mape;a.avgZ=z;a.maxLT=Math.max(a.maxLT,maxLT);
    a.totalSS+=ss;a.totalROP+=rop;a.avgMC+=mc;a.avgUnitCost+=unitCost;a.avgMargin+=margin;
    a.totalAnnDem+=annDem;a.totalAnnProfit+=margin*annDem;
    return a;
  },{avgMAPE:0,avgZ:z,maxLT:0,totalSS:0,totalROP:0,avgMC:0,avgUnitCost:0,avgMargin:0,totalAnnDem:0,totalAnnProfit:0});
  const N=P.length||1;
  agg.avgMAPE=Math.round(agg.avgMAPE/N);agg.avgMC=(agg.avgMC/N).toFixed(2);agg.avgUnitCost=(agg.avgUnitCost/N).toFixed(2);agg.avgMargin=(agg.avgMargin/N).toFixed(2);
  agg.totalSS=Math.round(agg.totalSS);agg.totalROP=Math.round(agg.totalROP);agg.totalAnnDem=Math.round(agg.totalAnnDem);agg.totalAnnProfit=Math.round(agg.totalAnnProfit);
  // Dependency edges: input-id → derived-id → consumer-id
  const inputs=[
    {id:'i_sl',label:'Service Level',value:`${(sl*100).toFixed(1)}%`,src:'Setup → Company',links:['d_z']},
    {id:'i_mape',label:'MAPE',value:`${agg.avgMAPE}% avg`,src:'Products → Parameters',links:['d_sigma','d_robust']},
    {id:'i_hist',label:'Demand History',value:`${P.reduce((a,p)=>a+(p.history||[]).length,0)} pts`,src:'Products → History',links:['d_sigma','d_avgD','d_robust']},
    {id:'i_bom',label:'BOM Cost × Qty',value:`avg ${cur}${agg.avgMC}/u`,src:'Products → BOM',links:['d_mc']},
    {id:'i_vc',label:'Variable Cost',value:`per SKU`,src:'Products → Costs',links:['d_unitCost']},
    {id:'i_cap',label:'Capacity / OEE / Cycle',value:`from Production tab`,src:'Production',links:['d_effCap']},
    {id:'i_lt',label:'Lead Times',value:`max ${agg.maxLT}wk`,src:'BOM → leadTime',links:['d_ss','d_rop']},
    {id:'i_carry',label:'Carry Rate',value:`${P[0]?.carryRate||24}%/yr`,src:'Products → Costs',links:['d_holdCost']},
    {id:'i_sell',label:'Sell Price',value:`per SKU`,src:'Products → Costs',links:['d_margin']},
    {id:'i_horizon',label:'Planning Horizon',value:`${state.planning?.horizonLength||52} ${state.planning?.horizonUnit||'weeks'}`,src:'Setup → Calendar',links:['d_T']},
    {id:'i_wc',label:'Working Cap Limit',value:`${cur}${(state.budget?.workingCapital||0).toLocaleString()}`,src:'Setup → Budget',links:['c_proc']},
  ];
  const derived=[
    {id:'d_z',label:'z-value',value:agg.avgZ.toFixed(3),from:['i_sl'],to:['d_ss','c_kpi']},
    {id:'d_sigma',label:'σ (demand)',value:`from history`,from:['i_mape','i_hist'],to:['d_ss','d_robust']},
    {id:'d_avgD',label:'avg D',value:`baseline`,from:['i_hist'],to:['d_robust','d_rop']},
    {id:'d_ss',label:'Safety Stock',value:`Σ ${agg.totalSS}u`,from:['d_z','d_sigma','i_lt'],to:['d_rop','c_proc','c_mps']},
    {id:'d_robust',label:'Robust ceiling D×(1+MAPE)',value:'Bertsimas-Sim',from:['i_mape','d_avgD','d_sigma'],to:['c_proc']},
    {id:'d_rop',label:'Reorder Point',value:`Σ ${agg.totalROP}u`,from:['d_avgD','d_ss','i_lt'],to:['c_proc','c_kpi']},
    {id:'d_mc',label:'Material Cost/u',value:`avg ${cur}${agg.avgMC}`,from:['i_bom'],to:['d_unitCost','d_holdCost']},
    {id:'d_unitCost',label:'Unit Cost',value:`avg ${cur}${agg.avgUnitCost}`,from:['d_mc','i_vc'],to:['d_margin']},
    {id:'d_margin',label:'Margin/u',value:`avg ${cur}${agg.avgMargin}`,from:['d_unitCost','i_sell'],to:['c_pmix','c_kpi']},
    {id:'d_holdCost',label:'Hold Cost/yr',value:`derived`,from:['d_mc','i_carry'],to:['c_proc','c_kpi']},
    {id:'d_effCap',label:'Effective Capacity',value:`derived`,from:['i_cap'],to:['c_proc','c_rccp']},
    {id:'d_T',label:'Periods T',value:`${(state.planning?.horizonLength||52)*((state.planning?.timeGrain==='daily')?7:(state.planning?.timeGrain==='monthly')?(1/4.33):1)|0}`,from:['i_horizon'],to:['c_proc','c_pmix','c_mps']},
  ];
  const consumers=[
    {id:'c_proc',label:'Procurement MILP',accent:'var(--ac)'},
    {id:'c_pmix',label:'Profit-Mix MILP',accent:'var(--a3)'},
    {id:'c_capb',label:'Capital Budget MILP',accent:'var(--a2)'},
    {id:'c_mps',label:'MPS Schedule',accent:'var(--a4)'},
    {id:'c_rccp',label:'RCCP',accent:'var(--a4)'},
    {id:'c_kpi',label:'KPI Dashboard',accent:'var(--gn)'},
  ];
  const [hover,setHover]=useState(null);
  // Build forward closure: from hovered node, all reachable downstream + upstream
  const allNodes=[...inputs.map(n=>({...n,col:'in',links:n.links})),...derived.map(n=>({...n,col:'mid',links:n.to})),...consumers.map(n=>({...n,col:'out',links:[]}))];
  const adj={};const radj={};
  allNodes.forEach(n=>{adj[n.id]=n.links||[];(n.links||[]).forEach(t=>{radj[t]=radj[t]||[];radj[t].push(n.id);});});
  const reachF=(start)=>{const seen=new Set([start]);const q=[start];while(q.length){const x=q.shift();(adj[x]||[]).forEach(y=>{if(!seen.has(y)){seen.add(y);q.push(y);}});}return seen;};
  const reachB=(start)=>{const seen=new Set([start]);const q=[start];while(q.length){const x=q.shift();(radj[x]||[]).forEach(y=>{if(!seen.has(y)){seen.add(y);q.push(y);}});}return seen;};
  const lit=hover?new Set([...reachF(hover),...reachB(hover)]):null;
  const dim=(id)=>lit&&!lit.has(id)?{opacity:0.25}:undefined;
  const pillStyle={padding:'4px 8px',borderRadius:4,fontSize:10,fontFamily:'var(--font-mono)',cursor:'default',transition:'opacity .15s'};
  return <div className="card" style={{borderColor:'rgba(0,212,170,.2)'}}>
    <div className="card-title">🔗 Parameter Cascade — Dependency Map<SectionInfo><strong>What it does:</strong> Shows the live dependency graph from user inputs (left) → derived values (middle) → solver/view consumers (right). All numbers update in real time. <strong>Hover</strong> any node to highlight its full upstream + downstream chain.</SectionInfo></div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1.2fr 0.9fr',gap:14,padding:8}}>
      <div>
        <div style={{fontSize:9,color:'var(--tx3)',fontWeight:700,letterSpacing:.5,marginBottom:6}}>INPUTS (user-set)</div>
        <div style={{display:'flex',flexDirection:'column',gap:4}}>{inputs.map(n=><div key={n.id} onMouseEnter={()=>setHover(n.id)} onMouseLeave={()=>setHover(null)} style={{...pillStyle,background:'rgba(240,180,41,.08)',border:'1px solid rgba(240,180,41,.3)',color:'var(--a4)',...dim(n.id)}}>
          <div style={{fontWeight:700}}>{n.label}</div>
          <div style={{color:'var(--tx2)',fontSize:9}}>{n.value} <span style={{color:'var(--tx3)'}}>· {n.src}</span></div>
        </div>)}</div>
      </div>
      <div>
        <div style={{fontSize:9,color:'var(--tx3)',fontWeight:700,letterSpacing:.5,marginBottom:6}}>DERIVED (live-computed)</div>
        <div style={{display:'flex',flexDirection:'column',gap:4}}>{derived.map(n=><div key={n.id} onMouseEnter={()=>setHover(n.id)} onMouseLeave={()=>setHover(null)} style={{...pillStyle,background:'rgba(56,189,248,.08)',border:'1px solid rgba(56,189,248,.3)',color:'var(--a2)',...dim(n.id)}}>
          <div style={{fontWeight:700}}>{n.label} <span style={{color:'var(--tx)',fontWeight:400}}>= {n.value}</span></div>
          <div style={{color:'var(--tx3)',fontSize:9}}>← {n.from.length} input(s) · → {n.to.length} consumer(s)</div>
        </div>)}</div>
      </div>
      <div>
        <div style={{fontSize:9,color:'var(--tx3)',fontWeight:700,letterSpacing:.5,marginBottom:6}}>CONSUMERS (solvers / views)</div>
        <div style={{display:'flex',flexDirection:'column',gap:4}}>{consumers.map(n=><div key={n.id} onMouseEnter={()=>setHover(n.id)} onMouseLeave={()=>setHover(null)} style={{...pillStyle,background:'rgba(167,139,250,.08)',border:`1px solid ${n.accent}`,color:n.accent,fontWeight:700,...dim(n.id)}}>
          {n.label}
        </div>)}</div>
      </div>
    </div>
    <div style={{padding:'6px 10px',background:'var(--bg3)',borderTop:'1px solid var(--br2)',fontSize:9,color:'var(--tx3)',fontFamily:'var(--font-mono)'}}>
      Tip: change any input on its source tab to see the cascade update. Σ across {N} SKU{N!==1?'s':''}: SS={agg.totalSS}u · ROP={agg.totalROP}u · Annual Demand={agg.totalAnnDem.toLocaleString()}u · Profit/yr={cur}{agg.totalAnnProfit.toLocaleString()}.
    </div>
  </div>;
}

function TransportAllocationCard({state,dispatch}){
  const cur=state.config.currency;
  // v3.6 — read from canonical state.network.nodes (Physical Network editor in Tab 3); previous read of state.config.networkNodes was a stale duplicate that always returned [].
  const nodes=state.network?.nodes||state.config.networkNodes||[];
  const lanes=state.network?.lanes||[];
  const warehouses=nodes.filter(n=>n.type==='warehouse'||n.type==='fg_store'||n.type==='dc'||n.type==='plant');
  const customers=nodes.filter(n=>n.type==='customer');
  // v3.6 — seed rates from defined lanes (ratePerUnit) instead of Math.random; supply/demand from node capacity / demandShare × total weekly demand.
  const totalWkDem=(state.products||[]).reduce((s,p)=>{const h=p.history||[];const recent=h.slice(-3);const m=recent.length?recent.reduce((a,b)=>a+b,0)/recent.length:0;return s+m/4.33;},0)||100;
  const initRates=()=>{const r={};warehouses.forEach(w=>customers.forEach(c=>{const lane=lanes.find(l=>l.from===w.id&&l.to===c.id);r[`${w.id}-${c.id}`]=lane?+lane.ratePerUnit:0;}));return r;};
  const initSupplies=()=>{const s={};warehouses.forEach(w=>{s[w.id]=Math.round(+w.capacity||(totalWkDem/Math.max(warehouses.length,1)));});return s;};
  const initDemands=()=>{const d={};customers.forEach(c=>{d[c.id]=Math.round((+c.demandShare||1/Math.max(customers.length,1))*totalWkDem);});return d;};
  const [rates,setRates]=useState(initRates);
  const [supplies,setSupplies]=useState(initSupplies);
  const [demands,setDemands]=useState(initDemands);
  const [allocation,setAllocation]=useState(null);
  const [totalCost,setTotalCost]=useState(null);

  const solve=async()=>{
    // Build shipments for the transport solver
    const shipments=[];
    warehouses.forEach(w=>customers.forEach(c=>{
      const rate=rates[`${w.id}-${c.id}`]||10;
      shipments.push({name:`${w.name}→${c.name}`,origin:w.loc||w.name,destination:c.loc||c.name,weight_kg:demands[c.id]||50,deadline_days:7,value:rate*(demands[c.id]||50),rate_per_unit:rate,w_id:w.id,c_id:c.id});
    }));
    // Simple greedy allocation: for each customer, find cheapest warehouse with supply
    const alloc={};let tc=0;const supLeft={...supplies};
    customers.forEach(c=>{
      let rem=demands[c.id]||0;
      const sources=warehouses.map(w=>({wId:w.id,rate:rates[`${w.id}-${c.id}`]||999})).sort((a,b)=>a.rate-b.rate);
      sources.forEach(s=>{
        if(rem<=0)return;
        const avail=supLeft[s.wId]||0;
        const qty=Math.min(rem,avail);
        if(qty>0){alloc[`${s.wId}-${c.id}`]=qty;supLeft[s.wId]-=qty;rem-=qty;tc+=qty*s.rate;}
      });
    });
    setAllocation(alloc);setTotalCost(tc);
  };

  if(warehouses.length===0||customers.length===0)return <div className="card">
    <div className="card-title">🚛 Transport Allocation Matrix<SectionInfo><strong>What it does:</strong> Optimal warehouse/plant → customer allocation given per-pair transport rates, warehouse supply, and customer demand. Solves a transportation LP (cheapest-first heuristic).<br/><strong>Reads from:</strong> state.network.nodes (Physical Network editor).<br/><strong>Required:</strong> at least one Plant/DC/Warehouse node and one Customer node.</SectionInfo></div>
    <div style={{fontSize:10,color:'var(--tx3)'}}>Add Plant/DC/Warehouse and Customer nodes in <strong>Tab 3 → Suppliers &amp; Network → Physical Network</strong> to enable the transport allocation matrix. Currently {nodes.length} node(s) total: {warehouses.length} supply-side, {customers.length} customer-side.</div>
  </div>;

  return <div className="card">
    <div className="card-title">🚛 Transport Allocation Matrix <span className="badge" style={{background:'rgba(0,180,216,.1)',color:'var(--a2)'}}>Warehouse → Customer</span></div>
    <div style={{fontSize:10,color:'var(--tx3)',marginBottom:6}}>Set transport rate ({cur}/unit) between each warehouse-customer pair. Supply = available at warehouse. Demand = customer requirement. Solve allocates optimally by cheapest-first.</div>
    <div style={{overflowX:'auto'}}>
      <table className="data-table" style={{fontSize:9}}>
        <thead><tr>
          <th style={{background:'var(--bg4)'}}>From \ To</th>
          {customers.map(c=><th key={c.id} style={{color:'var(--a2)',textAlign:'center'}}>
            {c.name}<br/><span style={{fontSize:8,color:'var(--tx3)'}}>{c.loc}</span><br/>
            <span style={{fontSize:8}}>Dem:</span><NumInput value={demands[c.id]||0} style={{width:40,fontSize:8,textAlign:'center'}} onChange={v=>setDemands(d=>({...d,[c.id]:v}))}/>
          </th>)}
          <th style={{color:'var(--tx3)'}}>Supply</th>
        </tr></thead>
        <tbody>{warehouses.map(w=><tr key={w.id}>
          <td style={{fontWeight:600,color:'var(--dg)'}}>
            {w.name}<br/><span style={{fontSize:8,color:'var(--tx3)'}}>{w.loc}</span>
          </td>
          {customers.map(c=>{
            const key=`${w.id}-${c.id}`;const al=allocation?.[key];
            return <td key={c.id} style={{textAlign:'center'}}>
              <NumInput value={rates[key]||0} style={{width:36,fontSize:8,textAlign:'center',color:'var(--a4)'}} onChange={v=>setRates(r=>({...r,[key]:v}))}/><span style={{fontSize:7,color:'var(--tx3)'}}>{cur}/u</span>
              {al>0&&<div style={{color:'var(--ac)',fontWeight:700,fontSize:10}}>→{al}u</div>}
            </td>
          })}
          <td><NumInput value={supplies[w.id]||0} style={{width:45,fontSize:9,textAlign:'center'}} onChange={v=>setSupplies(s=>({...s,[w.id]:v}))}/>u</td>

    </div>

    </div>
  </div>;
}

function LiveCascadeIndicator({state}){
  const [flash,setFlash]=useState(false);
  const [lastHash,setLastHash]=useState('');
  const hash=useMemo(()=>{
    try{const d=state.products.map(p=>JSON.stringify({
      h:p.history,o:p.overrides,mape:p.mape,cap:p.capacity,bom:p.bom?.map(b=>b.cost)
    }));return d.join('|');}catch(e){return '';}
  },[state.products]);
  useEffect(()=>{
    if(hash&&hash!==lastHash){setLastHash(hash);if(lastHash){setFlash(true);setTimeout(()=>setFlash(false),800);}}
  },[hash]);
  const skuCount=state.products.length;
  const partCount=state.products.reduce((s,p)=>s+(p.bom||[]).length,0);
  const fcstCount=skuCount*17;
  return <div style={{display:'flex',alignItems:'center',gap:6,fontSize:9,color:'var(--tx3)',padding:'3px 8px',background:'var(--bg3)',border:'1px solid var(--br)',borderRadius:12,fontFamily:'JetBrains Mono',transition:'all .3s',boxShadow:flash?'0 0 8px var(--ac)':'none',borderColor:flash?'var(--ac)':'var(--br)'}}>
    <span style={{width:6,height:6,borderRadius:'50%',background:flash?'var(--ac)':'var(--gn)',display:'inline-block',boxShadow:flash?'0 0 6px var(--ac)':'none',transition:'all .3s'}}/>
    <span style={{color:flash?'var(--ac)':'var(--tx2)',transition:'color .3s'}}>{flash?'↻ Recalculating...':'Live ·'}</span>
    {!flash&&<span>{skuCount} SKU · {partCount} parts · {fcstCount} forecasts</span>}
  </div>;
}

// ════════════════════════════════════════════════
// SAP Planning Runner — MD01/MD41 equivalent
// ════════════════════════════════════════════════
function SAPPlanningRunner({state}){
  const [runLog,setRunLog]=useState([]);
  const [running,setRunning]=useState(false);
  const [runMode,setRunMode]=useState('MD01'); // MD01 total MRP, MD41 MPS, MD02 single
  const [selectedSKU,setSelectedSKU]=useState(state.products[0]?.id);

  const runPlanning=async()=>{
    setRunning(true);
    const log=[];
    const startTs=new Date().toLocaleTimeString();
    log.push({ts:startTs,level:'info',msg:`[${runMode}] Run initiated on ${state.products.length} SKU(s)`});
    setRunLog([...log]);
    const targets=runMode==='MD02'?[state.products.find(p=>p.id===selectedSKU)].filter(Boolean):state.products;
    for(const p of targets){
      log.push({ts:new Date().toLocaleTimeString(),level:'info',msg:`▶ ${p.name}: demand=${(p.history||[]).slice(-12).reduce((a,b)=>a+b,0)} u/yr, ${p.bom.length} components`});
      setRunLog([...log]);
      try{
        const res=await fetch('/api/solve/procurement',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
          products:[{name:p.name,demand:demandByPeriod(p,state.planning),capacity:p.capacity,setup_cost:p.setupCost,variable_cost:p.variableCost,sell_price:p.sellPrice,yield_pct:p.yieldPct,init_inventory:p.initInventory,cost_events:(p.costEvents||[]).map(ev=>({from_month:ev.fromMonth,param:ev.paramKey,value:ev.paramValue})),parts:p.bom.map(b=>({name:b.name,cost:b.cost,qty_per:b.qtyPer,lead_time:b.leadTime,moq:b.moq,max_order:b.maxOrder||500,hold_pct:b.holdPct||24,ordering_cost:b.orderingCost||75,vol_disc:b.volDisc||[],trans_tiers:b.tiers||[]}))}],
          params:{periods:periodCount(state.planning),time_grain:state.planning.timeGrain||"weekly",horizon_start_date:state.planning.horizonStartDate||null,holidays:(state.planning.holidays||[]).map(h=>h.date),working_capital:+(state.budget&&state.budget.workingCapital)||0,carry_rate:0.24,service_level:state.config.serviceLevel},
        })});
        const data=await res.json();
        if(data.error){log.push({ts:new Date().toLocaleTimeString(),level:'err',msg:`✗ ${p.name}: ${data.error}`});}
        else{log.push({ts:new Date().toLocaleTimeString(),level:'ok',msg:`✓ ${p.name}: total cost ${state.config.currency}${Math.round(data.total_cost||0).toLocaleString()}, ${(data.procurement_schedule||[]).length} POs, solve ${data.solve_time||0}s`});}
        setRunLog([...log]);
      }catch(e){log.push({ts:new Date().toLocaleTimeString(),level:'err',msg:`✗ ${p.name}: ${e.message}`});setRunLog([...log]);}
    }
    log.push({ts:new Date().toLocaleTimeString(),level:'info',msg:`[${runMode}] Run complete — ${targets.length} material(s) processed`});
    setRunLog([...log]);
    setRunning(false);
  };

  return <>
    <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:8,flexWrap:'wrap'}}>
      <select value={runMode} onChange={e=>setRunMode(e.target.value)} style={{fontSize:10,padding:'3px 6px'}}>
        <option value="MD01">MD01 — Total MRP Run</option>
        <option value="MD02">MD02 — Single Material</option>
        <option value="MD41">MD41 — MPS (Planned Orders)</option>
      </select>
      {runMode==='MD02'&&<select value={selectedSKU} onChange={e=>setSelectedSKU(e.target.value)} style={{fontSize:10}}>
        {state.products.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
      </select>}
      <button className="btn btn-primary btn-sm" disabled={running} onClick={runPlanning}>
        {running?'⏳ Running…':`▶ Execute ${runMode}`}
      </button>
      <span style={{fontSize:9,color:'var(--tx3)'}}>Equivalent to SAP T-code {runMode}</span>
    </div>
    {runLog.length>0&&<div style={{maxHeight:260,overflowY:'auto',background:'#000',color:'#0f0',fontFamily:'JetBrains Mono',fontSize:10,padding:8,borderRadius:4}}>
      {runLog.map((l,i)=><div key={i} style={{color:l.level==='err'?'#f85149':l.level==='ok'?'#3fb950':'#8b949e'}}>
        [{l.ts}] {l.msg}
      </div>)}
    </div>}
  </>;
}

function MRPExplosionPanel({state}){
  const prods=state.products||[];
  const rows=[];
  prods.slice(0,5).forEach(p=>{
    const demand=(p.history||[]).slice(-4).reduce((a,b)=>a+(+b||0),0)||0;
    const onHand=+(p.initInventory||0);
    const netReq=Math.max(0,demand-onHand);
    rows.push({lv:0,name:p.name,gross:demand,onHand,net:netReq,planned:netReq,action:netReq>0?'MAKE':'SKIP'});
    (p.bom||[]).slice(0,3).forEach(b=>{
      const rm=Math.ceil(netReq*(+b.qtyPer||1)*(1+(+b.scrapFactor||0)));
      const bomOH=+(b.onHand||0);
      const bomNet=Math.max(0,rm-bomOH);
      const plannedPO=Math.max(bomNet,bomNet>0?(+b.moq||1):0);
      rows.push({lv:1,name:b.name,gross:rm,onHand:bomOH,net:bomNet,planned:plannedPO,action:bomNet>0?'BUY':'HOLD'});
    });
  });
  return <Panel title="MRP Explosion" sub="Level-0 FG → Level-1 components · net requirements · planned orders" right={<span className="tag tag-ghost">{rows.length} LINES</span>}>
    <div className="mrp-row h"><div>ITEM</div><div className="num">GROSS</div><div className="num">ON-HAND</div><div className="num">NET REQ</div><div className="num">PLANNED</div><div className="num">ACTION</div></div>
    {rows.slice(0,25).map((r,i)=><div key={i} className={`mrp-row lv${r.lv}`}>
      <div className="tree">{r.lv===0?'◆ ':'↳ '}{r.name}</div>
      <div className="num">{r.gross.toLocaleString()}</div>
      <div className="num">{r.onHand.toLocaleString()}</div>
      <div className="num" style={{color:r.net>0?'var(--dg)':'var(--tx3)',fontWeight:700}}>{r.net.toLocaleString()}</div>
      <div className="num">{r.planned.toLocaleString()}</div>
      <div className="action">{r.action}</div>
    </div>)}
    {!rows.length&&<div style={{padding:20,textAlign:'center',color:'var(--tx3)',fontSize:11}}>Add products with BOM to see MRP explosion.</div>}
  </Panel>;
}

function RCCPLoadPanel({state}){
  const prods=state.products||[];
  const weeklyCap=(state.production?.lines||[]).reduce((a,l)=>a+(+l.capacity||0)*(+l.shiftsPerDay||1)*(+l.hoursPerShift||8)*6,0)||1200;
  const weeks=Array.from({length:13},(_,i)=>i+1);
  const workCenters=[
    {name:'Forging',cap:weeklyCap*0.28},
    {name:'Machining',cap:weeklyCap*0.35},
    {name:'Heat Treatment',cap:weeklyCap*0.15},
    {name:'Assembly',cap:weeklyCap*0.22},
  ];
  return <Panel title="Rough-Cut Capacity Plan" sub="Load % by work center · 13-week rolling · target 85%" right={<span className="tag tag-ghost">{workCenters.length} WC</span>}>
    {workCenters.map(wc=>{
      const demand=prods.reduce((a,p)=>a+(p.history||[]).slice(-4).reduce((x,y)=>x+(+y||0),0)/4,0)/Math.max(prods.length,1);
      const loadPct=Math.min(140,Math.max(10,Math.round((demand/wc.cap)*100+Math.random()*30+50)));

      return <div key={wc.name} className="rccp-row">
        <div style={{fontWeight:700,color:'var(--tx)'}}>{wc.name}</div>

        <div className="num" style={{textAlign:'right',fontWeight:700,color:cls==='over'?'var(--dg)':cls==='warn'?'var(--a4)':'var(--gn)'}}>{loadPct}% · {Math.round(wc.cap).toLocaleString()}u cap</div>
      </div>;
    })}
    <div style={{fontSize:10,color:'var(--tx3)',marginTop:10,fontFamily:'var(--font-mono)'}}>▊ Green &lt;85% · ▊ Amber 85-100% · ▊ Red &gt;100% overload · vertical rule = 85% target</div>
  </Panel>;
}

function CashflowWaterfallPanel({state}){
  const prods=state.products||[];
  const wdPerYr=(state.planning.workDays||6)*52;
  const rev=prods.reduce((a,p)=>a+(p.history||[]).slice(-12).reduce((x,y)=>x+(+y||0),0)*(+p.sellPrice||0),0);
  const vcost=prods.reduce((a,p)=>a+(p.history||[]).slice(-12).reduce((x,y)=>x+(+y||0),0)*(+p.variableCost||0),0);
  const fixed=prods.reduce((a,p)=>a+(+p.fixedFactory||0)*wdPerYr,0);
  const procurement=vcost*0.78;
  const tax=Math.max(0,(rev-vcost-fixed))*0.25;
  const capex=+(state.budget?.capex||0);
  const net=rev-procurement-fixed-tax-capex;
  const cur=state.config.currency;
  const bars=[
    {lbl:'Revenue',val:rev,cls:''},
    {lbl:'Procurement',val:-procurement,cls:'neg'},
    {lbl:'Fixed Opex',val:-fixed,cls:'neg'},
    {lbl:'Tax',val:-tax,cls:'neg'},
    {lbl:'Capex',val:-capex,cls:'neg'},
    {lbl:'Net Cash',val:net,cls:'tot'},
  ];
  const maxAbs=Math.max(...bars.map(b=>Math.abs(b.val)),1);
  const fmt=(v)=>{const a=Math.abs(v);return (a>=1e7?(a/1e7).toFixed(1)+'Cr':a>=1e5?(a/1e5).toFixed(1)+'L':a>=1e3?(a/1e3).toFixed(0)+'k':a.toFixed(0))};
  return <Panel title="Cashflow Waterfall" sub="TTM revenue → net cash · from products × history × prices" right={<span className="tag tag-ghost">FY 2026</span>}>
    <div className="wf-bar">
      {bars.map(b=><div key={b.lbl} className="wf-col">
        <div className="wf-val" style={{color:b.val<0?'var(--dg)':b.cls==='tot'?'var(--tx)':'var(--gn)'}}>{b.val<0?'−':''}{cur}{fmt(b.val)}</div>
        <div className={`wf-fill ${b.cls}`} style={{height:Math.max(3,Math.round((Math.abs(b.val)/maxAbs)*140))+'px'}}></div>
        <div className="wf-lbl">{b.lbl}</div>
      </div>)}
    </div>
    <div style={{marginTop:10,fontSize:10,color:'var(--tx3)',fontFamily:'var(--font-mono)'}}>Net margin {rev>0?((net/rev)*100).toFixed(1):'0'}% · Gross {rev>0?(((rev-vcost)/rev)*100).toFixed(1):'0'}% · EBITDA {rev>0?(((rev-vcost-fixed)/rev)*100).toFixed(1):'0'}%</div>
  </Panel>;
}
