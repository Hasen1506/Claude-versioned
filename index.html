function IndiaSupplyMapPanel({state}){
  const nodes=state.network?.nodes||[];
  const lanes=state.network?.lanes||[];
  const sup=state._tataSuppliers||[];
  const all=[...nodes.map(n=>({...n,role:n.type})),...sup.map(s=>({id:'sup-'+s.name,type:'supplier',role:'supplier',name:s.name,location:s.city,lat:s.lat,lon:s.lon}))];
  const bb={lat0:6,lat1:37,lon0:68,lon1:97};
  // Project; clamp foreign nodes (e.g. NSK Steel/Tokyo) to bbox edge with `foreign` flag.
  const projRaw=(lat,lon)=>{
    if(lat==null||lon==null)return {x:300,y:200,foreign:true};
    const inBB=lat>=bb.lat0&&lat<=bb.lat1&&lon>=bb.lon0&&lon<=bb.lon1;
    const cLat=Math.max(bb.lat0,Math.min(bb.lat1,lat));
    const cLon=Math.max(bb.lon0,Math.min(bb.lon1,lon));
    const x=((cLon-bb.lon0)/(bb.lon1-bb.lon0))*520+30;
    const y=((bb.lat1-cLat)/(bb.lat1-bb.lat0))*360+20;
    return {x,y,foreign:!inBB};
  };
  // v3.6 — collision-avoidance jitter: when ≥2 nodes project within ~12px, fan them out around the centroid.
  // Fixes Tata demo where (plant-chennai, Sundaram Fasteners) and (plant-pune, cust-tatamot) sit on identical coords.
  const positioned=all.map(n=>{const p=projRaw(n.lat,n.lon);return {...n,_x:p.x,_y:p.y,_foreign:p.foreign};});
  const placed={};
  positioned.forEach(n=>{
    const k=`${Math.round(n._x/12)}|${Math.round(n._y/12)}`;
    placed[k]=placed[k]||[];placed[k].push(n);
  });
  Object.values(placed).forEach(group=>{
    if(group.length<=1)return;
    const cx=group.reduce((a,n)=>a+n._x,0)/group.length;
    const cy=group.reduce((a,n)=>a+n._y,0)/group.length;
    const R=11+Math.min(group.length,4);
    group.forEach((n,i)=>{const ang=(2*Math.PI*i)/group.length;n._x=cx+R*Math.cos(ang);n._y=cy+R*Math.sin(ang);});
  });
  const byId={};positioned.forEach(n=>byId[n.id]=n);
  const foreignCount=positioned.filter(n=>n._foreign).length;
  return <Panel title="India Supply Network" sub={`${positioned.length} nodes · ${lanes.length} lanes · plants · DCs · customers · suppliers${foreignCount?` · ${foreignCount} foreign (clamped to edge)`:''}`} right={<span className="tag tag-ghost">GEO</span>}>
    <svg viewBox="0 0 580 400" className="in-map">
      <path className="land" d="M200 30 L280 20 L360 30 L430 55 L470 110 L490 170 L510 230 L470 290 L430 340 L360 370 L300 380 L250 360 L200 320 L170 260 L160 200 L170 130 L180 70 Z"/>
      {lanes.map(l=>{const a=byId[l.from],b=byId[l.to];if(!a||!b)return null;return <line key={l.id} className="lane" x1={a._x} y1={a._y} x2={b._x} y2={b._y}/>;})}
      {positioned.map(n=>{const cls=n.role==='plant'?'plant':n.role==='dc'?'dc':n.role==='customer'?'cust':'';const r=n.role==='plant'?6:n.role==='dc'?5:4;return <g key={n.id} opacity={n._foreign?0.7:1}>
        <circle className={`node ${cls}`} cx={n._x} cy={n._y} r={r} stroke={n._foreign?'#f0b429':undefined} strokeWidth={n._foreign?1.5:undefined}/>
        <text className="lbl" x={n._x} y={n._y-r-3}>{n.name||n.location}{n._foreign?' ⚑':''}</text>
      </g>;})}
    </svg>
    <div style={{display:'flex',gap:14,marginTop:8,fontSize:10,fontFamily:'var(--font-mono)',color:'var(--tx2)',flexWrap:'wrap'}}>
      <span>▊ <span style={{color:'var(--a2)'}}>Plants</span></span>
      <span>▊ <span style={{color:'var(--a4)'}}>DCs</span></span>
      <span>▊ <span style={{color:'var(--a3)'}}>Customers</span></span>
      <span>▊ <span style={{color:'var(--ac)'}}>Suppliers</span></span>
      {foreignCount>0&&<span style={{color:'#f0b429'}}>⚑ Foreign (clamped)</span>}
    </div>
  </Panel>;
}

function SupplierScorecardPanel({state,dispatch}){
  const prods=state.products||[];
  const weights=state.supplierWeights||{cost:30,quality:25,otd:20,reliability:15,leadTime:10};
  const setW=(k,v)=>dispatch&&dispatch({type:'SET_SUPPLIER_WEIGHTS',payload:{[k]:+v||0}});
  // Collect every primary + qualified backup across products/BOM
  const rows=[];
  prods.forEach(p=>(p.bom||[]).forEach(b=>{
    const primaryName=b.supplierName||b.supplier||b.vendor||b.name||'—';
    rows.push({
      key:`${p.id}:${b.id}:P`,vendor:primaryName,part:b.name,sku:p.sku||p.name,isPrimary:true,qualified:true,
      cost:+b.cost||0,leadTime:+b.leadTime||1,quality:+b.quality??85,otd:+b.otd??90,reliability:+b.reliability??88,
      region:b.country||b.originCity||'—'
    });
    (b.backupSuppliers||[]).forEach((bk,bi)=>rows.push({
      key:`${p.id}:${b.id}:B${bi}`,vendor:bk.name||`Alt ${bi+1}`,part:b.name,sku:p.sku||p.name,isPrimary:false,qualified:!!bk.qualified,
      cost:+bk.cost||0,leadTime:+bk.leadTime||1,quality:+bk.quality??80,otd:+bk.otd??85,reliability:+bk.reliability??80,
      region:bk.country||'—'
    }));
  }));
  if(!rows.length)return <Panel title="Supplier Scorecard" sub="Weighted composite · primary + backups"><div style={{padding:20,textAlign:'center',color:'var(--tx3)',fontSize:11}}>Add products and BOM items with suppliers (Tab 2 → Products → BOM) to populate. Each supplier is scored on cost, quality, OTD, reliability, lead time.</div></Panel>;
  // Compute composite: cost and LT are inverted (lower is better). Normalize to 0-100 per row group.
  const maxCost=Math.max(...rows.map(r=>r.cost||0),1);
  const maxLT=Math.max(...rows.map(r=>r.leadTime||0),1);
  const wSum=weights.cost+weights.quality+weights.otd+weights.reliability+weights.leadTime||1;
  rows.forEach(r=>{
    const costScore=r.cost>0?(1-r.cost/maxCost)*100:0;
    const ltScore=r.leadTime>0?(1-r.leadTime/maxLT)*100:0;
    r.composite=(costScore*weights.cost+r.quality*weights.quality+r.otd*weights.otd+r.reliability*weights.reliability+ltScore*weights.leadTime)/wSum;
    r.grade=r.composite>=85?'A+':r.composite>=75?'A':r.composite>=65?'B':r.composite>=55?'C':'D';
  });
  // Sort by composite desc
  rows.sort((a,b)=>b.composite-a.composite);
  const topRows=rows.slice(0,20);
  // Per-part risk: any part with <2 qualified suppliers is a single-source
  const partCounts={};
  rows.forEach(r=>{const k=`${r.sku}|${r.part}`;partCounts[k]=(partCounts[k]||0)+(r.qualified?1:0);});
  const singleSource=Object.entries(partCounts).filter(([,n])=>n<2);
  return <Panel title="Supplier Scorecard" sub="Weighted composite — primary + qualified backups across all SKUs" right={<span className="tag tag-ghost">{rows.length} VENDORS · {singleSource.length} SINGLE-SRC</span>}>
    <div style={{display:'flex',gap:8,flexWrap:'wrap',padding:'6px 8px',background:'var(--bg2)',border:'1px solid var(--br2)',marginBottom:6,alignItems:'center'}}>
      <span style={{fontSize:9,color:'var(--tx3)',fontWeight:700,letterSpacing:.4}}>WEIGHTS</span>
      {[['cost','Cost'],['quality','Quality'],['otd','OTD'],['reliability','Reliability'],['leadTime','Lead Time']].map(([k,lbl])=>
        <label key={k} style={{fontSize:10,color:'var(--tx2)',display:'flex',alignItems:'center',gap:3}}>
          {lbl} <NumInput min={0} max={100} value={weights[k]} onChange={v=>setW(k,v)} style={{width:38,fontSize:10,padding:'1px 3px'}}/>%
        </label>)}
      <span style={{fontSize:9,color:wSum===100?'var(--gn)':'var(--a4)',marginLeft:'auto'}}>Σ = {wSum}% {wSum!==100?'(should be 100%)':'✓'}</span>
    </div>
    {singleSource.length>0&&<div style={{fontSize:10,padding:'5px 8px',background:'rgba(239,68,68,.08)',border:'1px solid var(--dg)',color:'var(--dg)',marginBottom:6}}>
      ⚠ {singleSource.length} part(s) have &lt;2 qualified suppliers — Kraljic risk: {singleSource.slice(0,4).map(([k])=>k.split('|')[1]).join(', ')}{singleSource.length>4?'…':''}
    </div>}
    <div className="score-row h" style={{gridTemplateColumns:'auto auto 60px 50px 60px 60px 60px 50px 40px'}}><div>VENDOR</div><div>SERVES</div><div>COST</div><div>LT(w)</div><div>Q %</div><div>OTD %</div><div>REL %</div><div>SCORE</div><div>GRD</div></div>
    {topRows.map((r)=>{return <div key={r.key} className="score-row" style={{gridTemplateColumns:'auto auto 60px 50px 60px 60px 60px 50px 40px',opacity:r.qualified?1:.55}}>
      <div style={{fontWeight:700,color:r.isPrimary?'var(--ac)':'var(--tx)'}}>{r.vendor}{r.isPrimary&&<span style={{fontSize:8,marginLeft:4,color:'var(--ac)',fontWeight:600}}>PRIMARY</span>}{!r.qualified&&<span style={{fontSize:8,marginLeft:4,color:'var(--a4)'}}>UNQUAL</span>}<div style={{fontSize:9,color:'var(--tx3)',fontWeight:400}}>{r.region}</div></div>
      <div style={{fontSize:9,color:'var(--tx2)'}}>{r.sku}<div style={{fontSize:8,color:'var(--tx3)'}}>{r.part}</div></div>
      <div style={{fontSize:10,color:'var(--tx)'}}>{state.config.currency}{r.cost.toFixed(2)}</div>
      <div style={{fontSize:10,color:'var(--tx)'}}>{r.leadTime}</div>
      <div><div className="score-bar"><div className={r.quality>=90?'':r.quality>=75?'warn':'bad'} style={{width:r.quality+'%'}}></div></div><div style={{fontSize:9,color:'var(--tx2)'}}>{r.quality}</div></div>
      <div><div className="score-bar"><div className={r.otd>=95?'':r.otd>=85?'warn':'bad'} style={{width:r.otd+'%'}}></div></div><div style={{fontSize:9,color:'var(--tx2)'}}>{r.otd}</div></div>
      <div><div className="score-bar"><div className={r.reliability>=90?'':r.reliability>=75?'warn':'bad'} style={{width:r.reliability+'%'}}></div></div><div style={{fontSize:9,color:'var(--tx2)'}}>{r.reliability}</div></div>
      <div style={{fontSize:11,fontWeight:700,color:r.composite>=75?'var(--gn)':r.composite>=55?'var(--a4)':'var(--dg)'}}>{r.composite.toFixed(1)}</div>
      <div style={{fontWeight:800,fontFamily:'var(--font-display)',fontSize:16,color:r.grade.startsWith('A')?'var(--gn)':r.grade==='B'?'var(--a4)':'var(--dg)'}}>{r.grade}</div>
    </div>;})}
    {rows.length>20&&<div style={{fontSize:9,color:'var(--tx3)',padding:6,textAlign:'center'}}>Showing top 20 of {rows.length} supplier entries</div>}
    <div style={{fontSize:9,color:'var(--tx3)',padding:6,borderTop:'1px dashed var(--br)',marginTop:6,lineHeight:1.5}}>
      <strong>Formula:</strong> composite = (cost_score×w_cost + quality×w_q + OTD×w_otd + reliability×w_rel + LT_score×w_lt) / Σw<br/>
      <strong>cost_score</strong> = (1 − cost/max_cost)×100 · <strong>LT_score</strong> = (1 − LT/max_LT)×100 — lower is better, inverted to 0-100.<br/>
      Edit quality/OTD/reliability per supplier in Tab 2 → Products → BOM → Backup Suppliers row. Weights tune priorities (fast lead time over low cost, quality over OTD, etc.).
    </div>
  </Panel>;
}

// Pillar 8 — persistence contract. Version bumps when the state shape changes in a migration-worthy way.
const ESIM_SCHEMA_VERSION='1';
const ESIM_STORAGE_KEY='esim.state.v1';
const ESIM_VERSION_KEY='esim.schemaVersion';
function migrateState(s,fromV){
  if(!s||typeof s!=='object')return defaultState;
  // v0 → v1: Pillar 2 renamed horizon fields. Pillar 6 seeded holidays. Pillar 3 added plant.
  if(fromV==='0'||!fromV){
    s.planning=s.planning||{};
    if(s.planning.horizonLength==null)s.planning.horizonLength=s.planning.periods||52;
    if(!s.planning.horizonUnit)s.planning.horizonUnit='weeks';
    if(!s.planning.horizonStartDate)s.planning.horizonStartDate=new Date().toISOString().slice(0,10);
    if(!Array.isArray(s.planning.holidays))s.planning.holidays=HOLIDAYS_IN_2026;
    delete s.planning.startMonth;
    if(!s.plant)s.plant={state:'TN',city:'Chennai',country:'IN'};
    if(s.config&&!s.config.locale)s.config.locale='IN';
  }
  return s;
}
function loadPersistedState(){
  try{
    if(typeof localStorage==='undefined')return defaultState;
    const raw=localStorage.getItem(ESIM_STORAGE_KEY);
    if(!raw)return defaultState;
    const v=localStorage.getItem(ESIM_VERSION_KEY);
    const loaded=JSON.parse(raw);
    return migrateState({...defaultState,...loaded,config:{...defaultState.config,...(loaded.config||{})},planning:{...defaultState.planning,...(loaded.planning||{})},plant:{...(defaultState.plant||{}),...(loaded.plant||{})}},v);
  }catch(e){console.warn('[esim] loadPersistedState failed',e);return defaultState;}
}

function App(){
  const [state,dispatch]=useReducer(reducer,defaultState,loadPersistedState);
  const [activeTab,setActiveTab]=useState('setup');
  const [persistStatus,setPersistStatus]=useState('ok'); // 'ok' | 'quota' | 'off'

  // Pillar 8 — debounced auto-save. Every state change schedules a localStorage write 500ms later.
  useEffect(()=>{
    if(typeof localStorage==='undefined'){setPersistStatus('off');return;}
    const tid=setTimeout(()=>{
      try{
        const safe={...state};
        delete safe.solverResults;
        delete safe.audit;
        localStorage.setItem(ESIM_STORAGE_KEY,JSON.stringify(safe));
        localStorage.setItem(ESIM_VERSION_KEY,ESIM_SCHEMA_VERSION);
        setPersistStatus('ok');
      }catch(e){setPersistStatus('quota');console.warn('[esim] persist failed',e);}
    },500);
    return()=>clearTimeout(tid);
  },[state]);

  // Check server health
  useEffect(()=>{
    fetch('/api/health').then(r=>r.json())
      .then(d=>dispatch({type:'SET_SERVER_STATUS',status:'connected'}))
      .catch(()=>dispatch({type:'SET_SERVER_STATUS',status:'offline'}));
    const iv=setInterval(()=>{
      fetch('/api/health').then(r=>r.json())
        .then(()=>dispatch({type:'SET_SERVER_STATUS',status:'connected'}))
        .catch(()=>dispatch({type:'SET_SERVER_STATUS',status:'offline'}));
    },30000);
    return()=>clearInterval(iv);
  },[]);

  // Sync skin to <html> so body-level CSS vars (bg, paper-grain) re-theme
  useEffect(()=>{
    const skin=state.config.skin||'v1';
    document.documentElement.setAttribute('data-skin',skin);
  },[state.config.skin]);

  const renderTab=()=>{
    switch(activeTab){
      case 'setup':return <SetupTab state={state} dispatch={dispatch}/>;
      case 'products':return <ProductsTab state={state} dispatch={dispatch}/>;
      case 'production':return <ProductionArchitectureTab state={state} dispatch={dispatch}/>;
      case 'supply':return <SupplyTab state={state} dispatch={dispatch}/>;
      case 'finance':return <FinanceTab state={state} dispatch={dispatch}/>;
      case 'optimize':return <OptimizeTab state={state} dispatch={dispatch}/>;
      case 'analysis':return <AnalysisTab state={state} dispatch={dispatch}/>;
      case 'command':return <CommandCenterTab state={state} dispatch={dispatch}/>;
      case 'learn':return <LearningLab state={state}/>;
      case 'sap':return <SAPModeTab state={state} dispatch={dispatch}/>;
      default:return null;
    }
  };

  const skin=state.config.skin||'v1';
  const setSkin=(s)=>dispatch({type:'SET_SKIN',skin:s});
  const connected=state.serverStatus==='connected';
  const planning=state.planning||{};
  const hz=planning.horizonLength||planning.periods||52;
  const hzUnit=(planning.horizonUnit||'weeks').slice(0,1).toUpperCase();
  const grain=(planning.timeGrain||'weekly');
  const skuCount=(state.products||[]).length;

  return <div className="app-shell shell-fluid" data-skin={skin}>
    <div className="mast">
      <div className="mast-co">{state.config.companyName||'Enterprise Simulator'}</div>
      <div className="mast-meta">
        {state.config.city&&<span className="mast-chip">📍 {state.config.city}</span>}
        <span className="mast-chip">{state.config.fyLabel||state.config.fiscalYear||'FY'}</span>
        <span className={`mast-chip ${connected?'ok':'err'}`}>{connected?'MILP ONLINE':'OFFLINE'}</span>
        <span className="mast-live">LIVE</span>
      </div>
      <LiveCascadeIndicator state={state}/>
      <div className="mast-right">
        <div className="skin-pill" title="Switch visual theme">
          <button className={skin==='v1'?'on':''}  onClick={()=>setSkin('v1')}>V1 Mono</button>
          <button className={skin==='v3'?'on':''}  onClick={()=>setSkin('v3')}>V3 Riso</button>
          <button className={skin==='dark'?'on':''} onClick={()=>setSkin('dark')}>Dark</button>
        </div>
        <select value={state.config.currency} onChange={e=>{const map={'₹':{r:1,n:'INR'},'$':{r:0.012,n:'USD'},'€':{r:0.011,n:'EUR'},'£':{r:0.0095,n:'GBP'}};const m=map[e.target.value]||{r:1,n:'INR'};dispatch({type:'SET_CONFIG',payload:{currency:e.target.value,currencyRate:m.r,currencyName:m.n}})}} style={{background:'var(--bg3)',border:'1px solid var(--br2)',color:'var(--tx)',padding:'3px 8px',fontSize:10,borderRadius:'var(--radius)',fontFamily:'var(--font-mono)'}}>
          <option value="₹">₹ INR</option><option value="$">$ USD</option><option value="€">€ EUR</option><option value="£">£ GBP</option>
        </select>
        {/* Pillar 8 — persistence indicator + reset */}
        <span title={persistStatus==='ok'?'Auto-saving to localStorage. Refresh-safe.':persistStatus==='quota'?'localStorage quota exceeded — changes not persisted.':'localStorage unavailable in this browser.'} style={{fontSize:10,fontFamily:'var(--font-mono)',color:persistStatus==='ok'?'var(--gn)':'var(--dg)',cursor:'help'}}>{persistStatus==='ok'?'● saved':persistStatus==='quota'?'⚠ quota':'⚠ off'}</span>
        <button title="Reset to default state (clears localStorage)" onClick={()=>{if(confirm('Reset all data to defaults? This clears your saved state.')){try{localStorage.removeItem(ESIM_STORAGE_KEY);localStorage.removeItem(ESIM_VERSION_KEY);}catch(_){} ;location.reload();}}} style={{background:'var(--bg3)',border:'1px solid var(--br2)',color:'var(--tx3)',padding:'2px 6px',fontSize:10,borderRadius:'var(--radius)',cursor:'pointer'}}>↺ reset</button>
        <span style={{fontSize:10,fontFamily:'var(--font-mono)',color:'var(--tx3)'}}>v3.4</span>
      </div>
    </div>
    <div className="tstrip">
      {TABS.map(t=><button key={t.id} className={`tchip${activeTab===t.id?' on':''}`} onClick={()=>setActiveTab(t.id)}>
        <span className="tnum">{t.num}</span>
        <span className="tname">{t.short}</span>
        <span className="tdesc">{t.desc}</span>
      </button>)}
    </div>
    <div className="tab-content">
      <TataDemoBar state={state} dispatch={dispatch}/>
      {renderTab()}
    </div>
    <AuditDrawer state={state} dispatch={dispatch}/>
    <div className="statusbar">
      <span>Solver <b>CBC·PuLP</b></span><span className="sep"></span>
      <span>Grain <b>{grain}</b></span><span className="sep"></span>
      <span>Horizon <b>{hz}{hzUnit}</b></span><span className="sep"></span>
      <span>SKUs <b>{skuCount}</b></span><span className="sep"></span>
      <span>Status <b>{connected?'ONLINE':'OFFLINE'}</b></span>
      <span style={{marginLeft:'auto',opacity:.7}}>
        <span className="kbd">⌘K</span>search · <span className="kbd">G+S</span>setup · <span className="kbd">?</span>help
      </span>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
