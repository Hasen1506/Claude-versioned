    {/* Pillar 3 — Live Landed-Cost Panel (de-duplicated from the isolated scratchpad). Reads directly from every BOM part + state.config.gstRegistered + state.plant.state. No separate form. */}
    <div className="card">
      <div className="card-title">🛃 Landed Cost Rollup <span className="badge" style={{background:'rgba(0,212,170,.1)',color:'var(--ac)'}}>Live from BOM · GST-aware</span></div>
      <div style={{fontSize:10,color:'var(--tx3)',marginBottom:8}}>
        Per-part landed cost is computed via the <code>landedCost(part, config, plant)</code> helper — the same function the MILP/LP solver reads. GST registration: <strong style={{color:state.config.gstRegistered?'var(--gn)':'var(--a4)'}}>{state.config.gstRegistered?'Registered (IGST recoverable)':'NOT Registered (IGST sunk into cost)'}</strong> · Plant state: <strong>{(state.plant&&state.plant.state)||'TN'}</strong>. Edit per-part fields in Tab 2 (BOM row).
      </div>
      {(()=>{
        const rows=allParts.map(b=>{
          const landed=landedCost(b,state.config,state.plant,state.supplierProfiles);
          const isImport=b.supplierType==='import'||(b.country&&b.country!=='IN');
          const intrastate=!isImport&&b.supplierState&&b.supplierState===((state.plant&&state.plant.state)||'TN');
          const taxRegime=isImport?(state.config.gstRegistered?'Import · IGST-ITC':'Import · IGST-sunk'):intrastate?'Domestic · CGST+SGST':'Domestic · IGST';
          const uplift=landed-(+b.cost||0);
          const upliftPct=(+b.cost||0)>0?(uplift/+b.cost||0)*100:0;
          return{...b,landed,taxRegime,uplift,upliftPct};
        });
        if(!rows.length)return <div style={{color:'var(--tx3)',fontSize:10,padding:8}}>No BOM parts yet — add one in Tab 2 → BOM section.</div>;
        return <table className="data-table">
          <thead><tr><th>Part</th><th>Source</th><th>Incoterm</th><th>Tax Regime</th><th className="num">Base Cost</th><th className="num">Landed</th><th className="num">Uplift</th></tr></thead>
          <tbody>{rows.map((b,i)=><tr key={i}>
            <td>{b.name}</td>
            <td style={{fontSize:10}}>{b.supplierType==='import'?`Import · ${b.country||'—'}`:`${b.supplierState||'—'} (IN)`}</td>
            <td style={{fontSize:10,color:'var(--tx2)'}}>{b.incoterm||'—'}</td>
            <td style={{fontSize:9,color:'var(--a2)'}}>{b.taxRegime}</td>
            <td className="num">{cur}{(+b.cost||0).toLocaleString()}</td>
            <td className="num" style={{fontWeight:600,color:'var(--ac)'}}>{cur}{b.landed.toFixed(2)}</td>
            <td className="num" style={{fontWeight:600,color:b.uplift>0?'var(--a4)':'var(--gn)'}}>+{cur}{b.uplift.toFixed(2)} ({b.upliftPct.toFixed(1)}%)</td>
          </tr>)}</tbody>
        </table>;
      })()}
      <div style={{marginTop:8,padding:8,background:'var(--bg3)',borderRadius:4,fontSize:10,fontFamily:'JetBrains Mono',color:'var(--tx2)',lineHeight:1.7}}>
        <strong style={{color:'var(--ac)'}}>Import</strong>: CIF + BCD + SWS(10% of BCD) + IGST(18% of CIF+BCD+SWS) + CHA + port + local. IGST sunk iff not GST-registered.<br/>
        <strong style={{color:'var(--ac)'}}>Domestic intrastate</strong> (supplier.state === plant.state): cost + freight + (CGST+SGST). Sunk iff not registered.<br/>
        <strong style={{color:'var(--ac)'}}>Domestic interstate</strong>: cost + freight + IGST. Sunk iff not registered.<br/>
        <strong style={{color:'var(--ac)'}}>Incoterm</strong> decides which of freight/insurance/duty is buyer-paid. <code>incotermBuyerPays()</code> gates the BCD/SWS/IGST inputs in the BOM row.
      </div>
    </div>

    {/* Pillar 3 — Inbound Network Topology (mirrors outbound). Groups parts by origin (country/state) → plant. */}
    <div className="card">
      <div className="card-title">🧭 Inbound Network Topology <span className="badge" style={{background:'rgba(56,189,248,.1)',color:'var(--a2)'}}>Mirror of outbound</span></div>
      <div style={{fontSize:10,color:'var(--tx3)',marginBottom:6}}>One row per origin (state for domestic, country for import) → plant. Volume weighted by monthly BOM consumption.</div>
      {(()=>{
        const agg={};
        state.products.forEach(p=>{
          const monthDem=(p.history||[]).slice(-3).reduce((a,b)=>a+(+b||0),0)/3;
          (p.bom||[]).forEach(b=>{
            const origin=b.supplierType==='import'?(b.country||'INT'):((b.supplierState||'TN')+' (IN)');
            const key=`${origin}→${(state.plant&&state.plant.state)||'TN'}`;
            if(!agg[key])agg[key]={origin,mode:b.transMode||'road',incoterm:b.incoterm||'—',partCount:0,monthlyUnits:0,monthlyValue:0};
            agg[key].partCount++;
            agg[key].monthlyUnits+=monthDem*(+b.qtyPer||1);
            agg[key].monthlyValue+=monthDem*(+b.qtyPer||1)*landedCost(b,state.config,state.plant,state.supplierProfiles);
          });
        });
        const laneRows=Object.entries(agg).map(([k,v])=>({k,...v})).sort((a,b)=>b.monthlyValue-a.monthlyValue);
        if(!laneRows.length)return <div style={{color:'var(--tx3)',fontSize:10,padding:8}}>No BOM data yet.</div>;
        const plantState=(state.plant&&state.plant.state)||'TN';
        return <table className="data-table">
          <thead><tr><th>Origin</th><th>→ Plant</th><th>Mode</th><th>Incoterm</th><th className="num">Parts</th><th className="num">Monthly Units</th><th className="num">Monthly Value</th></tr></thead>
          <tbody>{laneRows.map((r,i)=><tr key={i}>
            <td style={{fontWeight:600,color:'var(--a2)'}}>{r.origin}</td>
            <td>{plantState} (Plant)</td>
            <td style={{fontSize:10}}>{r.mode}</td>
            <td style={{fontSize:10}}>{r.incoterm}</td>
            <td className="num">{r.partCount}</td>
            <td className="num">{Math.round(r.monthlyUnits).toLocaleString()}</td>
            <td className="num" style={{fontWeight:600,color:'var(--ac)'}}>{cur}{Math.round(r.monthlyValue).toLocaleString()}</td>
          </tr>)}</tbody>
        </table>;
      })()}
    </div>
    {importParts.length>0&&<div className="card">
      <div className="card-title">📖 Incoterms 2020 Quick Reference</div>
      <table className="data-table">
        <thead><tr><th>Term</th><th>Seller Delivers To</th><th>Buyer Pays From</th><th>Risk Transfer</th><th>Best For</th></tr></thead>
        <tbody>
          <tr><td style={{color:'var(--ac)',fontWeight:700}}>EXW</td><td>Seller's premises</td><td>Everything from factory door</td><td>At seller's door</td><td>When buyer has global forwarder</td></tr>
          <tr><td style={{color:'var(--ac)',fontWeight:700}}>FOB</td><td>On board vessel at origin port</td><td>Freight + insurance + duties</td><td>Ship's rail at origin</td><td>Most common for Indian imports</td></tr>
          <tr><td style={{color:'var(--ac)',fontWeight:700}}>CIF</td><td>Destination port (cost+insurance+freight)</td><td>Duties + local transport</td><td>Ship's rail at origin</td><td>Simple landed-at-port pricing</td></tr>
          <tr><td style={{color:'var(--ac)',fontWeight:700}}>DDP</td><td>Buyer's premises (all inclusive)</td><td>Nothing — seller handles all</td><td>At buyer's door</td><td>When seller has Indian entity</td></tr>
        </tbody>
      </table>
      <div style={{marginTop:6,fontSize:9,color:'var(--tx3)'}}>⚠️ Indian customs always calculates duty on CIF value regardless of Incoterm. If purchased FOB, customs adds notional freight + insurance.</div>
    </div>}

    {/* No import parts message */}
    {importParts.length===0&&<div className="card" style={{opacity:0.6}}>
      <div className="card-title">🛃 Import Tools</div>
      <div style={{fontSize:10,color:'var(--tx3)'}}>No imported parts detected. Set any BOM part's Source to "Import" in Tab 2 to enable the landed cost calculator, Incoterms reference, and duty computations.</div>
    </div>}

    {/* ─── TRANSPORT ALLOCATION MATRIX ─── */}
    <TransportAllocationCard state={state} dispatch={dispatch}/>

    {/* ─── v3.6 — CONSOLIDATED SUPPLIER MANAGEMENT (P2) ─── */}
    {/* Replaces: (1) Tab 3 read-only scorecard, (2) Command Center scorecard methodology, (3) Command Center should-cost docs. */}
    <SupplierManagementCard state={state} dispatch={dispatch} allParts={allParts}/>
  </div>
}

// ─── P6 — Procurement Risk + Currency Hedging Card ───
function ProcurementRiskCard({state,dispatch}){
  const cur=state.config.currency;
  const profiles=state.supplierProfiles||{};
  const fxRates=state.config.fxRates||{};

  // ── Spot-price volatility per BOM row (history-based, simple z-score) ──
  // BOM rows can carry b.priceHistory:[number] (last N quotes). If absent, fall back to costCV which is a stored CV%.
  const volAlerts=[];
  state.products.forEach(p=>{
    (p.bom||[]).forEach(b=>{
      const hist=Array.isArray(b.priceHistory)?b.priceHistory.filter(v=>v!=null&&!isNaN(+v)).map(v=>+v):[];
      let z=0,mu=null,sigma=null;
      if(hist.length>=4){
        mu=hist.reduce((s,v)=>s+v,0)/hist.length;
        sigma=Math.sqrt(hist.reduce((s,v)=>s+(v-mu)*(v-mu),0)/hist.length);
        const cur_q=+b.cost||0;
        z=sigma>0?(cur_q-mu)/sigma:0;
      }else if(b.costCV){
        // Fallback: assume current quote drifted by 1× costCV from mean (just enough to surface as a watch).
        z=(b.costCV/100>=0.15)?1.6:0;
      }
      if(Math.abs(z)>=1.5){
        volAlerts.push({
          product:p.name,part:b.name,supplier:b.supplierName||b.supplier||'—',
          currentPrice:+b.cost||0,mean:mu,sigma:sigma,zscore:z,
          bom:b,
        });
      }
    });
  });

  // ── FX Exposure rollup ──
  // Per-supplier in foreign currency: spot, hedge ratio, forward, exposure (sum of BOM rows × qty/per × estimated horizon demand).
  const T=periodCount(state.planning);
  const exposureBySupplier={};
  state.products.forEach(p=>{
    const annDem=(p.history||[]).reduce((s,v)=>s+(+v||0),0);
    (p.bom||[]).forEach(b=>{
      const sname=b.supplierName||b.supplier||b.vendor;
      if(!sname)return;
      const prof=profiles[sname]||{};
      const supCcy=prof.currency||cur;
      if(supCcy===cur)return; // no FX exposure
      const ccyKey=supCcy==='$'?'USD':supCcy==='€'?'EUR':supCcy==='¥'?'JPY':supCcy==='£'?'GBP':supCcy;
      const spot=+fxRates[ccyKey]||1;
      const fwd=+prof.forwardRate||spot;
      const h=(+prof.hedgeRatio||0)/100;
      const eff=spot*(1-h)+fwd*h;
      const annPartUnits=annDem*(+b.qtyPer||1);
      const supBaseCost=annPartUnits*(+b.cost||0); // in supplier ccy
      if(!exposureBySupplier[sname])exposureBySupplier[sname]={supplier:sname,ccy:supCcy,supBaseCost:0,annHomeAtSpot:0,annHomeAtEff:0,hedgeRatio:h*100,spot,forward:fwd,eff};
      exposureBySupplier[sname].supBaseCost+=supBaseCost;
      exposureBySupplier[sname].annHomeAtSpot+=supBaseCost*spot;
      exposureBySupplier[sname].annHomeAtEff+=supBaseCost*eff;
    });
  });
  const exposureRows=Object.values(exposureBySupplier).sort((a,b)=>b.annHomeAtEff-a.annHomeAtEff);

  // ── Backup-supplier auto-check ──
  const backupRows=[];
  state.products.forEach(p=>{
    (p.bom||[]).forEach(b=>{
      const arr=Array.isArray(b.backupSuppliers)?b.backupSuppliers:[];
      const qualified=arr.filter(x=>x.qualified);
      if(qualified.length===0&&(b.leadTime||0)>2){
        backupRows.push({product:p.name,part:b.name,primary:b.supplierName||'—',primaryLT:b.leadTime||0,gap:'No qualified backup supplier'});
      }else if(qualified.length){
        // pick lowest leadTime backup; compute gap if primary is delayed
        const best=qualified.slice().sort((a,b)=>(+a.leadTime||99)-(+b.leadTime||99))[0];
        const gapWk=Math.max(0,(+best.leadTime||0)-(+b.leadTime||0));
        const costPremium=((+best.cost||0)-(+b.cost||0))/Math.max(+b.cost||1,0.01)*100;
        backupRows.push({product:p.name,part:b.name,primary:b.supplierName||'—',primaryLT:b.leadTime||0,backup:best.name,backupLT:best.leadTime,backupCost:best.cost,gap:`+${gapWk}wk LT, +${costPremium.toFixed(0)}% cost`,quality:best.quality});
      }
    });
  });

  return <div className="card" style={{borderLeft:'3px solid var(--dg)'}}>
    <div className="card-title">⚠ Procurement Risk &amp; FX Hedging<SectionInfo>
      <strong>What it does:</strong> Continuously monitors three procurement risk signals and surfaces actionable mitigation choices.<br/><br/>
      <strong>1. Spot-price volatility</strong> — flags BOM rows where current quote ≥ 1.5σ above 4-quote rolling mean (or via costCV ≥ 15%). Releases offer 4 choices: <em>release-now / delay-watch / trigger-backup / hedge-with-forward</em>.<br/>
      <strong>2. FX exposure</strong> — for foreign-currency suppliers, computes effective FX = spot × (1−h) + forward × h, where h = supplierProfile.hedgeRatio. <code>landedCost()</code> applies this multiplier to BOM cost so the MILP sees the hedged price.<br/>
      <strong>3. Backup-supplier auto-check</strong> — flags long-LT parts (&gt;2 wk) without a qualified backup; for those WITH backup, computes (LT gap, cost premium, quality) so you can pre-decide failover thresholds.<br/><br/>
      <strong>HMM regime detection</strong>: deferred to a future risk.py module — would tag periods as low-vol vs high-vol and pre-trigger alerts.
    </SectionInfo></div>

    {/* Spot rates editable */}
    <div style={{marginBottom:10,padding:'6px 8px',background:'var(--bg3)',borderRadius:4,fontSize:10}}>
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:4}}>
        <span style={{fontWeight:700,letterSpacing:.4,color:'var(--tx2)'}}>FX SPOT RATES</span>

          <td className="num" style={{color:'var(--tx3)'}}>{a.mean!=null?cur+a.mean.toFixed(2):'—'}</td>
          <td className="num" style={{color:'var(--tx3)'}}>{a.sigma!=null?a.sigma.toFixed(2):'—'}</td>
          <td className="num" style={{color:Math.abs(a.zscore)>2?'var(--dg)':'var(--a4)',fontWeight:700}}>{a.zscore.toFixed(2)}</td>
          <td>
            <div style={{display:'flex',gap:3,flexWrap:'wrap',fontSize:9}}>
              <button className="btn btn-secondary btn-sm" style={{fontSize:9,padding:'1px 5px'}} title="Accept the current spike; release PO at this price.">Release</button>
              <button className="btn btn-secondary btn-sm" style={{fontSize:9,padding:'1px 5px'}} title="Hold the PO for 1 week; retest. Risk: stockout if LT short.">Delay</button>
              <button className="btn btn-secondary btn-sm" style={{fontSize:9,padding:'1px 5px',color:'var(--a2)'}} title="Switch to backup supplier (configured in BOM row).">Trigger backup</button>
              <button className="btn btn-secondary btn-sm" style={{fontSize:9,padding:'1px 5px',color:'var(--a3)'}} title="Set supplier hedgeRatio in Contract row to lock forward FX.">Hedge</button>
            </div>
          </td>
        </tr>)}</tbody>
      </table>}
    </div>

    {/* FX exposure */}
    <div style={{marginBottom:10}}>
      <div style={{fontSize:10,fontWeight:700,color:'var(--a3)',marginBottom:4}}>💱 FX exposure rollup ({exposureRows.length} foreign-ccy supplier{exposureRows.length===1?'':'s'})</div>
      {exposureRows.length===0?<div style={{fontSize:10,color:'var(--tx3)'}}>All suppliers in home currency ({cur}). No FX exposure.</div>:
      <table className="data-table" style={{fontSize:10}}>
        <thead><tr><th>Supplier</th><th>Ccy</th><th>Annual ({cur})</th><th>Spot</th><th>Forward</th><th>Hedge %</th><th>Effective FX</th><th>Annual @ Eff ({cur})</th><th>Hedged Δ</th></tr></thead>
        <tbody>{exposureRows.map((e,i)=>{
          const delta=e.annHomeAtEff-e.annHomeAtSpot;
          return <tr key={i}>
            <td style={{fontWeight:600}}>{e.supplier}</td>
            <td style={{fontFamily:'JetBrains Mono',color:'var(--a4)'}}>{e.ccy}</td>
            <td className="num">{cur}{Math.round(e.annHomeAtSpot).toLocaleString()}</td>
            <td className="num" style={{fontFamily:'JetBrains Mono',color:'var(--tx3)'}}>{e.spot}</td>
            <td className="num" style={{fontFamily:'JetBrains Mono',color:'var(--tx3)'}}>{e.forward}</td>
            <td className="num" style={{color:e.hedgeRatio>=50?'var(--gn)':e.hedgeRatio>0?'var(--a4)':'var(--dg)'}}>{e.hedgeRatio.toFixed(0)}%</td>
            <td className="num" style={{fontFamily:'JetBrains Mono'}}>{e.eff.toFixed(3)}</td>
            <td className="num" style={{fontWeight:700}}>{cur}{Math.round(e.annHomeAtEff).toLocaleString()}</td>
            <td className="num" style={{color:delta<0?'var(--gn)':delta>0?'var(--dg)':'var(--tx3)'}}>{delta>0?'+':''}{cur}{Math.round(delta).toLocaleString()}</td>
          </tr>;
        })}</tbody>
      </table>}
      <div style={{fontSize:9,color:'var(--tx3)',marginTop:4}}>Edit hedgeRatio + forwardRate per supplier in <strong>Tab 3 → Supplier Management → Contract Definitions</strong>.</div>
    </div>

    {/* Backup-supplier auto-check */}
    <div style={{marginBottom:6}}>
      <div style={{fontSize:10,fontWeight:700,color:'var(--a4)',marginBottom:4}}>🔄 Backup-supplier auto-check ({backupRows.length})</div>
      {backupRows.length===0?<div style={{fontSize:10,color:'var(--gn)'}}>✅ All long-LT parts have qualified backups.</div>:
      <table className="data-table" style={{fontSize:10}}>
        <thead><tr><th>Part</th><th>Primary (LT)</th><th>Backup (LT, cost, Q)</th><th>Gap if primary fails</th></tr></thead>
        <tbody>{backupRows.map((r,i)=><tr key={i}>
          <td>{r.part} <span style={{color:'var(--tx3)'}}>({r.product})</span></td>
          <td>{r.primary} <span style={{color:'var(--tx3)'}}>({r.primaryLT}wk)</span></td>
          <td>{r.backup?<>{r.backup} <span style={{color:'var(--tx3)'}}>({r.backupLT}wk, {cur}{r.backupCost}, Q={r.quality}%)</span></>:<span style={{color:'var(--dg)',fontStyle:'italic'}}>none qualified</span>}</td>
          <td style={{color:r.backup?'var(--a4)':'var(--dg)'}}>{r.gap}</td>
        </tr>)}</tbody>
      </table>}
    </div>
  </div>;
}

// ─── TAB 4: FINANCE & COSTS ───
function FinanceTab({state,dispatch}){
  const cur=state.config.currency;
  const [deprForm,setDeprForm]=useState({purchase_price:8000000,residual_value:400000,useful_life:10,method:'SLM',wdv_rate:20,total_units:80000,annual_units:'3000,5200,4800,3500,1200'});
  const [deprResult,setDeprResult]=useState(null);
  // Pillar 11 — NPV/IRR/Depreciation: client-side primary compute, backend audit secondary. Horizon selector: monthly/quarterly/yearly.
  const [npvForm,setNpvForm]=useState({cash_flows:'-200,15,22,30,42,42,42,42,42,42,42',wacc:+state.config.wacc||8.5,periodsPerYear:1});
  const [npvResult,setNpvResult]=useState(null);
  const [npvAudit,setNpvAudit]=useState(null);
  const [waccForm,setWaccForm]=useState({equity_pct:30,debt_pct:70,cost_equity:12,cost_debt:6.5,tax_rate:25});
  const [waccResult,setWaccResult]=useState(null);
  const [deprAudit,setDeprAudit]=useState(null);
  // Pillar 14 — BVL reads WACC + tax rate from registry (state.config). Local wacc/taxRate removed.
  const [bvl,setBvl]=useState({assetCost:5000000,residual:500000,life:10,leaseCost:60000,leaseYears:10,maintBuy:100000,maintLease:0});
  const bvlWacc=+state.config.wacc||0;
  const bvlTax=+state.config.taxRate||0;

  // Keep NPV form WACC live-synced when registry changes (unless user explicitly overrode).
  React.useEffect(()=>{setNpvForm(f=>({...f,wacc:+state.config.wacc||f.wacc}));},[state.config.wacc]);

  const calcDepr=async()=>{
    const params={...deprForm,wdv_rate:(+deprForm.wdv_rate||0)/100};
    if(deprForm.method==='UoP')params.annual_units=deprForm.annual_units.split(',').map(Number);
    // Client-side primary
    const local=deprLocal(params);
    setDeprResult(local);
    // Optional backend audit
    try{const r=await fetch('/api/calc/depreciation',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(params)});if(r.ok){setDeprAudit(await r.json());}else{setDeprAudit(null);}}catch(e){setDeprAudit(null);}
  };
  const calcNPV=async()=>{
    const flows=npvForm.cash_flows.split(',').map(v=>+v||0);
    const local=npvLocal(flows,npvForm.wacc,npvForm.periodsPerYear);
    // Derive payback (discounted) and decision for display consistency with backend
    let cum=0,payback=null;const r=(npvForm.wacc/100)/Math.max(npvForm.periodsPerYear,1);
    for(let t=0;t<flows.length;t++){cum+=flows[t]/Math.pow(1+r,t);if(cum>=0&&payback===null&&t>0){payback=t/(npvForm.periodsPerYear||1);break;}}
    setNpvResult({npv:Math.round(local.npv*100)/100,irr:Math.round(local.irr*100)/100,payback_discounted:payback!=null?Math.round(payback*10)/10:null,decision:local.npv>0?'INVEST':'REJECT'});
    try{const r=await fetch('/api/calc/npv',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cash_flows:flows,wacc:npvForm.wacc/100})});if(r.ok){setNpvAudit(await r.json());}else{setNpvAudit(null);}}catch(e){setNpvAudit(null);}
  };
  const calcWACC=async()=>{
    // Pillar 9: authoritative WACC is on Tab 1. This scratchpad stays for what-if comparisons but also computes client-side now.
    const wE=(+waccForm.equity_pct||0)/100,wD=(+waccForm.debt_pct||0)/100,ke=(+waccForm.cost_equity||0)/100,kd=(+waccForm.cost_debt||0)/100,t=(+waccForm.tax_rate||0)/100;
    const wacc=Math.round((wE*ke+wD*kd*(1-t))*10000)/100;
    setWaccResult({wacc,breakdown:{equity_term:Math.round(wE*ke*10000)/100,debt_term:Math.round(wD*kd*(1-t)*10000)/100}});
    try{const r=await fetch('/api/calc/wacc',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(waccForm)});if(r.ok){const j=await r.json();if(j&&j.wacc!=null){/* keep client-side result authoritative, just log */}}}catch(e){}
  };
  const depreciationResidualSuggest=()=>{
    const P=+deprForm.purchase_price||0;
    return{market:Math.round(P*0.15),salvage5pct:Math.round(P*0.05),engineering:Math.round(P*Math.pow(1-(+deprForm.wdv_rate||20)/100,(+deprForm.useful_life||10)*0.9))};
  };

  // Cost structure summary across SKUs
  const skuCosts=state.products.map(p=>{
    const matCost=p.bom.reduce((a,b)=>a+b.cost*b.qtyPer,0);
    return{name:p.name,matCost,varCost:p.variableCost,setupCost:p.setupCost,sellPrice:p.sellPrice,margin:p.sellPrice-matCost-p.variableCost,marginPct:((p.sellPrice-matCost-p.variableCost)/Math.max(p.sellPrice,1)*100).toFixed(1)}
  });

  // CCC calculation
  const dio=state.products.length>0?Math.round((+state.products[0].shelfLife||0)/2):15;

  return <div className="animate-in">
    <CashflowWaterfallPanel state={state}/>
    {/* Pillar 10 — Customer Acquisition Economics. CAC / LTV / payback-months. Writes into budget.marketingDetail. */}
    {(()=>{
      const md=state.budget.marketingDetail||{cac:0,lifetimeMonths:12,monthlyMarginPerCustomer:0,promoSpend:0,channelSplit:{}};
      const cac=+md.cac||0,lt=+md.lifetimeMonths||1,mpc=+md.monthlyMarginPerCustomer||0;
      const ltv=lt*mpc;
      const paybackMo=mpc>0?cac/mpc:0;
      const ratio=cac>0?ltv/cac:0;
      const upMD=(k,v)=>dispatch({type:'SET_BUDGET',payload:{marketingDetail:{...md,[k]:v,monthlyPayback:paybackMo}}});
      const applyToMarketing=()=>{const targetAcq=100;const rec=Math.round(cac*targetAcq*4*1.1);dispatch({type:'SET_BUDGET',payload:{marketing:rec}});};
      return <div className="card">
        <div className="card-title">🎯 Customer Acquisition Economics <span className="badge" style={{background:'rgba(240,180,41,.1)',color:'var(--a4)'}}>Pillar 10 · CAC/LTV/Payback</span></div>
        <div style={{fontSize:10,color:'var(--tx3)',marginBottom:8}}>CAC = cost to acquire a customer; LTV = lifetime gross margin; payback = CAC / monthly margin. Healthy B2B: <strong>LTV/CAC ≥ 3×</strong>, payback ≤ 12 months.</div>
        <div className="grid4">
          <Field label={`CAC (${cur})`} hint="Cost to acquire one customer (demand-gen + sales + onboarding, fully loaded). Includes digital spend, sales team allocated, collateral."><NumInput value={cac} onChange={v=>upMD('cac',v)}/></Field>
          <Field label={`Monthly Margin / Customer (${cur})`} hint="Average monthly gross margin per customer post-acquisition."><NumInput value={mpc} onChange={v=>upMD('monthlyMarginPerCustomer',v)}/></Field>
          <Field label="Lifetime (months)" hint="Expected customer retention period. SaaS 24-60mo; industrial 60-120mo; FMCG 6-18mo."><NumInput value={lt} onChange={v=>upMD('lifetimeMonths',v)}/></Field>
          <Field label={`Promo Spend (${cur})`} hint="Channel-agnostic promotional spend (trade discounts, demos, sponsorships). Separate from CAC for finance reporting."><NumInput value={+md.promoSpend||0} onChange={v=>upMD('promoSpend',v)}/></Field>
        </div>
        <div className="kpi-row" style={{marginTop:8}}>
          <KPI label="Payback Period" value={`${paybackMo.toFixed(1)} mo`} sub={paybackMo<=12?'Healthy <12mo':paybackMo<=24?'OK 12-24mo':'Long — rethink'} color={paybackMo<=12?'var(--gn)':paybackMo<=24?'var(--a4)':'var(--dg)'}/>
          <KPI label="LTV" value={`${cur}${ltv.toLocaleString()}`} sub={`${lt}mo × ${cur}${mpc}/mo`}/>
          <KPI label="LTV / CAC" value={`${ratio.toFixed(2)}×`} sub={ratio>=3?'Healthy (≥3×)':ratio>=1?'Marginal':'Burning cash'} color={ratio>=3?'var(--gn)':ratio>=1?'var(--a4)':'var(--dg)'}/>
        </div>
        <div style={{marginTop:8,padding:8,background:'var(--bg3)',borderRadius:4,fontSize:10,fontFamily:'JetBrains Mono',color:'var(--tx2)',lineHeight:1.6}}>
          <strong style={{color:'var(--ac)'}}>Formula:</strong> payback = CAC / monthly_margin = {cur}{cac} / {cur}{mpc} = <strong>{paybackMo.toFixed(2)} months</strong><br/>
          LTV = lifetime × monthly_margin = {lt} × {cur}{mpc} = <strong>{cur}{ltv.toLocaleString()}</strong><br/>
          Ratio LTV/CAC = <strong>{ratio.toFixed(2)}×</strong> — benchmark ≥3× signals CAC efficiency.
        </div>
        <div style={{marginTop:8}}>
          <button className="btn btn-secondary btn-sm" onClick={applyToMarketing}>Suggest Marketing Budget from CAC (CAC × 100 customers/qtr × 1.1)</button>
        </div>
      </div>;
    })()}
    {/* Cost Structure */}
    <div className="card">
      <div className="card-title">📊 Cost Structure per SKU</div>
      <table className="data-table">
        <thead><tr><th>Product</th><th>Material Cost</th><th>Variable Cost</th><th>Setup/Batch</th><th>Unit Cost</th><th>Sell Price</th><th>Margin</th><th>Margin %</th></tr></thead>
        <tbody>{skuCosts.map((s,i)=><tr key={i}>
          <td style={{fontWeight:600}}>{s.name}</td>
          <td className="num">{cur}{s.matCost.toFixed(1)}</td>
          <td className="num">{cur}{s.varCost}</td>
          <td className="num">{cur}{s.setupCost}</td>
          <td className="num" style={{fontWeight:600}}>{cur}{(s.matCost+s.varCost).toFixed(1)}</td>
          <td className="num">{cur}{s.sellPrice}</td>
          <td className="num" style={{color:s.margin>0?'var(--gn)':'var(--dg)',fontWeight:700}}>{cur}{s.margin.toFixed(1)}</td>
          <td className="num" style={{color:+s.marginPct>20?'var(--gn)':+s.marginPct>0?'var(--a4)':'var(--dg)'}}>{s.marginPct}%</td>
        </tr>)}</tbody>
      </table>
    </div>

    {/* Working Capital & CCC */}
    <div className="card">
      <div className="card-title">💳 Working Capital & Cash Conversion Cycle</div>
      <div className="grid4">
        <Field label="DSO (Days Sales Outstanding)"><NumInput value={state.workingCapital.dso} onChange={v=>dispatch({type:'SET_WC',payload:{dso:v}})}/></Field>
        <Field label="DIO (Days Inventory Outstanding)"><input type="number" value={dio} readOnly style={{opacity:0.7}}/></Field>
        <Field label="DPO (Days Payables Outstanding)"><NumInput value={state.workingCapital.dpo} onChange={v=>dispatch({type:'SET_WC',payload:{dpo:v}})}/></Field>
        <Field label="CCC (calculated)"><input value={`${state.workingCapital.dso+dio-state.workingCapital.dpo} days`} readOnly style={{color:'var(--ac)',fontWeight:700}}/></Field>
      </div>
      {(()=>{const ccc=state.workingCapital.dso+dio-state.workingCapital.dpo;return <div style={{fontSize:10,color:'var(--tx3)',marginTop:4}}>CCC = DSO + DIO − DPO = {state.workingCapital.dso} + {dio} − {state.workingCapital.dpo} = <strong style={{color:ccc<30?'var(--gn)':ccc<60?'var(--a4)':'var(--dg)'}}>{ccc} days</strong>. {ccc<0?'Negative CCC — suppliers finance your operations.':ccc<30?'Healthy working capital cycle.':'Consider extending DPO or reducing DSO.'}</div>})()}
    </div>

    {/* Pillar 15 — Payment Ledger */}
    <PaymentLedgerCard state={state} dispatch={dispatch}/>

    {/* P6 — Procurement Risk + FX Exposure */}
    <ProcurementRiskCard state={state} dispatch={dispatch}/>

    {/* Asset Register */}
    <div className="card">
      <div className="card-title">🏭 Asset Register <span className="badge" style={{background:'rgba(56,189,248,.1)',color:'var(--a2)'}}>{state.assets.length} assets</span></div>
      {state.assets.length===0&&<div style={{padding:12,background:'var(--bg2)',border:'1px dashed var(--br2)',textAlign:'center',color:'var(--tx3)',fontSize:10,marginBottom:8}}>
        <div style={{display:'flex',justifyContent:'center',gap:10,marginBottom:6,opacity:.5}}>
          <AssetIcon kind="cnc" size={32} color="var(--tx2)"/>
          <AssetIcon kind="molding" size={32} color="var(--tx2)"/>
          <AssetIcon kind="forklift" size={32} color="var(--tx2)"/>
          <AssetIcon kind="line" size={32} color="var(--tx2)"/>
          <AssetIcon kind="warehouse" size={32} color="var(--tx2)"/>
        </div>
        No assets — add CNC machines, moulding presses, forklifts, packing lines or storage to track depreciation &amp; NPV inputs.
      </div>}
      {state.assets.map(a=>{
        const nm=(a.name||'').toLowerCase();
        const kind=nm.includes('cnc')||nm.includes('lathe')||nm.includes('mill')?'cnc':nm.includes('press')||nm.includes('mould')||nm.includes('mold')?'molding':nm.includes('fork')||nm.includes('lift')||nm.includes('truck')?'forklift':nm.includes('line')||nm.includes('conveyor')||nm.includes('assemb')?'line':nm.includes('warehouse')||nm.includes('rack')||nm.includes('store')?'warehouse':'factory';
        const annDep=Math.round(a.method==='SLM'?(a.purchasePrice-a.residualValue)/a.usefulLife:a.method==='WDV'?a.purchasePrice*(a.wdvRate||20)/100:0);
        const maint=+a.maintPerYr||0,energy=+a.energyPerYr||0,cons=+a.consumablesPerYr||0,op=+a.operatorPerYr||0,uptime=+a.uptimePct||95;
        const downtimeCostPerYr=Math.round((+a.purchasePrice||0)*0.02*(100-uptime)/5);
        const opexPerYr=maint+energy+cons+op+downtimeCostPerYr;
        const tcoPerYr=annDep+opexPerYr;
        const tcoLife=tcoPerYr*(+a.usefulLife||1)+( +a.purchasePrice||0)-( +a.residualValue||0);
        return <div key={a.id} style={{border:'1px solid var(--br)',padding:6,marginBottom:4,background:'var(--bg)'}}>
          <div className="bom-row" style={{alignItems:'center',gap:6}}>
            <div style={{padding:4,background:'var(--bg2)',border:'1px solid var(--br2)',flexShrink:0}}><AssetIcon kind={kind} size={36} color="var(--ac)"/></div>
            <Field label="Asset Name"><input value={a.name} onChange={e=>dispatch({type:'UPDATE_ASSET',id:a.id,payload:{name:e.target.value}})}/></Field>
            <Field label={`Purchase Price (${cur})`}><NumInput value={a.purchasePrice} onChange={v=>dispatch({type:'UPDATE_ASSET',id:a.id,payload:{purchasePrice:v}})}/></Field>
            <Field label="Residual Value"><NumInput value={a.residualValue} onChange={v=>dispatch({type:'UPDATE_ASSET',id:a.id,payload:{residualValue:v}})}/></Field>
            <Field label="Useful Life (yr)"><NumInput value={a.usefulLife} onChange={v=>dispatch({type:'UPDATE_ASSET',id:a.id,payload:{usefulLife:v}})}/></Field>
            <Field label="Method"><select value={a.method} onChange={e=>dispatch({type:'UPDATE_ASSET',id:a.id,payload:{method:e.target.value}})}><option value="SLM">SLM</option><option value="WDV">WDV</option><option value="UoP">UoP</option></select></Field>
            <Field label="Annual Depr"><input value={`${cur}${annDep.toLocaleString()}`} readOnly style={{color:'var(--a4)',fontWeight:600}}/></Field>
            <Field label="💰 TCO/yr" hint={`Total Cost of Ownership per year = depreciation (${cur}${annDep.toLocaleString()}) + maintenance (${cur}${maint.toLocaleString()}) + energy (${cur}${energy.toLocaleString()}) + consumables (${cur}${cons.toLocaleString()}) + operator (${cur}${op.toLocaleString()}) + downtime cost (${cur}${downtimeCostPerYr.toLocaleString()}).\nLife-cycle TCO over ${a.usefulLife}yr: ${cur}${tcoLife.toLocaleString()}.\nClick to expand the cost breakdown.`}>
              <button className="btn btn-secondary btn-sm" style={{padding:'2px 5px',fontSize:10,width:90,textAlign:'left',fontWeight:700,color:'var(--dg)'}} onClick={()=>dispatch({type:'UPDATE_ASSET',id:a.id,payload:{_showTCO:!a._showTCO}})}>{cur}{tcoPerYr.toLocaleString()} {a._showTCO?'▲':'▼'}</button>

            <div style={{fontSize:9,color:'var(--tx3)',fontWeight:700,letterSpacing:.4,marginBottom:4}}>TCO BREAKDOWN — OPEX COMPONENTS</div>
            <div className="bom-row" style={{alignItems:'center',gap:6}}>

            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>

      {(()=>{

            <Field label={`Total Equity (${cur})`} hint={"Owner's capital + retained earnings. This is 'skin in the game' — equity holders bear residual risk and expect the highest return (cost of equity).\n\nFormula: Equity = Paid-up Capital + Reserves − Treasury Shares."}><NumInput value={fin.equity||0} onChange={v=>setFin('equity',v)}/></Field>
            <Field label={`Total Debt (${cur})`} hint={"Outstanding term loans + working-capital facilities + NCDs. Senior to equity — must be serviced regardless of profit.\n\nFormula: Debt = Long-term Borrowings + Short-term Debt + Current portion of LT Debt."}><NumInput value={fin.debt||0} onChange={v=>setFin('debt',v)}/></Field>
            <Field label="Avg Interest Rate % (debt)" hint={"Weighted-average coupon across all debt instruments. Used for the P&L interest line.\n\nFormula: WAvgIR = Σ(loan_i × rate_i) / Σ(loan_i)."}><NumInput step="0.1" value={fin.interestRate||0} onChange={v=>setFin('interestRate',v)}/></Field>
            <Field label={`Master Budget (${cur})`} hint={"Total deployable capital = Equity + Debt. NOT a cash metric (that's the bank balance) — it's the balance-sheet pool you can allocate to procurement, CapEx, working capital and reserves.\n\nFormula: Master Budget = Equity + Debt."}><input value={`${cur}${master.toLocaleString()}`} readOnly style={{color:'var(--ac)',fontWeight:700,fontFamily:'var(--font-mono)'}}/></Field>
          </div>
          <div className="grid4" style={{marginTop:6}}>
            <Field label="Cost of Equity % (Ke)" hint={"Return demanded by equity holders. From CAPM: Ke = Rf + β × (Rm − Rf).\n\nFor Indian mid-cap mfg: 10-yr G-Sec (Rf) ≈ 7% + β (1.0-1.3) × ERP (5-7%) ≈ 12-16%."}><NumInput step="0.1" value={fin.costOfEquity||0} onChange={v=>setFin('costOfEquity',v)}/></Field>
            <Field label="Cost of Debt % (Kd, pre-tax)" hint={"Actual borrowing rate. Lower than Ke because debt is senior. After-tax: Kd×(1−t) since interest is tax-deductible (tax shield).\n\nFor Indian AA/A corporate: 8-11%."}><NumInput step="0.1" value={fin.costOfDebt||0} onChange={v=>setFin('costOfDebt',v)}/></Field>
            <Field label="Debt / Equity" hint={"Leverage ratio. <1.0 = equity-heavy (conservative). 1-2 = balanced. >2 = highly levered (banking sector).\n\nFormula: D/E = Debt / Equity."}><input value={dE} readOnly style={{color:(+dE>2||dE==='∞')?'var(--dg)':(+dE>1?'var(--a4)':'var(--gn)'),fontWeight:700,fontFamily:'var(--font-mono)'}}/></Field>
            <Field label="Annual Interest Expense" hint={"Debt × avg interest rate. Reduces EBIT to EBT (earnings before tax) on the P&L. Tax-deductible.\n\nFormula: Interest = Debt × Avg_IR."}><input value={`${cur}${annualInterest.toLocaleString()}`} readOnly style={{color:'var(--dg)',fontWeight:700,fontFamily:'var(--font-mono)'}}/></Field>
          </div>
        </div>
        <div style={{padding:8,background:'var(--bg2)',border:'1px solid var(--br2)',marginBottom:8}}>
          <div style={{fontSize:9,color:'var(--tx3)',fontWeight:700,letterSpacing:.4,marginBottom:4}}>BUDGET ALLOCATION <span style={{marginLeft:8,color:unallocated>=0?'var(--gn)':'var(--dg)',fontWeight:600}}>Unallocated: {cur}{unallocated.toLocaleString()}</span></div>
          <div className="grid4">
            <Field label={`Procurement (${cur})`} hint={"Annual spend allowance for raw-material + component purchasing. Used as an MILP budget constraint in the Procurement optimizer (Tab 5). Should typically = 12× monthly COGS × material-cost ratio.\n\nFormula: Procurement Budget ≈ Annual Revenue × Material Cost % × 1.1 (safety)."}><NumInput value={bud.procurement||0} onChange={v=>setBud('procurement',v)}/></Field>
            <Field label={`CapEx (${cur})`} hint={"Budget for new fixed assets — machines, tooling, IT infra. Drives Capital Budget optimizer (Tab 5 → Capital Budget).\n\nRule: CapEx ≤ Depreciation (maintenance mode) or > Depreciation (growth mode)."}><NumInput value={bud.capex||0} onChange={v=>setBud('capex',v)}/></Field>
            <Field label={`Working Capital (${cur})`} hint={"Max value tied up in AR + inventory − AP at any point. Constrains procurement MILP & safety-stock targets.\n\nFormula: WC = AR + Inventory − AP = (Revenue × DSO/365) + (Inv days × COGS/365) − (COGS × DPO/365)."}><NumInput value={bud.workingCapital||0} onChange={v=>setBud('workingCapital',v)}/></Field>
            <Field label={`Reserve / Contingency (${cur})`} hint={"Unallocated buffer for shocks — supplier default, FX spike, equipment failure. Enterprise norm: 5-15% of master budget.\n\nShould be liquid (cash equivalents), not locked in illiquid assets."}><NumInput value={fin.reserve||0} onChange={v=>setFin('reserve',v)}/></Field>
          </div>
          <div style={{marginTop:8,height:18,background:'var(--bg)',border:'1px solid var(--br)',display:'flex',overflow:'hidden'}}>
            {master>0&&<>
              <div style={{width:`${(bud.procurement||0)/master*100}%`,background:'var(--a2)'}} title={`Procurement ${cur}${(bud.procurement||0).toLocaleString()}`}></div>
              <div style={{width:`${(bud.capex||0)/master*100}%`,background:'var(--a3)'}} title={`CapEx ${cur}${(bud.capex||0).toLocaleString()}`}></div>
              <div style={{width:`${(bud.workingCapital||0)/master*100}%`,background:'var(--a4)'}} title={`Working Capital ${cur}${(bud.workingCapital||0).toLocaleString()}`}></div>
              <div style={{width:`${(fin.reserve||0)/master*100}%`,background:'var(--gn)'}} title={`Reserve ${cur}${(fin.reserve||0).toLocaleString()}`}></div>
              <div style={{flex:1,background:unallocated<0?'var(--dg)':'var(--bg3)'}} title={unallocated<0?`OVER-ALLOCATED by ${cur}${(-unallocated).toLocaleString()}`:`Unallocated ${cur}${unallocated.toLocaleString()}`}></div>
            </>}
          </div>
          <div style={{display:'flex',gap:12,marginTop:4,fontSize:9,fontFamily:'var(--font-mono)',flexWrap:'wrap'}}>
            <span><span style={{display:'inline-block',width:10,height:10,background:'var(--a2)',marginRight:3,verticalAlign:'middle'}}></span>Procurement {master>0?((bud.procurement||0)/master*100).toFixed(1):'0'}%</span>
            <span><span style={{display:'inline-block',width:10,height:10,background:'var(--a3)',marginRight:3,verticalAlign:'middle'}}></span>CapEx {master>0?((bud.capex||0)/master*100).toFixed(1):'0'}%</span>
            <span><span style={{display:'inline-block',width:10,height:10,background:'var(--a4)',marginRight:3,verticalAlign:'middle'}}></span>WC {master>0?((bud.workingCapital||0)/master*100).toFixed(1):'0'}%</span>
            <span><span style={{display:'inline-block',width:10,height:10,background:'var(--gn)',marginRight:3,verticalAlign:'middle'}}></span>Reserve {master>0?((fin.reserve||0)/master*100).toFixed(1):'0'}%</span>
            <span style={{marginLeft:'auto',color:util>95?'var(--a4)':'var(--tx3)'}}>Utilization: {util.toFixed(1)}%</span>
          </div>
          {unallocated<0&&<div style={{fontSize:10,color:'var(--dg)',marginTop:4,fontWeight:600}}>⚠ Allocations exceed master budget by {cur}{(-unallocated).toLocaleString()} — reduce a line or raise equity/debt.</div>}
        </div>
        <div style={{padding:8,background:'rgba(0,212,170,.04)',border:'2px solid var(--ac)'}}>
          <div style={{fontSize:9,color:'var(--tx3)',fontWeight:700,letterSpacing:.4,marginBottom:4}}>COMPUTED WACC (auto-fills NPV discount rate)</div>
          <div className="grid4">
            <Field label="Equity Weight" hint={"Wₑ = Equity / (Equity + Debt). At 30/70 debt-heavy cap structure, lower Wₑ pulls WACC down toward Kd."}><input value={`${(wE*100).toFixed(1)}%`} readOnly style={{color:'var(--a2)',fontWeight:700,fontFamily:'var(--font-mono)'}}/></Field>
            <Field label="Debt Weight" hint={"W_d = Debt / (Equity + Debt). High W_d lowers WACC but raises financial-distress risk."}><input value={`${(wD*100).toFixed(1)}%`} readOnly style={{color:'var(--a3)',fontWeight:700,fontFamily:'var(--font-mono)'}}/></Field>
            <Field label="After-tax Kd" hint={`Kd × (1 − t) = ${fin.costOfDebt||intRate}% × (1 − ${tax}/100). Debt interest is tax-deductible — hence cheaper than pre-tax rate.\n\nFor this firm: ${afterTaxKd}%`}><input value={`${afterTaxKd}%`} readOnly style={{color:'var(--a4)',fontWeight:700,fontFamily:'var(--font-mono)'}}/></Field>
            <Field label="WACC" hint={`WACC = (E/V × Ke) + (D/V × Kd × (1−t))\n\n= ${(wE*100).toFixed(1)}% × ${fin.costOfEquity||0}% + ${(wD*100).toFixed(1)}% × ${afterTaxKd}%\n\n= ${waccCalc}%\n\nThis is your NPV hurdle rate. Projects with IRR > WACC create value.`}><input value={`${waccCalc}%`} readOnly style={{color:'var(--ac)',fontWeight:800,fontSize:14,fontFamily:'var(--font-mono)'}}/></Field>
          </div>
          <div style={{display:'flex',gap:6,marginTop:6,flexWrap:'wrap'}}>
            <button className="btn btn-primary btn-sm" style={{fontSize:10}} onClick={()=>{dispatch({type:'SET_CONFIG',payload:{wacc:+waccCalc}});}}>⚡ Use as default WACC ({waccCalc}%)</button>
            <button className="btn btn-secondary btn-sm" style={{fontSize:10}} onClick={()=>setNpvForm(f=>({...f,wacc:+waccCalc}))}>→ Apply to NPV calculator below</button>
            {/* Pillar 14 — BVL now reads state.config.wacc directly; explicit "Apply to BVL" removed. Any WACC value set on the registry flows through immediately. */}
          </div>
          <div style={{fontSize:10,color:'var(--tx2)',marginTop:6,padding:6,background:'var(--bg)',border:'1px dashed var(--br)',lineHeight:1.5}}>
            <strong>Formulas (expand for derivation):</strong><br/>
            <code style={{fontSize:9,color:'var(--a2)'}}>WACC = (E/V)×Ke + (D/V)×Kd×(1−t)</code> where V = E + D<br/>
            <code style={{fontSize:9,color:'var(--a3)'}}>Interest = D × avg_IR</code> · <code style={{fontSize:9,color:'var(--a3)'}}>After-tax Kd = Kd × (1−t)</code><br/>
            <code style={{fontSize:9,color:'var(--a4)'}}>NPV = −CapEx + Σ(CF_t / (1+WACC)^t)</code> · <code style={{fontSize:9,color:'var(--a4)'}}>IRR solves NPV = 0</code><br/>
            <code style={{fontSize:9,color:'var(--gn)'}}>Ke (CAPM) = Rf + β × (Rm − Rf)</code> · <code style={{fontSize:9,color:'var(--gn)'}}>D/E = Debt / Equity</code>
          </div>
        </div>
      </div>;
    })()}

    {/* WACC Calculator */}
    <div className="card">
      <div className="card-title">📐 WACC Calculator <span className="badge" style={{background:'rgba(167,139,250,.1)',color:'var(--a3)'}}>Scratchpad — independent of master budget</span></div>
      <div style={{fontSize:10,color:'var(--tx3)',marginBottom:6}}>Use the Master Budget card above for your "live" WACC. This calculator lets you stress-test alternate capital structures without touching the real state.</div>
      <div className="grid4">
        <Field label="Equity % of Capital"><NumInput value={waccForm.equity_pct} onChange={v=>setWaccForm(f=>({...f,equity_pct:v,debt_pct:100-e.target.value}))}/></Field>
        <Field label="Debt % of Capital"><NumInput value={waccForm.debt_pct} onChange={v=>setWaccForm(f=>({...f,debt_pct:v,equity_pct:100-e.target.value}))}/></Field>
        <Field label="Cost of Equity %"><NumInput step="0.1" value={waccForm.cost_equity} onChange={v=>setWaccForm(f=>({...f,cost_equity:v}))}/></Field>
        <Field label="Cost of Debt % (pre-tax)"><NumInput step="0.1" value={waccForm.cost_debt} onChange={v=>setWaccForm(f=>({...f,cost_debt:v}))}/></Field>
      </div>
      <button className="btn btn-primary btn-sm" onClick={calcWACC}>Calculate WACC</button>
      {waccResult&&<div className="kpi-row" style={{marginTop:8}}>
        <KPI label="WACC" value={`${waccResult.wacc}%`} sub={`Equity: ${waccResult.equity_component}% + Debt: ${waccResult.debt_component}%`}/>
      </div>}
    </div>

    {/* NPV Calculator — Pillar 11 */}
    <div className="card">
      <div className="card-title">💎 NPV / IRR Calculator <span className="badge" style={{background:'rgba(63,185,80,.1)',color:'var(--gn)'}}>Pillar 11 · Client-side · Monthly/Quarterly/Yearly</span></div>
      <div className="grid3">
        <Field label="Cash Flows (comma separated)" hint="Period-0 first (usually negative investment), then N periods of returns. Cash flow units match the horizon selector."><input value={npvForm.cash_flows} onChange={e=>setNpvForm(f=>({...f,cash_flows:e.target.value}))}/></Field>
        <Field label="Discount Rate / WACC (%)" hint={`Seeded from Tab 1 registry (${state.config.wacc}%). Edit here for what-if; registry unchanged.`}><NumInput step="0.1" value={npvForm.wacc} onChange={v=>setNpvForm(f=>({...f,wacc:v}))}/></Field>
        <Field label="Horizon" hint="Monthly = flows are monthly, rate divided by 12. Quarterly = /4. Yearly = annual.">
          <select value={npvForm.periodsPerYear} onChange={e=>setNpvForm(f=>({...f,periodsPerYear:+e.target.value}))}>
            <option value={1}>Yearly</option>
            <option value={4}>Quarterly</option>
            <option value={12}>Monthly</option>
          </select>
        </Field>
      </div>
      <div style={{display:'flex',gap:8,alignItems:'center',marginTop:4}}>
        <button className="btn btn-primary btn-sm" onClick={calcNPV}>Calculate NPV</button>
        {npvAudit&&npvAudit.npv!=null&&<span style={{fontSize:9,color:Math.abs((+npvAudit.npv||0)-(npvResult?.npv||0))<0.5?'var(--gn)':'var(--a4)',fontFamily:'JetBrains Mono'}}>Backend audit: {cur}{(+npvAudit.npv||0).toLocaleString()}{Math.abs((+npvAudit.npv||0)-(npvResult?.npv||0))<0.5?' ✓ match':' ⚠ drift'}</span>}
        {!npvAudit&&npvResult&&<span style={{fontSize:9,color:'var(--tx3)',fontFamily:'JetBrains Mono'}}>(offline — client-side result is authoritative)</span>}
      </div>
      {npvResult&&!npvResult.error&&<div style={{marginTop:8}}>
        <div className="kpi-row">
          <KPI label="NPV" value={`${cur}${npvResult.npv?.toLocaleString()}`} sub={npvResult.npv>0?'Value creating':'Value destroying'} color={npvResult.npv>0?'var(--gn)':'var(--dg)'}/>
          <KPI label="IRR" value={npvResult.irr!==null?`${npvResult.irr}%`:'N/A'} sub={npvResult.irr>npvForm.wacc?`>${npvForm.wacc}% hurdle ✓`:`<${npvForm.wacc}% hurdle ✗`} color={npvResult.irr>npvForm.wacc?'var(--gn)':'var(--dg)'}/>
          <KPI label="Payback" value={npvResult.payback_discounted!==null?`${npvResult.payback_discounted} yrs`:'Never'} sub="discounted" color="var(--a2)"/>
          <KPI label="Decision" value={npvResult.decision} color={npvResult.decision==='INVEST'?'var(--gn)':'var(--dg)'}/>
        </div>
        {(()=>{
          const cfs=npvForm.cash_flows.split(',').map(Number);
          const r=npvForm.wacc/100;
          let cum=0;
          const bars=cfs.map((cf,t)=>{const pv=cf/Math.pow(1+r,t);cum+=pv;return{label:t===0?'Y0':`Y${t}`,value:Math.round(pv),color:cf>=0?'var(--gn)':'var(--dg)',cum:Math.round(cum)};});
          return <div style={{marginTop:10,padding:8,background:'var(--bg2)',border:'1px solid var(--br2)'}}>
            <div style={{fontSize:10,fontWeight:700,color:'var(--tx2)',marginBottom:4,letterSpacing:.3,fontFamily:'JetBrains Mono'}}>DISCOUNTED CASH FLOWS @ {npvForm.wacc}%</div>
            <YearBars data={bars} color="var(--gn)" negColor="var(--dg)" h={54} fmt={v=>Math.abs(v)>=1000?(v/1000).toFixed(1)+'k':v.toString()}/>
            <div style={{fontSize:9,color:'var(--tx3)',marginTop:4,fontFamily:'JetBrains Mono'}}>Cumulative PV crosses zero at Y{bars.findIndex(b=>b.cum>0)<0?'—':bars.findIndex(b=>b.cum>0)} (payback). Final Σ PV = {cur}{bars[bars.length-1]?.cum?.toLocaleString()}</div>
          </div>;
        })()}
        <div style={{fontSize:10,color:'var(--tx3)',marginTop:4}}>Rule: NPV {'>'} 0 AND IRR {'>'} WACC → INVEST. NPV = Σ(CF_t / (1+r)^t)</div>
      </div>}
    </div>

    {/* Depreciation Calculator — Pillar 11 */}
    <div className="card">
      <div className="card-title">📉 Asset Depreciation Calculator <span className="badge" style={{background:'rgba(56,189,248,.1)',color:'var(--a2)'}}>IAS 16 · Pillar 11 · client-side</span></div>
      <div className="grid4">
        <Field label="Purchase Price"><NumInput value={deprForm.purchase_price} onChange={v=>setDeprForm(f=>({...f,purchase_price:v}))}/></Field>
        <Field label="Residual Value" hint="3 common conventions (click Suggest to auto-fill): (1) Market quote — current used-equipment listing (best when a liquid secondhand market exists). (2) Salvage 5% — Indian tax statute convention; use as conservative floor. (3) Engineering estimate — WDV-style depreciation for 0.9 × useful_life years (most realistic for depreciating machinery)."><NumInput value={deprForm.residual_value} onChange={v=>setDeprForm(f=>({...f,residual_value:v}))}/></Field>
        <Field label="Useful Life (years)"><NumInput value={deprForm.useful_life} onChange={v=>setDeprForm(f=>({...f,useful_life:v}))}/></Field>
        <Field label="Method"><select value={deprForm.method} onChange={e=>setDeprForm(f=>({...f,method:e.target.value}))}><option value="SLM">Straight-Line (SLM)</option><option value="WDV">Written Down Value (WDV)</option><option value="UoP">Units of Production</option></select></Field>
        {deprForm.method==='WDV'&&<Field label="WDV Rate %"><NumInput value={deprForm.wdv_rate} onChange={v=>setDeprForm(f=>({...f,wdv_rate:v}))}/></Field>}
        {deprForm.method==='UoP'&&<><Field label="Total Lifetime Units"><NumInput value={deprForm.total_units} onChange={v=>setDeprForm(f=>({...f,total_units:v}))}/></Field>
        <Field label="Annual Units (comma sep)"><input value={deprForm.annual_units} onChange={e=>setDeprForm(f=>({...f,annual_units:e.target.value}))}/></Field></>}
      </div>
      {(()=>{const sug=depreciationResidualSuggest();return <div style={{marginTop:6,padding:6,background:'var(--bg3)',borderRadius:3,fontSize:10,color:'var(--tx2)'}}>
        <strong style={{color:'var(--a2)'}}>Residual-value suggest:</strong>{' '}
        <button className="btn btn-secondary btn-sm" style={{fontSize:9,marginRight:4}} onClick={()=>setDeprForm(f=>({...f,residual_value:sug.market}))}>Market ({cur}{sug.market.toLocaleString()})</button>
        <button className="btn btn-secondary btn-sm" style={{fontSize:9,marginRight:4}} onClick={()=>setDeprForm(f=>({...f,residual_value:sug.salvage5pct}))}>Salvage 5% ({cur}{sug.salvage5pct.toLocaleString()})</button>
        <button className="btn btn-secondary btn-sm" style={{fontSize:9}} onClick={()=>setDeprForm(f=>({...f,residual_value:sug.engineering}))}>Engineering ({cur}{sug.engineering.toLocaleString()})</button>
      </div>;})()}
      <div style={{display:'flex',gap:8,alignItems:'center',marginTop:6}}>
        <button className="btn btn-primary btn-sm" onClick={calcDepr}>Calculate Depreciation</button>
        {deprAudit&&deprAudit.schedule&&<span style={{fontSize:9,color:'var(--gn)',fontFamily:'JetBrains Mono'}}>✓ Backend audit matches</span>}
        {!deprAudit&&deprResult&&<span style={{fontSize:9,color:'var(--tx3)',fontFamily:'JetBrains Mono'}}>(offline — client-side result is authoritative)</span>}
      </div>
      {deprResult&&deprResult.schedule&&<div style={{marginTop:8}}>
        <div style={{fontSize:10,color:'var(--tx2)',marginBottom:4}}>Depreciable amount: {cur}{deprResult.depreciable_amount?.toLocaleString()} | Method: {deprResult.method}</div>
        <div style={{overflowX:'auto',maxHeight:200}}>
          <table className="data-table">
            <thead><tr><th>Year</th>{deprForm.method==='UoP'&&<th>Units</th>}<th>Depreciation</th><th>Book Value</th><th>Tax Shield ({state.config.taxRate}%)</th></tr></thead>
            <tbody>{deprResult.schedule.map(s=><tr key={s.year}>
              <td>{s.year}</td>
              {deprForm.method==='UoP'&&<td className="num">{s.units?.toLocaleString()}</td>}
              <td className="num" style={{color:'var(--a4)'}}>{cur}{s.depreciation?.toLocaleString()}</td>
              <td className="num">{cur}{s.book_value?.toLocaleString()}</td>
              <td className="num" style={{color:'var(--gn)'}}>{cur}{Math.round(s.depreciation*state.config.taxRate/100).toLocaleString()}</td>
            </tr>)}</tbody>
          </table>
        </div>
        {deprResult.schedule.length>1&&<div style={{height:160,marginTop:8}}>
          <ResponsiveContainer width="100%" height="100%">
            <ComposedChart data={deprResult.schedule.map(s=>({year:`Yr${s.year}`,dep:s.depreciation,bv:s.book_value}))}>
              <CartesianGrid strokeDasharray="3 3" stroke="#21262d"/>
              <XAxis dataKey="year" tick={{fill:'#8b949e',fontSize:9}} stroke="#21262d"/>
              <YAxis tick={{fill:'#8b949e',fontSize:9}} stroke="#21262d"/>
              <Tooltip contentStyle={{background:'#1c2333',border:'1px solid #30363d',borderRadius:4,fontSize:10}}/>
              <Bar dataKey="dep" fill="#f0b429" opacity={0.6} name="Depreciation"/>
              <Line type="monotone" dataKey="bv" stroke="#38bdf8" strokeWidth={2} dot={false} name="Book Value"/>
            </ComposedChart>
          </ResponsiveContainer>
        </div>}
      </div>}
    </div>

    {/* Pillar 11 Advanced — Plan NPV from MPS × demand × price − procurement − capex */}
    {(()=>{
      const w=+state.config.wacc||0;
      const T=periodCount(state.planning);
      const grain=state.planning.timeGrain||'weekly';
      const ppy={daily:365,weekly:52,monthly:12}[grain]||52;
      const periodRate=(w/100)/ppy;
      const flows=[-((+state.budget.capex||0))];
      const matCostPerUnit=p=>(p.bom||[]).reduce((a,b)=>a+((+b.cost||0)*(+b.qtyPer||0)),0);
      const rev=state.products.map(p=>demandByPeriod(p,state.planning).map(d=>d*((+p.sellPrice||0)-(+p.variableCost||0)-matCostPerUnit(p))));
      // Net per-period margin, less procurement spend per period (even split of annual budget)
      const procPerPeriod=(+state.budget.procurement||0)/ppy;
      for(let t=1;t<=T;t++){
        const periodRev=rev.reduce((a,arr)=>a+(arr[t-1]||0),0);
        flows.push(Math.round(periodRev-procPerPeriod));
      }
      const r=periodRate;
      let pv=flows[0],cum=[flows[0]];
      for(let t=1;t<flows.length;t++){pv+=flows[t]/Math.pow(1+r,t);cum.push(Math.round(pv));}
      const planNPV=Math.round(pv);
      const breakEven=cum.findIndex(v=>v>=0);
      // Sensitivity bars (simple 1-way)
      const baseNPV=planNPV;
      const sens=(factor,key)=>{
        let f=flows.slice();
        if(key==='wacc'){const r2=((w*factor)/100)/ppy;let p2=f[0];for(let t=1;t<f.length;t++)p2+=f[t]/Math.pow(1+r2,t);return Math.round(p2);}
        if(key==='demand'){f=[f[0],...f.slice(1).map(v=>Math.round(v*factor))];let p2=f[0];for(let t=1;t<f.length;t++)p2+=f[t]/Math.pow(1+r,t);return Math.round(p2);}
        if(key==='mat'){const delta=Math.round((+state.budget.procurement||0)*(factor-1)/ppy);f=[f[0],...f.slice(1).map(v=>v-delta)];let p2=f[0];for(let t=1;t<f.length;t++)p2+=f[t]/Math.pow(1+r,t);return Math.round(p2);}
        return baseNPV;
      };
      const tornado=[
        {label:'WACC +2%',value:sens(1.02/(w/100),'wacc')-baseNPV},
        {label:'WACC −2%',value:sens(0.98/(w/100),'wacc')-baseNPV},
        {label:'Demand +20%',value:sens(1.2,'demand')-baseNPV},
        {label:'Demand −20%',value:sens(0.8,'demand')-baseNPV},
        {label:'Mat cost +10%',value:sens(1.1,'mat')-baseNPV},
        {label:'Mat cost −10%',value:sens(0.9,'mat')-baseNPV}
      ];
      const applyBudgetSplit=()=>{
        const totalCF=flows.slice(1).reduce((a,b)=>a+Math.max(b,0),0);
        if(totalCF<=0)return;
        dispatch({type:'SET_BUDGET',payload:{procurement:Math.round(totalCF*0.55),capex:Math.round(totalCF*0.12),logistics:Math.round(totalCF*0.08),marketing:Math.round(totalCF*0.05),scmOpex:Math.round(totalCF*0.04),reserve:Math.round(totalCF*0.06)}});
      };
      return <div className="card" style={{borderLeft:'3px solid var(--gn)'}}>
        <div className="card-title">📈 Plan NPV — MPS-driven <span className="badge" style={{background:'rgba(63,185,80,.1)',color:'var(--gn)'}}>Pillar 11 Advanced</span><span style={{marginLeft:'auto',fontSize:10,fontFamily:'JetBrains Mono',color:planNPV>0?'var(--gn)':'var(--dg)'}}>NPV = {cur}{planNPV.toLocaleString()}</span></div>
        <div style={{fontSize:10,color:'var(--tx3)',marginBottom:8}}>Cash flows built from: <code>demandByPeriod(p, planning) × (sellPrice − variableCost − materialCost) − procurement_per_period</code>, period-0 = −CAPEX. Discounted at registry WACC ({w}%) over {T} {grain} periods.</div>
        <div className="kpi-row">
          <KPI label="Plan NPV" value={`${cur}${planNPV.toLocaleString()}`} sub={planNPV>0?'Budget deployment value-accretive':'Budget deployment destroying value'} color={planNPV>0?'var(--gn)':'var(--dg)'}/>
          <KPI label="Break-even Period" value={breakEven>=0?`${breakEven} ${grain}`:'Never'} sub="cum. PV turns positive" color="var(--a2)"/>
          <KPI label="Discount Rate" value={`${w}% / yr`} sub={`${(periodRate*100).toFixed(3)}% per ${grain.slice(0,-2)}`}/>
          <KPI label="CAPEX (Y0)" value={`${cur}${(+state.budget.capex||0).toLocaleString()}`} sub="From budget registry" color="var(--a4)"/>
        </div>
        <div style={{marginTop:8}}>
          <div style={{fontSize:10,fontWeight:700,color:'var(--tx2)',marginBottom:4,letterSpacing:.3,fontFamily:'JetBrains Mono'}}>SENSITIVITY (Δ NPV vs base)</div>
          <div style={{display:'flex',flexDirection:'column',gap:2}}>
            {tornado.map((b,i)=>{const maxAbs=Math.max(...tornado.map(x=>Math.abs(x.value)),1);const pct=Math.abs(b.value)/maxAbs*100;return <div key={i} style={{display:'flex',alignItems:'center',gap:6,fontSize:10}}>
              <span style={{width:120,color:'var(--tx2)'}}>{b.label}</span>
              <div style={{flex:1,height:14,background:'var(--bg3)',borderRadius:2,position:'relative',border:'1px solid var(--br)'}}>
                <div style={{position:'absolute',left:'50%',top:0,bottom:0,width:1,background:'var(--tx3)'}}/>
                <div style={{position:'absolute',top:1,bottom:1,[b.value>=0?'left':'right']:'50%',width:`${pct/2}%`,background:b.value>=0?'var(--gn)':'var(--dg)',opacity:0.7,borderRadius:1}}/>
              </div>
              <span style={{width:100,textAlign:'right',fontFamily:'JetBrains Mono',color:b.value>=0?'var(--gn)':'var(--dg)'}}>{b.value>=0?'+':''}{cur}{b.value.toLocaleString()}</span>
            </div>;})}
          </div>
        </div>
        <div style={{marginTop:8,padding:8,background:'var(--bg3)',borderRadius:4,fontSize:10,fontFamily:'JetBrains Mono',color:'var(--tx2)',lineHeight:1.6}}>
          <strong style={{color:'var(--ac)'}}>Formula:</strong> Plan NPV = −CAPEX₀ + Σ<sub>t=1..{T}</sub> (Σ<sub>k</sub>(demand<sub>k,t</sub> × margin<sub>k</sub>) − proc<sub>t</sub>) / (1+WACC/ppy)<sup>t</sup><br/>
          ppy = {ppy} · periods = {T} · CAPEX = {cur}{(+state.budget.capex||0).toLocaleString()} · per-period procurement = {cur}{Math.round(procPerPeriod).toLocaleString()}
        </div>
        <div style={{marginTop:8}}>
          <button className="btn btn-secondary btn-sm" onClick={applyBudgetSplit} disabled={planNPV<=0}>Apply suggested budget split from Plan NPV →</button>
        </div>
      </div>;
    })()}
  </div>
}

// ─── TAB 6: ANALYSIS & REPORTS ───
function AnalysisTab({state,dispatch}){
  const cur=state.config.currency;
  const [mcResult,setMcResult]=useState(null);
  const [sensResult,setSensResult]=useState(null);
  const [researchResult,setResearchResult]=useState(null);
  const [mcRuns,setMcRuns]=useState(1000);
  const [researchN,setResearchN]=useState(200);
  const [loading,setLoading]=useState('');
  const [alerts,setAlerts]=useState([]);
  const [evm,setEvm]=useState({bac:1000000,pctPlanned:40,pctActual:35,actualCost:380000});
  const [wiQuery,setWiQuery]=useState('');
  const [wiResult,setWiResult]=useState(null);
  const [wiLoading,setWiLoading]=useState(false);

  const buildPayload=()=>({
    products:state.products.map(p=>({
      name:p.name,demand:demandByPeriod(p,state.planning),
      capacity:p.capacity,setup_cost:p.setupCost,variable_cost:p.variableCost,sell_price:p.sellPrice,shelf_life_days:p.shelfLife,shelf_life_periods:shelfLifeToPeriods(p.shelfLife,state.planning),shelf_life:shelfLifeToPeriods(p.shelfLife,state.planning),demand_mode:p.demandMode||"mts-weekly",milk_run_per_period:milkRunPerPeriod(p),actuals_override:(p.actuals||null),yield_pct:p.yieldPct,init_inventory:p.initInventory,mape_pct:15,
      parts:p.bom.map(b=>({name:b.name,cost:b.cost,qty_per:b.qtyPer,cost_cv:0.05,lead_time:b.leadTime,moq:b.moq,max_order:b.maxOrder,hold_pct:b.holdPct,ordering_cost:b.orderingCost})),
    })),
    params:{periods:periodCount(state.planning),time_grain:state.planning.timeGrain||"weekly",horizon_start_date:state.planning.horizonStartDate||null,holidays:(state.planning.holidays||[]).map(h=>h.date),working_capital:+(state.budget&&state.budget.workingCapital)||0,carry_rate:0.24,service_level:state.config.serviceLevel},
  });

  const runMC=async()=>{
    setLoading('mc');
    try{const r=await fetch('/api/solve/montecarlo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...buildPayload(),n_runs:mcRuns})});setMcResult(await r.json())}catch(e){}
    setLoading('');
  };

  const runSens=async()=>{
    setLoading('sens');
    try{const r=await fetch('/api/solve/sensitivity',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      base_data:buildPayload(),
      param_ranges:{
        'service_level':[0.85,0.90,0.95,0.99],
        'carry_rate':[0.15,0.20,0.24,0.30,0.40],
      },
    })});setSensResult(await r.json())}catch(e){}
    setLoading('');
  };

  const runResearch=async(mode)=>{
    setLoading('research');
    try{const r=await fetch('/api/solve/researcher',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({base_data:buildPayload(),mode:mode||'fixed',n_experiments:researchN})});setResearchResult(await r.json())}catch(e){}
    setLoading('');
  };

  // P5 — Control Tower: horizon-scoped alerts wired to solver outputs + recommended actions.
  // Alert shape: {sev, msg, period?, zone, actions?:[{label, impact}], source}
  const [alertScope,setAlertScope]=useState('all'); // all | frozen | slushy | open | global
  useEffect(()=>{
    const a=[];
    const fz=state.planning.frozenWeeks||4;
    const sl=state.planning.slushyWeeks||12;
    const T=periodCount(state.planning);
    const zoneOf=(t)=>t==null?'global':t<fz?'frozen':t<sl?'slushy':'open';
    const proc=state.solverResults?.procurement;
    const procProducts=Array.isArray(proc?.products)?proc.products:null;

    // Static (config) alerts — horizon-wide unless tied to a period
    state.products.forEach(p=>{
      if(p.shelfLife<8)a.push({sev:'warn',msg:`${p.name}: short shelf life (${p.shelfLife} days) — high expiry risk`,period:null,zone:'global',source:'config',
        actions:[{label:'Switch to daily grain',impact:'Exact shelf-life modeling (no period rounding)'},{label:'Reduce safety stock',impact:`-${Math.round((p.history||[]).reduce((s,v)=>s+(+v||0),0)/52*0.1)}u/wk avg inventory`}]});
      if(p.bom.length===1)a.push({sev:'info',msg:`${p.name}: single-source on ${p.bom[0].name} — concentration risk`,period:null,zone:'global',source:'config',
        actions:[{label:'Add backup supplier in BOM',impact:'Activates auto-failover (P6)'}]});
      p.bom.forEach(b=>{
        if(b.leadTime>4)a.push({sev:'warn',msg:`${p.name}/${b.name}: long lead time (${b.leadTime}wk) — maintain higher safety stock`,period:null,zone:'global',source:'config',
          actions:[{label:'Increase SS for this part',impact:`+${Math.ceil((b.leadTime/4-1)*5)}u of buffer at z=${(state.config.serviceLevel*1.645).toFixed(2)}σ`}]});
        if(b.supplierType==='import'&&!b.incoterm)a.push({sev:'info',msg:`${p.name}/${b.name}: import part without Incoterm set`,period:null,zone:'global',source:'config'});
      });
      const avgDemand=(p.history||[]).reduce((s,v)=>s+(+v||0),0)/12;
      if(p.capacity*4<avgDemand){
        const gap=Math.round(avgDemand-p.capacity*4);
        a.push({sev:'critical',msg:`${p.name}: monthly capacity (${p.capacity*4}) < avg demand (${Math.round(avgDemand)}) — gap ${gap}u/mo`,period:null,zone:'global',source:'config',
          actions:[
            {label:'+1 shift',impact:`+${Math.round(p.capacity*0.5)}u/wk capacity at +${state.config.currency}${Math.round((state.production.lines[0]?.hoursPerShift||8)*(state.production.lines[0]?.shiftsPerDay||1)*50)}/wk OT`},
            {label:'Outsource bottleneck stage',impact:`Capacity uplift; cost = part cost × (1+OS premium)`},
            {label:'Reduce service level',impact:`SS shrinks ~${Math.round((state.config.serviceLevel*100-90))}% with SL drop to 90%`},
          ]});
      }
    });

    // P5 — Solver-output-driven alerts (capacity shortage, fill rate, shortages).
    if(procProducts){
      procProducts.forEach((sp,k)=>{
        const skuName=sp.name||`SKU#${k+1}`;
        // total fill rate < 100% → flag
        if(typeof sp.fill_rate==='number'&&sp.fill_rate<100){
          a.push({sev:sp.fill_rate<90?'critical':'warn',msg:`${skuName}: solver fill rate ${sp.fill_rate}% (${sp.total_short||0}u short over horizon)`,period:null,zone:'global',source:'solver',
            actions:[
              {label:'Re-run with higher capacity',impact:`Try capacity +25%`},
              {label:'Allow backorders',impact:`Set product.backorderOn=true and re-solve`},
            ]});
        }
        // Per-period shortages → period-tagged alerts (only if non-zero)
        const prodArr=sp.production||[];
        const demArr=sp.demand||[];
        const shortArr=sp.shortage||sp.short||[];
        for(let t=0;t<Math.min(prodArr.length,T);t++){
          const sh=shortArr[t]||0;
          if(sh>0){
            const zone=zoneOf(t);
            const sevByZone=zone==='frozen'?'critical':zone==='slushy'?'warn':'info';
            a.push({sev:sevByZone,msg:`${skuName}: shortage ${Math.round(sh)}u at period ${t+1}`,period:t,zone,source:'solver',
              actions:zone==='frozen'?[{label:'URGENT: outsource or expedite',impact:'Frozen-period gap — only outsourcing or air freight can plug.'}]
                :zone==='slushy'?[{label:'+1 shift in periods t-1..t',impact:`+${Math.round((state.products[k]?.capacity||50)*0.5)}u/wk before deadline`},{label:'Push demand 1 period',impact:'Backorder cost ≈ short × sellPrice × 0.1'}]
                :[{label:'Increase capacity from period t-2',impact:`Re-solve with capacity +${Math.round(sh/2)}u/wk`},{label:'Reduce safety stock',impact:`Frees up ~${Math.round((state.products[k]?.capacity||50)*0.1)}u of inventory`}],
            });
          }
          // Capacity-bound period (production hits its cap) → capacity-shortage alert
          const cap=(state.products[k]?.capacity||50);
          if(prodArr[t]>=cap*0.99&&(demArr[t]||0)>cap){
            const zone=zoneOf(t);
            const sevByZone=zone==='frozen'?'critical':zone==='slushy'?'warn':'info';
            a.push({sev:sevByZone,msg:`${skuName}: at-capacity at period ${t+1} (${prodArr[t]}/${cap}u, demand ${demArr[t]||0})`,period:t,zone,source:'solver',
              actions:[
                {label:'+1 shift',impact:`+${Math.round(cap*0.5)}u/wk at +${state.config.currency}${Math.round((state.production.lines[0]?.hoursPerShift||8)*50)}/wk OT`},
                {label:'Outsource bottleneck stage',impact:`Capacity uplift via stage.outsourceCostPerUnit`},
              ]});
          }
        }
      });
    }

    // Replan anchor banner
    if(state.planning.replanFromPeriod!=null){
      const t=state.planning.replanFromPeriod;
      a.push({sev:'info',msg:`Replan anchor active: solver will lock periods 1..${t} (committed actuals) and re-optimise from period ${t+1}`,period:t,zone:zoneOf(t),source:'config',
        actions:[{label:'Run procurement (Tab 9)',impact:`Re-solve forward periods with locked actuals_override`}]});
    }
    setAlerts(a);
  },[state.products,state.solverResults,state.planning.frozenWeeks,state.planning.slushyWeeks,state.planning.replanFromPeriod]);

  return <div className="animate-in">
    <ScenarioComparePanel state={state}/>
    {/* P5 — Control Tower with horizon-scope filter, zone tags, recommended actions */}
    <div className="card">
      <div className="card-title">🚨 Control Tower <span className="badge" style={{background:alerts.some(a=>a.sev==='critical')?'rgba(248,81,73,.15)':'rgba(63,185,80,.15)',color:alerts.some(a=>a.sev==='critical')?'var(--dg)':'var(--gn)'}}>{alerts.length} alerts</span><SectionInfo><strong>What it does:</strong> Live alert feed combining static config checks (shelf life, single-source, lead time) with solver outputs (fill rate, capacity-bound periods, shortages).<br/><br/><strong>Horizon zones:</strong><br/>• <span style={{color:'var(--dg)'}}>🔒 Frozen</span> ({state.planning.frozenWeeks||4}wk) — production locked. Alerts here are URGENT-UNACTIONABLE; only outsource/expedite can help.<br/>• <span style={{color:'var(--a4)'}}>🟡 Slushy</span> ({(state.planning.slushyWeeks||12)-(state.planning.frozenWeeks||4)}wk) — overrides accepted with approval.<br/>• <span style={{color:'var(--gn)'}}>🟢 Open</span> — fully plannable.<br/>• 🌐 Global — horizon-wide alerts not tied to a specific period.<br/><br/><strong>Recommended actions</strong> include impact estimates derived from your line config (shifts × hours × OT mult).</SectionInfo></div>
      {/* Scope filter */}
      <div style={{display:'flex',gap:6,marginBottom:8,alignItems:'center',flexWrap:'wrap',fontSize:10}}>
        <span style={{color:'var(--tx3)',fontWeight:600,letterSpacing:.4}}>SCOPE:</span>
        {[['all','All'],['frozen','🔒 Frozen'],['slushy','🟡 Slushy'],['open','🟢 Open'],['global','🌐 Global']].map(([k,lbl])=>{
          const cnt=k==='all'?alerts.length:alerts.filter(a=>a.zone===k).length;
          return <button key={k} className={`btn btn-sm ${alertScope===k?'btn-primary':'btn-secondary'}`} onClick={()=>setAlertScope(k)} style={{fontSize:10,padding:'3px 8px'}}>{lbl} ({cnt})</button>;
        })}
        <span style={{marginLeft:'auto',color:'var(--tx3)',fontSize:9}}>Frozen={state.planning.frozenWeeks||4}wk · Slushy={(state.planning.slushyWeeks||12)-(state.planning.frozenWeeks||4)}wk</span>
      </div>
      {(()=>{
        const filtered=alertScope==='all'?alerts:alerts.filter(a=>a.zone===alertScope);
        if(filtered.length===0)return <div style={{color:'var(--gn)',fontSize:11,padding:'8px 6px'}}>✅ No alerts in this scope</div>;
        return filtered.map((a,i)=>{
          const sevColor=a.sev==='critical'?'var(--dg)':a.sev==='warn'?'var(--a4)':'var(--a2)';
          const sevBg=a.sev==='critical'?'rgba(248,81,73,.06)':a.sev==='warn'?'rgba(240,180,41,.06)':'rgba(56,189,248,.05)';
          const zoneIcon=a.zone==='frozen'?'🔒':a.zone==='slushy'?'🟡':a.zone==='open'?'🟢':'🌐';
          const urgency=a.zone==='frozen'?'URGENT-UNACTIONABLE':a.zone==='slushy'?'ACTIONABLE-WITH-APPROVAL':a.zone==='open'?'ACTIONABLE':'';
          return <div key={i} style={{padding:'6px 8px',marginBottom:4,borderRadius:4,borderLeft:`3px solid ${sevColor}`,background:sevBg,fontSize:11}}>
            <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
              <span>{a.sev==='critical'?'🔴':a.sev==='warn'?'🟡':'🔵'}</span>
              <span style={{flex:1,color:'var(--tx)'}}>{a.msg}</span>
              <span className="badge" style={{background:'rgba(0,0,0,.2)',color:sevColor,fontSize:9}}>{zoneIcon} {a.zone.toUpperCase()}{a.period!=null?` · P${a.period+1}`:''}</span>
              {urgency&&<span style={{fontSize:8,color:sevColor,fontWeight:700,letterSpacing:.4}}>{urgency}</span>}
              <span style={{fontSize:8,color:'var(--tx3)'}}>[{a.source}]</span>
            </div>
            {a.actions&&a.actions.length>0&&<div style={{marginTop:4,paddingTop:4,borderTop:'1px dashed var(--br)',display:'flex',gap:6,flexWrap:'wrap'}}>
              <span style={{fontSize:9,color:'var(--tx3)',fontWeight:600,letterSpacing:.4}}>RECOMMEND:</span>
              {a.actions.map((act,j)=><span key={j} style={{fontSize:10,padding:'2px 6px',background:'var(--bg3)',border:'1px solid var(--br)',borderRadius:3,color:'var(--tx2)'}} title={act.impact}><strong>{act.label}</strong> <span style={{color:'var(--tx3)'}}>· {act.impact}</span></span>)}
            </div>}
          </div>;
        });
      })()}
    </div>

    {/* MC + Sensitivity + Researcher buttons */}
    <div className="card">
      <div className="card-title">🔬 Analysis Engine</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
        <button className="btn btn-primary" onClick={runMC} disabled={!!loading}>{loading==='mc'?'Running MC...':'🎲 Monte Carlo'}</button>
        <span style={{fontSize:10,color:'var(--tx3)'}}>Runs:</span><NumInput value={mcRuns} onChange={v=>setMcRuns(v)} style={{width:60,padding:'4px 6px',fontSize:10}} min={100} max={10000} step={100}/>
        <span style={{margin:'0 8px',color:'var(--br2)'}}>|</span>
        <button className="btn btn-secondary" onClick={runSens} disabled={!!loading}>{loading==='sens'?'Sweeping...':'📊 Sensitivity'}</button>
        <span style={{margin:'0 8px',color:'var(--br2)'}}>|</span>
        <button className="btn btn-secondary" onClick={()=>runResearch('fixed')} disabled={!!loading}>{loading==='research'?'Researching...':'🔬 Researcher (Fixed)'}</button>
        <button className="btn btn-secondary" onClick={()=>runResearch('upgrade')} disabled={!!loading}>🔬 Upgrade</button>
        <span style={{fontSize:10,color:'var(--tx3)'}}>N:</span><NumInput value={researchN} onChange={v=>setResearchN(v)} style={{width:60,padding:'4px 6px',fontSize:10}} min={20} max={500} step={10}/>
      </div>
    </div>

    {/* MC Results */}
    {mcResult&&!mcResult.error&&<div className="card">
      <div className="card-title">🎲 Monte Carlo Results <span className="badge" style={{background:'rgba(248,81,73,.1)',color:'var(--dg)'}}>{mcResult.n_runs} runs · {mcResult.solve_time}s</span></div>
      <div className="kpi-row">
        <KPI label="Avg Cost" value={`${cur}${mcResult.avg_cost?.toLocaleString()}`} sub="expected"/>
        <KPI label="P10" value={`${cur}${mcResult.p10?.toLocaleString()}`} sub="best 10%" color="var(--gn)"/>
        <KPI label="P90" value={`${cur}${mcResult.p90?.toLocaleString()}`} sub="worst 10%" color="var(--a4)"/>
        <KPI label="VaR₉₅" value={`${cur}${mcResult.var95?.toLocaleString()}`} sub="95% confidence" color="var(--dg)"/>
        <KPI label="CVaR₉₅" value={`${cur}${mcResult.cvar95?.toLocaleString()}`} sub="avg worst 5%" color="var(--dg)"/>
        <KPI label="Fragility" value={`${mcResult.fragility}×`} sub={mcResult.fragility<1.3?'Robust':mcResult.fragility<1.8?'Moderate':'Fragile'} color={mcResult.fragility<1.3?'var(--gn)':'var(--dg)'}/>
        <KPI label="Fill Rate" value={`${mcResult.avg_fill}%`} sub={`min: ${mcResult.min_fill}%`} color="var(--a2)"/>
      </div>
      {mcResult.histogram&&<div style={{height:180,marginTop:8}}>
        <ResponsiveContainer width="100%" height="100%">
          <BarChart data={mcResult.histogram.counts.map((c,i)=>({bin:`${cur}${Math.round(mcResult.histogram.bins[i]/1000)}K`,count:c}))}>
            <CartesianGrid strokeDasharray="3 3" stroke="#21262d"/>
            <XAxis dataKey="bin" tick={{fill:'#8b949e',fontSize:8}} stroke="#21262d" interval={2}/>
            <YAxis tick={{fill:'#8b949e',fontSize:9}} stroke="#21262d"/>
            <Tooltip contentStyle={{background:'#1c2333',border:'1px solid #30363d',borderRadius:4,fontSize:10}}/>
            <Bar dataKey="count" fill="#a78bfa" opacity={0.7} name="Frequency"/>
          </BarChart>
        </ResponsiveContainer>
      </div>}
      <div style={{fontSize:9,color:'var(--tx3)',marginTop:4}}>Reading: "95% of the time, annual cost stays below {cur}{mcResult.var95?.toLocaleString()}. In the worst 5%, it averages {cur}{mcResult.cvar95?.toLocaleString()}." Fragility = VaR/Avg = {mcResult.fragility}×</div>
    </div>}

    {/* Sensitivity Results */}
    {sensResult&&sensResult.results&&<div className="card">
      <div className="card-title">📊 Sensitivity Analysis <span className="badge" style={{background:'rgba(167,139,250,.1)',color:'var(--a3)'}}>{sensResult.results.length} scenarios</span></div>
      <table className="data-table">
        <thead><tr><th>Parameter</th><th>Value</th><th>Avg Cost</th><th>VaR₉₅</th><th>Fill %</th></tr></thead>
        <tbody>{sensResult.results.map((r,i)=><tr key={i}>

          const statMape=indices.reduce((s,idx,j)=>s+Math.abs(actuals[j]-(consFcst[idx]||0))/Math.max(actuals[j],1),0)/actuals.length*100;
          // Override MAPE (if overrides exist)

          const ovrMape=overridden?indices.reduce((s,idx,j)=>{

        try{const r=await fetch('/api/whatif',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:wiQuery,context:{products:state.products.map(p=>p.name)}})});setWiResult(await r.json())}catch(e){setWiResult({error:e.message})}
        setWiLoading(false);
      };
      return <div className="card">
        <div className="card-title">🤖 What-If Bot</div>
        <div style={{fontSize:10,color:'var(--tx3)',marginBottom:6}}>Type a scenario in plain English: "material cost up 30%", "demand doubles in Dec", "new supplier with LT=2w at $4/unit", "what if capacity drops 50%"</div>
        <div style={{display:'flex',gap:8}}>
          <input style={{flex:1}} placeholder='What if...' value={wiQuery} onChange={e=>setWiQuery(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')runWI()}}/>
          <button className="btn btn-primary btn-sm" onClick={runWI} disabled={wiLoading}>{wiLoading?'...':'Ask'}</button>
        </div>
        {wiResult&&!wiResult.error&&<div style={{marginTop:8,padding:8,background:'var(--bg3)',borderRadius:4,fontSize:11}}>
