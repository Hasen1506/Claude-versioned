// ─── TAB 2: PRODUCTS & DEMAND ───
// ── HistoryPanel: extracted from ProductsTab to satisfy React's rules of hooks ──
function HistoryPanel({prod,upProd}){
  const [histGran,setHistGran]=useState('monthly');
  // Weekly overrides: when user edits at weekly level, store in prod.historyWeekly[]
  // Daily overrides: store in prod.historyDaily[]; both reconcile back into monthly totals.
  const histWeekly=useMemo(()=>{
    if(prod.historyWeekly&&prod.historyWeekly.length)return prod.historyWeekly;
    const h=prod.history||[];
    const wks=[];
    h.forEach(mo=>{const w=Math.round(mo/4);wks.push(w,w,w,mo-3*w)});
    return wks;
  },[prod.history,prod.historyWeekly]);
  const histDaily=useMemo(()=>{
    if(prod.historyDaily&&prod.historyDaily.length)return prod.historyDaily;
    const h=prod.history||[];
    const days=[];
    h.forEach(mo=>{const perDay=mo/30;for(let d=0;d<30;d++)days.push(Math.round(perDay))});
    return days;
  },[prod.history,prod.historyDaily]);
  return <div className="card">
    <div className="card-title">📊 Historical Demand
      <span className="badge" style={{background:'rgba(240,180,41,.1)',color:'var(--a4)',marginLeft:6}}>{Math.ceil((prod.history?.length||12)/12)} yr</span>
    </div>
    <div style={{display:'flex',gap:6,marginBottom:8,alignItems:'center',flexWrap:'wrap'}}>
      {['daily','weekly','monthly'].map(g=><button key={g} className={`btn btn-sm ${histGran===g?'btn-primary':'btn-secondary'}`} onClick={()=>setHistGran(g)}>{g.charAt(0).toUpperCase()+g.slice(1)}</button>)}
      <span style={{fontSize:9,color:'var(--tx3)',marginLeft:8}}>{(()=>{const obs=(prod.history||[]).filter(v=>v!=null&&v!=='').length;const tot=(prod.history||[]).length;return histGran==='daily'?`${histDaily.length} days — edits roll up into weekly & monthly`:histGran==='weekly'?`${histWeekly.length} weeks — edits roll up into monthly`:`${obs}/${tot} observed${obs<3?' — need ≥3 for forecasting (blank = no data, not zero)':obs<12?' — 12+ for trend, 24+ for seasonality':obs<24?' — 24+ for robust seasonality':''}`})()}</span>
      <button className="btn btn-secondary btn-sm" type="button" title="Show import format spec" onClick={()=>{
        alert(`Excel / CSV Import — Format Spec\n\nColumn 1: Date (any of: 2026-01-15, 15/01/2026, Jan 2026, or week-of-year)\nColumn 2: Demand quantity (numeric, any unit — your call)\nColumn 3 (optional): Promotion flag (1 = promo period, 0 / blank = none)\nColumn 4 (optional): Notes\n\n• First row is treated as header if column 2 is non-numeric.\n• Daily / weekly rows auto-aggregate into MONTHLY buckets (keyed YYYY-MM).\n• Empty cells = no data (NOT zero) — needed so forecast can distinguish "missing" vs "zero demand".\n• You'll see a preview of cleaned output before commit.`);
      }}>📋 Format</button>
      <label className="btn btn-secondary btn-sm" style={{cursor:'pointer'}} title="Upload .xlsx / .csv — see Format button for spec.">
        📂 Import
        <input type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={e=>{
          const f=e.target.files[0];if(!f)return;
          const reader=new FileReader();
          reader.onload=ev=>{
            try{
              const XLSX=window.XLSX;
              if(!XLSX){alert('XLSX library not loaded — check network connection');return;}
              const wb=XLSX.read(ev.target.result,{type:'array',cellDates:true});
              const sh=wb.Sheets[wb.SheetNames[0]];
              const rows=XLSX.utils.sheet_to_json(sh,{header:1,raw:false,dateNF:'yyyy-mm-dd'});
              if(!rows.length){alert('Empty sheet');return;}
              // Skip header if first row has non-numeric second col
              const dataRows=(isNaN(+rows[0]?.[1])?rows.slice(1):rows).filter(r=>r&&r.length>=2&&r[1]!=null&&r[1]!=='');
              if(!dataRows.length){alert('No data rows detected');return;}
              // Auto-detect granularity from first two valid date cells
              const d0=new Date(dataRows[0][0]),d1=new Date(dataRows[1]?.[0]||dataRows[0][0]);
              const diffDays=Math.round((d1-d0)/86400000);
              const gran=isNaN(diffDays)||diffDays===0?'monthly':diffDays<=3?'daily':diffDays<=10?'weekly':'monthly';
              // Validation accumulators
              let invalidDates=0,negative=0,zero=0;
              const promoMonths=new Set();
              // Aggregate into monthly buckets keyed by YYYY-MM
              const buckets={};
              dataRows.forEach(r=>{
                const dt=new Date(r[0]);if(isNaN(dt)){invalidDates++;return;}
                const key=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;
                const q=+r[1]||0;if(q<0)negative++;if(q===0)zero++;
                buckets[key]=(buckets[key]||0)+q;
                if(r[2]&&(+r[2]===1||String(r[2]).toLowerCase()==='promo'||String(r[2]).toLowerCase()==='y'))promoMonths.add(key);
              });
              const keys=Object.keys(buckets).sort();
              if(!keys.length){alert('Could not parse any dates in column 1');return;}
              const monthly=keys.map(k=>Math.round(buckets[k]));
              // Preview before commit — let user accept/reject
              const promoIdxs=keys.map((k,i)=>promoMonths.has(k)?i:-1).filter(i=>i>=0);
              const summary=`Import preview\n\nDetected granularity: ${gran}\nRows accepted: ${dataRows.length-invalidDates} (skipped ${invalidDates} invalid dates)\nMonthly buckets: ${monthly.length} (range ${keys[0]} → ${keys[keys.length-1]})\nNegative demand cells: ${negative}\nZero-demand cells: ${zero}\nPromotion-flagged buckets: ${promoIdxs.length}\nTotal demand: ${monthly.reduce((a,b)=>a+b,0).toLocaleString()}\nMin / Mean / Max: ${Math.min(...monthly)} / ${Math.round(monthly.reduce((a,b)=>a+b,0)/monthly.length)} / ${Math.max(...monthly)}\n\nFirst 6 buckets: ${monthly.slice(0,6).join(', ')}\nLast 6 buckets: ${monthly.slice(-6).join(', ')}\n\nClick OK to commit, Cancel to abort.`;
              if(!confirm(summary))return;
              upProd({history:monthly});
              if(promoIdxs.length>0){
                // Add promo events at flagged month indices (only if not already present at same month)
                const existing=new Set((prod.events||[]).filter(ev=>ev.type==='promo').map(ev=>+ev.month));
                const newEvents=promoIdxs.filter(i=>i<12&&!existing.has(i)).map(i=>({id:'imp-'+Date.now().toString(36)+'-'+i,name:`Imported promo ${MONTHS[i]}`,month:i,type:'promo',pct:20}));
                newEvents.forEach(ev=>dispatch({type:'ADD_EVENT',productId:activeId,event:ev}));
              }
            }catch(ex){alert('Import failed: '+ex.message);}
          };
          reader.readAsArrayBuffer(f);
          e.target.value='';
        }}/>
      </label>
      <button className="btn btn-secondary btn-sm" onClick={()=>{
        const h=prod.history||[];const rows=[['Month','Demand']];
        h.forEach((v,i)=>{const yr=2024+Math.floor(i/12);const mo=(i%12)+1;rows.push([`${yr}-${String(mo).padStart(2,'0')}-01`,v]);});
        const csv=rows.map(r=>r.join(',')).join('\n');
        const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${prod.name||'demand'}-history.csv`;a.click();
      }} title="Download current history as CSV template for reference / editing">📥 Export</button>
    </div>

    {histGran==='monthly'&&<>
      <div style={{overflowX:'auto'}}>
        <table className="data-table" style={{fontSize:9}}>
          <thead><tr><th></th>{MONTHS.map(m=><th key={m}>{m.slice(0,3)}</th>)}<th>Total</th><th>Avg/mo</th></tr></thead>
          <tbody>{Array.from({length:Math.ceil((prod.history?.length||12)/12)}).map((_,yr)=>{
            const yrData=prod.history?.slice(yr*12,yr*12+12)||[];
            const yrTotal=yrData.reduce((a,b)=>a+(b||0),0);
            return <tr key={yr}>
              <td style={{fontWeight:600,color:'var(--a4)',fontFamily:'JetBrains Mono'}}>Y{yr+1}</td>
              {MONTHS.map((m,mi)=>{const idx=yr*12+mi;const cellVal=prod.history?.[idx];const isBlank=cellVal==null||cellVal==='';return <td key={m}><input type="number" placeholder="—" style={{width:40,textAlign:'center',fontSize:9,background:isBlank?'rgba(240,180,41,.04)':undefined,color:isBlank?'var(--tx3)':undefined}} value={cellVal??''} onChange={e=>{
                const v=e.target.value;const h=[...(prod.history||[])];while(h.length<=idx)h.push(null);h[idx]=v===''?null:(+v||0);upProd({history:h});
              }} title="Leave blank for 'no observation' (solver/forecaster skips). Enter 0 only if you know demand was actually zero."/></td>})}
              <td className="num" style={{fontWeight:600,color:'var(--ac)'}}>{yrTotal.toLocaleString()}</td>
              <td className="num" style={{color:'var(--tx2)'}}>{Math.round(yrTotal/12)}</td>
            </tr>
          })}</tbody>
        </table>
      </div>
      <div style={{display:'flex',gap:6,marginTop:6,alignItems:'center'}}>
        <button className="btn btn-secondary btn-sm" onClick={()=>{const obs=(prod.history||[]).filter(v=>v!=null&&v!=='').map(v=>+v);const avg=obs.length?Math.round(obs.reduce((a,b)=>a+b,0)/obs.length):0;const h=[...(prod.history||[]),...Array(12).fill(obs.length?avg:null)];upProd({history:h})}} title="Extend by 12 months. Filled with observed-avg if any data exists, otherwise blank.">+ Add Year</button>
        <button className="btn btn-secondary btn-sm" onClick={()=>{if((prod.history?.length||12)>12){const h=[...(prod.history||[])];h.splice(-12);upProd({history:h})}}} disabled={(prod.history?.length||12)<=12}>- Remove Year</button>
        <button className="btn btn-secondary btn-sm" onClick={()=>{if(confirm('Clear all historical demand cells? (Sets every cell to blank — forecasters will then run on 0 observations.)'))upProd({history:Array(prod.history?.length||12).fill(null)})}} title="Blank every cell. Useful for cold-start products where you'll enter only forecast overrides.">⌫ Clear</button>
        <span style={{fontSize:10,color:'var(--tx3)',marginLeft:8}}>{(()=>{const obs=(prod.history||[]).filter(v=>v!=null&&v!=='').map(v=>+v);const tot=obs.reduce((a,b)=>a+b,0);return <>Total: <strong style={{color:'var(--ac)'}}>{tot.toLocaleString()}</strong> | Avg/mo (observed): <strong>{Math.round(tot/Math.max(obs.length,1))}</strong> | Observed: <strong>{obs.length}</strong></>})()}</span>
      </div>
    </>}

    {histGran==='weekly'&&<>
      <div style={{fontSize:9,color:'var(--tx3)',marginBottom:4}}>Edit weekly cells — monthly totals recompute as Σ of 4 weeks. Initial values split monthly ÷ 4.</div>
      <div style={{overflowX:'auto'}}>
        <table className="data-table" style={{fontSize:9}}>
          <thead><tr><th>Wk</th><th>Month</th><th>Demand</th><th>Wk Avg</th></tr></thead>
          <tbody>{histWeekly.slice(0,Math.min(histWeekly.length,52)).map((wDem,wi)=>{
            const moIdx=Math.floor(wi/4);const moName=MONTHS[moIdx%12]?.slice(0,3)||'?';
            return <tr key={wi} style={{background:wi%8<4?'transparent':'rgba(255,255,255,.01)'}}>
              <td style={{fontFamily:'JetBrains Mono',fontSize:9,color:'var(--tx3)'}}>W{wi+1}</td>
              <td style={{color:'var(--tx3)',fontSize:9}}>{wi%4===0?moName:''}</td>
              <td><NumInput style={{width:64,textAlign:'center',fontSize:9}} value={wDem} onChange={v=>{
                const w=[...histWeekly];w[wi]=v||0;
                const mo=[...(prod.history||[])];
                for(let m=0;m<Math.ceil(w.length/4);m++){mo[m]=(w[m*4]||0)+(w[m*4+1]||0)+(w[m*4+2]||0)+(w[m*4+3]||0)}
                upProd({history:mo,historyWeekly:w});
              }}/></td>
              <td className="num" style={{color:'var(--tx3)'}}>{Math.round(wDem*52)}/yr run rate</td>
            </tr>
          })}</tbody>
        </table>
      </div>
      <div style={{display:'flex',gap:6,marginTop:6,alignItems:'center'}}>
        <button className="btn btn-secondary btn-sm" onClick={()=>upProd({historyWeekly:null})}>↺ Reset to monthly ÷ 4</button>
        <span style={{fontSize:10,color:'var(--tx3)',marginLeft:8}}>Total: <strong style={{color:'var(--ac)'}}>{histWeekly.reduce((a,b)=>a+b,0).toLocaleString()}</strong> | Avg/wk: <strong>{Math.round(histWeekly.reduce((a,b)=>a+b,0)/Math.max(histWeekly.length,1))}</strong></span>
      </div>
    </>}

    {histGran==='daily'&&<>
      <div style={{fontSize:9,color:'var(--tx3)',marginBottom:4}}>Edit daily cells — weekly and monthly totals recompute. Default split: monthly ÷ 30.</div>
      <div style={{overflowX:'auto',maxHeight:420,border:'1px solid var(--br)'}}>
        <table className="data-table" style={{fontSize:9}}>
          <thead style={{position:'sticky',top:0,background:'var(--bg2)',zIndex:1}}><tr><th>Month</th>{Array.from({length:30}).map((_,d)=><th key={d} style={{padding:'2px 3px',minWidth:32}}>D{d+1}</th>)}<th>Mo Σ</th></tr></thead>
          <tbody>{Array.from({length:Math.min(Math.ceil(histDaily.length/30),24)}).map((_,mi)=>{
            const moDays=histDaily.slice(mi*30,mi*30+30);
            const moTot=moDays.reduce((a,b)=>a+(b||0),0);
            const moName=MONTHS[mi%12]?.slice(0,3);
            const yr=Math.floor(mi/12)+1;
            return <tr key={mi}>
              <td style={{fontFamily:'JetBrains Mono',fontSize:9,color:'var(--a4)',fontWeight:600,position:'sticky',left:0,background:'var(--bg3)'}}>Y{yr} {moName}</td>
              {Array.from({length:30}).map((_,di)=>{
                const idx=mi*30+di;
                return <td key={di} style={{padding:1}}><NumInput style={{width:32,textAlign:'center',fontSize:9,padding:'2px 1px'}} value={histDaily[idx]||0} onChange={v=>{
                  const d=[...histDaily];d[idx]=v||0;
                  const mo=[...(prod.history||[])];
                  const wks=prod.historyWeekly?[...prod.historyWeekly]:null;
                  for(let m=0;m<Math.ceil(d.length/30);m++){
                    let tot=0;for(let k=0;k<30;k++)tot+=(d[m*30+k]||0);
                    mo[m]=tot;
                    if(wks){for(let w=0;w<4;w++){let wt=0;for(let k=0;k<7;k++)wt+=(d[m*30+w*7+k]||0);wks[m*4+w]=wt}}
                  }
                  upProd({history:mo,historyDaily:d,...(wks?{historyWeekly:wks}:{})});
                }}/></td>;
              })}
              <td className="num" style={{fontWeight:600,color:'var(--ac)',position:'sticky',right:0,background:'var(--bg3)'}}>{moTot.toLocaleString()}</td>
            </tr>;
          })}</tbody>
        </table>
      </div>
      <div style={{display:'flex',gap:6,marginTop:6,alignItems:'center'}}>
        <button className="btn btn-secondary btn-sm" onClick={()=>upProd({historyDaily:null})}>↺ Reset to monthly ÷ 30</button>
        <span style={{fontSize:10,color:'var(--tx3)',marginLeft:8}}>Days: <strong>{histDaily.length}</strong> | Total: <strong style={{color:'var(--ac)'}}>{histDaily.reduce((a,b)=>a+b,0).toLocaleString()}</strong> | Avg/day: <strong>{Math.round(histDaily.reduce((a,b)=>a+b,0)/Math.max(histDaily.length,1))}</strong></span>
      </div>
    </>}
  </div>;
}

// Pillar 9 — WACC registry card. Lives on Tab 1. Single source of truth for state.config.wacc.
function WACCCard({state,dispatch}){
  const cur=state.config.currency;
  const fin=state.finance||{};
  const setFin=(k,v)=>dispatch({type:'SET_FINANCE',payload:{[k]:v}});
  const setEqPct=v=>{const e=Math.max(0,Math.min(100,+v||0));dispatch({type:'SET_FINANCE',payload:{equityPct:e,debtPct:100-e}});};
  const setDbPct=v=>{const d=Math.max(0,Math.min(100,+v||0));dispatch({type:'SET_FINANCE',payload:{debtPct:d,equityPct:100-d}});};
  const res=computeWACC(fin,state.config);
  const mode=fin.mode||'simple';
  const instruments=fin.debtInstruments||[];
  const [computedAt,setComputedAt]=React.useState(null);
  const [serverWACC,setServerWACC]=React.useState(null);
  const doCalculate=async()=>{
    const clientRes=computeWACC(fin,state.config);
    // Write back to registry: nominal by default, real if inflation-adjusted
    const toRegistry=Math.round((fin.inflationAdjust?clientRes.real:clientRes.nominal)*100)/100;
    dispatch({type:'SET_CONFIG',payload:{wacc:toRegistry}});
    setComputedAt(new Date().toLocaleTimeString());
    // Optional backend audit
    try{
      const r=await fetch('/api/calc/wacc',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({equity_pct:fin.equityPct,debt_pct:fin.debtPct,cost_equity:fin.costOfEquity,cost_debt:mode==='complex'?res.kdWeighted:fin.costOfDebt,tax_rate:state.config.taxRate,debt_instruments:instruments,inflation_pct:fin.inflationAdjust?fin.inflationPct:0})});
      if(r.ok){const j=await r.json();if(j&&typeof j.wacc==='number')setServerWACC(Math.round(j.wacc*10000)/100);}
    }catch(e){setServerWACC(null);}
  };
  return <div className="card" style={{borderLeft:'3px solid var(--ac)'}}>
    <div className="card-title">💹 WACC Calculator <span className="badge" style={{background:'rgba(0,212,170,.1)',color:'var(--ac)',marginLeft:8}}>First financial input · Pillar 9</span><SectionInfo><strong>What it does:</strong> Computes Weighted Average Cost of Capital — the discount rate used everywhere there's a future cash flow.<br/><strong>Formula:</strong> WACC = (E/V)·Ke + (D/V)·Kd·(1−t).<br/><strong>Flows to:</strong> NPV of every CAPEX decision; Buy-vs-Lease comparison; Capital Budgeting MILP; the carry-rate "Capital %" component. Write-back updates the registry once you edit any input here.</SectionInfo><span style={{marginLeft:'auto',fontSize:10,fontFamily:'JetBrains Mono',color:'var(--ac)'}}>Current registry: {state.config.wacc}%</span></div>
    <div style={{fontSize:10,color:'var(--tx3)',marginBottom:8}}>Central WACC registry. Every downstream consumer (NPV, Buy-vs-Lease, Capital Budget MILP, inventory capital charge) reads <code>state.config.wacc</code>. Click <strong>Calculate WACC</strong> to derive from capital structure + write back to the registry.</div>

    {/* Capital structure */}
    <div className="grid3">
      <Field label={`Master Budget (${cur})`} hint="Total capital to deploy this year. Sum of equity + debt. Feeds Pillar 10 budget-head split (procurement + CAPEX + logistics + marketing + SCM opex + reserve)."><NumInput value={fin.masterBudget||0} onChange={v=>setFin('masterBudget',v)}/></Field>
      <Field label="Equity %" hint="Portion of master budget funded by equity (owners/shareholders). Editing auto-updates Debt % so the pair sums to 100."><NumInput min={0} max={100} step="1" value={fin.equityPct||0} onChange={setEqPct}/></Field>
      <Field label="Debt %" hint="Portion funded by debt (loans, bonds, NCDs). Editing auto-updates Equity %."><NumInput min={0} max={100} step="1" value={fin.debtPct||0} onChange={setDbPct}/></Field>
    </div>

    {/* Cost of equity + cost of debt (simple/complex) */}
    <div style={{marginTop:10,padding:8,background:'var(--bg3)',borderRadius:4,border:'1px solid var(--br)'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
        <strong style={{fontSize:11,color:'var(--ac)'}}>Cost of Capital</strong>
        <div style={{marginLeft:'auto',display:'flex',gap:4}}>
          <button onClick={()=>setFin('mode','simple')} className={mode==='simple'?'btn btn-primary btn-sm':'btn btn-secondary btn-sm'} style={{fontSize:9}}>Simple</button>
          <button onClick={()=>setFin('mode','complex')} className={mode==='complex'?'btn btn-primary btn-sm':'btn btn-secondary btn-sm'} style={{fontSize:9}}>Complex (multi-debt)</button>
        </div>
      </div>
      <div className="grid3">
        <Field label="Cost of Equity %" hint="Opportunity cost — the return equity holders could earn on an equivalent-risk alternative. CAPM: Ke = Rf + β·(Rm−Rf). For Indian mid-cap mfg: Rf(10yr G-Sec)≈7% + β(1.0-1.3)·ERP(5-7%) ≈ 12-16%."><NumInput step="0.1" value={fin.costOfEquity||0} onChange={v=>setFin('costOfEquity',v)}/></Field>
        {mode==='simple'&&<Field label="Cost of Debt % (pre-tax)" hint="Pre-tax interest rate. After-tax is Kd·(1−t) since interest is tax-deductible. For Indian AA/A corporate: 8-11%."><NumInput step="0.1" value={fin.costOfDebt||0} onChange={v=>setFin('costOfDebt',v)}/></Field>}
        {mode==='complex'&&<Field label={`Weighted Avg Kd (auto)`} hint="Computed as Σ(principal_i × rate_i) / Σ(principal_i) over all debt instruments below."><NumInput step="0.01" value={Math.round(res.kdWeighted*100)/100} onChange={()=>{}} disabled/></Field>}
        <Field label="Effective Tax Rate %" hint="Tax shield on debt. Indian corporate FY25 = 25%. Set in Company Profile."><NumInput step="0.1" value={state.config.taxRate||0} onChange={v=>dispatch({type:'SET_CONFIG',payload:{taxRate:v}})}/></Field>
      </div>

      {mode==='complex'&&<div style={{marginTop:8}}>
        <div style={{fontSize:10,color:'var(--tx2)',marginBottom:4,display:'flex',alignItems:'center',gap:8}}><strong>Debt Instruments ({instruments.length})</strong><button className="btn btn-secondary btn-sm" style={{marginLeft:'auto'}} onClick={()=>dispatch({type:'ADD_DEBT_INSTRUMENT'})}>+ Add</button></div>
        <table className="data-table">
          <thead><tr><th>Kind</th><th className="num">Principal</th><th className="num">Rate %</th><th className="num">Tenor (yr)</th><th>Notes</th><th></th></tr></thead>
          <tbody>{instruments.map(inst=><tr key={inst.id}>
            <td><select value={inst.kind} onChange={e=>dispatch({type:'UPDATE_DEBT_INSTRUMENT',id:inst.id,payload:{kind:e.target.value}})} style={{fontSize:10}}><option value="bank-loan">Bank Loan</option><option value="bond">Bond</option><option value="nc-debenture">NCD</option><option value="wc-line">WC Line</option><option value="commercial-paper">Comm. Paper</option></select></td>
            <td className="num"><NumInput value={inst.principal} style={{width:120}} onChange={v=>dispatch({type:'UPDATE_DEBT_INSTRUMENT',id:inst.id,payload:{principal:v}})}/></td>
            <td className="num"><NumInput step="0.1" value={inst.ratePct} style={{width:60}} onChange={v=>dispatch({type:'UPDATE_DEBT_INSTRUMENT',id:inst.id,payload:{ratePct:v}})}/></td>
            <td className="num"><NumInput value={inst.tenorYears} style={{width:50}} onChange={v=>dispatch({type:'UPDATE_DEBT_INSTRUMENT',id:inst.id,payload:{tenorYears:v}})}/></td>
            <td><input value={inst.notes||''} onChange={e=>dispatch({type:'UPDATE_DEBT_INSTRUMENT',id:inst.id,payload:{notes:e.target.value}})} style={{fontSize:10,width:140}}/></td>
            <td><button onClick={()=>dispatch({type:'DEL_DEBT_INSTRUMENT',id:inst.id})} style={{fontSize:9,padding:'0 5px',background:'none',border:'1px solid var(--dg)',color:'var(--dg)',borderRadius:2,cursor:'pointer'}}>×</button></td>
          </tr>)}</tbody>
        </table>
        {instruments.length>0&&<div style={{fontSize:9,color:'var(--tx3)',marginTop:3,fontFamily:'JetBrains Mono'}}>
          Σ principal = {cur}{instruments.reduce((a,i)=>a+(+i.principal||0),0).toLocaleString()} · Weighted Kd = {res.kdWeighted.toFixed(2)}%
        </div>}
      </div>}
    </div>

    {/* Inflation adjustment */}
    <div style={{marginTop:10,padding:8,background:'var(--bg3)',borderRadius:4,border:'1px solid var(--br)'}}>
      <label style={{display:'flex',alignItems:'center',gap:6,fontSize:11,cursor:'pointer'}}>
        <input type="checkbox" checked={!!fin.inflationAdjust} onChange={e=>setFin('inflationAdjust',e.target.checked)}/>
        <strong style={{color:'var(--a2)'}}>Inflation-adjusted WACC</strong>
        <span style={{fontSize:9,color:'var(--tx3)'}}>Fisher real-rate: (1 + nominal) / (1 + inflation) − 1 → writes REAL wacc to the registry when enabled.</span>
      </label>
      {fin.inflationAdjust&&<div className="grid3" style={{marginTop:8}}>
        <Field label="Monthly Inflation %" hint="Month-on-month CPI inflation. Indian CPI 2025 ≈ 0.4-0.6% MoM. Annualized automatically. If RBI CPI API not available, enter manually."><NumInput step="0.1" value={fin.inflationPct||0} onChange={v=>setFin('inflationPct',v)}/></Field>
        <div style={{fontSize:9,color:'var(--tx3)',fontFamily:'JetBrains Mono',alignSelf:'end',paddingBottom:4}}>Annualized ≈ <strong style={{color:'var(--a4)'}}>{(Math.pow(1+((+fin.inflationPct||0)/100),12)*100-100).toFixed(2)}%</strong></div>
      </div>}
    </div>

    {/* Result + Calculate */}
    <div style={{marginTop:10,display:'flex',alignItems:'center',gap:10}}>
      <button className="btn btn-primary" onClick={doCalculate}>Calculate WACC</button>
      {computedAt&&<span style={{fontSize:9,color:'var(--gn)',fontFamily:'JetBrains Mono'}}>✓ registry updated at {computedAt}</span>}
      {serverWACC!=null&&<span style={{fontSize:9,color:Math.abs(serverWACC-(fin.inflationAdjust?res.real:res.nominal))<0.05?'var(--gn)':'var(--a4)',fontFamily:'JetBrains Mono'}}>Backend audit: {serverWACC}%</span>}
    </div>

    {(()=>{
      const ko=fin.costOfEquity||0,kdPct=mode==='complex'?res.kdWeighted:(fin.costOfDebt||0);
      return <div style={{marginTop:10,padding:10,background:'var(--bg4)',borderRadius:4,fontFamily:'JetBrains Mono',fontSize:10,lineHeight:1.8,color:'var(--tx2)'}}>
        <strong style={{color:'var(--ac)'}}>Formula:</strong> WACC = wE·Ke + wD·Kd·(1−t)<br/>
        WACC = {(fin.equityPct||0)/100} × {ko}% + {(fin.debtPct||0)/100} × {kdPct.toFixed(2)}% × (1 − {state.config.taxRate||0}/100)<br/>
        WACC = <span style={{color:'var(--a3)'}}>{res.equityTerm.toFixed(3)}%</span> + <span style={{color:'var(--a4)'}}>{res.debtTerm.toFixed(3)}%</span> = <strong style={{color:'var(--ac)',fontSize:13}}>{res.nominal.toFixed(2)}%</strong> (nominal)
        {fin.inflationAdjust&&<>
          <br/>Inflation-adjusted: Real WACC = (1 + {(res.nominal/100).toFixed(4)}) / (1 + {(res.annualInflation/100).toFixed(4)}) − 1 = <strong style={{color:'var(--gn)',fontSize:13}}>{res.real.toFixed(2)}%</strong>
        </>}
      </div>;
    })()}

    {/* Downstream consumers strip — live values */}
    <div style={{marginTop:10,padding:8,background:'var(--bg3)',borderRadius:4,fontSize:10}}>
      <div style={{fontSize:9,color:'var(--tx3)',marginBottom:4}}>Downstream consumers (live):</div>
      <div style={{display:'flex',gap:12,flexWrap:'wrap',color:'var(--tx2)'}}>
        <span>NPV discount rate: <strong style={{color:'var(--ac)'}}>{state.config.wacc}%</strong></span>
        <span>Buy-vs-Lease: <strong style={{color:'var(--ac)'}}>{state.config.wacc}%</strong></span>
        <span>Capital Budget MILP: <strong style={{color:'var(--ac)'}}>{state.config.wacc}%</strong></span>
        <span>Inventory capital charge: <strong style={{color:'var(--ac)'}}>{state.config.wacc}%</strong></span>
      </div>
    </div>
  </div>;
}

// v3.5 — Distribution Network & Customer Zones. Defines DC nodes + customer zones, plus per-SKU allocation.
// Reads from state.network.nodes (shared with the richer Physical Network editor in Tab 3) and state.network.zones.
function DistributionNetworkPanel({state,dispatch}){
  const net=state.network||{nodes:[],lanes:[],zones:[]};
  const zones=net.zones||[];
  const dcs=(net.nodes||[]).filter(n=>n.type==='dc');
  const cur=state.config.currency;
  const activeId=state.activeProductId;
  const prod=(state.products||[]).find(p=>p.id===activeId)||(state.products||[])[0];
  const upZones=(zs)=>dispatch({type:'SET_NETWORK',payload:{zones:zs}});
  const upNodes=(nds)=>dispatch({type:'SET_NETWORK',payload:{nodes:nds}});
  const upProd=(patch)=>{if(prod)dispatch({type:'UPDATE_PRODUCT',id:prod.id,payload:patch})};
  const zoneSplit=prod?.zoneSplit||{};
  const zSplitTotal=Object.values(zoneSplit).reduce((a,b)=>a+(+b||0),0);
  return <CollapsibleCard title="Distribution Network & Customer Zones" icon="🚚" badge={`${dcs.length} DC${dcs.length===1?'':'s'} · ${zones.length} zone${zones.length===1?'':'s'}`} defaultOpen={false} accent="var(--a2)">
    <div style={{fontSize:10,color:'var(--tx3)',marginBottom:8,padding:'6px 8px',background:'var(--bg3)',borderRadius:4,borderLeft:'2px solid var(--a2)'}}>
      Define where finished goods ship (DCs), who consumes (customer zones), and the per-SKU demand split across zones. The transport solver honors <code>originCity → destCity</code> on BOM parts; for outbound (plant→DC→zone), use this panel. Service days per zone drive replenishment frequency in the MPS.
    </div>
    {/* DCs — quick add/edit; nodes with type='dc' are the source of truth */}
    <div style={{marginBottom:10}}>
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:6}}>
        <strong style={{fontSize:11,color:'var(--tx2)'}}>Distribution Centers ({dcs.length})</strong>
        <button className="btn btn-secondary btn-sm" onClick={()=>{
          const id='dc'+Date.now().toString(36).slice(-5);
          upNodes([...(net.nodes||[]),{id,type:'dc',name:`DC ${dcs.length+1}`,location:state.config.city||'',lat:0,lon:0,capacity:5000,costPerCbmDay:2.5}]);
        }}>+ DC</button>
        <span style={{fontSize:9,color:'var(--tx3)'}}>Richer lane config in Tab 3 → Physical Network</span>
      </div>
      {dcs.length>0&&<table className="data-table" style={{fontSize:10}}>
        <thead><tr><th>Name</th><th>City</th><th>Capacity (cbm)</th><th>Holding ({cur}/cbm·day)</th><th></th></tr></thead>
        <tbody>{dcs.map(dc=>{const idx=(net.nodes||[]).findIndex(n=>n.id===dc.id);const upDC=(patch)=>{const nds=[...(net.nodes||[])];nds[idx]={...nds[idx],...patch};upNodes(nds)};
          return <tr key={dc.id}>
            <td><input value={dc.name} onChange={e=>upDC({name:e.target.value})} style={{width:100}}/></td>
            <td><input value={dc.location||''} onChange={e=>upDC({location:e.target.value})} style={{width:90}}/></td>
            <td><NumInput value={dc.capacity||0} onChange={v=>upDC({capacity:v})} style={{width:70}}/></td>
            <td><NumInput step="0.1" value={dc.costPerCbmDay||0} onChange={v=>upDC({costPerCbmDay:v})} style={{width:60}}/></td>
            <td><button className="btn btn-danger btn-sm" onClick={()=>upNodes((net.nodes||[]).filter(n=>n.id!==dc.id))}>×</button></td>
          </tr>
        })}</tbody>
      </table>}
    </div>
    {/* Zones */}
    <div style={{marginBottom:10}}>
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:6}}>
        <strong style={{fontSize:11,color:'var(--tx2)'}}>Customer Zones ({zones.length})</strong>
        <button className="btn btn-secondary btn-sm" onClick={()=>upZones([...zones,{id:'zone'+Date.now().toString(36).slice(-5),name:`Zone ${zones.length+1}`,cities:'',demandPct:0,serviceDaysTarget:3}])}>+ Zone</button>
      </div>
      {zones.length>0&&<table className="data-table" style={{fontSize:10}}>
        <thead><tr><th>Zone</th><th>Cities (CSV)</th><th>Total Demand %</th><th>Service Days (target)</th><th></th></tr></thead>
        <tbody>{zones.map((z,zi)=>{const upZ=(patch)=>{const zs=[...zones];zs[zi]={...zs[zi],...patch};upZones(zs)};
          return <tr key={z.id}>
            <td><input value={z.name} onChange={e=>upZ({name:e.target.value})} style={{width:100}}/></td>
            <td><input value={z.cities||''} placeholder="Chennai, Bengaluru" onChange={e=>upZ({cities:e.target.value})} style={{width:180}}/></td>
            <td><NumInput value={z.demandPct||0} onChange={v=>upZ({demandPct:v})} style={{width:55}}/></td>
            <td><NumInput value={z.serviceDaysTarget||3} onChange={v=>upZ({serviceDaysTarget:v})} style={{width:55}}/></td>
            <td><button className="btn btn-danger btn-sm" onClick={()=>upZones(zones.filter((_,j)=>j!==zi))}>×</button></td>
          </tr>
        })}</tbody>
      </table>}
    </div>
    {/* Per-SKU allocation */}
    {prod&&zones.length>0&&<div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:4}}>
      <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:6}}>
        <strong style={{fontSize:11,color:'var(--tx2)'}}>Zone Split for <span style={{color:'var(--ac)'}}>{prod.name}</span></strong>
        <span style={{fontSize:9,color:zSplitTotal===100?'var(--gn)':zSplitTotal>0?'var(--a4)':'var(--tx3)'}}>total: {zSplitTotal}%</span>
        {zSplitTotal!==100&&<button className="btn btn-secondary btn-sm" style={{fontSize:9,padding:'2px 6px'}} onClick={()=>{
          // Equal-split across zones
          const each=Math.round(100/zones.length);
          const split={};zones.forEach((z,i)=>{split[z.id]=i===zones.length-1?(100-each*(zones.length-1)):each});
          upProd({zoneSplit:split});
        }}>Equal split</button>}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:6}}>
        {zones.map(z=><Field key={z.id} label={`${z.name} %`} hint={`Share of ${prod.name} demand served from this zone. Drives transport cost allocation and per-zone service-level tracking. Uniform split if left empty.`}>
          <NumInput min={0} max={100} placeholder="0" value={zoneSplit[z.id]??''} onChange={v=>upProd({zoneSplit:{...zoneSplit,[z.id]:e.target.value===''?0:v}})}/>
        </Field>)}
        <Field label="Served by DCs" hint="Check DCs that fulfill this SKU. Empty = all DCs can serve."><div style={{display:'flex',flexWrap:'wrap',gap:4}}>
          {dcs.map(dc=><label key={dc.id} style={{fontSize:9,padding:'2px 4px',background:(prod.dcIds||[]).includes(dc.id)?'rgba(56,189,248,.15)':'var(--bg2)',border:'1px solid var(--br)',borderRadius:3,cursor:'pointer'}}>
            <input type="checkbox" style={{width:10,height:10,marginRight:3}} checked={(prod.dcIds||[]).includes(dc.id)} onChange={e=>{
              const cur=prod.dcIds||[];
              const nxt=e.target.checked?[...cur,dc.id]:cur.filter(x=>x!==dc.id);
              upProd({dcIds:nxt});
            }}/>{dc.name}
          </label>)}
        </div></Field>
      </div>
    </div>}
    {!zones.length&&<div style={{padding:'10px',textAlign:'center',fontSize:10,color:'var(--tx3)'}}>No zones defined. Click + Zone to begin — e.g. South India (Chennai, Bengaluru), North India, Export.</div>}
  </CollapsibleCard>;
}

// v3.4 — Production Capacity & Compatibility. Shared line pool (identical hrs default)
// + product×line compatibility matrix. Single source of truth = line.eligibleProducts[].
function ProductionCapacityPanel({state,dispatch}){
  const lines=state.production?.lines||[];
  const products=state.products||[];
  const cur=state.config.currency;
  const wd=state.planning.workDays||6;
  const updateLines=(nl)=>dispatch({type:'SET_PRODUCTION',payload:{lines:nl}});
  const toggleCompat=(lineIdx,pid)=>{
    const nl=lines.map((l,i)=>{
      if(i!==lineIdx)return l;
      const ep=l.eligibleProducts||[];
      // universal (empty) → first toggle converts to explicit whitelist minus the clicked one
      if(!ep.length){return{...l,eligibleProducts:products.filter(p=>p.id!==pid).map(p=>p.id)}}
      return{...l,eligibleProducts:ep.includes(pid)?ep.filter(x=>x!==pid):[...ep,pid]};
    });
    updateLines(nl);
  };
  const setUniversal=(lineIdx)=>{const nl=lines.map((l,i)=>i===lineIdx?{...l,eligibleProducts:[],dedicated:false}:l);updateLines(nl);};
  const addLine=()=>{
    const id='line'+(lines.length+1)+'-'+Date.now().toString(36).slice(-4);
    updateLines([...lines,{id,name:`Line ${lines.length+1}`,type:'shared',capacity:50,shiftsPerDay:2,hoursPerShift:8,breakMins:30,otMult:1.5,changeoverMins:30,eligibleProducts:[],dedicated:false,plannedMaintenance:[]}]);
  };
  const delLine=(i)=>{if(lines.length<=1)return;updateLines(lines.filter((_,j)=>j!==i));};
  const lineIsEligible=(line,pid)=>!line.eligibleProducts?.length||line.eligibleProducts.includes(pid);
  // Theoretical capacity u/wk based on common cycle time
  const lineWeeklyHrs=(l)=>((+l.shiftsPerDay||2)*(+l.hoursPerShift||8)-((+l.breakMins||30)*(+l.shiftsPerDay||2)/60))*wd;
  return <CollapsibleCard title="Production Capacity & Line Compatibility" icon="🏭" badge={`${lines.length} lines · ${products.length} SKUs`} defaultOpen={true} accent="var(--a2)"
    right={<button className="btn btn-primary btn-sm" onClick={addLine}>+ Add Line</button>}>
    <div style={{fontSize:10,color:'var(--tx3)',marginBottom:8,padding:'6px 8px',background:'var(--bg3)',borderRadius:4,borderLeft:'2px solid var(--a2)'}}>
      <strong style={{color:'var(--a2)'}}>Shared pool model.</strong> All lines default to <em>identical</em> available hours (shifts × hrs × workDays). Cycle time is set per-product — the solver picks schedule: "Line L runs SKU k for duration d, then SKU k+1". Use the matrix below to declare which SKUs each line <em>can</em> produce. Universal = runs all; Dedicated = single SKU; Flexible = 2+ SKUs.
    </div>
    {/* LINE REGISTRY */}
    <div style={{marginBottom:10,overflowX:'auto'}}>
      <table className="data-table" style={{fontSize:10,minWidth:720}}>
        <thead><tr><th>Line</th><th>Name</th><th>Shifts/d</th><th>Hrs/shift</th><th>Break min</th><th>Changeover min</th><th>OT ×</th><th>Avail hrs/wk</th><th>Compatibility</th><th></th></tr></thead>
        <tbody>{lines.map((l,i)=>{
          const upL=(patch)=>updateLines(lines.map((ll,j)=>j===i?{...ll,...patch}:ll));
          const ep=l.eligibleProducts||[];
          const isUniv=!ep.length;
          const isDed=ep.length===1;
          const kind=isUniv?'Universal':isDed?'Dedicated':'Flexible';
          const kindCol=isUniv?'var(--gn)':isDed?'var(--a4)':'var(--a3)';
          return <tr key={l.id}>
            <td style={{fontWeight:700,color:'var(--ac)'}}>#{i+1}</td>
            <td><input value={l.name} onChange={e=>upL({name:e.target.value})} style={{width:90,fontSize:10}}/></td>
            <td><NumInput min={1} max={3} value={l.shiftsPerDay||2} onChange={v=>upL({shiftsPerDay:v})} style={{width:40,fontSize:10}}/></td>
            <td><NumInput value={l.hoursPerShift||8} onChange={v=>upL({hoursPerShift:v})} style={{width:40,fontSize:10}}/></td>
            <td><NumInput value={l.breakMins||30} onChange={v=>upL({breakMins:v})} style={{width:40,fontSize:10}}/></td>
            <td><NumInput value={l.changeoverMins||30} onChange={v=>upL({changeoverMins:v})} style={{width:40,fontSize:10}}/></td>
            <td><NumInput step="0.1" value={l.otMult||1.5} onChange={v=>upL({otMult:v})} style={{width:40,fontSize:10}}/></td>
            <td className="num" style={{color:'var(--a2)',fontWeight:600}}>{lineWeeklyHrs(l).toFixed(1)}h</td>
            <td><span style={{color:kindCol,fontWeight:600,fontSize:10}}>{kind}</span> <span style={{color:'var(--tx3)',fontSize:9}}>({isUniv?products.length:ep.length}/{products.length})</span>{!isUniv&&<button style={{marginLeft:4,fontSize:9,padding:'0 4px',background:'none',border:'1px solid var(--br2)',color:'var(--tx3)',borderRadius:2,cursor:'pointer'}} onClick={()=>setUniversal(i)} title="Reset to universal (runs all SKUs)">↺</button>}</td>
            <td>{lines.length>1&&<button className="btn btn-danger btn-sm" onClick={()=>delLine(i)}>×</button>}</td>
          </tr>;
        })}</tbody>
      </table>
    </div>
    {/* COMPATIBILITY MATRIX */}
    {products.length>0&&<div>
      <div style={{fontSize:10,color:'var(--tx2)',fontWeight:600,marginBottom:4}}>Product ↔ Line Compatibility Matrix <span style={{color:'var(--tx3)',fontWeight:400,fontSize:9,marginLeft:6}}>Click a cell to toggle. ✓ = line can run this SKU. Dashes on all cells of a column = universal line.</span></div>
      <div style={{overflowX:'auto'}}>
        <table className="data-table" style={{fontSize:10}}>
          <thead><tr><th style={{minWidth:140,textAlign:'left'}}>SKU ↓ / Line →</th>{lines.map(l=><th key={l.id} style={{textAlign:'center',minWidth:50}}>{l.name}</th>)}<th style={{textAlign:'center',color:'var(--a3)'}}># lines</th></tr></thead>
          <tbody>{products.map(p=>{
            const nEligible=lines.filter(l=>lineIsEligible(l,p.id)).length;
            const riskCol=nEligible===0?'var(--dg)':nEligible===1?'var(--a4)':'var(--gn)';
            return <tr key={p.id}>
              <td style={{textAlign:'left',fontWeight:600,color:p.id===state.activeProductId?'var(--ac)':'var(--tx)'}}>{p.name}</td>
              {lines.map((l,li)=>{
                const elig=lineIsEligible(l,p.id);
                const isUniv=!(l.eligibleProducts||[]).length;
                return <td key={l.id} style={{textAlign:'center',cursor:'pointer',padding:'4px',background:elig?(isUniv?'rgba(63,185,80,.08)':'rgba(0,212,170,.12)'):'rgba(248,81,73,.06)'}} onClick={()=>toggleCompat(li,p.id)} title={elig?(isUniv?'Universal (runs all) — click to convert to whitelist':'Eligible — click to remove'):'Not eligible — click to add'}>
                  <span style={{color:elig?(isUniv?'var(--gn)':'var(--ac)'):'var(--dg)',fontWeight:700,fontSize:12}}>{elig?(isUniv?'—':'✓'):'·'}</span>
                </td>;
              })}
              <td className="num" style={{color:riskCol,fontWeight:700}}>{nEligible}</td>
            </tr>;
          })}</tbody>
        </table>
      </div>
      {(()=>{
        const unreachable=products.filter(p=>!lines.some(l=>lineIsEligible(l,p.id)));
        if(unreachable.length){return <div style={{marginTop:6,padding:'4px 8px',background:'rgba(248,81,73,.08)',border:'1px solid var(--dg)',borderRadius:4,fontSize:10,color:'var(--dg)',fontWeight:600}}>⚠ {unreachable.length} SKU(s) have no eligible line: {unreachable.map(p=>p.name).join(', ')}. Solver will mark these infeasible.</div>}
        return null;
      })()}
    </div>}
  </CollapsibleCard>;
}

// Pillar 15 — Payment Ledger. Tracks PO release → due → actual payment with confirm workflow.
// Default assumption: paid on dueDate. User confirms 'on-time' / 'early' / 'late' per event.
function PaymentLedgerCard({state,dispatch}){
  const cur=state.config.currency;
  const wc=state.workingCapital||{};
  const events=wc.paymentEvents||[];
  const today=new Date().toISOString().slice(0,10);
  const setEvents=(next)=>dispatch({type:'SET_WC',payload:{paymentEvents:next}});
  const addEvent=()=>{
    const id=Date.now().toString(36);
    const release=today;
    const term=wc.dpo||45;
    setEvents([...events,{id,supplierId:'',partId:'',poId:`PO-${events.length+1}`,releaseDate:release,amount:50000,paymentTermDays:term,dueDate:paymentDueDate(release,term),confirmedStatus:'pending',actualPaymentDate:'',notes:''}]);
  };
  const upEvent=(id,patch)=>{
    setEvents(events.map(e=>{
      if(e.id!==id)return e;
      const next={...e,...patch};
      if(patch.releaseDate||patch.paymentTermDays!=null){
        next.dueDate=paymentDueDate(next.releaseDate,next.paymentTermDays);
      }
      return next;
    }));
  };
  const delEvent=(id)=>setEvents(events.filter(e=>e.id!==id));
  // Sync from latest procurement solver result — best-effort: pull POs from solverResults.procurement.po_schedule
  const syncFromSolver=()=>{
    const sched=state.solverResults?.procurement?.po_schedule;
    if(!sched||!Array.isArray(sched)){alert('No procurement po_schedule found in last solver result. Run procurement solver first.');return;}
    const start=state.planning.horizonStartDate||today;
    const days=daysPerPeriod(state.planning);
    const next=[...events];
    sched.forEach((po,i)=>{
      const tIdx=+po.period||0;
      const rel=new Date(start);rel.setDate(rel.getDate()+tIdx*days);
      const releaseISO=rel.toISOString().slice(0,10);
      const term=+po.payment_term_days||(wc.dpo||45);
      next.push({id:'sol-'+Date.now().toString(36)+'-'+i,supplierId:po.supplier||'',partId:po.part||'',poId:po.id||`PO-sol-${i+1}`,releaseDate:releaseISO,amount:+po.amount||0,paymentTermDays:term,dueDate:paymentDueDate(releaseISO,term),confirmedStatus:'pending',actualPaymentDate:'',notes:'auto from solver'});
    });
    setEvents(next);
  };
  const ap=accountsPayableAsOf(today,events);
  const cashTied=cashTiedUpAsOf(today,state);
  const apPending=events.filter(e=>e.confirmedStatus==='pending').length;
  return <div className="card">
    <div className="card-title">📒 Payment Ledger <span className="badge" style={{background:'rgba(248,191,45,.12)',color:'var(--a4)'}}>Pillar 15</span><SectionInfo><strong>What it does:</strong> Tracks PO releases, payment terms, and confirmed/actual payment dates. <br/><strong>Pulls from:</strong> Procurement solver's po_schedule (use Sync button).<br/><strong>Flows to:</strong> Accounts-Payable as-of any date; Cash-tied-up KPI = AP + FG inventory value; Default DPO statistic surfaced to Working Capital card.</SectionInfo></div>
    <div style={{fontSize:11,color:'var(--tx2)',marginBottom:8}}>Tracks PO release → payment terms → due date → actual payment. Default assumption: <strong>paid on last day of terms (dueDate)</strong>. Confirm each PO as on-time / early / late, with optional override of actualPaymentDate. Accounts payable as-of today and cash tied-up are auto-rolled.</div>
    <div className="grid4" style={{marginBottom:8}}>
      <div className="kpi"><div className="kpi-lbl">AP as of today</div><div className="kpi-val" style={{color:'var(--a4)'}}>{cur}{ap.toLocaleString()}</div><div className="kpi-sub">{events.length} events · {apPending} pending</div></div>
      <div className="kpi"><div className="kpi-lbl">FG inventory value</div><div className="kpi-val" style={{color:'var(--a2)'}}>{cur}{cashTied.inventoryValue.toLocaleString()}</div><div className="kpi-sub">init_inv × sell_price</div></div>
      <div className="kpi"><div className="kpi-lbl">Cash tied-up</div><div className="kpi-val" style={{color:'var(--ac)'}}>{cur}{cashTied.total.toLocaleString()}</div><div className="kpi-sub">AP + FG inventory</div></div>
      <div className="kpi"><div className="kpi-lbl">Default DPO</div><div className="kpi-val" style={{color:'var(--gn)'}}>{wc.dpo||45} d</div><div className="kpi-sub">used for new entries</div></div>
    </div>
    <div style={{display:'flex',gap:6,marginBottom:6}}>
      <button onClick={addEvent} style={{fontSize:11,padding:'4px 10px',background:'var(--ac)',color:'#000',border:'none',borderRadius:3,cursor:'pointer',fontWeight:700}}>⊕ Add PO</button>
      <button onClick={syncFromSolver} style={{fontSize:11,padding:'4px 10px',background:'transparent',color:'var(--a4)',border:'1px solid var(--a4)',borderRadius:3,cursor:'pointer',fontWeight:600}}>↻ Sync from last solver run</button>
      <button onClick={()=>{if(confirm('Clear all payment events?'))setEvents([])}} style={{fontSize:11,padding:'4px 10px',background:'transparent',color:'var(--dg)',border:'1px solid var(--dg)',borderRadius:3,cursor:'pointer'}}>Clear all</button>
    </div>
    {events.length===0?<div style={{padding:14,background:'var(--bg2)',border:'1px dashed var(--br2)',textAlign:'center',color:'var(--tx3)',fontSize:11}}>No payment events yet. Add a PO or sync from a procurement solver run.</div>:
    <div style={{overflowX:'auto'}}>
      <table className="data-table">
        <thead><tr><th>PO #</th><th>Supplier</th><th>Part</th><th>Released</th><th>Term (d)</th><th>Due</th><th>Amount</th><th>Status</th><th>Actual paid</th><th>Effective</th><th></th></tr></thead>
        <tbody>{events.map(e=>{const eff=effectivePaymentDate(e);const isLate=eff&&new Date(eff)<new Date(today)&&e.confirmedStatus==='pending';return<tr key={e.id} style={isLate?{background:'rgba(248,81,73,.06)'}:null}>
          <td><input value={e.poId} style={{maxWidth:90}} onChange={ev=>upEvent(e.id,{poId:ev.target.value})}/></td>
          <td><input value={e.supplierId} style={{maxWidth:90}} onChange={ev=>upEvent(e.id,{supplierId:ev.target.value})}/></td>
          <td><input value={e.partId} style={{maxWidth:90}} onChange={ev=>upEvent(e.id,{partId:ev.target.value})}/></td>
          <td><input type="date" value={e.releaseDate||''} onChange={ev=>upEvent(e.id,{releaseDate:ev.target.value})}/></td>
          <td><NumInput value={e.paymentTermDays||0} style={{width:50}} onChange={v=>upEvent(e.id,{paymentTermDays:v})}/></td>
          <td style={{color:'var(--tx3)',fontSize:10}}>{e.dueDate||'—'}</td>
          <td><NumInput value={e.amount||0} style={{width:90}} onChange={v=>upEvent(e.id,{amount:v})}/></td>
          <td><select value={e.confirmedStatus||'pending'} onChange={ev=>upEvent(e.id,{confirmedStatus:ev.target.value})} style={{color:e.confirmedStatus==='late'?'var(--dg)':e.confirmedStatus==='early'?'var(--gn)':e.confirmedStatus==='on-time'?'var(--ac)':'var(--tx3)',fontWeight:600}}>
            <option value="pending">pending</option>
            <option value="on-time">on-time</option>
            <option value="early">early</option>
            <option value="late">late</option>
          </select></td>
          <td><input type="date" value={e.actualPaymentDate||''} onChange={ev=>upEvent(e.id,{actualPaymentDate:ev.target.value})}/></td>
          <td style={{fontSize:10,color:eff&&new Date(eff)<new Date(today)?'var(--dg)':'var(--gn)'}}>{eff||'—'}</td>
          <td><button onClick={()=>delEvent(e.id)} style={{fontSize:10,padding:'2px 6px',background:'transparent',color:'var(--tx3)',border:'1px solid var(--br)',borderRadius:3,cursor:'pointer'}}>×</button></td>
        </tr>})}</tbody>
      </table>
    </div>}
    <div style={{fontSize:10,color:'var(--tx3)',marginTop:6}}>Effective payment date = actualPaymentDate if confirmed, else dueDate (release + term). AP as-of today sums event.amount where release ≤ today and effective &gt; today. Cash tied-up = AP + FG inventory value.</div>
  </div>;
}

// v3.6 P3 — Server-Side Forecast (real ML / DL via /api/forecast → forecast.py).
// Sits alongside the client-side Forecast Model Competition; user can run either or both.
function ServerForecastCard({state,dispatch,prod,activeId}){
  const [tier,setTier]=React.useState('auto'); // auto | classical | ml | hybrid | dl | all
  const [running,setRunning]=React.useState(false);
  const [result,setResult]=React.useState(null);
  const [error,setError]=React.useState(null);
  const [preview,setPreview]=React.useState(null); // {rows, parsed} for Excel preview before commit
  const T=periodCount(state.planning);
  const grain=state.planning?.timeGrain||'monthly';
  const histLen=(prod?.history||[]).filter(v=>v!=null&&v!=='').length;
  // Data-size bucket (matches forecast.py logic)
  const bucket=histLen<12?'small':histLen<=36?'medium':'large';
  const tierMap={
    auto:null, // server picks
    classical:['naive','holt_winters','arima'],
    ml:['random_forest','gradient_boost','xgboost'],
    hybrid:['holt_winters','arima','hybrid'],
    dl:['mlp'],
    all:['naive','holt_winters','arima','random_forest','gradient_boost','xgboost','mlp','hybrid'],
  };
  // Derive promo_periods from prod.events (type==='promo') — month index → period index for current grain
  const promoPeriods=(prod?.events||[]).filter(ev=>ev.type==='promo').map(ev=>{
    if(grain==='monthly')return +ev.month;
    if(grain==='weekly')return +ev.month*4;
    return +ev.month*30;
  });
  const runForecast=async()=>{
    if(!prod)return;
    setRunning(true);setError(null);setResult(null);
    try{
      const payload={
        products:[{
          name:prod.name,
          history:(prod.history||[]).map(v=>+v||0),
          promo_periods:promoPeriods,
        }],
        params:{
          h_periods:T,
          time_grain:grain,
          horizon_start_date:state.planning.horizonStartDate||null,
          holidays:(state.planning.holidays||[]).map(h=>h.date),
          models:tierMap[tier],
        },
      };
      const r=await fetch('/api/forecast',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      if(!r.ok)throw new Error(`HTTP ${r.status}`);
      const j=await r.json();
      if(j.error)throw new Error(j.error);
      setResult(j);
    }catch(e){setError(e.message);}
    finally{setRunning(false);}
  };
  const applyWinner=(modelName)=>{
    const winner=result?.products?.[0]?.leaderboard?.find(l=>l.model===modelName);
    if(!winner||!winner.forecast?.length){alert('No forecast data for this model.');return;}
    // Convert forecast (T periods at grain) into 12-month overrides
    const monthlyForecast=Array(12).fill(0);
    if(grain==='monthly'){
      winner.forecast.slice(0,12).forEach((v,i)=>monthlyForecast[i]=Math.round(v));
    }else if(grain==='weekly'){
      winner.forecast.forEach((v,i)=>{const m=Math.floor(i/4);if(m<12)monthlyForecast[m]+=Math.round(v);});
    }else{
      winner.forecast.forEach((v,i)=>{const m=Math.floor(i/30);if(m<12)monthlyForecast[m]+=Math.round(v);});
    }
    dispatch({type:'UPDATE_PRODUCT',id:activeId,payload:{overrides:monthlyForecast.map(v=>v||null),mape:+winner.mape||+prod.mape}});
    alert(`Applied ${modelName} forecast (MAPE ${winner.mape}%) → demand plan overrides.`);
  };
  const env=result?.env||{};
  const lb=result?.products?.[0]?.leaderboard||[];
  const winner=result?.products?.[0]?.winner;
  const recommended=result?.products?.[0]?.recommended_model;
  const warning=result?.products?.[0]?.warning;
  return <div className="card" style={{borderLeft:'3px solid var(--a3)'}}>
    <div className="card-title">🤖 Server-Side ML / DL Forecast <span className="badge" style={{background:'rgba(167,139,250,.12)',color:'var(--a3)'}}>P3 · forecast.py</span><SectionInfo><strong>What it does:</strong> Runs real ML and DL models on the server via /api/forecast → forecast.py.<br/><br/><strong>Tiers:</strong> <em>Classical</em> (Holt-Winters, ARIMA, Naive seasonal) · <em>ML</em> (RandomForest, GradientBoosting, XGBoost) · <em>Hybrid</em> (HW baseline + RF residuals) · <em>DL</em> (sklearn MLPRegressor — neural net w/o TF/PyTorch overhead).<br/><br/><strong>Auto-recommend</strong> picks the best tier for your data size: &lt;12 obs → classical only; 12–36 → classical + RF/hybrid; &gt;36 → all including ML/DL.<br/><br/><strong>Feature engineering</strong> (ML/DL/Hybrid only): lag-1, lag-7, lag-30, rolling-mean(3), rolling-mean(7), day-of-week, month, quarter, holiday flag, promotion flag.<br/><br/><strong>How to use:</strong> pick tier → Run → review leaderboard ranked by holdout MAPE → click "Apply" on the winner to write its forecast into the demand plan overrides.</SectionInfo></div>
    {/* Data-size warning */}
    {histLen<12&&<div style={{fontSize:11,padding:'6px 10px',background:'rgba(240,180,41,.06)',border:'1px solid rgba(240,180,41,.3)',borderRadius:3,marginBottom:6,color:'var(--a4)'}}>
      ⚠ <strong>Only {histLen} observations</strong> — seasonality cannot be reliably assessed (need ≥12 for trend, ≥24 for seasonality). Classical methods recommended; ML/DL accept the data with a caveat.
    </div>}
    {/* Controls row */}
    <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:6,flexWrap:'wrap',padding:'6px 10px',background:'var(--bg3)',borderRadius:3}}>
      <label style={{fontSize:10,color:'var(--tx3)',fontWeight:700,letterSpacing:.4}}>TIER</label>
      <select value={tier} onChange={e=>setTier(e.target.value)} style={{fontSize:10,padding:'3px 6px'}}>
        <option value="auto">AUTO ({bucket} bucket → recommended)</option>
        <option value="classical">Classical only (HW / ARIMA / Naive)</option>
        <option value="ml">ML (RF / GradBoost / XGBoost)</option>
        <option value="hybrid">Hybrid (HW + ML residual)</option>
        <option value="dl">DL (MLP neural net)</option>
        <option value="all">Run ALL (slow)</option>
      </select>
      <button className="btn btn-primary btn-sm" disabled={running||!histLen} onClick={runForecast}>{running?'⏳ Running…':'▶ Run on Server'}</button>
      {promoPeriods.length>0&&<span style={{fontSize:9,color:'var(--a4)',marginLeft:4}}>🎯 {promoPeriods.length} promo period(s) flagged</span>}
      <span style={{marginLeft:'auto',fontSize:9,color:'var(--tx3)',fontFamily:'var(--font-mono)'}}>
        Horizon = {T} {grain}; History = {histLen} obs ({bucket})
      </span>
    </div>
    {error&&<div style={{fontSize:10,padding:'5px 8px',background:'rgba(239,68,68,.08)',color:'var(--dg)',border:'1px solid var(--dg)',borderRadius:3,marginBottom:6}}>❌ {error}. <em>If this is "module not available", run `pip install -r requirements.txt` to install scikit-learn / statsmodels / xgboost.</em></div>}
    {result&&<>
      <div style={{fontSize:10,color:'var(--tx3)',marginBottom:6,padding:'5px 8px',background:'var(--bg3)',borderRadius:3}}>
        <strong>Solver env:</strong> sklearn {env.sklearn?'✓':'✗'} · statsmodels {env.statsmodels?'✓':'✗'} · xgboost {env.xgboost?'✓':'✗'} | solve_time {result.solve_time}s | data bucket: <strong>{result.products?.[0]?.data_size_bucket}</strong> | recommended for this size: <strong style={{color:'var(--ac)'}}>{recommended}</strong>
        {warning&&<><br/>⚠ {warning}</>}
      </div>
      <table className="data-table" style={{fontSize:10}}>
        <thead><tr><th>Rank</th><th>Model</th><th>Holdout MAPE %</th><th>RMSE</th><th>MAE</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>{lb.map((row,i)=><tr key={row.model} style={{background:row.model===winner?'rgba(0,212,170,.06)':'transparent'}}>
          <td style={{fontWeight:700,color:i===0&&row.status==='ok'?'var(--ac)':'var(--tx)'}}>{i+1}{row.model===winner&&' 👑'}</td>
          <td style={{fontWeight:600}}>{row.model}{row.model===recommended&&<span style={{fontSize:8,marginLeft:4,color:'var(--a3)'}}>★ recommended</span>}</td>
          <td className="num" style={{color:row.status==='ok'?(row.mape<10?'var(--gn)':row.mape<20?'var(--a4)':'var(--dg)'):'var(--tx3)'}}>{row.status==='ok'?row.mape:'—'}</td>
          <td className="num">{row.status==='ok'?row.rmse:'—'}</td>
          <td className="num">{row.status==='ok'?row.mae:'—'}</td>
          <td style={{fontSize:9,color:row.status==='ok'?'var(--gn)':'var(--dg)'}}>{row.status}</td>
          <td>{row.status==='ok'&&<button className="btn btn-secondary btn-sm" style={{fontSize:9,padding:'2px 6px'}} onClick={()=>applyWinner(row.model)} title="Write this model's forecast into the product's demand plan overrides">📥 Apply</button>}</td>
        </tr>)}</tbody>
      </table>
    </>}
    {!result&&!error&&<div style={{fontSize:10,color:'var(--tx3)',padding:8,textAlign:'center'}}>Pick a tier and hit Run to start. Output shows MAPE/RMSE/MAE on a hold-out split (last {Math.min(6,Math.max(1,Math.floor(histLen/4)))} periods).</div>}
  </div>;
}

function ProductsTab({state,dispatch}){
  const products=state.products;
  const activeId=state.activeProductId||products[0]?.id;
  const prod=products.find(p=>p.id===activeId);
  const [expandedModel,setExpandedModel]=React.useState(null); // v3.3.3 — expand forecast model to see formula + fit

  useEffect(()=>{if(!state.activeProductId&&products.length)dispatch({type:'SET_ACTIVE_PRODUCT',id:products[0].id})},[]);

  const forecastResults=useMemo(()=>{
    if(!prod)return[];
    return runAllForecasts(prod.history);  // handles null-sparse history internally
  },[prod?.history]);

  const bestModel=forecastResults[0];
  // FIX: Auto-flow winning model MAPE into product (v78 behavior)
  useEffect(()=>{
    if(bestModel&&bestModel.mape>0&&activeId&&Math.abs((prod?.mape||15)-bestModel.mape)>0.5){
      dispatch({type:'UPDATE_PRODUCT',id:activeId,payload:{mape:bestModel.mape}});
    }
  },[bestModel?.mape,activeId]);
  const consensus=useMemo(()=>{
    if(!forecastResults.length)return Array(12).fill(0);
    // Weighted blend of top 3 models by inverse MAPE
    const top3=forecastResults.slice(0,3).filter(r=>r.mape>0);
    if(!top3.length)return forecastResults[0]?.forecast||Array(12).fill(0);
    const totalW=top3.reduce((a,r)=>a+1/r.mape,0);
    return Array.from({length:12},(_,i)=>Math.round(top3.reduce((a,r)=>a+(r.forecast[i]||0)/r.mape,0)/totalW));
  },[forecastResults]);

  const finalDemand=useMemo(()=>{
    if(!prod)return Array(12).fill(0);
    return consensus.map((v,i)=>prod.overrides[i]!==null&&prod.overrides[i]!==''?+prod.overrides[i]:v);
  },[consensus,prod?.overrides]);

  const upProd=(payload)=>dispatch({type:'UPDATE_PRODUCT',id:activeId,payload});
  const cur=state.config.currency;

  const chartData=useMemo(()=>{
    if(!prod)return[];
    return MONTHS.map((m,i)=>({
      name:m,
      history:prod.history[i]||0,
      forecast:bestModel?.forecast[i]||0,
      consensus:consensus[i]||0,
      final:finalDemand[i]||0,
    }));
  },[prod?.history,bestModel,consensus,finalDemand]);

  if(!prod)return <div className="placeholder-tab"><div className="icon">📦</div><h3>No products yet</h3><p>Add your first product to begin</p><button className="btn btn-primary" onClick={()=>dispatch({type:'ADD_PRODUCT',payload:{name:'Product A'}})}>+ Add Product</button></div>;

  return <div className="animate-in">
    {/* v3.4 — Production Capacity & Compatibility Matrix (shared across all SKUs) */}
    <ProductionCapacityPanel state={state} dispatch={dispatch}/>
    {/* v3.5 — Distribution Network: DCs + customer zones (shared across all SKUs, then per-SKU split below) */}
    <DistributionNetworkPanel state={state} dispatch={dispatch}/>
  <div style={{display:'flex',gap:12,minHeight:'calc(100vh - 120px)'}}>
    {/* SKU Sidebar */}
    <div className="sku-sidebar">
      <div style={{fontSize:10,color:'var(--tx2)',fontWeight:600,marginBottom:6,textTransform:'uppercase',letterSpacing:'.5px'}}>Products ({products.length})</div>
      {products.map(p=><div key={p.id} className={`sku-item${p.id===activeId?' active':''}`} onClick={()=>dispatch({type:'SET_ACTIVE_PRODUCT',id:p.id})}>
        <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</span>
        {products.length>1&&<span className="sku-del" onClick={e=>{e.stopPropagation();dispatch({type:'DELETE_PRODUCT',id:p.id})}}>×</span>}
      </div>)}
      <button className="btn btn-secondary btn-sm" style={{width:'100%',marginTop:8}} onClick={()=>{const s=defaultSKU();s.name=`Product ${String.fromCharCode(65+products.length)}`;dispatch({type:'ADD_PRODUCT',payload:s})}}>+ Add SKU</button>
    </div>

    {/* Main Panel */}
    <div style={{flex:1,minWidth:0}}>
      {/* Product Header */}
      <div className="card">
        <div className="grid4">
          <Field label="Product Name"><input value={prod.name} onChange={e=>upProd({name:e.target.value})}/></Field>
          <Field label={`Selling Price (${cur})`}><NumInput value={prod.sellPrice} onChange={v=>upProd({sellPrice:v})}/></Field>
          <Field label="Shelf Life (days)" hint={`Finished-good expiry in DAYS. Solver enforces floor(days ÷ daysPerPeriod). Current grain "${state.planning?.timeGrain||'weekly'}" → enforces ${effectiveShelfDays(prod.shelfLife,state.planning)} days (${shelfLifeToPeriods(prod.shelfLife,state.planning)} periods). For 100% exact shelf, switch grain to daily.`}><NumInput value={prod.shelfLife} onChange={v=>upProd({shelfLife:v})}/></Field>
          <Field label="Yield %"><NumInput value={Math.round(prod.yieldPct*100)} onChange={v=>upProd({yieldPct:v/100})} min={1} max={100}/></Field>
        </div>
        <div className="grid4">
          {(()=>{
            const vcTotal=(+prod.vcElectricity||0)+(+prod.vcPackaging||0)+(+prod.vcConsumables||0)+(+prod.vcDirectLabor||0)+(+prod.vcOther||0);
            return <Field label={`Variable Cost/unit (${cur})`} hint="Computed from component breakdown below (Electricity+Packaging+Consumables+Direct Labor+Other). Edit the components — this total is derived."><input type="number" value={Math.round(vcTotal*100)/100} readOnly style={{background:'var(--bg3)',color:'var(--a2)',fontWeight:700,cursor:'not-allowed'}} title="Read-only: edit breakdown below"/></Field>;
          })()}
          <Field label={`Setup Cost/batch (${cur})`} hint="Fixed cost each time this product is produced (tooling changeover, line reset). Consumed by MPS lot-sizing."><NumInput value={prod.setupCost} onChange={v=>upProd({setupCost:v})}/></Field>
          <Field label="Capacity (units/day)" hint="FALLBACK ONLY — used when no routing is defined in Tab 2E. Once you declare operations with cycle time, effective capacity is computed from OEE × station time."><NumInput value={prod.capacity} onChange={v=>upProd({capacity:v})}/></Field>
          <Field label="Initial Inventory" hint="On-hand FG stock at plan start. Solver nets this against period-1 demand."><NumInput value={prod.initInventory} onChange={v=>upProd({initInventory:v})}/></Field>
        </div>

          <div style={{fontSize:9,color:'var(--tx3)',gridColumn:'1 / -1',marginBottom:2}}><strong style={{color:'var(--a3)'}}>Production bounds (MILP).</strong> Set <em>Min Prod</em> &gt; 0 when you must produce ≥ that many units (contract minimums, safety stock refresh, running a line to keep workers paid). <em>Max Prod</em> caps output even if capacity is free (market absorption limit). 0 = no bound.</div>
          <Field label="Min Prod (units/period)" hint="Lower bound in profit-mix MILP: x ≥ minProd. Use for contract minimums or must-run quantities."><NumInput value={prod.minProd||0} min={0} onChange={v=>upProd({minProd:v})} style={{color:(+prod.minProd>0)?'var(--a3)':'inherit',fontWeight:(+prod.minProd>0)?600:400}}/></Field>
          <Field label="Max Prod (units/period)" hint="Upper bound in profit-mix MILP: x ≤ maxProd. Use for market absorption limit or strategic cap. 0 = uncapped (capacity only)."><NumInput value={prod.maxProd||0} min={0} onChange={v=>upProd({maxProd:v})} style={{color:(+prod.maxProd>0)?'var(--a3)':'inherit',fontWeight:(+prod.maxProd>0)?600:400}}/></Field>
          <div style={{gridColumn:'3 / 5',fontSize:10,padding:'4px 8px',background:'var(--bg3)',borderRadius:4,alignSelf:'center'}}>
            {(+prod.minProd>0||+prod.maxProd>0)
              ? <span><strong style={{color:'var(--a3)'}}>Active:</strong> {+prod.minProd>0 && <>min {prod.minProd}u{+prod.maxProd>0?' · ':''}</>}{+prod.maxProd>0 && <>max {prod.maxProd}u</>} → added as constraint to profit-mix MILP.</span>
              : <span style={{color:'var(--tx3)'}}>No bounds active. Solver chooses any x ∈ [0, capacity].</span>
            }
          </div>
        </div>
        {/* OEE trio */}
        <div className="grid4" style={{marginTop:4,paddingTop:6,borderTop:'1px dashed var(--br)'}}>
          <div style={{fontSize:9,color:'var(--tx3)',gridColumn:'1 / -1',marginBottom:2}}><strong style={{color:'var(--a2)'}}>OEE — Overall Equipment Effectiveness.</strong> Effective Capacity = Machines × Shifts × Hrs × WorkDays × (A × P × Q). Edit the trio below; the app computes OEE and applies it to every capacity calc. World-class ≥85%, typical Indian mfg 55-70%.</div>
          <Field label="Availability %" hint="(Planned time − Downtime) / Planned time. Captures breakdowns, setups, breaks."><NumInput step="1" min={30} max={100} value={prod.oeeAvailability||85} onChange={v=>upProd({oeeAvailability:v})}/></Field>
          <Field label="Performance %" hint="(Ideal cycle × Count) / Run time. Captures micro-stops and slow running."><NumInput step="1" min={30} max={100} value={prod.oeePerformance||92} onChange={v=>upProd({oeePerformance:v})}/></Field>
          <Field label="Quality %" hint="Good count / Total count. First-pass yield."><NumInput step="1" min={50} max={100} value={prod.oeeQuality||98} onChange={v=>upProd({oeeQuality:v})}/></Field>
          {(()=>{const a=(+prod.oeeAvailability||85)/100,p=(+prod.oeePerformance||92)/100,q=(+prod.oeeQuality||98)/100;const oee=a*p*q;const col=oee>=0.85?'var(--gn)':oee>=0.70?'var(--a4)':'var(--dg)';return <Field label="OEE (computed)" hint={`Your OEE ${(oee*100).toFixed(1)}% · ${oee>=0.85?'World-class':oee>=0.70?'Good':oee>=0.55?'Typical Indian mfg':'Below benchmark — investigate'}`}><input readOnly value={`${(oee*100).toFixed(1)}%`} style={{background:'var(--bg3)',color:col,fontWeight:700,cursor:'not-allowed'}}/></Field>;})()}
        </div>
        {(()=>{
          const a=(+prod.oeeAvailability||85)/100,p=(+prod.oeePerformance||92)/100,q=(+prod.oeeQuality||98)/100;const oee=a*p*q;
          const pl=state.planning||{},m=pl.machines||1,sh=pl.shifts||2,hr=pl.hrsPerShift||8,wd=pl.workDays||22;
          const nameplate=m*sh*hr*wd;

          const effDaily=(m*sh*hr*oee);
          const cap=+prod.capacity||0;
          const effMonthly=Math.round(effDaily*wd*cap/Math.max(effHrs,1));
          const throughputPerHr=cap/Math.max(sh*hr,1);

          return <div style={{marginTop:10,padding:10,background:'var(--bg2)',border:'2px solid var(--br2)',borderRadius:4}}>

              <span className="badge" style={{marginLeft:'auto',background:'var(--bg3)',color:'var(--tx2)'}}>Nameplate × OEE</span>
            </div>
            <div className="grid4" style={{gap:6}}>
              <div style={{padding:6,background:'var(--bg)',border:'1px solid var(--br)'}}>
                <div style={{fontSize:9,color:'var(--tx3)'}}>Nameplate Hrs/Mo</div>
                <div style={{fontSize:15,fontWeight:700,color:'var(--tx2)'}}>{nameplate.toLocaleString()}<span style={{fontSize:9,color:'var(--tx3)'}}> hrs</span></div>

              </div>
              <div style={{padding:6,background:'var(--bg)',border:'1px solid var(--br)'}}>
                <div style={{fontSize:9,color:'var(--tx3)'}}>Effective Hrs/Mo</div>
                <div style={{fontSize:15,fontWeight:700,color:'var(--ac)'}}>{Math.round(effHrs).toLocaleString()}<span style={{fontSize:9,color:'var(--tx3)'}}> hrs</span></div>
                <div style={{fontSize:8,color:'var(--tx3)'}}>after OEE loss {((1-oee)*100).toFixed(1)}%</div>
              </div>
              <div style={{padding:6,background:'var(--bg)',border:'1px solid var(--br)'}}>
                <div style={{fontSize:9,color:'var(--tx3)'}}>Daily Throughput</div>
                <div style={{fontSize:15,fontWeight:700,color:'var(--a2)'}}>{Math.round(cap*oee).toLocaleString()}<span style={{fontSize:9,color:'var(--tx3)'}}> u/d</span></div>
                <div style={{fontSize:8,color:'var(--tx3)'}}>from {cap}/d × {(oee*100).toFixed(0)}% OEE</div>
              </div>
              <div style={{padding:6,background:'var(--hl,var(--bg3))',border:'2px solid var(--br2)'}}>
                <div style={{fontSize:9,color:'var(--tx2)',fontWeight:600}}>Monthly Capacity</div>
                <div style={{fontSize:16,fontWeight:800,color:'var(--tx)'}}>{monthlyUnits.toLocaleString()}<span style={{fontSize:9}}> units/mo</span></div>
                <div style={{fontSize:8,color:'var(--tx2)'}}>= {cap}/d × {wd}d × OEE</div>
              </div>
            </div>
            <div style={{fontSize:9,color:'var(--tx3)',marginTop:6,fontFamily:'JetBrains Mono'}}>
              Effective Capacity = {cap} (nameplate u/d) × {wd} (work days) × {(a*100).toFixed(0)}% A × {(p*100).toFixed(0)}% P × {(q*100).toFixed(0)}% Q = <strong style={{color:'var(--ac)'}}>{monthlyUnits.toLocaleString()} u/mo</strong> · Throughput: <strong>{throughputPerHr.toFixed(1)} u/hr nameplate → {(throughputPerHr*oee).toFixed(1)} u/hr effective</strong>
            </div>
          </div>;
        })()}
      </div>

      {/* Historical Demand — Multi-Year with granularity toggle */}
      <HistoryPanel prod={prod} upProd={upProd}/>

      {/* Forecast Chart */}
      <div className="card">
        <div className="card-title">📈 Forecast Comparison<SectionInfo><strong>What it does:</strong> Shows historical demand alongside the chosen forecast model's prediction across the configured horizon.<br/><strong>Flows to:</strong> The Demand Plan — solver consumes the active forecast (or override) as the demand signal D[k,t].</SectionInfo></div>
        <div style={{height:220}}>
          <ResponsiveContainer width="100%" height="100%">
            <ComposedChart data={chartData} margin={{top:5,right:10,left:0,bottom:5}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#21262d"/>
              <XAxis dataKey="name" tick={{fill:'#8b949e',fontSize:10}} stroke="#21262d"/>
              <YAxis tick={{fill:'#8b949e',fontSize:10}} stroke="#21262d"/>
              <Tooltip contentStyle={{background:'#1c2333',border:'1px solid #30363d',borderRadius:4,fontSize:11,fontFamily:'JetBrains Mono'}} labelStyle={{color:'#c9d1d9'}}/>

        <div style={{fontSize:10,color:'var(--tx3)',marginBottom:4}}>Click any model row to reveal its formula, fitted coefficients, and plain-English explanation.</div>
        <div className="fcst-table">
          <table className="data-table">
            <thead><tr><th></th><th>#</th><th>Model</th><th>MAPE%</th><th>MAE</th><th>RMSE</th><th>WMAPE%</th><th>Bias</th><th>TS</th>{MONTHS.map(m=><th key={m}>{m.slice(0,3)}</th>)}</tr></thead>
            <tbody>{forecastResults.map((r,i)=>{

                          <tbody>{Object.entries(fitted).map(([k,v])=><tr key={k}><td style={{color:'var(--tx3)',padding:'2px 6px'}}>{k}</td><td style={{color:'var(--a4)',fontWeight:600,padding:'2px 6px'}}>{String(v)}</td></tr>)}</tbody>

                        <div style={{fontSize:9,color:'var(--tx3)',marginTop:6}}>Error metrics on backtest: MAPE <strong>{r.mape}%</strong> · MAE <strong>{r.mae}</strong> · Bias <strong>{r.bias}</strong> · Tracking Signal <strong>{r.ts}</strong> {Math.abs(r.ts)>4&&<span style={{color:'var(--dg)'}}>(|TS|&gt;4 → model is biased, re-fit)</span>}</div>
                      </div>
                    </div>
                  </td>
                </tr>}
              </React.Fragment>;
            })}</tbody>
          </table>
        </div>
      </div>

      {/* P3 — Server-Side ML/DL Forecast (real models via /api/forecast) */}
      <ServerForecastCard state={state} dispatch={dispatch} prod={prod} activeId={activeId}/>

      {/* Manual Overrides — v3.6 P3.7: cleaner Base + Override layered view */}
      <div className="card">
        <div className="card-title">✏️ Demand Plan Overrides <span className="badge" style={{background:'rgba(240,180,41,.1)',color:'var(--a4)'}}>FVA tracked</span><SectionInfo><strong>What it does:</strong> Manual adjustments on top of the forecast — sales-team intel, big customer wins, cannibalisation calls.<br/><br/><strong>Three layers:</strong> (1) <em>History</em> = what actually happened. (2) <em>Base forecast</em> = consensus from model competition (or applied server-side ML winner). (3) <em>Override</em> = your manual edit on top.<br/><br/><strong>FVA (Forecast Value Add):</strong> tracks whether your overrides actually reduced error vs. baseline forecast. Negative FVA = you're hurting accuracy; consider trusting the model.<br/><br/><strong>Manual mode:</strong> with no history, just type values directly into the override row to create a manual demand plan.</SectionInfo></div>
        <div style={{fontSize:10,color:'var(--tx3)',marginBottom:6}}>Override consensus forecast for specific months. Leave blank to use model output. FVA (Forecast Value Add) measures if your overrides improve accuracy. <strong>No history?</strong> Just type values here — that becomes your manual demand plan.</div>
