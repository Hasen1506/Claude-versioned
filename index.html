      {/* BOM — Multi-Level */}
      <div className="card">
        <div className="card-title">🔧 Bill of Materials (BOM) <span className="badge" style={{background:'rgba(167,139,250,.1)',color:'var(--a3)'}}>{prod.bom.length} items</span><SectionInfo><strong>What it does:</strong> Defines the parts (raw materials/sub-assemblies) consumed per unit of finished good.<br/><strong>Per row:</strong> qty/unit, unit cost, lead time, MOQ/MaxOrder, ordering cost S (Admin+Freight-Fixed+Receiving/QC+Setup), holding %, RM shelf life, transport rate (variable), payment terms, supplier choice.<br/><strong>Flows to:</strong> Procurement MILP RM balance C5; landed cost; should-cost benchmarks; the MPS BOM-explosion that translates FG production into RM demand.</SectionInfo>
          <span style={{marginLeft:'auto',fontSize:9,color:'var(--tx3)'}}>Ref by: <select value={state.config.refMode||'name'} onChange={e=>dispatch({type:'SET_CONFIG',payload:{refMode:e.target.value}})} style={{fontSize:9,padding:'1px 4px',width:'auto'}}><option value="name">Name</option><option value="partno">Part Number</option><option value="both">Both</option></select></span>
        </div>
        <div style={{fontSize:10,color:'var(--tx3)',marginBottom:6}}>L0 = direct input to finished good. L1 = sub-component. L2 = raw material. Add children to create multi-level BOM hierarchy.</div>
        {/* BOM Tree */}
        {(()=>{
          // Build tree from flat list using parentId
          const roots=prod.bom.filter(b=>!b.parentId);
          const getChildren=(pid)=>prod.bom.filter(b=>b.parentId===pid);
          const calcCost=(item)=>{
            const children=getChildren(item.id);
            if(children.length===0)return item.cost*item.qtyPer;
            return children.reduce((s,c)=>s+calcCost(c),0)*item.qtyPer;
          };
          const refLabel=(b)=>{
            const mode=state.config.refMode||'name';
            if(mode==='partno')return b.partNo||b.name;
            if(mode==='both')return `${b.partNo||'—'} | ${b.name}`;
            return b.name;
          };
          const renderItem=(b,level)=>{
            const children=getChildren(b.id);
            const indent=level*20;
            const levelColors=['var(--ac)','var(--a2)','var(--a3)','var(--a4)'];
            const cascadedCost=calcCost(b);
            return <React.Fragment key={b.id}>
              <div className="bom-row" style={{marginLeft:indent,borderLeft:`3px solid ${levelColors[level]||'var(--br)'}`,paddingLeft:8}}>
                <div style={{fontSize:8,color:levelColors[level],fontWeight:700,minWidth:24}}>L{level}</div>
                <Field label={state.config.refMode==='name'?'Part Name':'Part No / Name'}>
                  <div style={{display:'flex',gap:4}}>
                    {(state.config.refMode||'name')!=='name'&&<input value={b.partNo||''} placeholder="PN-001" style={{width:70}} onChange={e=>dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{partNo:e.target.value}})}/>}
                    <input value={b.name} onChange={e=>dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{name:e.target.value}})}/>
                  </div>
                </Field>
                <Field label="Qty/Unit"><NumInput step="0.1" value={b.qtyPer} style={{width:55}} onChange={v=>dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{qtyPer:v}})}/></Field>
                <Field label={`Cost (${cur})`}><NumInput step="0.01" value={b.cost} style={{width:65}} onChange={v=>dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{cost:v}})}/></Field>
                <Field label="LT (wk)"><NumInput value={b.leadTime} style={{width:45}} onChange={v=>dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{leadTime:v}})}/></Field>
                <Field label="LT CV%"><NumInput value={b.ltCV||10} style={{width:40}} onChange={v=>dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{ltCV:v}})}/></Field>
                <Field label="MOQ"><NumInput value={b.moq} style={{width:50}} onChange={v=>dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{moq:v}})}/></Field>
                <Field label="Max Ord"><NumInput value={b.maxOrder||500} style={{width:50}} onChange={v=>dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{maxOrder:v}})}/></Field>
                <Field label={`Ord Cost S (${cur})`} hint="TOTAL fixed cost per PO event (Silver-Pyke-Peterson / APICS): Admin (buyer time + approval) + Freight-Fixed (LTL/FTL fixed per shipment — usually largest) + Receiving/QC (dock labor + inspection) + Setup (supplier changeover). Per-unit transport (Trans Rate × qty) is a SEPARATE variable cost, NOT rolled into S. Click ⚙ to enter breakdown."><NumInput value={calcOrderingCost(b)||b.orderingCost||50} style={{width:55}} onChange={v=>dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{orderingCost:v,ordBreakdown:ordBreakdownDefault(v)}})}/></Field>
                <Field label="⚙" hint="Edit S breakdown: admin / freight-fixed / receiving+QC / setup. Sum becomes Ord Cost S."><button style={{fontSize:10,padding:'2px 6px',cursor:'pointer',background:'var(--bg3)',color:'var(--tx2)',border:'1px solid var(--br)',borderRadius:3}} onClick={()=>{const br=b.ordBreakdown||ordBreakdownDefault(b.orderingCost||50);const admin=+prompt(`Admin (buyer time, PO approval, vendor mgmt) — ${cur}/PO`,br.admin)||br.admin;const fr=+prompt(`Freight-Fixed (LTL/FTL fixed per shipment, documentation) — ${cur}/PO`,br.freightFixed)||br.freightFixed;const rc=+prompt(`Receiving+QC (dock labor, inspection, putaway) — ${cur}/PO`,br.receivingQC)||br.receivingQC;const su=+prompt(`Setup (supplier changeover, tooling) — ${cur}/PO`,br.setup)||br.setup;const next={admin,freightFixed:fr,receivingQC:rc,setup:su};const total=admin+fr+rc+su;dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{ordBreakdown:next,orderingCost:total}});}}>⚙</button></Field>
                <Field label="Hold%/yr"><NumInput value={b.holdPct||24} style={{width:40}} onChange={v=>dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{holdPct:v}})}/></Field>
                <Field label="Yield%"><NumInput value={b.partYield||98} style={{width:40}} onChange={v=>dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{partYield:v}})}/></Field>
                <Field label="RM Shelf (d)"><NumInput value={b.rmShelf||90} style={{width:45}} onChange={v=>dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{rmShelf:v}})}/></Field>
                <Field label="Cost CV%"><NumInput value={b.costCV||10} style={{width:40}} onChange={v=>dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{costCV:v}})}/></Field>
                <Field label="Trans Mode" hint="Air: $6-12/kg, 1-3d, insurance ~0.3%, no duty-stacking. Sea: $0.10-0.25/kg, 20-40d, insurance ~0.5%, port handling. Road (FTL/LTL): $0.04-0.12/kg, 1-10d, minimal surcharge. Rail: $0.03-0.08/kg, 5-15d, intermodal handling. Multimodal: mixed. Contract: long-term fixed lane. Affects insurance, duty, handling, fuel defaults in Landed Cost breakdown."><select value={b.transMode||'road'} style={{width:78}} onChange={e=>{
                  const m=e.target.value;
                  // Auto-seed mode-typical transport component defaults if this is the first time the user picks a real mode
                  const presets={air:{transFuelPct:18,transInsurancePct:0.3,transHandlingPerUnit:2},sea:{transFuelPct:12,transInsurancePct:0.6,transHandlingPerUnit:3},road:{transFuelPct:8,transInsurancePct:0.2,transHandlingPerUnit:0.5},rail:{transFuelPct:6,transInsurancePct:0.3,transHandlingPerUnit:1},multimodal:{transFuelPct:10,transInsurancePct:0.5,transHandlingPerUnit:1.5},contract:{transFuelPct:0,transInsurancePct:0.4,transHandlingPerUnit:0}};
                  const seed=!b._modeSeeded?{...presets[m]||{},_modeSeeded:true}:{};
                  dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{transMode:m,...seed}})
                }}><option value="road">Road</option><option value="rail">Rail</option><option value="sea">Sea</option><option value="air">Air</option><option value="multimodal">Multimodal</option><option value="contract">Contract</option></select></Field>
                <Field label="Lot-Sizing Rule" hint="Per-part procurement policy. AUTO (default) evaluates ALL policies against this part's demand and picks the cheapest — no more manual toggling. MILP = solved jointly across all parts; others = closed-form / heuristic on this part alone. When MILP wins (common at small scale with clean data), AUTO picks MILP. Leaderboard is returned in the result.">
                  <select value={b.procPolicy||'auto'} style={{width:95}} onChange={e=>dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{procPolicy:e.target.value}})}>
                    <optgroup label="v3.2 — Auto (recommended)">
                      <option value="auto">Auto (cheapest wins)</option>
                    </optgroup>
                    <optgroup label="Solver (wired)">
                      <option value="milp">MILP (joint)</option>
                    </optgroup>
                    <optgroup label="Closed-form (v3.2)">
                      <option value="lfl">Lot-for-Lot</option>
                      <option value="eoq">EOQ</option>
                      <option value="foq">Fixed Order Qty</option>
                      <option value="poq">Fixed Order Period</option>
                      <option value="minmax">Min-Max (ROP)</option>
                      <option value="epq">EPQ (in-house)</option>
                    </optgroup>
                    <optgroup label="Heuristic (v3.2)">
                      <option value="ww">Wagner-Whitin</option>
                      <option value="silvermeal">Silver-Meal</option>
                      <option value="ppb">Part-Period Balancing</option>
                      <option value="luc">Least Unit Cost</option>
                      <option value="ltc">Least Total Cost</option>
                    </optgroup>
                    <optgroup label="Pull / Framework">
                      <option value="jit">JIT</option>
                      <option value="kanban">Kanban</option>
                      <option value="mrp">MRP (framework)</option>
                    </optgroup>
                  </select>
                </Field>
                <Field label={`Trans Rate (${cur})`}><NumInput step="0.1" value={b.transRate||0.5} style={{width:45}} onChange={v=>dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{transRate:v}})}/></Field>
                <Field label="Pay Days"><NumInput value={b.payTermDays||30} style={{width:40}} onChange={v=>dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{payTermDays:v}})}/></Field>
                <Field label="Source"><select value={b.supplierType} style={{width:75}} onChange={e=>dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{supplierType:e.target.value}})}><option value="domestic">Domestic</option><option value="import">Import</option></select></Field>
                {b.supplierType==='domestic'&&<Field label="Supplier State" hint="Supplier's state (India). If matches plant state → SGST+CGST (intrastate). If different → IGST (interstate). Drives Pillar 3 tax branching in landed-cost."><select value={b.supplierState||'TN'} style={{width:72,fontSize:10}} onChange={e=>dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{supplierState:e.target.value}})}>
                  {['TN','MH','KA','GJ','UP','DL','WB','TG','AP','KL','PB','HR','RJ','MP','BR','OR','JH','CG','AS','UK','HP','GA','TR','MN','ML','NL','MZ','AR','SK','JK','LA','CH','PY','AN','DN','DD','LD'].map(s=><option key={s} value={s}>{s}</option>)}
                </select></Field>}
                {b.supplierType==='domestic'&&<Field label="GST %" hint="Total GST rate (intrastate → CGST+SGST sum; interstate → IGST). Default 18%. Flows into Pillar 3 landed-cost branching and is sunk into cost if non-registered."><NumInput step="0.5" value={b.gstPct??18} style={{width:50}} onChange={v=>dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{gstPct:v}})}/></Field>}
                {b.supplierType==='import'&&<Field label="Incoterm" hint="Incoterms 2020 — 11 rules. Greyed rules are sea/waterway-only (FAS/FOB/CFR/CIF cannot be used for air). Hover an option for who pays what.">
                  <select value={b.incoterm||''} style={{width:72}} onChange={e=>dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{incoterm:e.target.value}})}>
                    <option value="">—</option>
                    <optgroup label="Any mode of transport">
                      <option value="EXW" title="Ex Works — buyer handles everything from seller's premises">EXW</option>
                      <option value="FCA" title="Free Carrier — seller delivers to named carrier; common for air/multimodal">FCA</option>
                      <option value="CPT" title="Carriage Paid To — seller pays freight to named place">CPT</option>
                      <option value="CIP" title="Carriage & Insurance Paid — CPT + seller's insurance">CIP</option>
                      <option value="DAP" title="Delivered at Place — seller handles transit to named place">DAP</option>
                      <option value="DPU" title="Delivered at Place Unloaded — DAP + unloading (new in 2020, replaces DAT)">DPU</option>
                      <option value="DDP" title="Delivered Duty Paid — seller pays all duties, buyer pays nothing">DDP</option>
                    </optgroup>
                    <optgroup label="Sea / waterway only">
                      <option value="FAS" disabled={b.transMode==='air'} title="Free Alongside Ship — seller delivers to ship's side at origin port">FAS</option>
                      <option value="FOB" disabled={b.transMode==='air'} title="Free on Board — seller loads vessel at origin port">FOB</option>
                      <option value="CFR" disabled={b.transMode==='air'} title="Cost and Freight — seller pays freight to destination port">CFR</option>
                      <option value="CIF" disabled={b.transMode==='air'} title="Cost, Insurance, Freight — CFR + seller's insurance">CIF</option>
                    </optgroup>
                  </select>
                </Field>}
                {/* Pillar 3 — Incoterm-conditional import tax inputs. Shown only when buyer pays duty (CIF/CIP/CFR/CPT/FOB/FCA/EXW), hidden for DDP (seller pays). */}
                {b.supplierType==='import'&&incotermBuyerPays(b.incoterm).duty&&<Field label="BCD %" hint="Basic Customs Duty on CIF value (Indian customs). Typical 7.5–10%. Non-refundable. Flows into landed cost via Pillar 3 helper."><NumInput step="0.5" value={b.bcdPct??7.5} style={{width:50}} onChange={v=>dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{bcdPct:v}})}/></Field>}
                {b.supplierType==='import'&&incotermBuyerPays(b.incoterm).duty&&<Field label="SWS %" hint="Social Welfare Surcharge on BCD amount. 10% standard."><NumInput step="0.5" value={b.swsPct??10} style={{width:50}} onChange={v=>dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{swsPct:v}})}/></Field>}
                {b.supplierType==='import'&&incotermBuyerPays(b.incoterm).duty&&<Field label="IGST %" hint="IGST on (CIF+BCD+SWS). 18% standard. RECOVERABLE if GST-registered (ITC), SUNK into landed cost if not registered — Pillar 3 branches on state.config.gstRegistered."><NumInput step="0.5" value={b.igstPct??18} style={{width:50}} onChange={v=>dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{igstPct:v}})}/></Field>}
                <Field label="Backup Suppliers" hint="Kraljic Strategic parts need ≥2 qualified backups. Composite = w_cost·(cost⁻¹) + w_q·quality + w_otd·OTD + w_rel·reliability + w_lt·(LT⁻¹). Solver picks highest-scoring QUALIFIED alt when primary fails OTD, LT exceeds 2× standard, or price spikes above ceiling.">
                  <div style={{minWidth:210}}>
                    {(()=>{
                      const arr=b.backupSuppliers&&b.backupSuppliers.length?b.backupSuppliers:(b.backupSupplier?[{name:b.backupSupplier,cost:b.backupCost||0,leadTime:b.backupLeadTime||0,qualified:true,quality:85,otd:90,reliability:88}]:[]);
                      return arr.map((bk,bi)=><div key={bi} style={{marginBottom:3,padding:'3px 4px',border:'1px solid var(--br)',background:bk.qualified?'rgba(0,212,170,.04)':'transparent',borderRadius:2}}>
                        <div style={{display:'flex',gap:2,alignItems:'center'}}>
                          <input placeholder="Supplier" value={bk.name||''} style={{width:70,fontSize:9,padding:'2px 4px'}} onChange={e=>{const n=[...arr];n[bi]={...n[bi],name:e.target.value};dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{backupSuppliers:n,backupSupplier:n[0]?.name||''}});}}/>
                          <NumInput placeholder="LT(w)" value={bk.leadTime||0} style={{width:34,fontSize:9,padding:'2px 4px'}} title="Lead time (weeks)" onChange={v=>{const n=[...arr];n[bi]={...n[bi],leadTime:v};dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{backupSuppliers:n}});}}/>
                          <NumInput step="0.1" placeholder="Cost" value={bk.cost||0} style={{width:38,fontSize:9,padding:'2px 4px'}} title={`Unit cost in ${cur}`} onChange={v=>{const n=[...arr];n[bi]={...n[bi],cost:v};dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{backupSuppliers:n}});}}/>
                          <label style={{fontSize:8,color:bk.qualified?'var(--gn)':'var(--a4)',cursor:'pointer'}} title="Qualified = passed audits, ready to activate">
                            <input type="checkbox" checked={!!bk.qualified} style={{width:10,height:10,verticalAlign:'middle'}} onChange={e=>{const n=[...arr];n[bi]={...n[bi],qualified:e.target.checked};dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{backupSuppliers:n}});}}/>Q
                          </label>
                          <button style={{fontSize:8,padding:'0 3px',cursor:'pointer',background:'none',border:'1px solid var(--dg)',color:'var(--dg)',borderRadius:2,lineHeight:1.4}} onClick={()=>{const n=arr.filter((_,j)=>j!==bi);dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{backupSuppliers:n,backupSupplier:n[0]?.name||''}});}}>×</button>
                        </div>
                        <div style={{display:'flex',gap:2,alignItems:'center',marginTop:2}}>
                          <span style={{fontSize:8,color:'var(--tx3)',width:14}} title="Quality score (0-100) — defect rate, audit results">Q</span>
                          <NumInput min="0" max="100" value={bk.quality??85} style={{width:30,fontSize:9,padding:'1px 3px'}} title="Quality score 0-100" onChange={v=>{const n=[...arr];n[bi]={...n[bi],quality:v};dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{backupSuppliers:n}});}}/>
                          <span style={{fontSize:8,color:'var(--tx3)',width:22}} title="On-Time Delivery %">OTD</span>
                          <NumInput min="0" max="100" value={bk.otd??90} style={{width:30,fontSize:9,padding:'1px 3px'}} title="On-Time Delivery %" onChange={v=>{const n=[...arr];n[bi]={...n[bi],otd:v};dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{backupSuppliers:n}});}}/>
                          <span style={{fontSize:8,color:'var(--tx3)',width:16}} title="Reliability % — uptime, financial health, capacity">Rel</span>
                          <NumInput min="0" max="100" value={bk.reliability??88} style={{width:30,fontSize:9,padding:'1px 3px'}} title="Reliability %" onChange={v=>{const n=[...arr];n[bi]={...n[bi],reliability:v};dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{backupSuppliers:n}});}}/>
                        </div>
                      </div>);
                    })()}
                    <button style={{fontSize:8,padding:'1px 5px',cursor:'pointer',background:'var(--bg3)',border:'1px solid var(--br2)',color:'var(--tx2)',borderRadius:3}} onClick={()=>{
                      const arr=b.backupSuppliers&&b.backupSuppliers.length?b.backupSuppliers:(b.backupSupplier?[{name:b.backupSupplier,cost:b.backupCost||0,leadTime:b.backupLeadTime||0,qualified:true,quality:85,otd:90,reliability:88}]:[]);
                      const next=[...arr,{name:`Alt ${arr.length+1}`,cost:(b.cost||1)*1.1,leadTime:(b.leadTime||1)+1,qualified:false,quality:80,otd:85,reliability:80}];
                      dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{backupSuppliers:next,backupSupplier:next[0]?.name||''}});
                    }}>+ backup</button>
                    {(()=>{
                      const arr=b.backupSuppliers&&b.backupSuppliers.length?b.backupSuppliers:(b.backupSupplier?[{qualified:true}]:[]);
                      const nq=arr.filter(bk=>bk.qualified).length;
                      const risk=nq===0?{c:'var(--dg)',t:'HIGH RISK'}:nq===1?{c:'var(--a4)',t:'MEDIUM'}:{c:'var(--gn)',t:'LOW'};
                      return <div style={{fontSize:8,marginTop:2,color:risk.c,fontWeight:600}}>{nq} qualified · {risk.t}</div>;
                    })()}
                  </div>
                </Field>
                {children.length>0&&<Field label="Cascaded"><input value={`${cur}${cascadedCost.toFixed(2)}`} readOnly style={{width:70,color:'var(--a3)',fontWeight:600}}/></Field>}
                <Field label="Vol Disc Tiers" hint="Supplier price break schedule. Solver applies effective unit cost = base × (1 − pct/100) when order ≥ minQty. Tiers stack from lowest to highest MinQty.">
                  <div style={{minWidth:130}}>
                    {(b.volDisc||[{minQty:0,pct:0}]).map((tier,ti)=><div key={ti} style={{display:'flex',gap:2,marginBottom:3,alignItems:'center'}}>
                      <NumInput placeholder="MinQty" value={tier.minQty} style={{width:48,fontSize:9,padding:'2px 4px'}} onChange={v=>{const vd=[...(b.volDisc||[{minQty:0,pct:0}])];vd[ti]={...vd[ti],minQty:v};dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{volDisc:vd}});}}/>
                      <span style={{fontSize:9,color:'var(--tx3)'}}>≥</span>
                      <NumInput placeholder="Disc%" value={tier.pct} style={{width:36,fontSize:9,padding:'2px 4px'}} onChange={v=>{const vd=[...(b.volDisc||[{minQty:0,pct:0}])];vd[ti]={...vd[ti],pct:v};dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{volDisc:vd}});}}/>
                      <span style={{fontSize:9,color:'var(--a4)'}}>%off</span>
                      {ti>0&&<button style={{fontSize:8,padding:'0 3px',cursor:'pointer',background:'none',border:'1px solid var(--dg)',color:'var(--dg)',borderRadius:2,lineHeight:1.4}} onClick={()=>{const vd=(b.volDisc||[]).filter((_,j)=>j!==ti);dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{volDisc:vd}});}}>×</button>}
                    </div>)}
                    <button style={{fontSize:8,padding:'1px 5px',cursor:'pointer',background:'var(--bg3)',border:'1px solid var(--br2)',color:'var(--tx2)',borderRadius:3}} onClick={()=>{const vd=[...(b.volDisc||[{minQty:0,pct:0}]),{minQty:(b.moq||50)*2,pct:2}];dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{volDisc:vd}});}}>+ tier</button>
                  </div>
                </Field>
                <Field label="Trans Rate Tiers" hint="Freight rate schedule. Solver picks rate = tier.rate where order ≥ tier.minQty. Lets you price FTL/LTL break points (e.g., 500+ units = ₹0.3/u).">
                  <div style={{minWidth:130}}>
                    {(b.tiers||[{minQty:0,rate:b.transRate||0.5}]).map((tier,ti)=><div key={ti} style={{display:'flex',gap:2,marginBottom:3,alignItems:'center'}}>
                      <NumInput placeholder="MinQty" value={tier.minQty} style={{width:48,fontSize:9,padding:'2px 4px'}} onChange={v=>{const ts=[...(b.tiers||[{minQty:0,rate:0.5}])];ts[ti]={...ts[ti],minQty:v};dispatch({type:'UPDATE_BOM_ITEM',productId:activeId,bomId:b.id,payload:{tiers:ts}});}}/>
                      <span style={{fontSize:9,color:'var(--tx3)'}}>≥</span>

                <div style={{fontSize:16,fontWeight:800,color:'var(--tx)'}}>{cur}{total.toLocaleString()}</div>
                <div style={{fontSize:8,color:'var(--tx2)'}}>= {cur}{(total/Math.max(annual,1)).toFixed(2)}/u avg</div>
              </div>
            </div>
          </div>
        </div>;
      })()}

      {/* Product Settings */}
      <div className="card">
        <div className="card-title">⚙️ Product Parameters <span className="badge" style={{background:'rgba(167,139,250,.1)',color:'var(--a3)'}}>Each feeds a calculation</span><SectionInfo><strong>What it does:</strong> Per-SKU operational parameters: capacity (units/period), MAPE (forecast error), yield %, OEE, sell price, shelf life, init inventory, demand mode, etc.<br/><strong>Each field flows to a specific solver constraint</strong> — see the per-field ⓘ tooltips for the exact MILP variable/constraint each one drives.</SectionInfo></div>
        <div style={{fontSize:10,color:'var(--tx3)',marginBottom:6}}>MAPE auto-fills from winning forecast model. All parameters cascade into safety stock, MPS, MILP, and Monte Carlo.</div>
        <div className="grid4">
          <Field label="MAPE %" hint="Auto from winner → SS → ROP → MC noise"><NumInput value={prod.mape||15} onChange={v=>upProd({mape:v})} min={0} max={100} style={{color:'var(--a4)',fontWeight:600}}/></Field>
          <Field label="Demand Ceiling" hint="strict = cap at forecast (no MAPE buffer); soft = forecast × (1+MAPE) (deterministic robust-optimization, Bertsimas-Sim style); off = solver free (use maxProd only)"><select value={prod.demandCeilingMode||'soft'} onChange={e=>upProd({demandCeilingMode:e.target.value})} style={{color:prod.demandCeilingMode==='strict'?'var(--dg)':prod.demandCeilingMode==='off'?'var(--a3)':'var(--ac)',fontWeight:600}}><option value="soft">soft (±MAPE robust)</option><option value="strict">strict (cap at forecast)</option><option value="off">off (free)</option></select></Field>
          <Field label="Demand Mode" hint="MTS-weekly (default): build-to-stock; demand[t] is the period total; solver may pre-build inventory. Simultaneous: total demand fires at once across horizon. Daily: demand spread evenly across workdays in the period. MTO: make-to-order; no inventory build-ahead — production must match demand each period (FG inv ≤ safety stock only)."><select value={prod.demandMode||'mts-weekly'} onChange={e=>upProd({demandMode:e.target.value})} style={{color:'var(--a3)',fontWeight:600}}><option value="mts-weekly">MTS (build to stock)</option><option value="simultaneous">Simultaneous</option><option value="daily">Daily-spread</option><option value="mto">MTO (make to order)</option></select></Field>
          <Field label="Shelf Life (days)" hint={`FG expiry in DAYS. At grain "${state.planning?.timeGrain||'weekly'}" solver enforces ${effectiveShelfDays(prod.shelfLife||52,state.planning)} days. Switch grain to daily for 100% exact.`}><NumInput value={prod.shelfLife||52} onChange={v=>upProd({shelfLife:v})}/></Field>
          <Field label="Yield Predicted %" hint="Production yield used by the planner → scrap factor. Predicted = what the design says you should achieve."><NumInput value={Math.round((prod.yieldPct||0.95)*100)} onChange={v=>upProd({yieldPct:v/100})} min={50} max={100} style={{color:'var(--ac)',fontWeight:600}}/></Field>
          {/* P7 — yieldActual side-by-side variance vs predicted */}
          <Field label="Yield Actual %" hint="Yield observed in production this horizon. If left blank or 0, the planner assumes predicted = actual. Variance = (actual − predicted) drives the Cost Waterfall Quality Loss bar and the P5 alert if Δ > 5 pp."><NumInput value={prod.yieldActual!=null?Math.round((prod.yieldActual||0)*100):''} placeholder="—" onChange={v=>upProd({yieldActual:v===''||v==null?null:(+v||0)/100})} min={0} max={100} style={{color:'var(--a4)'}}/></Field>
          {(()=>{
            if(prod.yieldActual==null)return null;
            const dPct=((prod.yieldActual-(prod.yieldPct||0.95))*100).toFixed(1);
            const sign=+dPct>=0?'+':'';
            const col=Math.abs(+dPct)>5?'var(--dg)':Math.abs(+dPct)>2?'var(--a4)':'var(--gn)';
            return <div className="field" style={{display:'flex',flexDirection:'column',justifyContent:'flex-end',padding:'4px 6px',background:'var(--bg3)',border:`1px solid ${col}`,borderRadius:3}}>
              <span style={{fontSize:9,color:'var(--tx3)',letterSpacing:.4,fontWeight:600}}>YIELD VARIANCE</span>
              <span style={{fontSize:14,fontWeight:700,color:col}}>{sign}{dPct} pp</span>
              <span style={{fontSize:8,color:'var(--tx3)'}}>{Math.abs(+dPct)>5?'⚠ exceeds threshold':'within tolerance'}</span>
            </div>;
          })()}
          <Field label="Yield CV %" hint="Variability for MC"><NumInput value={prod.yieldCV||0} onChange={v=>upProd({yieldCV:v})}/></Field>
          <Field label="Capacity (u/week)"><NumInput value={prod.capacity||50} onChange={v=>upProd({capacity:v})}/></Field>
          <Field label="Cycle Time (min/u)" hint="Process time per unit"><NumInput value={prod.cycleTime||19} onChange={v=>upProd({cycleTime:v})}/></Field>
          <Field label="Setup Penalty" hint="1.0=none, 1.25=seasonal"><NumInput step="0.05" value={prod.setupPen||1} onChange={v=>upProd({setupPen:v})}/></Field>
          {/* Setup Cost + Fixed Factory + Labor moved to the dedicated "Fixed & Setup Costs" card above — single source of truth */}
          <Field label="Salvage %" hint="Recovery rate on expired/obsolete inventory. Used in Newsvendor critical ratio and write-off cost."><NumInput value={Math.round((prod.salvageRate||0.8)*100)} onChange={v=>upProd({salvageRate:v/100})} min={0} max={100}/></Field>
          <Field label="FG Warehouse Max" hint="Per-product storage cap. Solver enforces as hard constraint. 0 = unlimited."><NumInput value={prod.whMaxUnits||500} onChange={v=>upProd({whMaxUnits:v})}/></Field>
          {/* P7 — per-product footprint for area/volume warehouse modes */}
          <Field label="Footprint (m²/u)" hint="Floor area per unit. Used when Setup → Budget warehouse mode = 'area'; effective wh_max = area_limit / weighted-avg footprint."><NumInput step="0.01" value={prod.footprintArea||0.05} onChange={v=>upProd({footprintArea:v})}/></Field>
          <Field label="Volume (m³/u)" hint="Stack volume per unit. Used when warehouse mode = 'volume'."><NumInput step="0.001" value={prod.footprintVolume||0.02} onChange={v=>upProd({footprintVolume:v})}/></Field>
          <Field label="Production Mode" hint="MTS = Make-to-Stock (forecast-driven, safety stock). MTO = Make-to-Order (backlog-driven, no FG inventory). ATO = Assemble-to-Order (subassy MTS + final MTO). This gates which tabs/sections are relevant."><select value={prod.prodMode||'mts'} onChange={e=>upProd({prodMode:e.target.value})}><option value="mts">Make-to-Stock</option><option value="mto">Make-to-Order</option><option value="ato">Assemble-to-Order</option><option value="eto">Engineer-to-Order</option><option value="retailer">Retailer (pass-through)</option></select></Field>
          <Field label="Backorder" hint="Yes = allow stockouts to be filled in later period (penalty applied). No = treat as lost sales (revenue lost)."><select value={prod.backorderOn?'yes':'no'} onChange={e=>upProd({backorderOn:e.target.value==='yes'})}><option value="no">No (lost sale)</option><option value="yes">Yes (backorder)</option></select></Field>
          <Field label="Cap CV %" hint="Equipment failure variability — used by Monte Carlo to simulate capacity shortfalls."><NumInput value={prod.capCV||5} onChange={v=>upProd({capCV:v})}/></Field>
        </div>
        {/* ── Variable Cost breakdown (single source of truth) ── */}
        {(()=>{
          const vcTotal=(+prod.vcElectricity||0)+(+prod.vcPackaging||0)+(+prod.vcConsumables||0)+(+prod.vcDirectLabor||0)+(+prod.vcOther||0);
          return <div style={{marginTop:8,padding:'8px 10px',background:'var(--bg3)',borderRadius:4,borderLeft:'3px solid var(--a2)'}}>
            <div style={{fontSize:10,fontWeight:600,color:'var(--a2)',marginBottom:4}}>💰 Variable Cost Breakdown <span style={{color:'var(--tx3)',fontSize:9,fontWeight:400,marginLeft:6}}>Edit components — total below is derived. This is the ONLY place to edit variable cost in v3.0 (was duplicated in v2.0).</span></div>
            <div className="grid6">
              <Field label={`Electricity (${cur})`}><NumInput step="0.1" value={prod.vcElectricity||1.5} onChange={v=>upProd({vcElectricity:v})}/></Field>
              <Field label={`Packaging (${cur})`}><NumInput step="0.1" value={prod.vcPackaging||1} onChange={v=>upProd({vcPackaging:v})}/></Field>
              <Field label={`Consumables (${cur})`}><NumInput step="0.1" value={prod.vcConsumables||1} onChange={v=>upProd({vcConsumables:v})}/></Field>
              <Field label={`Direct Labor (${cur})`}><NumInput step="0.1" value={prod.vcDirectLabor||1} onChange={v=>upProd({vcDirectLabor:v})}/></Field>
              <Field label={`Other (${cur})`}><NumInput step="0.1" value={prod.vcOther||0.5} onChange={v=>upProd({vcOther:v})}/></Field>
              <Field label={`TOTAL (${cur}/u)`} hint="Computed: Σ of the five components. Used by every solver.">
                <input readOnly value={Math.round(vcTotal*100)/100} style={{background:'var(--bg2)',color:'var(--a2)',fontWeight:700,cursor:'not-allowed'}}/>
              </Field>
            </div>
          </div>;
        })()}
        {/* ── Carry Rate breakdown (single source of truth) ── */}
        {(()=>{
          const crTotal=(+prod.crCapital||0)+(+prod.crStorage||0)+(+prod.crInsurance||0)+(+prod.crObsolescence||0)+(+prod.crHandling||0)+(+prod.crShrinkage||0);
          return <div style={{marginTop:6,padding:'8px 10px',background:'var(--bg3)',borderRadius:4,borderLeft:'3px solid var(--a4)'}}>
            <div style={{fontSize:10,fontWeight:600,color:'var(--a4)',marginBottom:4}}>📦 Annual Carry Rate Breakdown (% of inventory value) <span style={{color:'var(--tx3)',fontSize:9,fontWeight:400,marginLeft:6}}>Edit components — total is derived. Indian typical 20-30%.</span></div>
            <div className="grid6">
              <Field label="Capital %" hint="Opportunity cost of capital tied up in inventory. Usually ≈ WACC."><NumInput step="0.5" value={prod.crCapital||10} onChange={v=>upProd({crCapital:v})}/></Field>
              <Field label="Storage %" hint="Rent, utilities, equipment allocation to stored goods."><NumInput step="0.5" value={prod.crStorage||5} onChange={v=>upProd({crStorage:v})}/></Field>
              <Field label="Insurance %"><NumInput step="0.5" value={prod.crInsurance||2} onChange={v=>upProd({crInsurance:v})}/></Field>
              <Field label="Obsolescence %" hint="Expected write-down from expiry, model changes, product discontinuation."><NumInput step="0.5" value={prod.crObsolescence||4} onChange={v=>upProd({crObsolescence:v})}/></Field>
              <Field label="Handling %"><NumInput step="0.5" value={prod.crHandling||2} onChange={v=>upProd({crHandling:v})}/></Field>
              <Field label="Shrinkage %" hint="Theft, damage, counting errors."><NumInput step="0.5" value={prod.crShrinkage||1} onChange={v=>upProd({crShrinkage:v})}/></Field>
              <Field label="TOTAL %/yr" hint="Computed. Solver uses this / 365 as daily carry cost multiplier."><input readOnly value={Math.round(crTotal*10)/10} style={{background:'var(--bg2)',color:'var(--a4)',fontWeight:700,cursor:'not-allowed'}}/></Field>
            </div>
          </div>;
        })()}
        {/* Outbound logistics */}
        <div style={{marginTop:8,padding:'6px 8px',background:'var(--bg3)',borderRadius:4}}>
          <div style={{fontSize:10,fontWeight:600,color:'var(--a2)',marginBottom:4}}>📦 Outbound / Distribution</div>
          <div className="grid4">
            <Field label={`Outbound Rate (${cur}/u)`}><NumInput step="0.1" value={prod.outRate||2} onChange={v=>upProd({outRate:v})}/></Field>
            <Field label="Out Mode"><select value={prod.outMode||'perUnit'} onChange={e=>upProd({outMode:e.target.value})}><option value="perUnit">Per Unit</option><option value="perShipment">Per Shipment</option><option value="customer">Customer pays</option></select></Field>
            <Field label={`Ship Cost (${cur})`} hint="Fixed per shipment"><NumInput value={prod.outShipCost||50} onChange={v=>upProd({outShipCost:v})}/></Field>
            <Field label="DSO (days)" hint="Days Sales Outstanding"><NumInput value={prod.dso||30} onChange={v=>upProd({dso:v})}/></Field>
          </div>
        </div>
        {/* v3.6 — Milk Run inbound consolidation. Three modes: per-trip × trips/period, fixed per-period, or per-supplier-visit × #suppliers. Adds an annual cost line surfaced in TCO and landed cost. */}
        {(()=>{
          const mode=prod.milkRunMode||'off';
          const cost=+prod.milkRunCost||0;
          const freq=+prod.milkRunFreq||1;
          const supCount=new Set((prod.bom||[]).map(b=>b.supplierName||b.supplier||b.vendor).filter(Boolean)).size||(prod.bom||[]).length;
          const periodsPerYear=({daily:260,weekly:52,monthly:12})[state.planning?.timeGrain||'weekly']||52;
          const annual=mode==='perTrip'?cost*freq*periodsPerYear:mode==='perPeriod'?cost*periodsPerYear:mode==='perSupplier'?cost*supCount*freq*periodsPerYear:0;
          return <div style={{marginTop:6,padding:'6px 8px',background:'var(--bg3)',borderRadius:4,borderLeft:'3px solid var(--a3)'}}>
            <div style={{fontSize:10,fontWeight:600,color:'var(--a3)',marginBottom:4}}>🚚 Milk Run (consolidated inbound pickup) <span style={{color:'var(--tx3)',fontSize:9,fontWeight:400,marginLeft:6}}>One truck, multiple suppliers — shared cost across BOM. Set to OFF if each supplier ships separately (already in BOM trans rate).</span></div>
            <div className="grid4">
              <Field label="Mode" hint="OFF → no milk run; per-Trip → cost × trips per period; per-Period → fixed annual fee; per-Supplier → cost × visits × suppliers (today: {supCount}).">
                <select value={mode} onChange={e=>upProd({milkRunMode:e.target.value})}>
                  <option value="off">Off (per-supplier shipping)</option>
                  <option value="perTrip">Per Trip</option>
                  <option value="perPeriod">Fixed per Period</option>
                  <option value="perSupplier">Per Supplier Visit</option>
                </select>
              </Field>
              <Field label={`Cost (${cur})`} hint={mode==='perTrip'?'Cost of each milk-run trip':mode==='perPeriod'?'Fixed cost per planning period':mode==='perSupplier'?'Cost per supplier pickup':'—'}>
                <NumInput step="1" value={prod.milkRunCost||0} onChange={v=>upProd({milkRunCost:v})} disabled={mode==='off'}/>
              </Field>
              <Field label="Frequency / period" hint={mode==='perTrip'?`Trips per ${state.planning?.timeGrain||'week'}`:mode==='perSupplier'?'Pickups per supplier per period':'(unused)'}>
                <NumInput step="1" min={0} value={prod.milkRunFreq||1} onChange={v=>upProd({milkRunFreq:v})} disabled={mode==='off'||mode==='perPeriod'}/>
              </Field>
              <Field label="Annual cost" hint={`Mode=${mode}. Suppliers in BOM: ${supCount}. Periods/yr at "${state.planning?.timeGrain||'weekly'}" grain: ${periodsPerYear}.`}>
                <input readOnly value={`${cur}${Math.round(annual).toLocaleString()}`} style={{background:'var(--bg2)',color:'var(--a3)',fontWeight:700,cursor:'not-allowed'}}/>
              </Field>
            </div>
          </div>;
        })()}
      </div>

      {/* Routing — per-product operations DAG (v3.4: parallelism removed; parallelism is "more lines") */}
      <div className="card" style={{borderLeft:'3px solid var(--a2)'}}>
        <div className="card-title">🏭 Production — Cycle Time &amp; Line Assignment
          <span className="badge" style={{background:'rgba(79,168,240,.12)',color:'var(--a2)',marginLeft:6}}>v3.4</span>
          <SectionInfo><strong>What it does:</strong> Per-product cycle time + which production lines this SKU may run on.<br/><strong>Cycle time</strong> (min/unit) → cycle_hrs = cycleMin ÷ 60 → throughput_per_hr = 60/cycleMin.<br/><strong>Line eligibility</strong> comes from the global compatibility matrix at the top of the tab. Parallelism = running on multiple lines, not stations within a line.<br/><strong>Flows to:</strong> Capacity constraint C2 in MILP (per-line + shared-hours).</SectionInfo>
        </div>
        {/* Eligible lines chips — derived from global compatibility matrix */}
        {(()=>{
          const eligible=(state.production.lines||[]).filter(l=>!l.eligibleProducts?.length||l.eligibleProducts.includes(prod.id));
          const dedicated=eligible.filter(l=>(l.eligibleProducts||[]).length===1);
          return <div style={{fontSize:10,marginBottom:8,padding:'6px 8px',background:'var(--bg3)',borderRadius:4}}>
            <strong style={{color:'var(--a2)'}}>Eligible lines for {prod.name}:</strong> {eligible.length===0?<span style={{color:'var(--dg)'}}>none — infeasible! Fix the compatibility matrix above.</span>:eligible.map(l=><span key={l.id} style={{display:'inline-block',margin:'0 4px',padding:'2px 6px',background:(dedicated.includes(l))?'var(--a4)':'var(--ac)',color:'#000',borderRadius:3,fontSize:10,fontWeight:600}}>{l.name}{dedicated.includes(l)?' (dedicated)':''}</span>)}
            <div style={{fontSize:9,color:'var(--tx3)',marginTop:4}}>Edit eligibility in the compatibility matrix at the top of this tab. Parallelism = running on more lines (not stations within a line).</div>
          </div>;
        })()}
        <div style={{fontSize:10,color:'var(--tx3)',marginBottom:6}}>
          Define operation sequence (multi-step routing) — each op picks one of <strong>{prod.name}</strong>'s eligible lines. For single-op SKUs just add one row. Cycle time here is per-op (line-agnostic); setup minutes trigger at changeover.
        </div>
        <div style={{display:'flex',gap:8,marginBottom:8,alignItems:'center',flexWrap:'wrap'}}>
          <span style={{fontSize:9,color:'var(--tx3)'}}>{(prod.routing||[]).length} op(s) defined</span>
          <button className="btn btn-secondary btn-sm" style={{marginLeft:'auto'}} onClick={()=>{
            const rt=prod.routing||[];
            const seq=rt.length;
            const eligible=(state.production.lines||[]).filter(l=>!l.eligibleProducts?.length||l.eligibleProducts.includes(prod.id));
            const newOp={id:Date.now().toString(36),seq,name:`Op ${seq+1}`,workCenter:'WC1',lineId:eligible[0]?.id||state.production.lines[0]?.id||'line1',cycleTimeMin:prod.cycleTime||19,setupMin:30,yieldPct:98,predecessor:seq>0?rt[seq-1].id:null};
            upProd({routing:[...rt,newOp]});
          }}>+ Add Operation</button>
        </div>
        {(prod.routing||[]).length>0&&<div style={{overflowX:'auto'}}>
          <table className="data-table">
            <thead><tr><th>#</th><th>Name</th><th>Work Center</th><th>Line (eligible)</th><th>Cycle (min/u)</th><th>Setup (min)</th><th>Yield %</th><th>Theor. u/hr</th><th></th></tr></thead>
            <tbody>{(prod.routing||[]).map((op,oi)=>{
              const eligible=(state.production.lines||[]).filter(l=>!l.eligibleProducts?.length||l.eligibleProducts.includes(prod.id));
              const oee=((prod.oeeAvailability||85)*(prod.oeePerformance||92)*(prod.oeeQuality||98))/1000000;
              const effUperHr=op.cycleTimeMin>0?Math.round(60/op.cycleTimeMin*oee*100)/100:0;
              const upRouting=(patch)=>{const rt=[...(prod.routing||[])];rt[oi]={...rt[oi],...patch};upProd({routing:rt});};
              const lineOK=eligible.some(l=>l.id===op.lineId);
              return <tr key={op.id}>
                <td style={{fontWeight:600,color:'var(--a4)'}}>{oi+1}</td>
                <td><input value={op.name} onChange={e=>upRouting({name:e.target.value})} style={{width:90,fontSize:10}}/></td>
                <td><input value={op.workCenter} onChange={e=>upRouting({workCenter:e.target.value})} style={{width:60,fontSize:10}} title="SAP CR01 work center code"/></td>
                <td><select value={op.lineId} onChange={e=>upRouting({lineId:e.target.value})} style={{width:95,fontSize:10,background:lineOK?'inherit':'rgba(248,81,73,.08)',color:lineOK?'inherit':'var(--dg)'}}>{eligible.length===0?<option value="">(no eligible)</option>:eligible.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}</select></td>
                <td><NumInput step="0.1" value={op.cycleTimeMin} onChange={v=>upRouting({cycleTimeMin:v})} style={{width:50,fontSize:10}}/></td>
                <td><NumInput value={op.setupMin} onChange={v=>upRouting({setupMin:v})} style={{width:45,fontSize:10}}/></td>
                <td><NumInput value={op.yieldPct} onChange={v=>upRouting({yieldPct:v})} style={{width:40,fontSize:10}}/></td>
                <td className="num" style={{color:'var(--ac)',fontSize:10}}>{effUperHr}</td>
                <td><button className="btn btn-danger btn-sm" onClick={()=>{const rt=(prod.routing||[]).filter(r=>r.id!==op.id);upProd({routing:rt});}}>×</button></td>
              </tr>;
            })}</tbody>
          </table>
          {(()=>{
            const rt=prod.routing||[];
            const oee=((prod.oeeAvailability||85)*(prod.oeePerformance||92)*(prod.oeeQuality||98))/1000000;
            const bottleneckCycle=Math.max(...rt.map(o=>o.cycleTimeMin||0),prod.cycleTime||19);
            const eligible=(state.production.lines||[]).filter(l=>!l.eligibleProducts?.length||l.eligibleProducts.includes(prod.id));
            const nLines=Math.max(eligible.length,1);
            const shiftsHrs=(state.production.lines[0]?.hoursPerShift||8)*(state.production.lines[0]?.shiftsPerDay||2);
            const netHrs=shiftsHrs-(state.production.lines[0]?.breakMins||30)*(state.production.lines[0]?.shiftsPerDay||2)/60;
            const wkDays=state.planning.workDays||6;
            const perLineDaily=Math.floor(netHrs*60/Math.max(bottleneckCycle,0.1)*oee);
            const weeklyIfAllRun=perLineDaily*wkDays*nLines;
            return <div style={{fontSize:10,color:'var(--tx3)',marginTop:6,padding:'6px 8px',background:'var(--bg3)',borderRadius:4}}>
              Bottleneck cycle: <strong style={{color:'var(--dg)'}}>{bottleneckCycle.toFixed(1)} min/u</strong>
              {' | '}Per-line daily capacity: <strong style={{color:'var(--ac)'}}>{perLineDaily}</strong> u/d
              {' | '}If all {nLines} eligible line(s) run this SKU: <strong style={{color:'var(--a2)'}}>{weeklyIfAllRun.toLocaleString()}</strong> u/wk max
              {' | '}Solver allocates between SKUs sharing these lines.
            </div>;
          })()}
        </div>}
        {!(prod.routing||[]).length&&<div style={{fontSize:10,color:'var(--tx3)',padding:'8px',background:'var(--bg3)',borderRadius:4,textAlign:'center'}}>
          No routing defined — using fallback cycle time {prod.cycleTime||19} min/u on eligible lines. Add operations for multi-step routing.
        </div>}
      </div>

      {/* Cost Events — Rolling Horizon */}
      <div className="card">
        <div className="card-title">📅 Cost Events — Rolling Horizon<SectionInfo><strong>What it does:</strong> Schedules step-changes in any cost parameter at a specified period (e.g., "from month 6 onwards, variable cost = 7.50").<br/><strong>Use cases:</strong> contracted price escalation, supplier renegotiation, FX-adjusted cost ramps.<br/><strong>Flows to:</strong> Procurement MILP uses period-indexed cost series instead of a single scalar.</SectionInfo></div>
        <div style={{fontSize:10,color:'var(--tx3)',marginBottom:6}}>Schedule parameter changes at future dates. E.g., supplier renegotiates price in month 4, new transport contract in month 7. The solver uses current values until the event date, then switches.</div>

  // Build a per-product consensus forecast by running all 17 models, picking top-3 by MAPE,
  // then inverse-MAPE weighting their forward forecast arrays. Memoized per history reference.
  const forecastByProd=useMemo(()=>{
    const map={};
    (state.products||[]).forEach(p=>{
      const hist=p.history||[];
      if(hist.length<3){map[p.id]=hist.slice();return}
      const results=runAllForecasts(hist);
      const top=results.slice(0,3).filter(r=>r&&r.forecast&&r.forecast.length);
      if(!top.length){map[p.id]=hist.slice();return}
      const L=Math.max(...top.map(r=>r.forecast.length));
      const weights=top.map(r=>1/Math.max(r.mape||15,0.1));
      const wSum=weights.reduce((a,b)=>a+b,0);
      const consensus=[];
      for(let i=0;i<L;i++){
        let v=0;top.forEach((r,j)=>{v+=(r.forecast[i]||r.forecast[r.forecast.length-1]||0)*weights[j]/wSum});
        consensus.push(Math.max(0,Math.round(v)));
      }
      // User overrides (manual forecast adjustments) win
      const ovr=p.overrides||[];
      ovr.forEach((o,i)=>{if(o!=null&&i<consensus.length)consensus[i]=+o});
      map[p.id]=consensus;

            params:{periods:periodCount(state.planning),time_grain:state.planning.timeGrain||"weekly",horizon_start_date:state.planning.horizonStartDate||null,holidays:(state.planning.holidays||[]).map(h=>h.date),working_capital:+(state.budget&&state.budget.workingCapital)||0,carry_rate:0.24,wh_max:constraints.warehouse.on?Math.min(constraints.warehouse.val,effectiveWhMaxUnits(state,5000)):effectiveWhMaxUnits(state,5000),wh_mode:state.budget.warehouseMode||'units',service_level:state.config.serviceLevel},
          }
        };
      }
      const res=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      const data=await res.json();
      if(data.error){setError(data.error)}else{setResult({...data,_mode:solverMode})}
    }catch(e){setError(e.message)}
    setSolving(false);
  };

  const MODES=[
    {id:'profitmix',label:'① Profit Max',icon:'💰',desc:'STEP 1 — Maximize contribution margin: decides HOW MUCH of each SKU to make given shared capacity and demand ceiling. Output quantities feed Procurement & Production.',obj:'Max Margin'},
    {id:'procurement',label:'② Procurement',icon:'📦',desc:'STEP 2 — Takes Profit Mix quantities, explodes BOM, finds optimal PO schedule minimizing total procurement + holding + ordering cost (MILP/CBC).',obj:'Min Cost'},
    {id:'production',label:'③ Production',icon:'🏭',desc:'STEP 3 — Takes required quantities from Profit Mix, schedules across production lines minimizing makespan + setup + overtime (MILP/CBC).',obj:'Min Makespan'},
    {id:'pipeline',label:'🔗 Full Pipeline',icon:'🔗',desc:'Chains all 3 steps in order: Profit Mix → Disaggregation (seasonal) → Procurement → Production. Each step output feeds the next.',obj:'End-to-End'},
    {id:'transport',label:'Transport',icon:'🚛',desc:'Mode selection with demand sensing + allocation (LP). Evaluates road/rail/sea/air/multimodal across 25 Indian routes.',obj:'Min Logistics'},
    {id:'capital',label:'Capital Budget',icon:'🏗️',desc:'Maximize portfolio NPV subject to CAPEX budget (LP). Computes IRR, payback, profitability index per investment.',obj:'Max NPV'},
    {id:'montecarlo',label:'Monte Carlo',icon:'🎲',desc:'1000 stochastic runs with randomized demand (±MAPE%), lead times (±LT_CV%), material prices (±cost_CV%). Outputs VaR/CVaR/fragility.',obj:'Risk Analysis'},
    {id:'rolling',label:'🔄 Rolling MPS',icon:'🔄',desc:'v3.0 P8 — Re-solve procurement over N waves (default 4). Each wave shifts horizon forward by shiftWeeks, freezes first N weeks of prev plan. Outputs nervousness (qty variance across re-plans) — use to tune the frozen/slushy horizon.',obj:'Rolling-horizon Stability'},
  ];

  // Dynamic constraints
  const [constraints,setConstraints]=useState({budget:{on:!!state.budget.procurement,val:state.budget.procurement||500000},warehouse:{on:true,val:5000},workingCapital:{on:false,val:200000},supplierMax:{on:false,val:1000}});
  const toggleC=(k)=>setConstraints(c=>({...c,[k]:{...c[k],on:!c[k].on}}));
  const setCV=(k,v)=>setConstraints(c=>({...c,[k]:{...c[k],val:+v}}));

  return <div className="animate-in">
    <div className="vgrid vgrid-2" style={{marginBottom:14}}>
      <MRPExplosionPanel state={state}/>
      <RCCPLoadPanel state={state}/>
    </div>
    {/* Solver Mode Selector */}
    <div className="card">
      <div className="card-title">⚡ Optimization Engine <span className="badge" style={{background:'rgba(56,189,248,.1)',color:'var(--a2)'}}>MILP · PuLP/CBC</span></div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(110px,1fr))',gap:6,marginBottom:12}}>
        {MODES.map(m=><div key={m.id} onClick={()=>setSolverMode(m.id)} style={{padding:'8px 10px',borderRadius:4,cursor:'pointer',border:`1px solid ${solverMode===m.id?'var(--ac)':'var(--br)'}`,background:solverMode===m.id?'rgba(0,212,170,.08)':'var(--bg3)',textAlign:'center',transition:'all .15s'}}>
          <div style={{fontSize:20}}>{m.icon}</div>
          <div style={{fontSize:10,fontWeight:600,color:solverMode===m.id?'var(--ac)':'var(--tx)',marginTop:2}}>{m.label}</div>
          <div style={{fontSize:8,color:'var(--tx3)',marginTop:1}}>{m.obj}</div>
        </div>)}
      </div>
      <div style={{fontSize:10,color:'var(--tx2)',marginBottom:8,padding:'4px 8px',background:'var(--bg3)',borderRadius:4}}>
        {MODES.find(m=>m.id===solverMode)?.desc}
      </div>

      {/* ═══ SOLVER INPUTS DETAIL — Shows ALL inputs per selected mode ═══ */}
      <div style={{marginBottom:10,padding:'10px 12px',background:'var(--bg3)',borderRadius:6,border:'1px solid var(--br)'}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--a3)',marginBottom:8}}>📋 Inputs for: {MODES.find(m=>m.id===solverMode)?.label}</div>

        {/* PROCUREMENT inputs */}
        {solverMode==='procurement'&&<div style={{fontSize:10}}>
          <div style={{color:'var(--tx3)',marginBottom:6}}>
            <strong>Objective:</strong> min Z = Σ [setup·y[t] + h_fg·I[t] + var·x[t] + penalty·s[t]] + Σ [mat·q[i,t] + ord·z[i,t] + trans·q[i,t] + h_rm·RI[i,t]]<br/>
            <strong>Where:</strong> Ordering cost = PO admin (fixed/order) + material (variable/unit) + transport (variable/unit, mode-dependent). Holding cost = inventory value × carry rate. Transport NOT in holding — no double counting.
          </div>
          <table className="data-table" style={{fontSize:9}}>
            <thead><tr><th>Input</th>{state.products.map(p=><th key={p.id} style={{color:'var(--ac)'}}>{p.name}</th>)}<th>Formula / Source</th></tr></thead>
            <tbody>
              {[
                ['Weekly Demand',p=>weeklyDemand(p).slice(0,4).join(',')+`... (${periodCount(state.planning)} periods)`,'Top-3 forecast consensus (inverse-MAPE weighted) → weekly split 27/27/23/23%'],
                ['Capacity (u/wk)',p=>p.capacity,'Setup Tab → Production Lines'],
                ['Setup Cost/batch',p=>`${cur}${p.setupCost}`,'Product Settings → Setup Cost'],
                ['Variable Cost/u',p=>`${cur}${p.variableCost}`,'Product Settings → Variable Cost'],
                ['Shelf Life',p=>`${p.shelfLife} days`,'Product Settings → Shelf Life'],
                ['Yield %',p=>`${Math.round((p.yieldPct||0.95)*100)}%`,'Product Settings → Yield'],
                ['FG Hold Cost/u/wk',p=>{const mc=p.bom.reduce((s,b)=>s+b.cost*b.qtyPer,0);return `${cur}${(mc*(p.carryRate||24)/100/52).toFixed(4)}`},'BOM mat cost × carry% ÷ 52'],
                ['Carry Rate',p=>`${p.carryRate||24}%/yr`,'Capital(42%)+Storage(25%)+Ins(8%)+Obsol(21%)+Hdl(4%)'],
                ['Init Inventory',p=>p.initInventory||0,'Product Settings'],
                ['Service Level',p=>`${(state.config.serviceLevel*100).toFixed(0)}%`,'Setup → Company Profile'],
              ].map(([label,fn,src])=><tr key={label}><td style={{fontWeight:600}}>{label}</td>{state.products.map(p=><td key={p.id} className="num">{fn(p)}</td>)}<td style={{fontSize:8,color:'var(--tx3)'}}>{src}</td></tr>)}
            </tbody>
          </table>
          <div style={{marginTop:6,fontSize:10,fontWeight:600,color:'var(--a2)'}}>BOM Subparts (per-part inputs):</div>
          <table className="data-table" style={{fontSize:9}}>
            <thead><tr><th>Part (Product)</th><th>Cost/u</th><th>Qty/U</th><th>LT (wk)</th><th>MOQ</th><th>Max</th><th>Ord Cost</th><th>Hold%</th><th>Yield%</th><th>Shelf(d)</th><th>Scrap%</th><th>Trans</th><th>Policy</th></tr></thead>
            <tbody>{state.products.flatMap(p=>p.bom.map(b=><tr key={`${p.id}-${b.id}`}>
              <td style={{fontWeight:600}}>{b.name} <span style={{color:'var(--tx3)',fontSize:8}}>({p.name})</span></td>
              <td className="num">{cur}{b.cost}</td><td className="num">{b.qtyPer}</td>
              <td className="num">{b.leadTime}</td><td className="num">{b.moq}</td><td className="num">{b.maxOrder||500}</td>
              <td className="num">{cur}{b.orderingCost||75}</td><td className="num">{b.holdPct||24}%</td>
              <td className="num">{b.partYield||98}%</td><td className="num">{b.rmShelf||90}</td>
              <td className="num">{((b.scrapFactor||0.05)*100).toFixed(0)}%</td>
              <td className="num">{cur}{b.transRate||0.5} ({(b.transMode||'perUnit')})</td>
              <td><span style={{fontSize:8,padding:'1px 5px',borderRadius:8,background:'rgba(167,139,250,.1)',color:'var(--a3)'}}>{(b.procPolicy||'milp').toUpperCase()}</span></td>
            </tr>))}</tbody>
          </table>
        </div>}

        {/* PRODUCTION inputs */}
        {solverMode==='production'&&<div style={{fontSize:10}}>
          <div style={{color:'var(--tx3)',marginBottom:6}}>
            <strong>Objective:</strong> min Z = Σ [setup·changeover[k,t] + overtime_cost·OT[t] + idle_cost·idle[t]]<br/>
            <strong>Subject to:</strong> Σ(cycle_hrs[k]·x[k,t]) ≤ avail_hrs[t] + OT[t] for each line and period &nbsp;<span style={{color:'var(--tx3)'}}>(cycle_hrs[k] = cycleTime_min[k] ÷ 60 — e.g. 19 min/u = 0.317 hrs/u)</span>
          </div>
          <div style={{fontWeight:600,color:'var(--a2)',marginBottom:4}}>Production Lines:</div>
          <table className="data-table" style={{fontSize:9}}>
            <thead><tr><th>Line</th><th>Type</th><th>Capacity</th><th>Shifts</th><th>Hrs/Shift</th><th>Break</th><th>OT Mult</th><th>Changeover</th><th>Net Hrs/Day</th></tr></thead>
            <tbody>{state.production.lines.map(l=><tr key={l.id}>
              <td style={{fontWeight:600}}>{l.name}</td><td>{l.type}</td><td className="num">{l.capacity} u/wk</td>
              <td className="num">{l.shiftsPerDay}</td><td className="num">{l.hoursPerShift||8}h</td>
              <td className="num">{l.breakMins||30}min</td><td className="num">{l.otMult||1.5}×</td>
              <td className="num">{l.changeoverMins||30}min</td>
              <td className="num" style={{color:'var(--ac)',fontWeight:600}}>{(((l.hoursPerShift||8)*l.shiftsPerDay)-(l.breakMins||30)*l.shiftsPerDay/60).toFixed(1)}h</td>
            </tr>)}</tbody>
          </table>
          {/* ── Maintenance windows (v3.1 Q3 + v3.1.1 Q12 hourly) ── */}
          <div style={{marginTop:8,padding:6,background:'var(--bg3)',borderRadius:4,border:'1px solid var(--br)'}}>
            <div style={{fontSize:10,fontWeight:600,color:'var(--a4)',marginBottom:4}}>🔧 Planned Maintenance <span style={{color:'var(--tx3)',fontWeight:400,fontSize:9}}>— two modes: <em>weekly</em> (zeros capacity for listed weeks) or <em>hourly</em> (capacity reduced pro-rata for hours lost on a date). Unplanned downtime goes into OEE Availability.</span></div>
            {state.production.lines.map(l=>{
              const mw=l.plannedMaintenance||[];
              return <div key={l.id} style={{fontSize:10,marginBottom:4,display:'flex',alignItems:'flex-start',gap:6,flexWrap:'wrap'}}>
                <strong style={{minWidth:55,color:'var(--ac)',paddingTop:4}}>{l.name}:</strong>
                <div style={{display:'flex',flexDirection:'column',gap:3,flex:1}}>
                  {mw.length===0&&<span style={{color:'var(--tx3)',fontSize:9}}>no windows scheduled</span>}
                  {mw.map((w,wi)=>{
                    const isHourly=w.mode==='hourly';
                    return <div key={wi} style={{display:'flex',alignItems:'center',gap:2,background:'var(--bg2)',padding:'2px 4px',borderRadius:3,border:'1px solid var(--br)',flexWrap:'wrap'}}>
                      <select value={w.mode||'weekly'} style={{width:60,fontSize:9,padding:'1px 3px'}} onChange={e=>{const nl=state.production.lines.map(ll=>ll.id===l.id?{...ll,plannedMaintenance:mw.map((mm,mi)=>mi===wi?{...mm,mode:e.target.value}:mm)}:ll);dispatch({type:'SET_PRODUCTION',payload:{lines:nl}});}}>
                        <option value="weekly">Weekly</option>
                        <option value="hourly">Hourly</option>
                      </select>
                      {!isHourly&&<>
                        <span style={{fontSize:9,color:'var(--tx3)'}}>W</span>
                        <NumInput placeholder="from" value={w.fromWeek||''} style={{width:32,fontSize:9,padding:'1px 3px'}} onChange={v=>{const nl=state.production.lines.map(ll=>ll.id===l.id?{...ll,plannedMaintenance:mw.map((mm,mi)=>mi===wi?{...mm,fromWeek:v}:mm)}:ll);dispatch({type:'SET_PRODUCTION',payload:{lines:nl}});}}/>
                        <span style={{fontSize:9,color:'var(--tx3)'}}>→</span>
                        <NumInput placeholder="to" value={w.toWeek||''} style={{width:32,fontSize:9,padding:'1px 3px'}} onChange={v=>{const nl=state.production.lines.map(ll=>ll.id===l.id?{...ll,plannedMaintenance:mw.map((mm,mi)=>mi===wi?{...mm,toWeek:v}:mm)}:ll);dispatch({type:'SET_PRODUCTION',payload:{lines:nl}});}}/>
                      </>}
                      {isHourly&&<>
                        <input type="date" value={w.date||''} style={{width:120,fontSize:9,padding:'1px 3px'}} onChange={e=>{const nl=state.production.lines.map(ll=>ll.id===l.id?{...ll,plannedMaintenance:mw.map((mm,mi)=>mi===wi?{...mm,date:e.target.value}:mm)}:ll);dispatch({type:'SET_PRODUCTION',payload:{lines:nl}});}}/>
                        <NumInput placeholder="hrs" min={0.5} step={0.5} value={w.hoursLost||''} style={{width:40,fontSize:9,padding:'1px 3px'}} title="Hours of capacity lost on that date" onChange={v=>{const nl=state.production.lines.map(ll=>ll.id===l.id?{...ll,plannedMaintenance:mw.map((mm,mi)=>mi===wi?{...mm,hoursLost:v}:mm)}:ll);dispatch({type:'SET_PRODUCTION',payload:{lines:nl}});}}/>
                        <span style={{fontSize:9,color:'var(--tx3)'}}>hrs lost</span>
                      </>}
                      <input placeholder="reason" value={w.reason||''} style={{width:90,fontSize:9,padding:'1px 3px'}} onChange={e=>{const nl=state.production.lines.map(ll=>ll.id===l.id?{...ll,plannedMaintenance:mw.map((mm,mi)=>mi===wi?{...mm,reason:e.target.value}:mm)}:ll);dispatch({type:'SET_PRODUCTION',payload:{lines:nl}});}}/>
                      <button style={{fontSize:8,padding:'0 3px',cursor:'pointer',background:'none',border:'1px solid var(--dg)',color:'var(--dg)',borderRadius:2,lineHeight:1.4}} onClick={()=>{const nl=state.production.lines.map(ll=>ll.id===l.id?{...ll,plannedMaintenance:mw.filter((_,mi)=>mi!==wi)}:ll);dispatch({type:'SET_PRODUCTION',payload:{lines:nl}});}}>×</button>
                    </div>;
                  })}
                  <div style={{display:'flex',gap:4}}>
                    <button style={{fontSize:9,padding:'1px 6px',cursor:'pointer',background:'var(--bg2)',border:'1px solid var(--a4)',color:'var(--a4)',borderRadius:3}} onClick={()=>{const nl=state.production.lines.map(ll=>ll.id===l.id?{...ll,plannedMaintenance:[...(ll.plannedMaintenance||[]),{mode:'weekly',fromWeek:(ll.plannedMaintenance?.length?(ll.plannedMaintenance.slice(-1)[0].toWeek||12)+2:12),toWeek:(ll.plannedMaintenance?.length?(ll.plannedMaintenance.slice(-1)[0].toWeek||12)+3:13),reason:'PM'}]}:ll);dispatch({type:'SET_PRODUCTION',payload:{lines:nl}});}}>+ weekly</button>
                    <button style={{fontSize:9,padding:'1px 6px',cursor:'pointer',background:'var(--bg2)',border:'1px solid var(--a3)',color:'var(--a3)',borderRadius:3}} onClick={()=>{const today=new Date().toISOString().slice(0,10);const nl=state.production.lines.map(ll=>ll.id===l.id?{...ll,plannedMaintenance:[...(ll.plannedMaintenance||[]),{mode:'hourly',date:today,hoursLost:4,reason:'Bearing replacement'}]}:ll);dispatch({type:'SET_PRODUCTION',payload:{lines:nl}});}}>+ hourly</button>
                  </div>
                </div>
              </div>;
            })}
            <div style={{fontSize:9,color:'var(--tx3)',marginTop:4}}>💡 <strong>Taxonomy:</strong> <em>Micro-stops</em> → OEE Performance %; <em>Unplanned downtime</em> → reduce Availability %; <em>Scheduled PM</em> → this calendar. Don't double-count.</div>
          </div>
          <div style={{fontWeight:600,color:'var(--a2)',marginTop:6,marginBottom:4}}>Products to Schedule:</div>
          <table className="data-table" style={{fontSize:9}}>
            <thead><tr><th>Product</th><th>Annual Demand</th><th>Setup Cost</th><th>Cycle Time</th><th>Yield%</th></tr></thead>
            <tbody>{state.products.map(p=><tr key={p.id}>
              <td style={{fontWeight:600}}>{p.name}</td>
              <td className="num">{annDemand(p).toLocaleString()}u</td>
              <td className="num">{cur}{p.setupCost}</td>
              <td className="num">{p.cycleTime||19} min/u</td>
              <td className="num">{Math.round((p.yieldPct||0.95)*100)}%</td>
            </tr>)}</tbody>
          </table>
        </div>}

        {/* PROFIT MAX inputs */}
        {solverMode==='profitmix'&&<div style={{fontSize:10}}>
          <div style={{color:'var(--tx3)',marginBottom:6}}>
            <strong>Objective:</strong> max Z = Σ [(sell_price[k] - var_cost[k] - mat_cost[k]) × qty[k]]<br/>
            <strong>Subject to:</strong> qty[k] ≤ demand_ceiling[k] &nbsp;<span style={{color:'var(--tx3)'}}>(forecast × (1 + MAPE%) — deterministic robust-optimization, Bertsimas-Sim style: worst-case inflation by empirical MAPE without full distributional assumption)</span>, &nbsp;Σ(cycle_hrs[k]·qty[k]) ≤ shared_capacity_hrs &nbsp;<span style={{color:'var(--tx3)'}}>(cycle_hrs[k] = cycleTime_min[k] ÷ 60)</span><br/>
            <strong>Allocates by:</strong> margin per bottleneck-hour (not margin per unit)
          </div>
          <table className="data-table" style={{fontSize:9}}>
            <thead><tr><th>Product</th><th>Sell Price</th><th>Mat Cost/u</th><th>Var Cost/u</th><th>Margin/u</th><th>Cycle(min)</th><th>Margin/hr</th><th>Demand Ceiling</th><th>MAPE%</th></tr></thead>
            <tbody>{state.products.map(p=>{
              const mc=p.bom.reduce((s,b)=>s+b.cost*b.qtyPer,0);
              const mg=p.sellPrice-p.variableCost-mc;
              const ct=(p.cycleTime||19)/60;
              const mgh=ct>0?mg/ct:0;
              const ceil=Math.round(annDemand(p)*(1+(p.mape||15)/100));
              return <tr key={p.id}>
                <td style={{fontWeight:600}}>{p.name}</td>
                <td className="num">{cur}{p.sellPrice}</td>
                <td className="num">{cur}{mc.toFixed(2)}</td>
                <td className="num">{cur}{p.variableCost}</td>
                <td className="num" style={{color:mg>0?'var(--gn)':'var(--dg)',fontWeight:700}}>{cur}{mg.toFixed(2)}</td>
                <td className="num">{p.cycleTime||19}</td>
                <td className="num" style={{color:'var(--a2)',fontWeight:700}}>{cur}{mgh.toFixed(1)}/hr</td>
                <td className="num">{ceil.toLocaleString()}</td>
                <td className="num">{p.mape||15}%</td>
              </tr>
            })}</tbody>
          </table>
        </div>}

        {/* TRANSPORT inputs */}
        {solverMode==='transport'&&<div style={{fontSize:10}}>
          <div style={{color:'var(--tx3)',marginBottom:6}}>
            <strong>Logic:</strong> For each shipment, evaluates 5 modes (road, rail, sea, air, multimodal) against 25-route Indian transit database. Checks deadline feasibility, computes total cost (freight + handling + insurance). If demand sensing detects spike (actual {'>'} forecast), overrides to faster mode and shows cost premium.<br/>
            <strong>Modes available per BOM part:</strong> {state.products.flatMap(p=>p.bom.map(b=>`${b.name}:${(b.transMode||'perUnit').toUpperCase()}`)).join(', ')}
          </div>
          <div style={{color:'var(--a4)',fontSize:9,marginTop:4}}>The transport solver uses real Indian transit times (Chennai→Mumbai: road 3d, rail 4d, air 1d, sea 5d, etc.) from a 25-route database. It's not isolated — it connects to demand sensing: if current_demand {'>'} forecast_demand, it flags air freight override with cost premium calculation.</div>
        </div>}

        {/* MONTE CARLO inputs */}
        {solverMode==='montecarlo'&&<div style={{fontSize:10}}>
          <div style={{color:'var(--tx3)',marginBottom:6}}>
            <strong>Process:</strong> Runs the full procurement simulation 1000 times, each with randomized: demand (±MAPE%), lead time (±LT_CV%), material price (±cost_CV%). Collects cost distribution → computes Avg, P10, P50, P90, VaR₉₅, CVaR₉₅, fragility ratio.<br/>
            <strong>Variability parameters from your data:</strong>
          </div>
          <table className="data-table" style={{fontSize:9}}>
            <thead><tr><th>Product</th><th>MAPE% (demand noise)</th><th>Parts</th><th>Max LT CV%</th><th>Max Cost CV%</th><th>Yield CV%</th><th>Cap CV%</th></tr></thead>
            <tbody>{state.products.map(p=><tr key={p.id}>
              <td style={{fontWeight:600}}>{p.name}</td>
              <td className="num">{p.mape||15}%</td>
              <td className="num">{p.bom.length}</td>
              <td className="num">{Math.max(...p.bom.map(b=>b.ltCV||10))}%</td>
              <td className="num">{Math.max(...p.bom.map(b=>b.costCV||10))}%</td>
              <td className="num">{p.yieldCV||0}%</td>
              <td className="num">{p.capCV||5}%</td>
            </tr>)}</tbody>
          </table>
        </div>}

        {/* CAPITAL BUDGET inputs */}
        {solverMode==='capital'&&<div style={{fontSize:10}}>
          <div style={{color:'var(--tx3)',marginBottom:6}}>
            <strong>Objective:</strong> max Σ NPV[j]·select[j] subject to Σ CAPEX[j]·select[j] ≤ Budget<br/>
            <strong>NPV formula:</strong> NPV = -CAPEX + Σ(CF_t / (1+WACC)^t) + Residual/(1+WACC)^n<br/>
            <strong>WACC:</strong> {state.config.wacc}% | <strong>Budget:</strong> {cur}{(state.budget.capex||1000000).toLocaleString()}
          </div>
          <table className="data-table" style={{fontSize:9}}>
            <thead><tr><th>Investment</th><th>CAPEX</th><th>Annual CF</th><th>Life (yr)</th><th>Residual</th><th>Est. NPV</th><th>PI</th></tr></thead>
            <tbody>{state.production.lines.map((l,i)=>{
              const capex=l.capacity*10000;const cf=l.capacity*state.products.reduce((a,p)=>a+p.sellPrice-p.variableCost-p.bom.reduce((s,b)=>s+b.cost*b.qtyPer,0),0)/Math.max(state.production.lines.length,1)*0.3;
              const wacc=state.config.wacc/100;const life=10;const res=l.capacity*2000;
              const npv=-capex+Array.from({length:life},(_,t)=>cf/Math.pow(1+wacc,t+1)).reduce((a,b)=>a+b,0)+res/Math.pow(1+wacc,life);
              return <tr key={l.id}>
                <td style={{fontWeight:600}}>{l.name} upgrade</td>
                <td className="num">{cur}{capex.toLocaleString()}</td>
                <td className="num">{cur}{Math.round(cf).toLocaleString()}</td>
                <td className="num">{life}yr</td>
                <td className="num">{cur}{res.toLocaleString()}</td>
                <td className="num" style={{color:npv>0?'var(--gn)':'var(--dg)',fontWeight:700}}>{cur}{Math.round(npv).toLocaleString()}</td>
                <td className="num">{(npv/capex+1).toFixed(2)}</td>
              </tr>
            })}</tbody>
          </table>
        </div>}

        {/* PIPELINE inputs */}
        {solverMode==='pipeline'&&<div style={{fontSize:10}}>
          <div style={{color:'var(--tx3)',marginBottom:6}}>
            <strong>Chains 3 solvers:</strong><br/>
            1. <strong style={{color:'var(--a4)'}}>Profit Mix</strong> → decides HOW MUCH of each product to make (max margin) → outputs qty per SKU<br/>
            2. <strong style={{color:'var(--ac)'}}>Procurement</strong> → takes those quantities, explodes BOM, finds optimal PO schedule (min cost) → outputs PO timing + material orders<br/>
            3. <strong style={{color:'var(--a3)'}}>Production</strong> → takes required quantities, schedules across lines (min makespan) → outputs Gantt + utilization<br/>
            <br/>Each solver's OUTPUT becomes the next solver's INPUT. The pipeline result shows all three together with a combined cost/profit summary.
          </div>
        </div>}
      </div>

      {/* Dynamic Constraint Panel */}
      <div style={{marginBottom:10,padding:'8px 10px',background:'var(--bg3)',borderRadius:4,border:'1px solid var(--br)'}}>
        <div style={{display:'flex',gap:16,alignItems:'center',marginBottom:6}}>
          <div style={{fontSize:10,fontWeight:600,color:'var(--a3)'}}>⚙ Constraints</div>
          {solverMode==='profitmix'&&<div style={{display:'flex',alignItems:'center',gap:4,fontSize:10}}>
            <span style={{color:'var(--a4)',fontWeight:600}}>Demand Mode:</span>
            <select value={demandMode} onChange={e=>setDemandMode(e.target.value)} style={{fontSize:10,padding:'2px 6px'}}>
              <option value="mts">MTS — Forecast ceiling</option>
              <option value="mto">MTO — Order book only</option>
              <option value="ato">ATO — Orders + forecast buffer</option>
              <option value="seasonal">Seasonal — Peak-aware forecast</option>
            </select>
          </div>}
        </div>
        <div style={{display:'flex',gap:12,flexWrap:'wrap',fontSize:11}}>
          {[{k:'budget',lbl:`Budget (${cur})`},{k:'warehouse',lbl:'Warehouse (units)'},{k:'workingCapital',lbl:`Working Capital (${cur})`},{k:'supplierMax',lbl:'Supplier Max/mo'}].map(({k,lbl})=>
            <label key={k} style={{display:'flex',alignItems:'center',gap:4,cursor:'pointer',opacity:constraints[k].on?1:0.5}}>
              <input type="checkbox" checked={constraints[k].on} onChange={()=>toggleC(k)} style={{width:14,height:14}}/>

              <NumInput value={constraints[k].val} onChange={v=>setCV(k,v)} disabled={!constraints[k].on} style={{width:80,padding:'2px 6px',fontSize:10,opacity:constraints[k].on?1:0.4}}/>
            </label>
          )}
        </div>
      </div>
      <button className="btn btn-primary" onClick={handleSolve} disabled={solving}>{solving?'⏳ Solving...':'🔬 Run '+MODES.find(m=>m.id===solverMode)?.label}</button>
      {error&&<div style={{color:'var(--dg)',fontSize:11,padding:8,background:'rgba(248,81,73,.08)',borderRadius:4,marginTop:8}}>❌ {error}</div>}
    </div>

    {/* ─── PROCUREMENT RESULTS ─── */}
    {result&&result._mode==='procurement'&&<div className="card">
      <div className="card-title">📦 Procurement MILP Results</div>
      <div className="kpi-row">
        <KPI label="Total Cost" value={`${cur}${result.total_cost?.toLocaleString()}`} sub={`${result.periods} periods`}/>
        <KPI label="Solve Time" value={`${result.solve_time}s`} sub="CBC" color="var(--a2)"/>
        <KPI label="Status" value={result.status} color="var(--gn)"/>
        <KPI label="Products" value={result.products?.length||0} color="var(--a2)"/>
        <KPI label="Materials" value={result.materials?.length||0} color="var(--a3)"/>
        <KPI label="Total POs" value={result.materials?.reduce((a,m)=>a+(m.num_orders||0),0)||0} color="var(--a4)"/>
      </div>
      {result.cost_breakdown&&<div className="kpi-row">{Object.entries(result.cost_breakdown).filter(([k])=>k!=='total').map(([k,v])=><KPI key={k} label={k.replace(/_/g,' ')} value={`${cur}${Math.round(v).toLocaleString()}`} color="var(--a3)"/>)}</div>}
    </div>}

    {/* ─── DETAILED PRODUCTION SCHEDULE (Procurement mode) ─── */}
    {result&&result._mode==='procurement'&&result.products?.map((p,pi)=><div key={`sched-${pi}`} className="card">
      <div className="card-title">📋 Production Schedule — {p.name}
        <span className="badge" style={{background:'rgba(0,212,170,.12)',color:'var(--ac)',marginLeft:6}}>{p.total_produced?.toLocaleString()}u / {p.total_demand?.toLocaleString()}u</span>
        <span className="badge" style={{background:p.fill_rate>=99?'rgba(63,185,80,.15)':'rgba(240,180,41,.15)',color:p.fill_rate>=99?'var(--gn)':'var(--a4)',marginLeft:4}}>{p.fill_rate}% fill</span>
      </div>
      <div style={{fontSize:10,color:'var(--tx3)',marginBottom:6}}>Period-by-period execution plan. Each row = one planning bucket ({state.planning.planningUnit||'weekly'}).</div>
      <div style={{overflowX:'auto',maxHeight:360}}>
        <table className="data-table" style={{fontSize:10}}>
          <thead style={{position:'sticky',top:0,background:'var(--bg2)'}}>
            <tr><th>Period</th><th>Demand</th><th style={{color:'var(--ac)'}}>Produce</th><th>Setup</th><th>Inventory</th><th style={{color:'var(--dg)'}}>Shortage</th><th>Fill</th></tr>
          </thead>
          <tbody>{p.production?.map((q,t)=>{
            const dem=(state.products[pi]?.history?.[Math.floor(t/4)]||0)/4;
            const fill=dem>0?Math.min(100,Math.round((q-(p.shortages?.[t]||0))/Math.max(dem,1)*100)):100;
            return <tr key={t} style={{background:p.setups?.[t]?'rgba(0,212,170,.03)':'transparent'}}>
              <td style={{fontFamily:'JetBrains Mono',fontSize:9,color:'var(--tx3)'}}>W{t+1}</td>
              <td className="num">{Math.round(dem)}</td>
              <td className="num" style={{color:q>0?'var(--ac)':'var(--tx3)',fontWeight:q>0?700:400}}>{q||'—'}</td>
              <td style={{textAlign:'center',fontSize:9}}>{p.setups?.[t]?'▶ batch':''}</td>
              <td className="num" style={{color:(p.inventory?.[t]||0)<5?'var(--dg)':(p.inventory?.[t]||0)<15?'var(--a4)':'var(--tx)'}}>{Math.round(p.inventory?.[t]||0)}</td>
              <td className="num" style={{color:(p.shortages?.[t]||0)>0?'var(--dg)':'var(--tx3)'}}>{(p.shortages?.[t]||0)>0?Math.round(p.shortages[t]):'—'}</td>
              <td className="num" style={{color:fill>=99?'var(--gn)':fill>=80?'var(--a4)':'var(--dg)',fontSize:9}}>{fill}%</td>

            <td>Total</td>
            <td className="num">{p.total_demand?.toLocaleString()}</td>

            <td style={{textAlign:'center'}}>{p.num_batches} batches</td>
            <td></td>
            <td className="num" style={{color:'var(--dg)'}}>{p.total_shortage?.toLocaleString()||0}</td>
            <td className="num">{p.fill_rate}%</td>
          </tr></tfoot>
        </table>
      </div>
    </div>)}

    {/* ─── PO REGISTER (Procurement mode) ─── */}
    {result&&result._mode==='procurement'&&result.materials?.length>0&&<div className="card">

        <span className="badge" style={{background:'rgba(79,168,240,.12)',color:'var(--a2)',marginLeft:6}}>{result.materials.reduce((a,m)=>a+(m.purchase_orders?.length||0),0)} POs issued</span>

                rows.push(<tr key={poNum}>
                  <td style={{fontFamily:'JetBrains Mono',fontSize:9,fontWeight:600,color:'var(--a2)'}}>PO-{String(poNum).padStart(4,'0')}</td>
