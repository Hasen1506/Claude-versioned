                </div>
              </div>
              {children.map(c=>renderItem(c,level+1))}
            </React.Fragment>;
          };
          return <div>{roots.map(r=>renderItem(r,0))}</div>;
        })()}
        <button className="btn btn-secondary btn-sm" style={{marginTop:6}} onClick={()=>dispatch({type:'ADD_BOM_ITEM',productId:activeId})}>+ Add L0 Part</button>
        <div style={{marginTop:8,fontSize:10,color:'var(--tx3)'}}>
          Unit material cost (L0 direct): <strong style={{color:'var(--ac)'}}>{cur}{prod.bom.filter(b=>!b.parentId).reduce((a,b)=>a+b.cost*b.qtyPer,0).toFixed(2)}</strong>
          {prod.bom.some(b=>b.parentId)&&<span> | Cascaded (all levels): <strong style={{color:'var(--a3)'}}>{cur}{(()=>{
            const getC=(id)=>prod.bom.filter(b=>b.parentId===id);
            const calc=(item)=>{const ch=getC(item.id);return ch.length===0?item.cost*item.qtyPer:ch.reduce((s,c)=>s+calc(c),0)*item.qtyPer};
            return prod.bom.filter(b=>!b.parentId).reduce((s,b)=>s+calc(b),0).toFixed(2)})()}</strong></span>}
        </div>
      </div>

      {/* Actuals Input — Demand Sensing */}
      <div className="card">
        <div className="card-title">📡 Demand Sensing <span className="badge" style={{background:'rgba(56,189,248,.1)',color:'var(--a2)'}}>Actuals vs Forecast</span></div>
        <div style={{fontSize:10,color:'var(--tx3)',marginBottom:6}}>Enter actual sales as months complete. Sensing detects deviations and triggers replanning when threshold is breached.</div>
        {/* Sensing Configuration */}
        <div style={{display:'flex',gap:12,marginBottom:8,padding:'4px 8px',background:'var(--bg3)',borderRadius:4,fontSize:10,flexWrap:'wrap',alignItems:'center'}}>
          <label>Min periods before sensing: <input type="number" min={1} max={8} value={state.planning.sensingMinWeeks||2} style={{width:40}} onChange={e=>dispatch({type:'SET_PLANNING',payload:{sensingMinWeeks:+e.target.value}})}/></label>

          <label>Sensing α: <input type="number" step="0.05" min={0.1} max={0.9} value={state.planning.sensingAlpha||0.3} style={{width:45}} onChange={e=>dispatch({type:'SET_PLANNING',payload:{sensingAlpha:+e.target.value}})}/></label>
          <span style={{color:'var(--tx3)'}}>α=0.1 slow response, α=0.5 fast response</span>
        </div>
        <div className="month-grid">
          {MONTHS.map((m,i)=>{
            const act=prod.actuals?.[i];const fct=consensus[i]||0;const dev=act!==null&&act!==undefined&&fct>0?((act-fct)/fct*100).toFixed(0):null;
            return <div key={m} className="month-cell" style={{borderColor:act!==null&&act!==undefined?(Math.abs(dev)>20?'var(--dg)':Math.abs(dev)>10?'var(--a4)':'var(--gn)'):'var(--br)'}}>
              <label>{m} (f:{fct})</label>
              <input type="number" placeholder="—" value={act!==null&&act!==undefined?act:''} onChange={e=>dispatch({type:'UPDATE_ACTUAL',productId:activeId,month:i,value:e.target.value===''?null:+e.target.value})}/>
              {dev!==null&&<div style={{fontSize:8,color:Math.abs(+dev)>20?'var(--dg)':Math.abs(+dev)>10?'var(--a4)':'var(--gn)',fontWeight:600}}>{+dev>0?'+':''}{dev}%</div>}
            </div>})}
        </div>
        {(()=>{const filled=[];const indices=[];(prod.actuals||[]).forEach((a,i)=>{if(a!==null&&a!==undefined){filled.push(a);indices.push(i)}});
          if(filled.length<(state.planning.sensingMinWeeks||2))return <div style={{marginTop:6,fontSize:10,color:'var(--tx3)'}}>Enter {state.planning.sensingMinWeeks||2}+ periods of actuals to activate sensing. ({filled.length} entered)</div>;
          const alpha=state.planning.sensingAlpha||0.3;
          const biasArr=indices.map((idx,j)=>{const f=consensus[idx]||1;return filled[j]-f});
          const bias=biasArr.reduce((s,v)=>s+v,0)/biasArr.length;
          const mape=indices.reduce((s,idx,j)=>s+Math.abs(filled[j]-(consensus[idx]||0))/Math.max(filled[j],1),0)/filled.length*100;
          const ts=Math.abs(biasArr.reduce((s,v)=>s+v,0))/(biasArr.reduce((s,v)=>s+Math.abs(v),0)/biasArr.length||1);
          // Sensed demand for next period (exponential smoothing of error)
          const lastIdx=indices[indices.length-1];
          const nextFcst=consensus[Math.min(lastIdx+1,11)]||0;
          const sensedNext=Math.round(alpha*filled[filled.length-1]+(1-alpha)*nextFcst);
          const correction=sensedNext-nextFcst;
          return <div style={{marginTop:6,fontSize:10}}>
            <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
              <span>Bias: <strong style={{color:Math.abs(bias)>10?'var(--dg)':'var(--gn)'}}>{bias>0?'+':''}{bias.toFixed(1)}</strong> {bias>5?'(over-forecast)':bias<-5?'(under-forecast)':'(balanced)'}</span>
              <span>Track MAPE: <strong style={{color:mape>20?'var(--dg)':'var(--gn)'}}>{mape.toFixed(1)}%</strong></span>
              <span>TS (tracking signal): <strong style={{color:Math.abs(ts)>4?'var(--dg)':'var(--gn)'}}>{ts.toFixed(1)}</strong> {Math.abs(ts)>4?'⚠ OUT OF CONTROL':'✓ in control'}</span>
            </div>
            <div style={{marginTop:4,padding:'4px 8px',background:Math.abs(correction)>5?'rgba(248,81,73,.06)':'rgba(63,185,80,.06)',borderRadius:4,border:`1px solid ${Math.abs(correction)>5?'var(--dg)':'var(--gn)'}`}}>
              <strong>Sensing correction:</strong> Next period forecast {nextFcst} → sensed <strong style={{color:'var(--ac)'}}>{sensedNext}</strong> (Δ={correction>0?'+':''}{correction})
              {Math.abs(bias)>15&&<span style={{color:'var(--dg)',fontWeight:600,marginLeft:8}}>⚠ Significant bias ({bias.toFixed(0)}) — REPLAN RECOMMENDED</span>}
            </div>
          </div>
        })()}

            const newOp={id:Date.now().toString(36),seq,name:`Op ${seq+1}`,workCenter:'WC1',lineId:state.production.lines[0]?.id||'line1',cycleTimeMin:prod.cycleTime||19,setupMin:30,yieldPct:98,parallelism:1,predecessor:seq>0?rt[seq-1].id:null};

          </table>
          {(()=>{
            const rt=prod.routing||[];

              {' | '}OEE-adjusted effective daily cap: <strong style={{color:'var(--ac)'}}>{effectiveDailyCap}</strong> units/day

            </div>;
          })()}
        </div>}
        {!(prod.routing||[]).length&&<div style={{fontSize:10,color:'var(--tx3)',padding:'8px',background:'var(--bg3)',borderRadius:4,textAlign:'center'}}>

      {/* Cost Events — Rolling Horizon */}
      <div className="card">

        {(prod.costEvents||[]).map(ev=><div key={ev.id} className="bom-row">

          <Field label="Parameter"><select value={ev.paramKey||'variableCost'} onChange={e=>{const pi=state.products.findIndex(p=>p.id===activeId);if(pi>=0){const ces=[...(state.products[pi].costEvents||[])];const ci=ces.findIndex(c=>c.id===ev.id);if(ci>=0){ces[ci]={...ces[ci],paramKey:e.target.value};dispatch({type:'UPDATE_PRODUCT',id:activeId,payload:{costEvents:ces}})}}}}><option value="variableCost">Variable Cost/u</option><option value="setupCost">Setup Cost/batch</option><option value="capacity">Capacity (u/wk)</option><option value="sellPrice">Sell Price</option><option value="laborPerUnit">Labor/u</option><option value="fixedFactory">Fixed Factory/day</option><option value="carryRate">Carry Rate %</option><option value="yieldPct">Yield %</option><option value="bom.0.cost">BOM Part 1: Material Cost</option><option value="bom.0.transRate">BOM Part 1: Transport Rate</option><option value="bom.0.leadTime">BOM Part 1: Lead Time</option><option value="bom.1.cost">BOM Part 2: Material Cost</option><option value="bom.1.transRate">BOM Part 2: Transport Rate</option></select></Field>
          <Field label="New Value"><input type="number" value={ev.paramValue||0} onChange={e=>{const pi=state.products.findIndex(p=>p.id===activeId);if(pi>=0){const ces=[...(state.products[pi].costEvents||[])];const ci=ces.findIndex(c=>c.id===ev.id);if(ci>=0){ces[ci]={...ces[ci],paramValue:+e.target.value};dispatch({type:'UPDATE_PRODUCT',id:activeId,payload:{costEvents:ces}})}}}} /></Field>

        </div>)}
        <button className="btn btn-secondary btn-sm" onClick={()=>{dispatch({type:'UPDATE_PRODUCT',id:activeId,payload:{costEvents:[...(prod.costEvents||[]),{id:Date.now().toString(36),fromMonth:6,label:'Cost change',paramKey:'variableCost',paramValue:0}]}})}}>+ Add Cost Event</button>
      </div>

      {/* CSV Upload/Download */}
      <div className="card">
        <div className="card-title">📁 Data Import/Export</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className="btn btn-secondary btn-sm" onClick={()=>{
            const csv='Month,History,Actual,Override,Forecast\n'+MONTHS.map((m,i)=>`${m},${prod.history[i]||0},${prod.actuals?.[i]??''},${prod.overrides[i]??''},${consensus[i]||0}`).join('\n');
            const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${prod.name}_demand.csv`;a.click();
          }}>📥 Download Demand CSV</button>
          <label className="btn btn-secondary btn-sm" style={{cursor:'pointer'}}>📤 Upload History CSV<input type="file" accept=".csv" style={{display:'none'}} onChange={e=>{
            const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{
              const lines=ev.target.result.split('\n').slice(1);const hist=[];
              lines.forEach(l=>{const cols=l.split(',');if(cols[1])hist.push(+cols[1])});
              if(hist.length>=3)upProd({history:hist.slice(0,12)});
            };r.readAsText(f);
          }}/></label>
          <button className="btn btn-secondary btn-sm" onClick={()=>{
            const data=JSON.stringify(state,null,2);const blob=new Blob([data],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='enterprise_simulator_state.json';a.click();
          }}>💾 Export Full State (JSON)</button>
        </div>
      </div>
    </div>
  </div>
}

// ─── TAB 5: OPTIMIZE (partial) ───
function OptimizeTab({state,dispatch}){
  const [solving,setSolving]=useState(false);
  const [result,setResult]=useState(null);
  const [error,setError]=useState(null);
  const [solverMode,setSolverMode]=useState('procurement');
  const [atpQty,setAtpQty]=useState(100);
  const [atpMonth,setAtpMonth]=useState(3);
  const [atpResult,setAtpResult]=useState(null);
  const [demandMode,setDemandMode]=useState('mts');
  const cur=state.config.currency;
  // Component-scope helpers (used in both handleSolve AND render JSX)
  const annDemand=p=>(p.history||[]).slice(-12).reduce((a,b)=>a+b,0);
  const weeklyDemand=(p)=>{
    // Proper disaggregation: use last 12 months of history, distribute to weeks using working days
    const hist=(p.history||[]).slice(-12);
    const planMo=state.planning.planMonths||12;
    const wd=state.planning.workDays||6;
    const weeks=[];
    for(let m=0;m<Math.min(planMo,hist.length);m++){
      // Each month has ~4.33 weeks, but we use 4 for simplicity in weekly buckets
      const monthDem=hist[m]||0;
      // Distribute proportional to working days per week (approx 5-6 days)
      const w1=Math.round(monthDem*0.27);const w2=Math.round(monthDem*0.27);
      const w3=Math.round(monthDem*0.23);const w4=monthDem-w1-w2-w3;
      weeks.push(w1,w2,w3,w4);
    }
    return weeks.slice(0,state.planning.periods);
  };

  const handleSolve=async()=>{
    setSolving(true);setError(null);setResult(null);
    try{
      let endpoint,payload;
      if(solverMode==='procurement'){
        endpoint='/api/solve/procurement';
        payload={
          products:state.products.map(p=>({
            name:p.name,demand:weeklyDemand(p),capacity:p.capacity,setup_cost:p.setupCost,
            variable_cost:p.variableCost,sell_price:p.sellPrice,shelf_life:p.shelfLife,
            yield_pct:p.yieldPct,init_inventory:p.initInventory,mape_pct:15,
            cost_events:(p.costEvents||[]).map(ev=>({from_month:ev.fromMonth,param:ev.paramKey,value:ev.paramValue,label:ev.label})),
            parts:p.bom.map(b=>({name:b.name,cost:b.cost,qty_per:b.qtyPer,lead_time:b.leadTime,moq:b.moq,max_order:b.maxOrder||500,hold_pct:b.holdPct||24,rm_capacity:b.rmCapacity||2000,ordering_cost:b.orderingCost||75,rm_shelf:b.rmShelf||90,scrap_factor:b.scrapFactor||0.05,trans_rate:b.transRate||0.5,trans_mode:b.transMode||'perUnit',proc_policy:b.procPolicy||'milp',part_yield:(b.partYield||98)/100,lt_cv:(b.ltCV||10)/100,cost_cv:(b.costCV||10)/100,vol_disc:b.volDisc||[],trans_tiers:b.tiers||[],pay_term_days:b.payTermDays||30,early_pay_disc:b.earlyPayDisc||0})),
          })),
          params:{periods:state.planning.periods,carry_rate:(state.products[0]?.carryRate||24)/100,wh_max:constraints.warehouse.on?constraints.warehouse.val:5000,service_level:state.config.serviceLevel,budget:constraints.budget.on?constraints.budget.val:state.budget.procurement||0,shared_capacity:state.production.lines[0]?.capacity||50,work_days:state.planning.workDays||6},
          capacity_mode:state.production.lines[0]?.type||'shared',
        };
      }else if(solverMode==='production'){
        endpoint='/api/solve/production';
        payload={
          products:state.products.map(p=>({name:p.name,required_qty:annDemand(p),setup_cost:p.setupCost,yield_pct:p.yieldPct,cycle_time:(p.cycleTime||19)/60,capacity_per_week:p.capacity,mape_pct:p.mape||15,
            routing:(p.routing||[]).map(op=>({op_id:op.id,seq:op.seq,name:op.name,line_id:op.lineId,work_center:op.workCenter,cycle_time_min:op.cycleTimeMin,setup_min:op.setupMin,yield_pct:op.yieldPct,parallelism:op.parallelism})),
            oee:((p.oeeAvailability||85)*(p.oeePerformance||92)*(p.oeeQuality||98))/1000000,
            line_mode:p.lineMode||'shared'})),
          lines:state.production.lines.map((l,i)=>({id:l.id,name:l.name,capacity:l.capacity,type:l.type,shifts_per_day:l.shiftsPerDay,hours_per_shift:l.hoursPerShift||8,break_mins:l.breakMins||30,ot_mult:l.otMult||1.5,ot_threshold:l.otThresh||80,changeover_mins:l.changeoverMins||30,planned_maintenance:(l.plannedMaintenance||[]).map(w=>w.mode==='hourly'?{mode:'hourly',date:w.date,hours_lost:+(w.hoursLost||0),reason:w.reason||''}:{mode:'weekly',from_week:+(w.fromWeek||0),to_week:+(w.toWeek||0),reason:w.reason||''}),products:state.products.map((_,k)=>k)})),
          params:{periods:state.planning.periods,changeover_cost:100,overtime_cost_per_hr:50,work_days:state.planning.workDays||6,hrs_per_period:(state.production.lines[0]?.hoursPerShift||8)*(state.production.lines[0]?.shiftsPerDay||1)*(state.planning.workDays||6),horizon_start_date:state.planning.horizonStartDate||null,time_grain:state.planning.timeGrain||'weekly'},
        };
      }else if(solverMode==='profitmix'){
        endpoint='/api/solve/profitmix';
        // v3.1.1 Q14 — scope forecast to planning horizon, not full 24-month history
        const unit=state.planning.planningUnit||'weekly';
        const horizonMonths=Math.max(1,Math.min(24,Math.ceil(state.planning.periods*(unit==='weekly'?7:unit==='daily'?1:30)/30.5)));
        payload={
          demand_mode:demandMode,
          planning_horizon_months:horizonMonths,
          time_grain:state.planning.timeGrain||'weekly',
          products:state.products.map(p=>({name:p.name,sell_price:p.sellPrice,variable_cost:p.variableCost,
            cycle_time:Math.max(0.1,168/(p.capacity||50)), // hrs/unit derived from weekly capacity
            forecast:(p.history||[]).slice(-horizonMonths), // sliced to horizon, not full history
            history:p.history, mape_pct:p.mape||15, shelf_life:p.shelfLife,
            carry_rate:0.24, salvage_rate:p.salvageRate||0.8,
            mto_orders:p.mtoOrders||[], min_quantity:0,
            parts:p.bom.map(b=>({name:b.name,cost:b.cost,qty_per:b.qtyPer}))})),
          constraints:{shared_capacity:state.production.lines.reduce((a,l)=>a+l.capacity*state.planning.periods,0),budget:constraints.budget.on?constraints.budget.val:0,warehouse:constraints.warehouse.on?constraints.warehouse.val:0},
        };
      }else if(solverMode==='transport'){
        endpoint='/api/solve/transport';
        payload={
          shipments:state.products.flatMap(p=>p.bom.filter(b=>b.supplierType==='import'||b.leadTime>2).map(b=>({
            name:`${b.name} for ${p.name}`,weight_kg:b.qtyPer*p.history.reduce((a,v)=>a+v,0)/12*10,volume_cbm:b.qtyPer*p.history.reduce((a,v)=>a+v,0)/12*0.01,
            value:b.cost*b.qtyPer*p.history.reduce((a,v)=>a+v,0)/12,deadline_days:b.leadTime*7,urgency:b.leadTime<=1?'critical':b.leadTime<=3?'high':'normal',
            origin:b.supplierType==='import'?'International':'Domestic',destination:'Factory',demand_spike:false,
          }))),
          params:{},
        };
        if(!payload.shipments.length)payload.shipments=[{name:'Sample Shipment',weight_kg:500,volume_cbm:2,value:50000,deadline_days:21,urgency:'normal',origin:'Shanghai',destination:'Chennai'}];
      }else if(solverMode==='montecarlo'){
        endpoint='/api/solve/montecarlo';
        payload={
          products:state.products.map(p=>({name:p.name,demand:weeklyDemand(p),capacity:p.capacity,setup_cost:p.setupCost,variable_cost:p.variableCost,sell_price:p.sellPrice,shelf_life:p.shelfLife,yield_pct:p.yieldPct,yield_cv:(p.yieldCV||0)/100,init_inventory:p.initInventory,mape_pct:p.mape||15,carry_rate:(p.carryRate||24)/100,cap_cv:(p.capCV||5)/100,parts:p.bom.map(b=>({name:b.name,cost:b.cost,qty_per:b.qtyPer,cost_cv:(b.costCV||10)/100,lead_time:b.leadTime,lt_cv:(b.ltCV||10)/100,moq:b.moq,max_order:b.maxOrder||500,hold_pct:b.holdPct||24,ordering_cost:b.orderingCost||75}))})),
          params:{periods:state.planning.periods,carry_rate:(state.products[0]?.carryRate||24)/100,service_level:state.config.serviceLevel},n_runs:1000,
        };
      }else if(solverMode==='capital'){
        endpoint='/api/solve/capital';
        // Build investment list from product lines and assets
        payload={
          investments:state.production.lines.map((l,i)=>({
            name:`${l.name} (capacity upgrade)`,capex:l.capacity*10000,
            annual_cash_flow:l.capacity*state.products.reduce((a,p)=>a+p.sellPrice-p.variableCost-p.bom.reduce((s,b)=>s+b.cost*b.qtyPer,0),0)/state.production.lines.length*0.3,
            useful_life:10,residual_value:l.capacity*2000,
          })),
          params:{budget:constraints.budget.on?constraints.budget.val:state.budget.capex||1000000,wacc:state.config.wacc/100},
        };
      }else if(solverMode==='pipeline'){
        endpoint='/api/solve/pipeline';
        payload={
          profit_data:{
            products:state.products.map(p=>({name:p.name,sell_price:p.sellPrice,variable_cost:p.variableCost,max_demand:annDemand(p),cycle_time:1,parts:p.bom.map(b=>({name:b.name,cost:b.cost,qty_per:b.qtyPer}))})),
            constraints:{shared_capacity:state.production.lines.reduce((a,l)=>a+l.capacity*state.planning.periods,0),budget:constraints.budget.on?constraints.budget.val:0,warehouse:constraints.warehouse.on?constraints.warehouse.val:5000},
          },
          procurement_data:{
            products:state.products.map(p=>({name:p.name,demand:weeklyDemand(p),capacity:p.capacity,setup_cost:p.setupCost,variable_cost:p.variableCost,sell_price:p.sellPrice,shelf_life:p.shelfLife,yield_pct:p.yieldPct,init_inventory:p.initInventory,
              cost_events:(p.costEvents||[]).map(ev=>({from_month:ev.fromMonth,param:ev.paramKey,value:ev.paramValue,label:ev.label})),
              parts:p.bom.map(b=>({name:b.name,cost:b.cost,qty_per:b.qtyPer,lead_time:b.leadTime,moq:b.moq,max_order:b.maxOrder,hold_pct:b.holdPct,rm_capacity:b.rmCapacity,ordering_cost:b.orderingCost,rm_shelf:b.rmShelf,scrap_factor:b.scrapFactor,vol_disc:b.volDisc||[],trans_tiers:b.tiers||[]}))})),
            params:{periods:state.planning.periods,carry_rate:0.24,wh_max:constraints.warehouse.on?constraints.warehouse.val:5000,service_level:state.config.serviceLevel,budget:constraints.budget.on?constraints.budget.val:0},capacity_mode:state.production.lines[0]?.type||'shared',
          },
          production_data:{
            products:state.products.map(p=>({name:p.name,required_qty:annDemand(p),setup_cost:p.setupCost,yield_pct:p.yieldPct,cycle_time:1})),
            lines:state.production.lines.map(l=>({id:l.id,name:l.name,capacity:l.capacity,type:l.type,shifts_per_day:l.shiftsPerDay,products:state.products.map((_,k)=>k)})),
            params:{periods:state.planning.periods,changeover_cost:100},
          },
        };
      }else if(solverMode==='rolling'){
        endpoint='/api/solve/rolling';
        payload={
          n_waves:4,shift_weeks:4,frozen_weeks:state.planning.frozenWeeks||2,
          base:{
            products:state.products.map(p=>({
              name:p.name,demand:weeklyDemand(p),capacity:p.capacity,setup_cost:p.setupCost,
              variable_cost:p.variableCost,sell_price:p.sellPrice,shelf_life:p.shelfLife,
              yield_pct:p.yieldPct,init_inventory:p.initInventory,
              cost_events:(p.costEvents||[]).map(ev=>({from_month:ev.fromMonth,param:ev.paramKey,value:ev.paramValue,label:ev.label})),
              parts:p.bom.map(b=>({name:b.name,cost:b.cost,qty_per:b.qtyPer,lead_time:b.leadTime,moq:b.moq,max_order:b.maxOrder||500,hold_pct:b.holdPct||24,rm_capacity:b.rmCapacity||2000,ordering_cost:b.orderingCost||75,vol_disc:b.volDisc||[],trans_tiers:b.tiers||[]})),
            })),
            params:{periods:state.planning.periods,carry_rate:0.24,wh_max:constraints.warehouse.on?constraints.warehouse.val:5000,service_level:state.config.serviceLevel},
          }
        };
      }
      const res=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      const data=await res.json();
      if(data.error){setError(data.error)}else{setResult({...data,_mode:solverMode})}
    }catch(e){setError(e.message)}
    setSolving(false);
  };

  const MODES=[
    {id:'profitmix',label:'① Profit Max',icon:'💰',desc:'STEP 1 — Maximize contribution margin: decides HOW MUCH of each SKU to make given shared capacity and demand ceiling. Output quantities feed Procurement & Production.',obj:'Max Margin'},
    {id:'procurement',label:'② Procurement',icon:'📦',desc:'STEP 2 — Takes Profit Mix quantities, explodes BOM, finds optimal PO schedule minimizing total procurement + holding + ordering cost (MILP/CBC).',obj:'Min Cost'},
    {id:'production',label:'③ Production',icon:'🏭',desc:'STEP 3 — Takes required quantities from Profit Mix, schedules across production lines minimizing makespan + setup + overtime (MILP/CBC).',obj:'Min Makespan'},
    {id:'pipeline',label:'🔗 Full Pipeline',icon:'🔗',desc:'Chains all 3 steps in order: Profit Mix → Disaggregation (seasonal) → Procurement → Production. Each step output feeds the next.',obj:'End-to-End'},
    {id:'transport',label:'Transport',icon:'🚛',desc:'Mode selection with demand sensing + allocation (LP). Evaluates road/rail/sea/air/multimodal across 25 Indian routes.',obj:'Min Logistics'},
    {id:'capital',label:'Capital Budget',icon:'🏗️',desc:'Maximize portfolio NPV subject to CAPEX budget (LP). Computes IRR, payback, profitability index per investment.',obj:'Max NPV'},
    {id:'montecarlo',label:'Monte Carlo',icon:'🎲',desc:'1000 stochastic runs with randomized demand (±MAPE%), lead times (±LT_CV%), material prices (±cost_CV%). Outputs VaR/CVaR/fragility.',obj:'Risk Analysis'},
    {id:'rolling',label:'🔄 Rolling MPS',icon:'🔄',desc:'v3.0 P8 — Re-solve procurement over N waves (default 4). Each wave shifts horizon forward by shiftWeeks, freezes first N weeks of prev plan. Outputs nervousness (qty variance across re-plans) — use to tune the frozen/slushy horizon.',obj:'Rolling-horizon Stability'},
  ];

  // Dynamic constraints
  const [constraints,setConstraints]=useState({budget:{on:!!state.budget.procurement,val:state.budget.procurement||500000},warehouse:{on:true,val:5000},workingCapital:{on:false,val:200000},supplierMax:{on:false,val:1000}});
  const toggleC=(k)=>setConstraints(c=>({...c,[k]:{...c[k],on:!c[k].on}}));
  const setCV=(k,v)=>setConstraints(c=>({...c,[k]:{...c[k],val:+v}}));

  return <div className="animate-in">
    <div className="vgrid vgrid-2" style={{marginBottom:14}}>
      <MRPExplosionPanel state={state}/>
      <RCCPLoadPanel state={state}/>
    </div>
    {/* Solver Mode Selector */}
    <div className="card">
      <div className="card-title">⚡ Optimization Engine <span className="badge" style={{background:'rgba(56,189,248,.1)',color:'var(--a2)'}}>MILP · PuLP/CBC</span></div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(110px,1fr))',gap:6,marginBottom:12}}>
        {MODES.map(m=><div key={m.id} onClick={()=>setSolverMode(m.id)} style={{padding:'8px 10px',borderRadius:4,cursor:'pointer',border:`1px solid ${solverMode===m.id?'var(--ac)':'var(--br)'}`,background:solverMode===m.id?'rgba(0,212,170,.08)':'var(--bg3)',textAlign:'center',transition:'all .15s'}}>
          <div style={{fontSize:20}}>{m.icon}</div>
          <div style={{fontSize:10,fontWeight:600,color:solverMode===m.id?'var(--ac)':'var(--tx)',marginTop:2}}>{m.label}</div>
          <div style={{fontSize:8,color:'var(--tx3)',marginTop:1}}>{m.obj}</div>
        </div>)}
      </div>
      <div style={{fontSize:10,color:'var(--tx2)',marginBottom:8,padding:'4px 8px',background:'var(--bg3)',borderRadius:4}}>
        {MODES.find(m=>m.id===solverMode)?.desc}
      </div>

      {/* ═══ SOLVER INPUTS DETAIL — Shows ALL inputs per selected mode ═══ */}
      <div style={{marginBottom:10,padding:'10px 12px',background:'var(--bg3)',borderRadius:6,border:'1px solid var(--br)'}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--a3)',marginBottom:8}}>📋 Inputs for: {MODES.find(m=>m.id===solverMode)?.label}</div>

        {/* PROCUREMENT inputs */}
        {solverMode==='procurement'&&<div style={{fontSize:10}}>
          <div style={{color:'var(--tx3)',marginBottom:6}}>
            <strong>Objective:</strong> min Z = Σ [setup·y[t] + h_fg·I[t] + var·x[t] + penalty·s[t]] + Σ [mat·q[i,t] + ord·z[i,t] + trans·q[i,t] + h_rm·RI[i,t]]<br/>
            <strong>Where:</strong> Ordering cost = PO admin (fixed/order) + material (variable/unit) + transport (variable/unit, mode-dependent). Holding cost = inventory value × carry rate. Transport NOT in holding — no double counting.
          </div>
          <table className="data-table" style={{fontSize:9}}>
            <thead><tr><th>Input</th>{state.products.map(p=><th key={p.id} style={{color:'var(--ac)'}}>{p.name}</th>)}<th>Formula / Source</th></tr></thead>
            <tbody>
              {[
                ['Weekly Demand',p=>weeklyDemand(p).slice(0,4).join(',')+`... (${state.planning.periods} periods)`,'History[-12] ÷ 4 weeks/month'],
                ['Capacity (u/wk)',p=>p.capacity,'Setup Tab → Production Lines'],

                ['Variable Cost/u',p=>`${cur}${p.variableCost}`,'Product Settings → Variable Cost'],
                ['Shelf Life',p=>`${p.shelfLife} days`,'Product Settings → Shelf Life'],
                ['Yield %',p=>`${Math.round((p.yieldPct||0.95)*100)}%`,'Product Settings → Yield'],
                ['FG Hold Cost/u/wk',p=>{const mc=p.bom.reduce((s,b)=>s+b.cost*b.qtyPer,0);return `${cur}${(mc*(p.carryRate||24)/100/52).toFixed(4)}`},'BOM mat cost × carry% ÷ 52'],
                ['Carry Rate',p=>`${p.carryRate||24}%/yr`,'Capital(42%)+Storage(25%)+Ins(8%)+Obsol(21%)+Hdl(4%)'],
                ['Init Inventory',p=>p.initInventory||0,'Product Settings'],
                ['Service Level',p=>`${(state.config.serviceLevel*100).toFixed(0)}%`,'Setup → Company Profile'],
              ].map(([label,fn,src])=><tr key={label}><td style={{fontWeight:600}}>{label}</td>{state.products.map(p=><td key={p.id} className="num">{fn(p)}</td>)}<td style={{fontSize:8,color:'var(--tx3)'}}>{src}</td></tr>)}
            </tbody>
          </table>
          <div style={{marginTop:6,fontSize:10,fontWeight:600,color:'var(--a2)'}}>BOM Subparts (per-part inputs):</div>
          <table className="data-table" style={{fontSize:9}}>
            <thead><tr><th>Part (Product)</th><th>Cost/u</th><th>Qty/U</th><th>LT (wk)</th><th>MOQ</th><th>Max</th><th>Ord Cost</th><th>Hold%</th><th>Yield%</th><th>Shelf(d)</th><th>Scrap%</th><th>Trans</th><th>Policy</th></tr></thead>
            <tbody>{state.products.flatMap(p=>p.bom.map(b=><tr key={`${p.id}-${b.id}`}>
              <td style={{fontWeight:600}}>{b.name} <span style={{color:'var(--tx3)',fontSize:8}}>({p.name})</span></td>
              <td className="num">{cur}{b.cost}</td><td className="num">{b.qtyPer}</td>
              <td className="num">{b.leadTime}</td><td className="num">{b.moq}</td><td className="num">{b.maxOrder||500}</td>
              <td className="num">{cur}{b.orderingCost||75}</td><td className="num">{b.holdPct||24}%</td>
              <td className="num">{b.partYield||98}%</td><td className="num">{b.rmShelf||90}</td>
              <td className="num">{((b.scrapFactor||0.05)*100).toFixed(0)}%</td>
              <td className="num">{cur}{b.transRate||0.5} ({(b.transMode||'perUnit')})</td>
              <td><span style={{fontSize:8,padding:'1px 5px',borderRadius:8,background:'rgba(167,139,250,.1)',color:'var(--a3)'}}>{(b.procPolicy||'milp').toUpperCase()}</span></td>
            </tr>))}</tbody>
          </table>
        </div>}

        {/* PRODUCTION inputs */}
        {solverMode==='production'&&<div style={{fontSize:10}}>
          <div style={{color:'var(--tx3)',marginBottom:6}}>
            <strong>Objective:</strong> min Z = Σ [setup·changeover[k,t] + overtime_cost·OT[t] + idle_cost·idle[t]]<br/>
            <strong>Subject to:</strong> Σ(cycle_time[k]·x[k,t]) ≤ avail_hrs[t] + OT[t] for each line and period
          </div>
          <div style={{fontWeight:600,color:'var(--a2)',marginBottom:4}}>Production Lines:</div>
          <table className="data-table" style={{fontSize:9}}>
            <thead><tr><th>Line</th><th>Type</th><th>Capacity</th><th>Shifts</th><th>Hrs/Shift</th><th>Break</th><th>OT Mult</th><th>Changeover</th><th>Net Hrs/Day</th></tr></thead>
            <tbody>{state.production.lines.map(l=><tr key={l.id}>
              <td style={{fontWeight:600}}>{l.name}</td><td>{l.type}</td><td className="num">{l.capacity} u/wk</td>
              <td className="num">{l.shiftsPerDay}</td><td className="num">{l.hoursPerShift||8}h</td>
              <td className="num">{l.breakMins||30}min</td><td className="num">{l.otMult||1.5}×</td>
              <td className="num">{l.changeoverMins||30}min</td>
              <td className="num" style={{color:'var(--ac)',fontWeight:600}}>{(((l.hoursPerShift||8)*l.shiftsPerDay)-(l.breakMins||30)*l.shiftsPerDay/60).toFixed(1)}h</td>
            </tr>)}</tbody>
          </table>
          {/* ── Maintenance windows (v3.1 Q3 + v3.1.1 Q12 hourly) ── */}
          <div style={{marginTop:8,padding:6,background:'var(--bg3)',borderRadius:4,border:'1px solid var(--br)'}}>
            <div style={{fontSize:10,fontWeight:600,color:'var(--a4)',marginBottom:4}}>🔧 Planned Maintenance <span style={{color:'var(--tx3)',fontWeight:400,fontSize:9}}>— two modes: <em>weekly</em> (zeros capacity for listed weeks) or <em>hourly</em> (capacity reduced pro-rata for hours lost on a date). Unplanned downtime goes into OEE Availability.</span></div>
            {state.production.lines.map(l=>{
              const mw=l.plannedMaintenance||[];
              return <div key={l.id} style={{fontSize:10,marginBottom:4,display:'flex',alignItems:'flex-start',gap:6,flexWrap:'wrap'}}>
                <strong style={{minWidth:55,color:'var(--ac)',paddingTop:4}}>{l.name}:</strong>
                <div style={{display:'flex',flexDirection:'column',gap:3,flex:1}}>
                  {mw.length===0&&<span style={{color:'var(--tx3)',fontSize:9}}>no windows scheduled</span>}
                  {mw.map((w,wi)=>{
                    const isHourly=w.mode==='hourly';
                    return <div key={wi} style={{display:'flex',alignItems:'center',gap:2,background:'var(--bg2)',padding:'2px 4px',borderRadius:3,border:'1px solid var(--br)',flexWrap:'wrap'}}>
                      <select value={w.mode||'weekly'} style={{width:60,fontSize:9,padding:'1px 3px'}} onChange={e=>{const nl=state.production.lines.map(ll=>ll.id===l.id?{...ll,plannedMaintenance:mw.map((mm,mi)=>mi===wi?{...mm,mode:e.target.value}:mm)}:ll);dispatch({type:'SET_PRODUCTION',payload:{lines:nl}});}}>
                        <option value="weekly">Weekly</option>
                        <option value="hourly">Hourly</option>
                      </select>
                      {!isHourly&&<>
                        <span style={{fontSize:9,color:'var(--tx3)'}}>W</span>
                        <input type="number" placeholder="from" value={w.fromWeek||''} style={{width:32,fontSize:9,padding:'1px 3px'}} onChange={e=>{const nl=state.production.lines.map(ll=>ll.id===l.id?{...ll,plannedMaintenance:mw.map((mm,mi)=>mi===wi?{...mm,fromWeek:+e.target.value}:mm)}:ll);dispatch({type:'SET_PRODUCTION',payload:{lines:nl}});}}/>
                        <span style={{fontSize:9,color:'var(--tx3)'}}>→</span>
                        <input type="number" placeholder="to" value={w.toWeek||''} style={{width:32,fontSize:9,padding:'1px 3px'}} onChange={e=>{const nl=state.production.lines.map(ll=>ll.id===l.id?{...ll,plannedMaintenance:mw.map((mm,mi)=>mi===wi?{...mm,toWeek:+e.target.value}:mm)}:ll);dispatch({type:'SET_PRODUCTION',payload:{lines:nl}});}}/>
                      </>}
                      {isHourly&&<>
                        <input type="date" value={w.date||''} style={{width:120,fontSize:9,padding:'1px 3px'}} onChange={e=>{const nl=state.production.lines.map(ll=>ll.id===l.id?{...ll,plannedMaintenance:mw.map((mm,mi)=>mi===wi?{...mm,date:e.target.value}:mm)}:ll);dispatch({type:'SET_PRODUCTION',payload:{lines:nl}});}}/>
                        <input type="number" placeholder="hrs" min={0.5} step={0.5} value={w.hoursLost||''} style={{width:40,fontSize:9,padding:'1px 3px'}} title="Hours of capacity lost on that date" onChange={e=>{const nl=state.production.lines.map(ll=>ll.id===l.id?{...ll,plannedMaintenance:mw.map((mm,mi)=>mi===wi?{...mm,hoursLost:+e.target.value}:mm)}:ll);dispatch({type:'SET_PRODUCTION',payload:{lines:nl}});}}/>
                        <span style={{fontSize:9,color:'var(--tx3)'}}>hrs lost</span>
                      </>}
                      <input placeholder="reason" value={w.reason||''} style={{width:90,fontSize:9,padding:'1px 3px'}} onChange={e=>{const nl=state.production.lines.map(ll=>ll.id===l.id?{...ll,plannedMaintenance:mw.map((mm,mi)=>mi===wi?{...mm,reason:e.target.value}:mm)}:ll);dispatch({type:'SET_PRODUCTION',payload:{lines:nl}});}}/>
                      <button style={{fontSize:8,padding:'0 3px',cursor:'pointer',background:'none',border:'1px solid var(--dg)',color:'var(--dg)',borderRadius:2,lineHeight:1.4}} onClick={()=>{const nl=state.production.lines.map(ll=>ll.id===l.id?{...ll,plannedMaintenance:mw.filter((_,mi)=>mi!==wi)}:ll);dispatch({type:'SET_PRODUCTION',payload:{lines:nl}});}}>×</button>
                    </div>;
                  })}
                  <div style={{display:'flex',gap:4}}>
                    <button style={{fontSize:9,padding:'1px 6px',cursor:'pointer',background:'var(--bg2)',border:'1px solid var(--a4)',color:'var(--a4)',borderRadius:3}} onClick={()=>{const nl=state.production.lines.map(ll=>ll.id===l.id?{...ll,plannedMaintenance:[...(ll.plannedMaintenance||[]),{mode:'weekly',fromWeek:(ll.plannedMaintenance?.length?(ll.plannedMaintenance.slice(-1)[0].toWeek||12)+2:12),toWeek:(ll.plannedMaintenance?.length?(ll.plannedMaintenance.slice(-1)[0].toWeek||12)+3:13),reason:'PM'}]}:ll);dispatch({type:'SET_PRODUCTION',payload:{lines:nl}});}}>+ weekly</button>
                    <button style={{fontSize:9,padding:'1px 6px',cursor:'pointer',background:'var(--bg2)',border:'1px solid var(--a3)',color:'var(--a3)',borderRadius:3}} onClick={()=>{const today=new Date().toISOString().slice(0,10);const nl=state.production.lines.map(ll=>ll.id===l.id?{...ll,plannedMaintenance:[...(ll.plannedMaintenance||[]),{mode:'hourly',date:today,hoursLost:4,reason:'Bearing replacement'}]}:ll);dispatch({type:'SET_PRODUCTION',payload:{lines:nl}});}}>+ hourly</button>
                  </div>
                </div>
              </div>;
            })}
            <div style={{fontSize:9,color:'var(--tx3)',marginTop:4}}>💡 <strong>Taxonomy:</strong> <em>Micro-stops</em> → OEE Performance %; <em>Unplanned downtime</em> → reduce Availability %; <em>Scheduled PM</em> → this calendar. Don't double-count.</div>
          </div>
          <div style={{fontWeight:600,color:'var(--a2)',marginTop:6,marginBottom:4}}>Products to Schedule:</div>
          <table className="data-table" style={{fontSize:9}}>
            <thead><tr><th>Product</th><th>Annual Demand</th><th>Setup Cost</th><th>Cycle Time</th><th>Yield%</th></tr></thead>
            <tbody>{state.products.map(p=><tr key={p.id}>
              <td style={{fontWeight:600}}>{p.name}</td>
              <td className="num">{annDemand(p).toLocaleString()}u</td>
              <td className="num">{cur}{p.setupCost}</td>
              <td className="num">{p.cycleTime||19} min/u</td>
              <td className="num">{Math.round((p.yieldPct||0.95)*100)}%</td>
            </tr>)}</tbody>
          </table>
        </div>}

        {/* PROFIT MAX inputs */}
        {solverMode==='profitmix'&&<div style={{fontSize:10}}>
          <div style={{color:'var(--tx3)',marginBottom:6}}>
            <strong>Objective:</strong> max Z = Σ [(sell_price[k] - var_cost[k] - mat_cost[k]) × qty[k]]<br/>
            <strong>Subject to:</strong> qty[k] ≤ demand_ceiling[k] (from forecast × (1+MAPE%)), Σ(cycle_time[k]·qty[k]) ≤ shared_capacity<br/>
            <strong>Allocates by:</strong> margin per bottleneck-hour (not margin per unit)
          </div>
          <table className="data-table" style={{fontSize:9}}>
            <thead><tr><th>Product</th><th>Sell Price</th><th>Mat Cost/u</th><th>Var Cost/u</th><th>Margin/u</th><th>Cycle(min)</th><th>Margin/hr</th><th>Demand Ceiling</th><th>MAPE%</th></tr></thead>
            <tbody>{state.products.map(p=>{
              const mc=p.bom.reduce((s,b)=>s+b.cost*b.qtyPer,0);
              const mg=p.sellPrice-p.variableCost-mc;
              const ct=(p.cycleTime||19)/60;
              const mgh=ct>0?mg/ct:0;
              const ceil=Math.round(annDemand(p)*(1+(p.mape||15)/100));
              return <tr key={p.id}>
                <td style={{fontWeight:600}}>{p.name}</td>
                <td className="num">{cur}{p.sellPrice}</td>
                <td className="num">{cur}{mc.toFixed(2)}</td>
                <td className="num">{cur}{p.variableCost}</td>
                <td className="num" style={{color:mg>0?'var(--gn)':'var(--dg)',fontWeight:700}}>{cur}{mg.toFixed(2)}</td>
                <td className="num">{p.cycleTime||19}</td>
                <td className="num" style={{color:'var(--a2)',fontWeight:700}}>{cur}{mgh.toFixed(1)}/hr</td>
                <td className="num">{ceil.toLocaleString()}</td>
                <td className="num">{p.mape||15}%</td>
              </tr>
            })}</tbody>
          </table>
        </div>}

        {/* TRANSPORT inputs */}
        {solverMode==='transport'&&<div style={{fontSize:10}}>
          <div style={{color:'var(--tx3)',marginBottom:6}}>
            <strong>Logic:</strong> For each shipment, evaluates 5 modes (road, rail, sea, air, multimodal) against 25-route Indian transit database. Checks deadline feasibility, computes total cost (freight + handling + insurance). If demand sensing detects spike (actual {'>'} forecast), overrides to faster mode and shows cost premium.<br/>
            <strong>Modes available per BOM part:</strong> {state.products.flatMap(p=>p.bom.map(b=>`${b.name}:${(b.transMode||'perUnit').toUpperCase()}`)).join(', ')}
          </div>
          <div style={{color:'var(--a4)',fontSize:9,marginTop:4}}>The transport solver uses real Indian transit times (Chennai→Mumbai: road 3d, rail 4d, air 1d, sea 5d, etc.) from a 25-route database. It's not isolated — it connects to demand sensing: if current_demand {'>'} forecast_demand, it flags air freight override with cost premium calculation.</div>
        </div>}

        {/* MONTE CARLO inputs */}
        {solverMode==='montecarlo'&&<div style={{fontSize:10}}>
          <div style={{color:'var(--tx3)',marginBottom:6}}>
            <strong>Process:</strong> Runs the full procurement simulation 1000 times, each with randomized: demand (±MAPE%), lead time (±LT_CV%), material price (±cost_CV%). Collects cost distribution → computes Avg, P10, P50, P90, VaR₉₅, CVaR₉₅, fragility ratio.<br/>
            <strong>Variability parameters from your data:</strong>
          </div>
          <table className="data-table" style={{fontSize:9}}>
            <thead><tr><th>Product</th><th>MAPE% (demand noise)</th><th>Parts</th><th>Max LT CV%</th><th>Max Cost CV%</th><th>Yield CV%</th><th>Cap CV%</th></tr></thead>
            <tbody>{state.products.map(p=><tr key={p.id}>
              <td style={{fontWeight:600}}>{p.name}</td>
              <td className="num">{p.mape||15}%</td>
              <td className="num">{p.bom.length}</td>
              <td className="num">{Math.max(...p.bom.map(b=>b.ltCV||10))}%</td>
              <td className="num">{Math.max(...p.bom.map(b=>b.costCV||10))}%</td>
              <td className="num">{p.yieldCV||0}%</td>
              <td className="num">{p.capCV||5}%</td>
            </tr>)}</tbody>
          </table>
        </div>}

        {/* CAPITAL BUDGET inputs */}
        {solverMode==='capital'&&<div style={{fontSize:10}}>
          <div style={{color:'var(--tx3)',marginBottom:6}}>
            <strong>Objective:</strong> max Σ NPV[j]·select[j] subject to Σ CAPEX[j]·select[j] ≤ Budget<br/>
            <strong>NPV formula:</strong> NPV = -CAPEX + Σ(CF_t / (1+WACC)^t) + Residual/(1+WACC)^n<br/>
            <strong>WACC:</strong> {state.config.wacc}% | <strong>Budget:</strong> {cur}{(state.budget.capex||1000000).toLocaleString()}
          </div>
          <table className="data-table" style={{fontSize:9}}>
            <thead><tr><th>Investment</th><th>CAPEX</th><th>Annual CF</th><th>Life (yr)</th><th>Residual</th><th>Est. NPV</th><th>PI</th></tr></thead>
            <tbody>{state.production.lines.map((l,i)=>{
              const capex=l.capacity*10000;const cf=l.capacity*state.products.reduce((a,p)=>a+p.sellPrice-p.variableCost-p.bom.reduce((s,b)=>s+b.cost*b.qtyPer,0),0)/Math.max(state.production.lines.length,1)*0.3;
              const wacc=state.config.wacc/100;const life=10;const res=l.capacity*2000;
              const npv=-capex+Array.from({length:life},(_,t)=>cf/Math.pow(1+wacc,t+1)).reduce((a,b)=>a+b,0)+res/Math.pow(1+wacc,life);
              return <tr key={l.id}>
                <td style={{fontWeight:600}}>{l.name} upgrade</td>
                <td className="num">{cur}{capex.toLocaleString()}</td>
                <td className="num">{cur}{Math.round(cf).toLocaleString()}</td>
                <td className="num">{life}yr</td>
                <td className="num">{cur}{res.toLocaleString()}</td>
                <td className="num" style={{color:npv>0?'var(--gn)':'var(--dg)',fontWeight:700}}>{cur}{Math.round(npv).toLocaleString()}</td>
                <td className="num">{(npv/capex+1).toFixed(2)}</td>
              </tr>
            })}</tbody>
          </table>
        </div>}

        {/* PIPELINE inputs */}
        {solverMode==='pipeline'&&<div style={{fontSize:10}}>
          <div style={{color:'var(--tx3)',marginBottom:6}}>
            <strong>Chains 3 solvers:</strong><br/>
            1. <strong style={{color:'var(--a4)'}}>Profit Mix</strong> → decides HOW MUCH of each product to make (max margin) → outputs qty per SKU<br/>
            2. <strong style={{color:'var(--ac)'}}>Procurement</strong> → takes those quantities, explodes BOM, finds optimal PO schedule (min cost) → outputs PO timing + material orders<br/>
            3. <strong style={{color:'var(--a3)'}}>Production</strong> → takes required quantities, schedules across lines (min makespan) → outputs Gantt + utilization<br/>
            <br/>Each solver's OUTPUT becomes the next solver's INPUT. The pipeline result shows all three together with a combined cost/profit summary.
          </div>
        </div>}
      </div>

      {/* Dynamic Constraint Panel */}
      <div style={{marginBottom:10,padding:'8px 10px',background:'var(--bg3)',borderRadius:4,border:'1px solid var(--br)'}}>
        <div style={{display:'flex',gap:16,alignItems:'center',marginBottom:6}}>
          <div style={{fontSize:10,fontWeight:600,color:'var(--a3)'}}>⚙ Constraints</div>
          {solverMode==='profitmix'&&<div style={{display:'flex',alignItems:'center',gap:4,fontSize:10}}>
            <span style={{color:'var(--a4)',fontWeight:600}}>Demand Mode:</span>
            <select value={demandMode} onChange={e=>setDemandMode(e.target.value)} style={{fontSize:10,padding:'2px 6px'}}>
              <option value="mts">MTS — Forecast ceiling</option>
              <option value="mto">MTO — Order book only</option>
              <option value="ato">ATO — Orders + forecast buffer</option>
              <option value="seasonal">Seasonal — Peak-aware forecast</option>
            </select>
          </div>}
        </div>
        <div style={{display:'flex',gap:12,flexWrap:'wrap',fontSize:11}}>
          {[{k:'budget',lbl:`Budget (${cur})`},{k:'warehouse',lbl:'Warehouse (units)'},{k:'workingCapital',lbl:`Working Capital (${cur})`},{k:'supplierMax',lbl:'Supplier Max/mo'}].map(({k,lbl})=>
            <label key={k} style={{display:'flex',alignItems:'center',gap:4,cursor:'pointer',opacity:constraints[k].on?1:0.5}}>
              <input type="checkbox" checked={constraints[k].on} onChange={()=>toggleC(k)} style={{width:14,height:14}}/>
              <span>{lbl}:</span>
              <input type="number" value={constraints[k].val} onChange={e=>setCV(k,e.target.value)} disabled={!constraints[k].on} style={{width:80,padding:'2px 6px',fontSize:10,opacity:constraints[k].on?1:0.4}}/>
            </label>
          )}
        </div>
      </div>
      <button className="btn btn-primary" onClick={handleSolve} disabled={solving}>{solving?'⏳ Solving...':'🔬 Run '+MODES.find(m=>m.id===solverMode)?.label}</button>
      {error&&<div style={{color:'var(--dg)',fontSize:11,padding:8,background:'rgba(248,81,73,.08)',borderRadius:4,marginTop:8}}>❌ {error}</div>}
    </div>

    {/* ─── PROCUREMENT RESULTS ─── */}
    {result&&result._mode==='procurement'&&<div className="card">
      <div className="card-title">📦 Procurement MILP Results</div>
      <div className="kpi-row">
        <KPI label="Total Cost" value={`${cur}${result.total_cost?.toLocaleString()}`} sub={`${result.periods} periods`}/>
        <KPI label="Solve Time" value={`${result.solve_time}s`} sub="CBC" color="var(--a2)"/>
        <KPI label="Status" value={result.status} color="var(--gn)"/>
        <KPI label="Products" value={result.products?.length||0} color="var(--a2)"/>
        <KPI label="Materials" value={result.materials?.length||0} color="var(--a3)"/>
        <KPI label="Total POs" value={result.materials?.reduce((a,m)=>a+(m.num_orders||0),0)||0} color="var(--a4)"/>
      </div>
      {result.cost_breakdown&&<div className="kpi-row">{Object.entries(result.cost_breakdown).filter(([k])=>k!=='total').map(([k,v])=><KPI key={k} label={k.replace(/_/g,' ')} value={`${cur}${Math.round(v).toLocaleString()}`} color="var(--a3)"/>)}</div>}
    </div>}

    {/* ─── DETAILED PRODUCTION SCHEDULE (Procurement mode) ─── */}
    {result&&result._mode==='procurement'&&result.products?.map((p,pi)=><div key={`sched-${pi}`} className="card">
      <div className="card-title">📋 Production Schedule — {p.name}
        <span className="badge" style={{background:'rgba(0,212,170,.12)',color:'var(--ac)',marginLeft:6}}>{p.total_produced?.toLocaleString()}u / {p.total_demand?.toLocaleString()}u</span>
        <span className="badge" style={{background:p.fill_rate>=99?'rgba(63,185,80,.15)':'rgba(240,180,41,.15)',color:p.fill_rate>=99?'var(--gn)':'var(--a4)',marginLeft:4}}>{p.fill_rate}% fill</span>
      </div>
      <div style={{fontSize:10,color:'var(--tx3)',marginBottom:6}}>Period-by-period execution plan. Each row = one planning bucket ({state.planning.planningUnit||'weekly'}).</div>
      <div style={{overflowX:'auto',maxHeight:360}}>
        <table className="data-table" style={{fontSize:10}}>
          <thead style={{position:'sticky',top:0,background:'var(--bg2)'}}>
            <tr><th>Period</th><th>Demand</th><th style={{color:'var(--ac)'}}>Produce</th><th>Setup</th><th>Inventory</th><th style={{color:'var(--dg)'}}>Shortage</th><th>Fill</th></tr>
          </thead>
          <tbody>{p.production?.map((q,t)=>{
            const dem=(state.products[pi]?.history?.[Math.floor(t/4)]||0)/4;
            const fill=dem>0?Math.min(100,Math.round((q-(p.shortages?.[t]||0))/Math.max(dem,1)*100)):100;
            return <tr key={t} style={{background:p.setups?.[t]?'rgba(0,212,170,.03)':'transparent'}}>
              <td style={{fontFamily:'JetBrains Mono',fontSize:9,color:'var(--tx3)'}}>W{t+1}</td>
              <td className="num">{Math.round(dem)}</td>
              <td className="num" style={{color:q>0?'var(--ac)':'var(--tx3)',fontWeight:q>0?700:400}}>{q||'—'}</td>
              <td style={{textAlign:'center',fontSize:9}}>{p.setups?.[t]?'▶ batch':''}</td>
              <td className="num" style={{color:(p.inventory?.[t]||0)<5?'var(--dg)':(p.inventory?.[t]||0)<15?'var(--a4)':'var(--tx)'}}>{Math.round(p.inventory?.[t]||0)}</td>
              <td className="num" style={{color:(p.shortages?.[t]||0)>0?'var(--dg)':'var(--tx3)'}}>{(p.shortages?.[t]||0)>0?Math.round(p.shortages[t]):'—'}</td>
              <td className="num" style={{color:fill>=99?'var(--gn)':fill>=80?'var(--a4)':'var(--dg)',fontSize:9}}>{fill}%</td>
            </tr>;
          })}</tbody>
          <tfoot><tr style={{borderTop:'2px solid var(--br)',fontWeight:700}}>
            <td>Total</td>
            <td className="num">{p.total_demand?.toLocaleString()}</td>
            <td className="num" style={{color:'var(--ac)'}}>{p.total_produced?.toLocaleString()}</td>

    {/* ─── CAPITAL BUDGET RESULTS ─── */}

      </div>
    </div>}

    {/* ─── ROLLING MPS RESULTS ─── */}
    {result&&result._mode==='rolling'&&<div>
      <div className="card" style={{borderColor:'var(--a3)'}}>
        <div className="card-title">🔄 Rolling-Horizon MPS — Nervousness Report
          <span className="badge" style={{background:'rgba(167,139,250,.12)',color:'var(--a3)',marginLeft:6}}>{result.waves?.length||0} waves</span>
        </div>
        <div style={{fontSize:10,color:'var(--tx2)',marginBottom:8}}>Re-ran procurement over {result.waves?.length} rolling waves, each shifted by {result.shift_weeks} weeks with first {result.frozen_weeks} weeks frozen. Total nervousness = total absolute qty delta across re-plans (lower = more stable).</div>
        <div className="kpi-row">
          <KPI label="Waves Solved" value={result.waves?.filter(w=>!w.error).length||0} color="var(--a2)"/>

      {result.waves?.length>0&&<div className="card">

        <table className="data-table" style={{fontSize:10}}>
          <thead><tr><th>Wave</th><th>Shift (wks)</th><th className="num">Total Cost</th><th className="num">Δ vs Wave 0</th><th className="num">Solve Time</th><th>Status</th></tr></thead>
          <tbody>{result.waves.map((w,i)=>{
            const base=result.waves[0]?.total_cost||0;
            const delta=w.total_cost-base;
            const pct=base?((delta/base)*100).toFixed(1):'0';
            return <tr key={i}>
              <td style={{fontWeight:600,color:'var(--ac)'}}>Wave {w.wave+1}</td>
              <td style={{fontFamily:'JetBrains Mono',fontSize:9}}>+{w.shift_weeks}w</td>
              <td className="num" style={{fontWeight:700}}>{cur}{w.total_cost?.toLocaleString()}</td>
              <td className="num" style={{color:delta>0?'var(--dg)':delta<0?'var(--gn)':'var(--tx3)'}}>{i===0?'baseline':`${delta>=0?'+':''}${cur}${delta.toLocaleString()} (${pct}%)`}</td>
              <td className="num" style={{fontSize:9,color:'var(--tx2)'}}>{w.solve_time}s</td>
              <td style={{color:w.error?'var(--dg)':'var(--gn)',fontSize:9,fontWeight:600}}>{w.error?`✗ ${w.error}`:'✓ Optimal'}</td>

          })}</tbody>

      {result.final_plan&&result.final_plan.materials?.length>0&&<div className="card">
        <div className="card-title">🧾 Final Wave — Settled PO Register
          <span className="badge" style={{background:'rgba(0,212,170,.12)',color:'var(--ac)',marginLeft:6}}>{result.final_plan.materials.reduce((a,m)=>a+(m.purchase_orders?.length||0),0)} POs</span>
        </div>
        <div style={{fontSize:10,color:'var(--tx3)',marginBottom:6}}>After all rolling re-plans converged, these are the POs to execute. Weeks 1-{result.frozen_weeks} are frozen; later weeks remain re-plannable.</div>
        <div style={{overflowX:'auto',maxHeight:400}}>
          <table className="data-table" style={{fontSize:10}}>
            <thead style={{position:'sticky',top:0,background:'var(--bg2)'}}>
              <tr><th>PO #</th><th>Material</th><th>Issue Wk</th><th>Arrive Wk</th><th className="num">Qty</th><th className="num">Ext Cost</th><th>Zone</th></tr>
            </thead>
            <tbody>{(()=>{
              let poNum=0;const rows=[];
              result.final_plan.materials.forEach(m=>{
                (m.purchase_orders||[]).forEach(po=>{
                  poNum++;
                  const frozen=po.period<(result.frozen_weeks||2);
                  rows.push(<tr key={poNum} style={frozen?{background:'rgba(167,139,250,.05)'}:{}}>
                    <td style={{fontFamily:'JetBrains Mono',fontSize:9,fontWeight:600,color:'var(--a2)'}}>PO-{String(poNum).padStart(4,'0')}</td>
                    <td style={{fontWeight:600}}>{m.name}</td>
                    <td style={{fontFamily:'JetBrains Mono',fontSize:9}}>W{po.period+1}</td>
                    <td style={{fontFamily:'JetBrains Mono',fontSize:9,color:'var(--ac)'}}>W{po.arrive_period+1}</td>
                    <td className="num" style={{color:'var(--ac)',fontWeight:700}}>{po.quantity.toLocaleString()}</td>
                    <td className="num" style={{fontWeight:700}}>{cur}{Math.round(po.cost).toLocaleString()}</td>
                    <td style={{fontSize:9,color:frozen?'var(--a3)':'var(--tx2)',fontWeight:frozen?700:400}}>{frozen?'🔒 FROZEN':'🔓 OPEN'}</td>
                  </tr>);
                });
              });
              return rows.length?rows:[<tr key="empty"><td colSpan={7} style={{textAlign:'center',color:'var(--tx3)',padding:12}}>No POs in final plan</td></tr>];
            })()}</tbody>
          </table>
        </div>
      </div>}

      <div className="card" style={{background:'rgba(167,139,250,.05)',borderColor:'var(--a3)'}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--a3)',marginBottom:4}}>💡 Interpretation Guide</div>
        <div style={{fontSize:10,color:'var(--tx)',lineHeight:1.5}}>
          <strong>Low nervousness (&lt;100):</strong> Plan is stable — frozen zone is long enough, or demand is well-predicted. Suppliers get consistent POs.<br/>
          <strong>Medium (100-500):</strong> Some re-planning churn — consider lengthening frozen zone or smoothing demand forecast.<br/>
          <strong>High (&gt;500):</strong> Plan thrash — suppliers receive conflicting signals. Widen frozen horizon, add safety stock, or improve demand sensing.
        </div>
      </div>
    </div>}

    {/* MILP Export */}
    <div className="card">
      <div className="card-title">📤 MILP Export & Data Management</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>

          let py='# Enterprise Simulator — MILP Export\n# Run: pip install pulp numpy && python this_file.py\nimport pulp, numpy as np\n\n';
          py+='# PRODUCTS\nproducts = '+JSON.stringify(state.products.map(p=>({name:p.name,demand:p.history.flatMap(m=>{const w=Math.round(m/4);return[w,w,w,m-3*w]}).slice(0,state.planning.periods),capacity:p.capacity,setup_cost:p.setupCost,variable_cost:p.variableCost,sell_price:p.sellPrice,shelf_life:p.shelfLife,yield_pct:p.yieldPct,parts:p.bom.map(b=>({name:b.name,cost:b.cost,qty_per:b.qtyPer,lead_time:b.leadTime,moq:b.moq,max_order:b.maxOrder,hold_pct:b.holdPct,ordering_cost:b.orderingCost}))})),null,2)+'\n\n';
          py+='# Copy into milp_v3_fixed.py or use the /api/solve/procurement endpoint\n';
          py+='print("Products:", len(products))\nfor p in products:\n    print(f"  {p[\'name\']}: demand={sum(p[\'demand\'])}u, parts={len(p[\'parts\'])}")\n';
          const blob=new Blob([py],{type:'text/python'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='milp_export.py';a.click();
        }}>📤 Export MILP (.py)</button>
        <button className="btn btn-secondary btn-sm" onClick={()=>{
          const data=JSON.stringify(state,null,2);const blob=new Blob([data],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='simulator_state.json';a.click();
        }}>💾 Save State (JSON)</button>
        <label className="btn btn-secondary btn-sm" style={{cursor:'pointer'}}>📂 Load State<input type="file" accept=".json" style={{display:'none'}} onChange={e=>{
          const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);Object.keys(d).forEach(k=>{if(k==='config')dispatch({type:'SET_CONFIG',payload:d[k]});else if(k==='products'){d[k].forEach((p,i)=>{if(i<state.products.length)dispatch({type:'UPDATE_PRODUCT',id:state.products[i].id,payload:p})})}});alert('State loaded')}catch(ex){alert('Invalid file')}};r.readAsText(f);

      </div>
    </div>

    {/* Scenario Save/Load */}
    <div className="card">

      <div style={{display:'flex',gap:8,marginBottom:8}}>
        <button className="btn btn-primary btn-sm" onClick={()=>{const name=prompt('Scenario name:','Scenario '+(state.scenarios.length+1));if(name)dispatch({type:'SAVE_SCENARIO',name})}}>💾 Save Current</button>
      </div>
      {state.scenarios.map(sc=><div key={sc.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 8px',borderBottom:'1px solid var(--br)',fontSize:11}}>
        <span><strong>{sc.name}</strong> <span style={{color:'var(--tx3)',fontSize:9}}>{sc.time}</span></span>
        <span><button className="btn btn-secondary btn-sm" onClick={()=>dispatch({type:'LOAD_SCENARIO',id:sc.id})}>Load</button> <button className="btn btn-danger btn-sm" onClick={()=>dispatch({type:'DELETE_SCENARIO',id:sc.id})}>×</button></span>
      </div>)}
    </div>

    {/* ATP/CTP */}
    <MPSVizCard state={state}/>
    <InventoryProjectionCard state={state}/>
    <MILPFormCard state={state}/>
