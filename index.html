          {wiResult.changes?.map((c,i)=><div key={i} style={{padding:'3px 0',borderBottom:'1px solid var(--br)'}}>
            <span style={{color:'var(--a2)'}}>{c.param}</span>: <strong>{c.change}</strong> — <span style={{color:'var(--tx2)'}}>{c.reason}</span>
          </div>)}
          <div style={{marginTop:6,fontSize:10,color:'var(--a4)'}}>{wiResult.impact}</div>
        </div>}
      </div>
    })()}

    {/* v3.3.3 — Parameter sensitivity: one-param slider + tornado */}
    {(()=>{
      const P=state.products;if(P.length===0)return null;
      // Baseline profit (heuristic — sum of margin × forecasted demand × min(1, capacity/demand))
      const computeProfit=(delta)=>{
        let profit=0;
        P.forEach(p=>{
          const mc=p.bom.reduce((s,b)=>s+(b.cost*(1+(delta.matCost||0)))*b.qtyPer,0);
          const margin=(p.sellPrice*(1+(delta.sellPrice||0)))-p.variableCost-mc;
          const forecast=(p.history||[]).slice(-12).reduce((a,b)=>a+b,0)*(1+(delta.demand||0));
          const cap=(p.capacity||50)*periodCount(state.planning)*(1+(delta.capacity||0));
          const produced=Math.min(forecast,cap);
          profit+=margin*produced-p.setupCost*Math.ceil(produced/Math.max(p.capacity,1))*(1+(delta.setupCost||0));
        });
        // Freight cost (if lanes)
        const act=(state.network?.lanes||[]).filter(l=>l.active!==false);
        const freight=act.reduce((a,l)=>a+(+l.demandPerWk||0)*(+l.ratePerUnit||0)*(1+(delta.freight||0)),0)*52;
        return Math.round(profit-freight);
      };
      const baseProfit=computeProfit({});
      // Tornado: ±20% on each parameter
      const params=[
        {key:'sellPrice',label:'Sell Price',unit:'%'},
        {key:'matCost',label:'Material Cost',unit:'%',invert:true},
        {key:'demand',label:'Demand Volume',unit:'%'},
        {key:'capacity',label:'Production Capacity',unit:'%'},
        {key:'freight',label:'Freight Rate',unit:'%',invert:true},
        {key:'setupCost',label:'Setup Cost',unit:'%',invert:true},
      ];
      const tornado=params.map(pr=>{
        const down=computeProfit({[pr.key]:-0.20});
        const up=computeProfit({[pr.key]:+0.20});
        return {label:pr.label,down:down-baseProfit,up:up-baseProfit,range:Math.abs((up-down))};
      }).sort((a,b)=>b.range-a.range);
      const maxRange=Math.max(1,...tornado.map(t=>Math.max(Math.abs(t.up),Math.abs(t.down))));
      return <div className="card">
        <div className="card-title">🎚️ What-If Sensitivity <span className="badge" style={{background:'rgba(240,180,41,.1)',color:'var(--a4)'}}>deterministic · no solver re-run</span></div>
        <div style={{fontSize:10,color:'var(--tx3)',marginBottom:8}}>
          Instant sensitivity: each parameter is perturbed ±20% while holding everything else fixed, and the resulting profit impact is plotted as a tornado. The widest bar is the parameter your plan is most exposed to — invest in hedging, negotiation, or capacity there first.
        </div>
        <div style={{fontSize:11,marginBottom:8}}>
          <strong style={{color:'var(--tx2)'}}>Baseline profit:</strong> <span style={{color:'var(--ac)',fontWeight:700}}>{cur}{baseProfit.toLocaleString()}</span>/yr
          <span style={{color:'var(--tx3)',marginLeft:12}}>Δ shown in {cur}/yr for a ±20% shock on each single parameter</span>
        </div>
        {tornado.map((t,i)=>{
          const widthDown=Math.abs(t.down)/maxRange*50;
          const widthUp=Math.abs(t.up)/maxRange*50;
          return <div key={i} style={{display:'grid',gridTemplateColumns:'140px 1fr 80px',alignItems:'center',gap:6,marginBottom:4,fontSize:11}}>
            <div style={{color:'var(--tx2)',fontWeight:i===0?700:400}}>{i+1}. {t.label}</div>
            <div style={{display:'flex',alignItems:'center',height:18,background:'var(--bg3)',borderRadius:3,position:'relative'}}>
              <div style={{flex:1,textAlign:'right',paddingRight:4,fontSize:9,color:'var(--dg)'}}>
                <div style={{display:'inline-block',width:`${widthDown}%`,height:14,background:'rgba(248,81,73,.3)',borderRight:'2px solid var(--dg)'}} title={`-20%: ${t.down>=0?'+':''}${cur}${t.down.toLocaleString()}`}></div>
              </div>
              <div style={{width:1,height:18,background:'var(--br)'}}></div>
              <div style={{flex:1,paddingLeft:4,fontSize:9,color:'var(--gn)'}}>
                <div style={{display:'inline-block',width:`${widthUp}%`,height:14,background:'rgba(63,185,80,.3)',borderLeft:'2px solid var(--gn)'}} title={`+20%: ${t.up>=0?'+':''}${cur}${t.up.toLocaleString()}`}></div>
              </div>
            </div>
            <div style={{fontSize:9,fontFamily:'JetBrains Mono',color:'var(--tx3)',textAlign:'right'}}>
              <span style={{color:'var(--dg)'}}>{t.down>=0?'+':''}{(t.down/1000).toFixed(0)}k</span>
              <span style={{margin:'0 2px',color:'var(--tx3)'}}>↔</span>
              <span style={{color:'var(--gn)'}}>+{(t.up/1000).toFixed(0)}k</span>
            </div>
          </div>;
        })}
        <div style={{marginTop:10,padding:8,background:'var(--bg3)',borderRadius:4,fontSize:10,color:'var(--tx2)'}}>
          <strong style={{color:'var(--a2)'}}>Reading:</strong> the <em>{tornado[0].label}</em> lever swings profit by roughly {cur}{(tornado[0].range/1000).toFixed(0)}k for every ±20% move. Your profit is most sensitive to this parameter — focus risk-management effort here. Run the Monte Carlo engine (Solve tab) for full joint-distribution uncertainty.
        </div>
      </div>;
    })()}

function LearningLab({state}){
  const [open,setOpen]=useState({});
  const toggle=(k)=>setOpen(o=>({...o,[k]:!o[k]}));
  const cur=state.config.currency;
  const prods=state.products||[];
  const prod=prods[0];
  const bom0=prod?.bom?.[0];
  const obsHist=prod?(prod.history||[]).filter(v=>v!=null&&v!=='').map(v=>+v):[];
  const annDemand=obsHist.length?obsHist.reduce((a,b)=>a+b,0):1800;
  const avgMonthly=Math.round(annDemand/Math.max(obsHist.length||12,1));
  const matCost=bom0?(bom0.cost*bom0.qtyPer):20;
  const holdRate=bom0?(bom0.holdPct/100):0.24;
  const ordCost=bom0?bom0.orderingCost:75;
  const eoq=Math.round(Math.sqrt(2*annDemand*ordCost/(matCost*holdRate)));
  const z95=1.645;
  const stdDem=obsHist.length>1?Math.round(Math.sqrt(obsHist.reduce((s,v)=>s+Math.pow(v-avgMonthly,2),0)/obsHist.length)):15;
  const lt=bom0?bom0.leadTime:2;
  const ss=Math.round(z95*stdDem*Math.sqrt(lt));
  const rop=Math.round(avgMonthly/4*lt+ss);
  // v3.3.4 — Live user-data rollups for Profit Mix, MILP, Capital, Landed sections
  const liveMargins=prods.map(p=>{
    const mat=(p.bom||[]).reduce((a,b)=>a+(b.cost||0)*(b.qtyPer||1),0);
    const margin=(+p.sellPrice||0)-(+p.variableCost||0)-mat-(+p.laborPerUnit||0);
    const cyc=168/Math.max(+p.capacity||50,1);
    return {name:p.name,sell:+p.sellPrice||0,mat:mat,margin:margin,marginPerHr:margin/Math.max(cyc,0.01),cycle:cyc,cap:+p.capacity||50};
  }).sort((a,b)=>b.marginPerHr-a.marginPerHr);
  const importedParts=prods.flatMap(p=>(p.bom||[]).filter(b=>b.supplierType==='import').map(b=>({part:b.name,sku:p.name,country:b.country||'?',cost:b.cost||0,leadDays:(b.leadTime||1)*7,incoterm:b.incoterm||'FOB'})));
  const totalBudget=(+state.budget?.capex||0)+(+state.budget?.procurement||0)+(+state.budget?.workingCapital||0);
  const assetCount=(state.assets||[]).length;
  const assetsValue=(state.assets||[]).reduce((a,x)=>a+(+x.cost||0),0);
  const bomCount=prods.reduce((a,p)=>a+(p.bom||[]).length,0);
  const horizonLen=state.planning.horizonLength||periodCount(state.planning)||52;
  const wdPerYr=(state.planning.workDays||6)*52;
  const annFixed=prods.reduce((a,p)=>a+(+p.fixedFactory||0)*wdPerYr,0);

  // Aliases so JSX below reads the same as before
  const S=({id,title,children,color})=><LearnSection id={id} title={title} color={color} openMap={open} onToggle={toggle}>{children}</LearnSection>;
  const F=({f,c})=><LearnFormula f={f} c={c}/>;

  return <div className="animate-in">
    <div style={{marginBottom:12,fontSize:13,color:'var(--tx2)'}}>Interactive reference using <strong style={{color:'var(--ac)'}}>your live data</strong>. Each section computes with your actual product parameters.</div>

    <S id="pipeline" title="🏗️ Your Supply Chain Pipeline" color="var(--ac)">
      <p>Your product <strong>{prod?.name||'—'}</strong> has <strong>{prod?.bom?.length||0}</strong> subparts feeding into {periodCount(state.planning)} weeks of planning. Annual demand: <strong>{annDemand.toLocaleString()}</strong> units ({avgMonthly}/mo). Capacity: {prod?.capacity||0} units/week.</p>
      <p style={{marginTop:6}}>Unit material cost: <F f={`${cur}${matCost.toFixed(2)}`}/> | Selling price: <F f={`${cur}${prod?.sellPrice||0}`}/> | Margin: <F f={`${cur}${((prod?.sellPrice||0)-matCost-(prod?.variableCost||0)).toFixed(2)}`} c="var(--gn)"/> ({(((prod?.sellPrice||0)-matCost-(prod?.variableCost||0))/Math.max(prod?.sellPrice||1,1)*100).toFixed(0)}%)</p>
      <p style={{marginTop:6}}>The planning flow: <strong>Demand Forecast</strong> (17 models compete) → <strong>Consensus</strong> (weighted top-3) → <strong>MPS</strong> (production plan) → <strong>MRP</strong> (BOM explosion) → <strong>Procurement</strong> (MILP optimizes PO timing/qty) → <strong>Transport</strong> (mode selection) → <strong>Goods Receipt</strong> → <strong>Production</strong> → <strong>Delivery</strong></p>
    </S>

    <S id="forecast" title="📊 Forecasting — Why Models Compete" color="var(--a4)">
      <p>No single forecast model works for all demand patterns. That's why we run <strong>17 models simultaneously</strong> and let MAPE (Mean Absolute Percentage Error) pick the winner. The best model gets a MAPE badge; the top 3 form the consensus forecast via inverse-MAPE weighting.</p>
      <p style={{marginTop:6}}><strong>Model families:</strong></p>
      <p>• <strong>Naive methods</strong> (Simple Avg, Naive, Seasonal Naive): baselines — if your fancy model can't beat Naive, it's not adding value</p>
      <p>• <strong>Smoothing</strong> (SES, Adaptive SES, DES/Holt, Brown's): exponentially weight recent data. Alpha (α) controls how much weight goes to newest observation</p>
      <p>• <strong>Seasonal</strong> (HW Additive/Multiplicative, Seasonal LinReg, Auto-SARIMA): capture repeating patterns. Additive when seasonal swing is constant (±50u). Multiplicative when it's proportional (±30%)</p>
      <p>• <strong>Intermittent</strong> (Croston's): for spare parts / low-frequency demand where many periods have zero</p>
      <p style={{marginTop:6}}>Your avg demand is {avgMonthly}/mo with σ={stdDem}. CV = {(stdDem/avgMonthly*100).toFixed(0)}% — {stdDem/avgMonthly<0.5?'fairly stable demand (smoothing models likely win)':'variable demand (seasonal or adaptive models may win)'}.</p>
    </S>

    <S id="safety" title="🛡️ Safety Stock — Your Numbers" color="var(--a2)">
      <p><F f={`SS = Z × σ_d × √LT = ${z95} × ${stdDem} × √${lt} = ${ss} units`}/></p>
      <p style={{marginTop:6}}>Z = {z95} corresponds to {(state.config.serviceLevel*100).toFixed(0)}% service level. This means {(state.config.serviceLevel*100).toFixed(0)}% of demand cycles are met from stock. The remaining {((1-state.config.serviceLevel)*100).toFixed(0)}% may face shortages.</p>
      <p style={{marginTop:6}}>σ_d = {stdDem} is the standard deviation of your monthly demand. Higher variability → more safety stock needed. √LT = √{lt} = {Math.sqrt(lt).toFixed(2)} amplifies uncertainty over the lead time window.</p>
      <p style={{marginTop:6}}><strong>Reorder Point:</strong> <F f={`ROP = (avg_weekly × LT) + SS = (${Math.round(avgMonthly/4)} × ${lt}) + ${ss} = ${rop} units`}/></p>
      <p>When inventory drops to <strong>{rop} units</strong>, place a new order. The order arrives {lt} weeks later. During those {lt} weeks, you'll consume ~{Math.round(avgMonthly/4*lt)} units from safety stock + regular stock.</p>
      <p style={{marginTop:6,color:'var(--a4)'}}><strong>Advanced:</strong> This formula assumes demand variability only. The full formula includes supply variability: SS = Z × √(LT × σ²_d + d² × σ²_LT). If your supplier's lead time varies (CV = {(bom0?.ltCV||0.1)*100}%), safety stock should be higher.</p>
    </S>

    <S id="eoq" title="📦 EOQ — Your Procurement Math" color="var(--a3)">
      <p><F f={`EOQ = √(2DS/H) = √(2 × ${annDemand} × ${cur}${ordCost} / (${cur}${matCost} × ${(holdRate*100).toFixed(0)}%)) = ${eoq} units`}/></p>
      <p style={{marginTop:6}}>D = {annDemand} units/year (annual demand), S = {cur}{ordCost} = total fixed cost per PO (Admin + Freight-Fixed + Receiving/QC + Setup — the classic Silver-Pyke-Peterson breakdown; freight-fixed is usually the largest component). Per-unit transport (Trans Rate × qty) is modeled separately as a variable cost. H = {cur}{matCost} × {(holdRate*100).toFixed(0)}% = {cur}{(matCost*holdRate).toFixed(2)}/unit/year (annual holding cost).</p>
      <p style={{marginTop:6}}>Orders/year: {Math.ceil(annDemand/eoq)} | Total ordering cost: {cur}{Math.ceil(annDemand/eoq)*ordCost} | Avg inventory: {Math.round(eoq/2)} | Annual holding: {cur}{Math.round(eoq/2*matCost*holdRate)}</p>
      <p style={{marginTop:6,color:'var(--dg)'}}><strong>Why MILP beats EOQ:</strong> EOQ assumes constant demand, fixed costs, no capacity limits. Reality: demand fluctuates, suppliers have MOQs ({bom0?.moq||20}), warehouse has limits ({bom0?.rmCapacity||2000}), and shelf life ({prod?.shelfLife||0} days) forces expiry. MILP handles ALL of these simultaneously — that's why this app uses MILP as the primary solver, not EOQ.</p>
    </S>

    <S id="milp" title="🔬 MILP — What the Solver Actually Does" color="var(--ac)">
      <p>MILP = Mixed-Integer Linear Programming. "Mixed" because some variables are integers (batch yes/no), some are continuous (inventory level). "Linear" because the objective and constraints are all linear equations.</p>
      <p style={{marginTop:8}}><strong>The solver minimizes:</strong></p>
      <p style={{fontFamily:'JetBrains Mono',fontSize:10,padding:8,background:'var(--bg3)',borderRadius:4,marginTop:4}}>
        Total Cost = Σ(setup_cost × y[k,t]) + Σ(hold_cost × inv[k,t]) + Σ(var_cost × prod[k,t]) + Σ(shortage_penalty × short[k,t]) + Σ(material_cost × order[i,t]) + Σ(ordering_cost × order_flag[i,t])
      </p>
      <p style={{marginTop:8}}><strong>Subject to:</strong></p>
      <p>• Inventory balance: inv[t] = inv[t-1] + produced[t] - demand[t] + shortage[t]</p>
      <p>• Capacity: produced[t] ≤ capacity × active[t] (can't exceed line capacity)</p>
      <p>• BOM: raw_material_consumed[t] = produced[t] × qty_per × (1+scrap) / yield</p>
      <p>• RM balance: rm_inv[t] = rm_inv[t-1] + arrived[t] - consumed[t]</p>
      <p>• MOQ: order[t] ≥ MOQ × order_flag[t] (if ordering, order at least MOQ)</p>
      <p>• Lead time: material ordered at t arrives at t + LT</p>
      <p style={{marginTop:6}}>The CBC solver (open-source, by COIN-OR) uses branch-and-bound to explore millions of combinations and find the provably optimal solution. For 26-week problems with 2 SKUs: ~2 seconds. For 52 weeks: ~5-10 seconds.</p>
      <div style={{marginTop:10,padding:8,background:'var(--bg3)',border:'1px solid var(--ac)',borderRadius:4,fontSize:10}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--ac)',marginBottom:4}}>🧮 Your instance size (live)</div>
        <div>SKUs: <strong>{prods.length}</strong> · BOM parts: <strong>{bomCount}</strong> · Horizon: <strong>{horizonLen}</strong> {state.planning.horizonUnit||'weeks'} · Time grain: <strong>{state.planning.timeGrain||'weekly'}</strong></div>
        <div style={{marginTop:2}}>Decision variables ≈ {prods.length} × {horizonLen} (production) + {bomCount} × {horizonLen} (orders) + {bomCount} × {horizonLen} (order flags binary) = <strong>~{(prods.length*horizonLen + bomCount*horizonLen*2).toLocaleString()}</strong> vars. Constraints ≈ {(prods.length*horizonLen*3 + bomCount*horizonLen*2).toLocaleString()}.</div>
        <div style={{fontSize:9,color:'var(--tx3)',marginTop:2}}>Annual fixed-opex absorbed by the objective: <strong>{cur}{Math.round(annFixed).toLocaleString()}</strong> ({prods.length} SKUs × daily fixed × {wdPerYr} working days).</div>
      </div>
    </S>

    <S id="mc" title="🎲 Monte Carlo — How 1000 Futures Work" color="var(--dg)">
      <p>Run the entire supply chain simulation 1000 times. Each run randomizes demand (±MAPE%), lead times (±CV%), and material prices (±5%). Each run is one "possible future."</p>
      <p style={{marginTop:6}}>Sort the 1000 cost outcomes. The distribution tells you:</p>
      <p>• <strong>Average</strong> — expected cost (what you'd plan for)</p>
      <p>• <strong>P10/P90</strong> — 80% of outcomes fall between these (your likely range)</p>
      <p>• <strong>VaR₉₅</strong> — 95th percentile. "95% of the time, cost stays below this." This is your budget ceiling</p>
      <p>• <strong>CVaR₉₅</strong> — average of the WORST 5%. "When things go really bad, they cost this much on average." This is your catastrophe estimate</p>
      <p>• <strong>Fragility ratio</strong> = VaR₉₅ / Average. Measures how much worse worst-case is vs expected. Below 1.3× = robust. Above 1.8× = fragile (your supply chain is brittle)</p>
      <p style={{marginTop:6,color:'var(--a4)'}}>1000 runs is the minimum for stable VaR estimates. 500 gives ~5% variance in VaR. 1000 gives ~3%. 5000 gives ~1.5%. Diminishing returns after 2000 for most supply chains.</p>
    </S>

    <S id="var" title="⚠️ VaR & CVaR — Reading Risk Numbers" color="var(--dg)">
      <p>VaR₉₅ answers: "What's the worst cost I'll face 95% of the time?" It's the threshold. CVaR₉₅ answers: "Given that I'm in the worst 5%, how bad is it on average?" It's the severity.</p>
      <p style={{marginTop:6}}>Example: If VaR₉₅ = {cur}25,000 and CVaR₉₅ = {cur}28,000: your budget should be at least {cur}25,000 (covers 95% of scenarios). If you want to survive even the worst cases, budget {cur}28,000.</p>
      <p style={{marginTop:6}}>Banks use VaR for capital requirements. Supply chains use it for buffer stock/budget planning. CVaR is preferred by risk managers because it captures tail severity — VaR only tells you the threshold, not what happens beyond it.</p>
    </S>

    <S id="npv" title="💎 NPV / IRR — Investment Decisions" color="var(--gn)">
      <p><F f="NPV = Σ CF_t / (1 + WACC)^t"/></p>
      <p style={{marginTop:6}}>NPV {'>'} 0 means the investment creates value — the discounted future cash flows exceed the initial cost. IRR is the discount rate that makes NPV = 0. If IRR {'>'} WACC, the project returns more than its cost of capital.</p>
      <p style={{marginTop:6}}><strong>Decision rule:</strong> NPV {'>'} 0 AND IRR {'>'} WACC → INVEST. If multiple projects compete for limited budget, use the Capital Budget Optimizer (Tab 5) — it selects the combination that maximizes total portfolio NPV.</p>
      <p style={{marginTop:6}}><strong>WACC</strong> = E/V × Re + D/V × Rd × (1-T). Your WACC of {state.config.wacc}% means every project must return at least {state.config.wacc}% to justify the capital employed.</p>
    </S>

    <S id="depreciation" title="📉 Depreciation — 3 Methods Compared" color="var(--a2)">
      <p><strong>Straight-Line (SLM):</strong> (Cost - Residual) / Life. Same charge every year. Best for: civil infrastructure, quay walls — value declines evenly.</p>
      <p><strong>Written Down Value (WDV):</strong> Book Value × Rate%. High early charges, declining later. Best for: tech assets, DP systems — value drops fast initially. Front-loads tax shield.</p>
      <p><strong>Units of Production (UoP):</strong> (Cost - Residual) / Total Units × Annual Units. Matches cost to actual usage. Best for: cranes, engines, dredgers — depreciation tracks revenue generation.</p>
      <p style={{marginTop:6}}>Under IAS 16, major components with different useful lives must be depreciated separately (component accounting). A crane: structure (40yr SLM), hoisting mechanism (15yr SLM), electrical/controls (10yr SLM), crane trolley (20yr UoP).</p>
    </S>

    <S id="landed" title="🛃 Import Landed Cost — India Customs Math" color="var(--a4)">
      <p>For any imported material, the TOTAL cost is NOT just the purchase price:</p>
      <p style={{fontFamily:'JetBrains Mono',fontSize:10,padding:8,background:'var(--bg3)',borderRadius:4,marginTop:6}}>
        Landed = CIF + BCD (7.5-10%) + SWS (10% of BCD) + IGST (18%) + CHA (₹5K) + Port (₹8K) + Local Transport
      </p>
      <p style={{marginTop:6}}><strong>Key insight:</strong> IGST is recoverable as Input Tax Credit for GST-registered businesses. So effective duty ≈ BCD + SWS ≈ 8-11% of CIF value. The 18% IGST looks scary but nets to zero.</p>
      <p style={{marginTop:6}}>Customs ALWAYS calculates duty on CIF value regardless of Incoterm. If you bought FOB, customs adds notional freight + insurance to reach CIF. Use the Landed Cost Calculator in Tab 3 to compute exact numbers.</p>
      {importedParts.length>0?<div style={{marginTop:10,padding:8,background:'var(--bg3)',border:'1px solid var(--a4)',borderRadius:4,fontSize:10}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--a4)',marginBottom:4}}>📦 Your imported parts ({importedParts.length}) — live</div>
        <table className="data-table" style={{fontSize:9}}>
          <thead><tr><th>Part</th><th>Used in</th><th>Country</th><th>Incoterm</th><th>CIF</th><th>Effective duty (+10%)</th></tr></thead>
          <tbody>{importedParts.slice(0,8).map((p,i)=><tr key={i}>
            <td>{p.part}</td><td style={{color:'var(--tx3)'}}>{p.sku}</td><td>{p.country}</td>
            <td style={{fontFamily:'var(--font-mono)'}}>{p.incoterm}</td>
            <td className="num">{cur}{p.cost.toFixed(2)}</td>
            <td className="num" style={{color:'var(--a4)'}}>{cur}{(p.cost*0.10).toFixed(2)}</td>
          </tr>)}</tbody>
        </table>
      </div>:<div style={{marginTop:10,fontSize:10,color:'var(--tx3)'}}>No imported parts in your BOMs yet. Set a supplier's type to <em>import</em> in Tab 2 → Materials to see duty uplift here.</div>}
    </S>

    <S id="incoterms" title="📖 Incoterms — Who Pays What" color="var(--a3)">
      <p><strong>EXW</strong> — You pay everything from seller's factory door. Maximum buyer responsibility. Use when you have a global freight forwarder.</p>
      <p><strong>FOB</strong> — Seller delivers to origin port, on board vessel. You pay freight + insurance + duties. Most common for Indian sea imports.</p>
      <p><strong>CIF</strong> — Seller pays cost + insurance + freight to destination port. You only pay duties + local transport. Simplest for first-time importers.</p>
      <p><strong>DDP</strong> — Seller handles everything including Indian import clearance. Rare unless seller has an Indian entity.</p>
      <p style={{marginTop:6,color:'var(--a4)'}}>Pro tip: FOB gives you control over freight costs (you can negotiate better rates with your own forwarder). CIF is simpler but the seller bakes their freight margin into the price. For high-volume imports, FOB saves 5-15% on logistics.</p>
    </S>

    <S id="sensing" title="📡 Demand Sensing — What's Wired, What's Not" color="var(--ac)">
      <p><strong>What IS implemented (v3.1):</strong> Classical exponential smoothing on the MPS — sensed_next = α × last_actual + (1 − α) × prior_forecast, with α tunable in Tab 2C (default 0.3). When the sensed forecast drifts from consensus by more than the sensing threshold, the MPS re-plans. The transport optimizer also consults the sensed forecast to decide air vs sea overrides.</p>
      <p style={{marginTop:6}}><strong>SPC tripwire (rule of thumb):</strong> When |actual − forecast| exceeds 2σ for 2+ consecutive periods, it's a genuine regime change (not noise) — trigger replan. This is a Shewhart/Western-Electric rule; false-alarm rate is ~0.25% vs 32% at 1σ.</p>
      <p style={{marginTop:6}}>The transport leg specifically: if sensed spike AND stock won't last sea freight arrival, compute:</p>
      <p style={{fontFamily:'JetBrains Mono',fontSize:10,padding:8,background:'var(--bg3)',borderRadius:4,marginTop:6}}>
        Stockout cost = gap_days × daily_consumption × unit_value × <em>stockoutRevenuePct</em> (default 0.3)<br/>
        Air premium = air_cost − sea_cost<br/>
        Decision: USE AIR if premium {'<'} stockout_cost, else ACCEPT RISK
      </p>
      <p style={{marginTop:6}}>Transit DB: Shanghai→Chennai 18d sea / 4d air, Hamburg→JNPT 26d sea / 5d air; customs green 2d, normal 4d, red 7d.</p>
      <div style={{marginTop:10,padding:8,background:'rgba(0,212,170,.08)',border:'1px solid var(--ac)',borderRadius:4}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--ac)',marginBottom:4}}>🗺️ SAP IBP-Style Pattern Sensing — v3.2 <span style={{background:'var(--ac)',color:'var(--bg)',padding:'1px 5px',borderRadius:3,fontSize:8,marginLeft:4}}>LIVE</span></div>
        <div style={{fontSize:10,color:'var(--tx)',lineHeight:1.5}}>
          All five SAP IBP Demand Sensing layers are now wired via <code>/api/demand/sense</code>:<br/>
          <strong>1. Multi-signal intake</strong> — actuals + promo_weeks + holiday_weeks external signals (POS/weather coming in v3.3).<br/>
          <strong>2. Pattern library</strong> — 7 parametric templates: promo_lift, holiday_ramp, weekend_dip, post_outage_bounce, trend_break_up/down, cannibalization.<br/>
          <strong>3. Cosine-similarity matching</strong> — residual shape vs each template; pattern with highest similarity drives the lift correction (confidence gate at 0.15).<br/>
          <strong>4. Horizon handoff</strong> — sensed owns weeks 0–6 (configurable), linear blend over 3 weeks, statistical owns 7+.<br/>
          <strong>5. Posterior uncertainty</strong> — σ from residual std; CV-scaled safety-stock multiplier z·(1+CV).<br/>
          <span style={{color:'var(--ac)',fontWeight:600}}>Use the "Run Pattern Sense" button below</span> with your actuals + baseline forecast to see matched patterns, blended curve, and propagated σ.
        </div>
      </div>
      <IbpSenseDemo cur={cur}/>
    </S>

    <S id="profitmix" title="💰 Profit Maximization — Shadow Prices" color="var(--gn)">
      <p>When capacity is limited and products have different margins, the LP determines the optimal mix. But the most valuable output isn't the quantities — it's the <strong>shadow prices</strong>.</p>
      <p style={{marginTop:6}}>A shadow price tells you: "If I relax this constraint by 1 unit, profit increases by $X." If Budget shadow = $3, every extra $1 of budget generates $3 of profit. If Warehouse shadow = $0, your warehouse isn't the bottleneck — adding space adds nothing.</p>
      <p style={{marginTop:6}}>Use shadow prices to prioritize investments: invest where the shadow price is highest. A shadow price of $0 means the constraint has slack (unused capacity). A high shadow price means that resource is the binding bottleneck limiting your profit.</p>
      {liveMargins.length>0&&<div style={{marginTop:10,padding:8,background:'var(--bg3)',border:'1px solid var(--gn)',borderRadius:4}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--gn)',marginBottom:6}}>🎯 Your Products Ranked by Margin / Machine-Hour (live)</div>
        <table className="data-table" style={{fontSize:10}}>
          <thead><tr><th>SKU</th><th>Sell</th><th>Margin/u</th><th>Cycle (hr)</th><th>Margin/hr</th></tr></thead>
          <tbody>{liveMargins.map((m,i)=><tr key={i} style={{background:i===0?'rgba(63,185,80,.08)':'transparent'}}>
            <td style={{fontWeight:600}}>{m.name}{i===0&&<span style={{marginLeft:4,fontSize:9,color:'var(--gn)'}}>← LP picks this first</span>}</td>
            <td className="num">{cur}{m.sell.toLocaleString()}</td>
            <td className="num">{cur}{m.margin.toFixed(0)}</td>
            <td className="num">{m.cycle.toFixed(2)}</td>
            <td className="num" style={{fontWeight:600,color:i===0?'var(--gn)':'var(--tx)'}}>{cur}{m.marginPerHr.toFixed(1)}/hr</td>
          </tr>)}</tbody>
        </table>
        <div style={{fontSize:9,color:'var(--tx3)',marginTop:4}}>The LP fills capacity top-down: highest margin/hr fills first, then the next, until capacity or demand caps it. Products with margin/hr below the marginal product are excluded — raise their price or drop their cycle time to enter the mix.</div>
      </div>}
    </S>

    <S id="pipeline_learn" title="🔗 Solver Pipeline — Why Chaining Matters" color="var(--a3)">
      <p>Real enterprises don't solve procurement in isolation. The flow is:</p>
      <p style={{marginTop:6}}>1. <strong>Profit Mix</strong> → determines WHAT to produce and HOW MUCH (optimal quantities per product given capacity + demand ceiling)</p>
      <p>2. <strong>Procurement</strong> → takes those quantities as demand input → determines WHEN to order raw materials and HOW MUCH per PO</p>
      <p>3. <strong>Production</strong> → takes production requirements → determines the SEQUENCE on each line, minimizing setup + overtime</p>
      <p style={{marginTop:6}}>Each solver's output feeds the next solver's input. The Pipeline mode (Tab 5) chains all three automatically and shows the end-to-end result: Revenue - Procurement Cost - Production Cost = Net Profit.</p>
    </S>

    <S id="capital" title="🏗️ Capital Budgeting — Portfolio Selection" color="var(--a4)">
      <p>When you have multiple investment options but limited budget, the Capital Budget Optimizer selects the combination that maximizes total NPV. It handles:</p>
      <p>• <strong>Mutual exclusivity:</strong> Buy Machine A OR Lease Machine A (not both)</p>
      <p>• <strong>Dependencies:</strong> Investment B requires Investment A first</p>
      <p>• <strong>Profitability Index:</strong> PI = NPV/CAPEX + 1. Higher PI = more NPV per dollar invested. A $500K investment with NPV=$250K has PI=1.5 (50% return on capital)</p>
      <p style={{marginTop:6}}>The Budget shadow price tells you: if you could borrow $1 more for CAPEX, how much NPV would you gain? If shadow = 0.4, each extra $1 of budget creates $0.40 of value. If shadow = 0, you have budget slack — no need for more capital.</p>
      <div style={{marginTop:10,padding:8,background:'var(--bg3)',border:'1px solid var(--a4)',borderRadius:4,fontSize:10}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--a4)',marginBottom:4}}>💼 Your declared budgets (Tab 1)</div>
        <div>CAPEX: <strong>{cur}{(+state.budget?.capex||0).toLocaleString()}</strong> · Procurement: <strong>{cur}{(+state.budget?.procurement||0).toLocaleString()}</strong> · Working Capital: <strong>{cur}{(+state.budget?.workingCapital||0).toLocaleString()}</strong> · <strong>Total {cur}{totalBudget.toLocaleString()}</strong></div>
        <div style={{marginTop:2}}>Asset register: <strong>{assetCount}</strong> items totaling <strong>{cur}{assetsValue.toLocaleString()}</strong> · WACC <strong>{state.config.wacc}%</strong> · hurdle rate for any project</div>
      </div>
    </S>

    <S id="newsvendor" title="📰 Newsvendor Problem" color="var(--a2)">
      <p>Classic: how many newspapers to stock when demand is uncertain? Order too many → waste (overage cost). Order too few → lost sales (underage cost).</p>
      <p><F f="Q* = F⁻¹(Cu / (Cu + Co))"/> where Cu = underage cost (selling price - cost), Co = overage cost (cost - salvage).</p>
      <p style={{marginTop:6}}>For your product: Cu = {cur}{(prod?.sellPrice||100) - matCost} (lost margin), Co = {cur}{(matCost * (1 - (prod?.yieldPct||0.8))).toFixed(1)} (waste after salvage). Critical ratio = {((prod?.sellPrice||100 - matCost) / ((prod?.sellPrice||100 - matCost) + matCost * 0.2)).toFixed(3)}</p>
    </S>

    <S id="clt" title="📐 Central Limit Theorem" color="var(--a3)">
      <p>The CLT says: regardless of the underlying distribution of individual demand days, the AVERAGE demand over N days approaches a normal distribution as N grows. This is why safety stock formulas use the normal distribution — even if daily demand isn't normal, weekly/monthly demand approximately is.</p>
      <p style={{marginTop:6}}>Practical implication: with lead time of {lt} weeks covering ~{lt*6} working days, the lead-time demand distribution is approximately Normal(μ={Math.round(avgMonthly/4*lt)}, σ={Math.round(stdDem/Math.sqrt(12)*Math.sqrt(lt*6))}). This is why the Z-score approach for safety stock works.</p>
    </S>

    <S id="markov" title="🔗 Markov Chains in Supply Chain" color="var(--ac)">
      <p>A Markov chain models transitions between states where the next state depends ONLY on the current state (not history). Applications:</p>
      <p>• <strong>Supplier reliability:</strong> States = {'{On-Time, Late, Failed}'}. Transition matrix captures probability of switching between states. Steady-state gives long-run OTD %.</p>
      <p>• <strong>Demand states:</strong> States = {'{Low, Normal, High}'}. If demand is High this month, what's the probability of High next month? Drives safety stock decisions.</p>
      <p>• <strong>Machine states:</strong> States = {'{Running, Degraded, Down}'}. Predicts maintenance schedules and capacity availability.</p>
    </S>

    <S id="hedge" title="🛡️ Currency Hedging Basics" color="var(--a4)">
      <p>If you import materials priced in USD/EUR/CNY, your costs fluctuate with exchange rates. A 5% INR depreciation against USD means your material costs jump 5% — wiping out procurement savings.</p>
      <p style={{marginTop:6}}><strong>Forward contract:</strong> Lock in today's exchange rate for a future date. Costs ~0.5-2% premium. Eliminates uncertainty. Use for 50-80% of known exposure; keep 20-50% unhedged to benefit from favorable movements.</p>
      <p style={{marginTop:6}}><strong>Natural hedge:</strong> Match currency of revenues and costs. If you export to USD markets AND import USD materials, the exposure cancels. No hedging cost.</p>
      <p style={{marginTop:6}}>Rule of thumb: hedge if currency exposure {'>'} 5% of COGS and you can't pass through cost increases to customers within 30 days.</p>
    </S>

    <S id="enterprise" title="🏢 Enterprise Comparison — This App vs SAP/Oracle" color="var(--ac)">
      <p><strong>What this app does that SAP IBP / Oracle ASCP don't:</strong></p>
      <p>• 17-model forecast competition with auto-selection (they offer 3-5 models)</p>
      <p>• Monte Carlo simulation with VaR/CVaR (they don't — they use deterministic planning)</p>
      <p>• Shadow prices on constraints (they compute but rarely surface to users)</p>
      <p>• Demand sensing → transport mode override (they separate demand sensing from transport)</p>
      <p>• Solver pipeline chaining (they do this but it requires complex configuration)</p>
      <p style={{marginTop:6}}><strong>What they do that this app doesn't (yet):</strong></p>
      <p>• Multi-echelon inventory optimization (warehouse → DC → retail)</p>
      <p>• ML-based demand sensing (gradient boosted trees on POS data)</p>
      <p>• Multi-plant coordination (this app handles one plant)</p>
      <p>• ERP integration (SAP MM/PP/WM, Oracle Procurement Cloud)</p>
      <p>• 10,000+ SKU scale (this app targets 1-50 SKUs)</p>
      <p style={{marginTop:6}}>Same underlying math (LP/MILP, safety stock, MRP explosion). Different deployment scale and integration depth.</p>
    </S>

    {/* Probability Lab */}
    <S id="prob_lab" title="🎲 Probability Lab — Interactive Distributions" color="var(--a2)">
      {(()=>{
        const mu=avgMonthly,sig=stdDem;
        const cv=mu>0?(sig/mu*100):0;
        const highCV=cv>25;
        const zVals=[{z:1.036,sl:85},{z:1.282,sl:90},{z:1.645,sl:95},{z:2.326,sl:99}];
        // Clip left tail to 0 — demand can't be negative
        const xMin=Math.max(0,mu-3.5*sig);
        const points=[];for(let x=xMin;x<=mu+3.5*sig;x+=sig/10){
          const pdf=1/(sig*Math.sqrt(2*Math.PI))*Math.exp(-0.5*Math.pow((x-mu)/sig,2));
          points.push({x:Math.round(x),y:+(pdf*1000).toFixed(2)});
        }
        return <div>
          <p>Your demand: μ = {mu} units/month, σ = {sig} (CV = {cv.toFixed(1)}%). The normal distribution N({mu}, {sig}²) describes the probability of different demand levels.</p>
          {highCV&&<div style={{padding:6,background:'rgba(248,81,73,.08)',border:'1px solid var(--dg)',borderRadius:4,fontSize:10,color:'var(--dg)',marginTop:4}}>
            ⚠ <strong>High variability (CV &gt; 25%):</strong> Normal approximation is weak — it assigns non-trivial probability to negative demand (impossible). X-axis is clipped to 0; for safety-stock accuracy consider <strong>lognormal</strong> or <strong>gamma</strong> distributions instead of normal.
          </div>}
          <div style={{height:160,marginTop:8}}>
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={points.filter((_,i)=>i%3===0)} margin={{top:5,right:5,left:0,bottom:5}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#21262d"/>
                <XAxis dataKey="x" tick={{fill:'#8b949e',fontSize:8}} stroke="#21262d"/>
                <YAxis tick={{fill:'#8b949e',fontSize:8}} stroke="#21262d" hide/>
                <Tooltip contentStyle={{background:'#1c2333',border:'1px solid #30363d',borderRadius:4,fontSize:10}}/>
                <Bar dataKey="y" fill="#38bdf8" opacity={0.6} name="PDF × 1000"/>
              </BarChart>
            </ResponsiveContainer>
          </div>
          <div style={{marginTop:8}}>
            <p><strong>Z-score table (your data):</strong></p>
            <table className="data-table" style={{marginTop:4}}>
              <thead><tr><th>Service Level</th><th>Z</th><th>Safety Stock</th><th>Reorder Point</th><th>Meaning</th></tr></thead>
              <tbody>{zVals.map(({z,sl})=>{
                const ss2=Math.round(z*sig*Math.sqrt(lt));
                const rop2=Math.round(mu/4*lt+ss2);
                return <tr key={sl} style={{fontWeight:sl===Math.round(state.config.serviceLevel*100)?700:400,color:sl===Math.round(state.config.serviceLevel*100)?'var(--ac)':'var(--tx)'}}>
                  <td>{sl}%{sl===Math.round(state.config.serviceLevel*100)?' ← your target':''}</td>
                  <td className="num">{z}</td>
                  <td className="num">{ss2} units</td>
                  <td className="num">{rop2} units</td>
                  <td style={{fontSize:10,color:'var(--tx2)'}}>{sl}% of demand cycles met from stock. {100-sl}% risk of stockout per cycle.</td>
                </tr>
              })}</tbody>
            </table>
          </div>
          <p style={{marginTop:8}}><strong>Confidence intervals:</strong></p>
          <p>68% of demand falls in [{mu-sig}, {mu+sig}] (μ ± 1σ)</p>
          <p>95% of demand falls in [{mu-2*sig}, {mu+2*sig}] (μ ± 2σ)</p>
          <p>99.7% of demand falls in [{mu-3*sig}, {mu+3*sig}] (μ ± 3σ)</p>
          <p style={{marginTop:8,color:'var(--a4)'}}><strong>Practical:</strong> If demand follows N({mu}, {sig}²) and your safety stock covers {(state.config.serviceLevel*100).toFixed(0)}% (z={z95}), you expect stockout in {Math.round((1-state.config.serviceLevel)*52)} out of 52 weeks per year.</p>
        </div>
      })()}
    </S>
  </div>
}

      <div style={{marginBottom:6}}>
        <div style={{fontSize:9,fontWeight:700,color:'var(--tx2)',marginBottom:2}}>Pattern Leaderboard (cosine similarity)</div>
        <table style={{width:'100%',fontSize:9,borderCollapse:'collapse'}}>
          <tr style={{background:'var(--bg3)'}}><th style={{textAlign:'left',padding:'3px 6px'}}>Pattern</th><th style={{textAlign:'right',padding:'3px 6px'}}>Similarity</th><th style={{textAlign:'left',padding:'3px 6px'}}>Description</th></tr>
          {res.matched_patterns.map((m,i)=>
            <tr key={i} style={{borderTop:'1px solid var(--bd)',background:i===0?'rgba(0,212,170,.08)':'transparent'}}>
              <td style={{padding:'3px 6px',fontWeight:i===0?700:400}}>{m.pattern}</td>
              <td style={{textAlign:'right',padding:'3px 6px',fontFamily:'JetBrains Mono'}}>{m.similarity}</td>
              <td style={{padding:'3px 6px',color:'var(--tx2)'}}>{m.description}</td>
            </tr>
          )}
        </table>
      </div>
      <div style={{marginBottom:6}}>
        <div style={{fontSize:9,fontWeight:700,color:'var(--tx2)',marginBottom:2}}>Blended Forecast (sensed weeks 0-5 → blend 6-8 → statistical 9+)</div>
        <div style={{display:'flex',gap:2,fontSize:8,fontFamily:'JetBrains Mono',overflowX:'auto',padding:4,background:'var(--bg3)',borderRadius:3}}>
          {res.blended_forecast.map((v,i)=>
            <div key={i} style={{minWidth:38,textAlign:'center',padding:'2px 4px',borderRadius:2,background:i<6?'rgba(0,212,170,.15)':i<9?'rgba(167,139,250,.12)':'transparent',color:i<6?'var(--ac)':i<9?'var(--a3)':'var(--tx2)'}}>
              <div style={{fontSize:7,color:'var(--tx3)'}}>w{i}</div>
              {Math.round(v)}
            </div>
          )}
        </div>
        <div style={{fontSize:8,color:'var(--tx3)',marginTop:3}}>Green=sensed (pattern-driven), Purple=blend band, Grey=statistical.</div>
      </div>
    </div>}
  </div>;
}

// ════════════════════════════════════════════════
// NEW COMPONENTS — MPS · INVENTORY · MILP · INSIGHTS · MULTI-SKU
// ════════════════════════════════════════════════

function MPSVizCard({state,dispatch}){
  const [mpsGran,setMpsGran]=useState('weekly'); // monthly | weekly | daily
  const [dailyWeeks,setDailyWeeks]=useState(4); // how many weeks of daily granularity to show
  const [selSKU,setSelSKU]=useState(-1); // v3.3.3 — -1 = aggregate all SKUs, 0+ = single SKU
  const [prodOverrides,setProdOverrides]=useState({}); // week/day index → user qty
  const [expandedWeek,setExpandedWeek]=React.useState(null); // v3.3.3 — click week to show days
  const products=state.products;
  // v3.3.3 — aggregate mode synthesizes a pseudo-SKU summing all products
  const aggregateMode=selSKU===-1&&products.length>1;
  const prod=aggregateMode?{
    name:`ALL SKUs (${products.length})`,
    initInventory:products.reduce((a,p)=>a+(p.initInventory||0),0),
    capacity:products.reduce((a,p)=>a+(p.capacity||50),0),
    cycleTime:products.reduce((a,p)=>a+(p.cycleTime||19)*((p.history||[]).reduce((s,x)=>s+x,0)),0)/Math.max(1,products.reduce((a,p)=>a+(p.history||[]).reduce((s,x)=>s+x,0),0)),
    history:MONTHS.map((_,i)=>products.reduce((a,p)=>a+((p.history||[])[i]||0),0)),
    overrides:Array(12).fill(null),actuals:Array(12).fill(null)
  }:(products[selSKU]||products[0]);
  if(!prod)return null;
  const cur=state.config.currency;
  const workDays=state.planning.workDays||6;
  const frozenWk=state.planning.frozenWeeks||4;
  const slushyWk=state.planning.slushyWeeks||12;
  const sensingAlpha=state.planning.sensingAlpha||0.3;
  const sensingMin=state.planning.sensingMinWeeks||2;

  // Build monthly base plan — length follows configured horizon (projected to months)
  // Pillar 2: MPS generates exactly `periodCount` buckets; no magic 12/52 caps.
  const T=periodCount(state.planning);
  const gLabel=grainLabel(state.planning);
  const monthsNeeded=Math.max(1,Math.ceil(gLabel==='months'?T:gLabel==='days'?T/30:T/4));
  let inv=prod.initInventory||0;
  const mMPS=Array.from({length:monthsNeeded},(_,i)=>{
    const mLabel=MONTHS[i%12]+(i>=12?` y${Math.floor(i/12)+1}`:'');
    const dem=(prod.history||[])[i%Math.max(1,(prod.history||[]).length)]||0;
    const cap4=(prod.capacity||50)*4;
    const produce=Math.min(Math.max(dem-inv,0),cap4);
    const endInv=Math.max(0,inv+produce-dem);
    const short=Math.max(0,dem-produce-Math.max(0,inv));
    inv=endInv;
    return{month:mLabel,demand:dem,production:produce,inventory:endInv,shortfall:short,batches:Math.ceil(produce/Math.max(prod.capacity||50,1))};
  });

  // Pillar 7 follow-up — weekly demand now comes from demandByPeriod (single source). Production plan is rolling-inventory against configured per-week capacity.
  const weeklyDem=demandByPeriod(prod,{...state.planning,timeGrain:'weekly'});
  const wCap=prod.capacity||50;
  let wInvCursor=prod.initInventory||0;
  const wMPS=weeklyDem.map((dem,wIdx)=>{
    const baseWProd=Math.min(Math.max(dem-wInvCursor,0),wCap);
    wInvCursor=Math.max(0,wInvCursor+baseWProd-dem);
    const key=`w${wIdx}`;
    const overrideStr=prodOverrides[key];
    const overrideProd=overrideStr!==undefined&&overrideStr!==''?+overrideStr:undefined;
    const monthIdx=Math.floor(wIdx/4);
    return{week:`W${wIdx+1}`,month:(MONTHS[monthIdx%12]||'').slice(0,3),wIdx,isFirst:wIdx%4===0,
      demand:dem,
      production:overrideProd!==undefined?overrideProd:baseWProd,
      productionInput:overrideStr!==undefined?overrideStr:String(baseWProd),
      baseProd:baseWProd,
      isOverridden:overrideProd!==undefined,
      isFrozen:wIdx<frozenWk,isSlushy:wIdx>=frozenWk&&wIdx<slushyWk};
  });

  // Demand sensing summary for MPS card
  const filledActuals=(prod.actuals||[]).map((a,i)=>({a,i})).filter(x=>x.a!==null&&x.a!==undefined);
  const sensingActive=filledActuals.length>=sensingMin;
  const consensus=prod.overrides?.map((ov,i)=>ov!==null&&ov!==undefined?ov:(prod.history[i]||0))||prod.history||[];
  const senseWindow=state.planning.sensingWindow||2;
  const sensePct=state.planning.sensingPctThreshold||15;
  const senseK=state.planning.sensingStdK||2;
  const senseResolveAfter=state.planning.sensingResolveAfter||4; // P4 — full re-solve threshold
  const replanFrom=state.planning.replanFromPeriod;
  let sensingNote=null;
  if(sensingActive){
    const bias=filledActuals.reduce((s,{a,i})=>s+(a-(consensus[i]||0)),0)/filledActuals.length;
    const lastIdx=filledActuals[filledActuals.length-1].i;
    const lastActual=filledActuals[filledActuals.length-1].a;
    const nextFcst=consensus[Math.min(lastIdx+1,11)]||0;
    const sensedNext=Math.round(sensingAlpha*lastActual+(1-sensingAlpha)*nextFcst);
    // Window-based deviation check
    const window=filledActuals.slice(-senseWindow);
    const devs=window.map(({a,i})=>a-(consensus[i]||0));
    const meanFc=window.reduce((s,{i})=>s+(consensus[i]||0),0)/window.length||1;
    const sigma=Math.sqrt(devs.reduce((s,d)=>s+d*d,0)/window.length);
    const absDev=Math.abs(devs.reduce((s,d)=>s+d,0)/window.length);
    const pctTrigger=Math.abs(meanFc)*sensePct/100;
    const kTrigger=senseK*sigma;
    const threshold=Math.max(pctTrigger,kTrigger);
    const breach=absDev>threshold&&threshold>0;
    const breachStart=breach?window[0].i:null; // first period of the deviating window → replan anchor
    // P4 — count CONSECUTIVE per-period breaches (each period vs its forecast, not the windowed mean).
    // Used to recommend rolling-horizon vs full-resolve action: ≥ senseResolveAfter consecutive breaches → full re-solve.
    let consecutive=0;
    for(let j=filledActuals.length-1;j>=0;j--){
      const {a,i}=filledActuals[j];
      const f=consensus[i]||0;
      const trig=Math.max(Math.abs(f)*sensePct/100,senseK*sigma);
      if(Math.abs(a-f)>trig&&trig>0)consecutive++;else break;
    }
    const recommendResolve=consecutive>=senseResolveAfter; // structural shift
    sensingNote={bias:bias.toFixed(1),sensedNext,nextFcst,correction:sensedNext-nextFcst,lastIdx,lastActual,
      sigma:sigma.toFixed(1),absDev:absDev.toFixed(1),threshold:threshold.toFixed(1),breach,breachStart,window:senseWindow,
      consecutive,recommendResolve};
  }
  // P4 — rolling-horizon patches read for MPS display
  const rollingPatch=(state.mpsRollingPatch&&prod.id&&state.mpsRollingPatch[prod.id])||{};

  // Daily breakdown across first N weeks — uses real calendar dates from horizonStartDate.
  // Skips weekends (Sat-Sun if workDays=5; Sun if workDays=6; never if workDays=7) AND gazetted holidays.
  const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const isWorkDay=(date)=>{const dow=date.getDay();if(workDays===5)return dow>=1&&dow<=5;if(workDays===6)return dow>=1&&dow<=6;return true;};
  const holList=(state.planning.holidays||[]).reduce((m,h)=>{m[h.date]=h.name;return m;},{});
  const startISO=state.planning.horizonStartDate||new Date().toISOString().slice(0,10);
  const startDate=new Date(startISO+'T00:00:00');
  const totalDays=dailyWeeks*workDays;
  const dMPS=[];
  let cursor=new Date(startDate);
  let calendarOffset=0; // counter for total calendar days walked (incl. skipped)
  let workingDayIdx=0;  // counter for actual production days
  while(dMPS.length<totalDays&&calendarOffset<dailyWeeks*7+30){ // +30 buffer for holidays
    const iso=cursor.toISOString().slice(0,10);
    const isWD=isWorkDay(cursor);
    const isHol=!!holList[iso];
    if(isWD&&!isHol){
      const wIdx=Math.floor(workingDayIdx/workDays);
      const wk=wMPS[wIdx]||{demand:0,production:0};
      const baseDD=Math.round((wk.demand||0)/workDays);
      const baseDProd=Math.round((wk.production||0)/workDays);
      const key=`d${workingDayIdx}`;
      const ov=prodOverrides[key];
      dMPS.push({day:dayNames[cursor.getDay()],date:iso,dateLabel:`${dayNames[cursor.getDay()]} ${cursor.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})}`,globalDay:workingDayIdx+1,wIdx,demand:baseDD,production:ov!==undefined?ov:baseDProd,baseProd:baseDProd,isOverridden:ov!==undefined,isFrozen:wIdx<frozenWk,isSlushy:wIdx>=frozenWk&&wIdx<slushyWk});
      workingDayIdx++;
    }
    cursor.setDate(cursor.getDate()+1);
    calendarOffset++;
  }

  const setOverride=(key,val)=>setProdOverrides(o=>({...o,[key]:val})); // store raw string
  const clearOverrides=()=>setProdOverrides({});

  const overrideCount=Object.keys(prodOverrides).length;

  return <div className="card">
    <div className="card-title">📅 Master Production Schedule (MPS)
      <span className="badge" style={{background:'rgba(0,212,170,.1)',color:'var(--ac)',marginLeft:6}}>Editable</span>
      {overrideCount>0&&<span className="badge" style={{background:'rgba(240,180,41,.15)',color:'var(--a4)',marginLeft:4}}>{overrideCount} manual override{overrideCount>1?'s':''}</span>}
      <SectionInfo><strong>What it does:</strong> Period-by-period production plan output by the procurement MILP — editable.<br/><strong>Granularities:</strong> daily/weekly/monthly toggle. Daily expanded view shows specific dates from the configured horizon start, excluding gazetted holidays.<br/><strong>Frozen vs Slushy:</strong> periods inside the frozen horizon are LOCKED (any override flagged as urgent unactionable change in Control Tower); slushy periods accept overrides with approval.<br/><strong>Flows to:</strong> RM demand via BOM explosion → Procurement; capacity utilisation reports; planned-vs-actual in Demand Sensing (P4).</SectionInfo>
    </div>

    {/* Controls row */}
    <div style={{display:'flex',gap:6,marginBottom:8,alignItems:'center',flexWrap:'wrap'}}>
      {['monthly','weekly','daily'].map(v=><button key={v} className={`btn btn-sm ${mpsGran===v?'btn-primary':'btn-secondary'}`} onClick={()=>setMpsGran(v)}>{v.charAt(0).toUpperCase()+v.slice(1)}</button>)}
      {mpsGran==='daily'&&<select value={dailyWeeks} onChange={e=>setDailyWeeks(+e.target.value)} style={{fontSize:10,padding:'3px 6px'}} title="Number of weeks to show daily">
        {[1,2,4,8,12].map(n=><option key={n} value={n}>{n} wk ({n*workDays}d)</option>)}
      </select>}
      {products.length>1&&<select value={selSKU} onChange={e=>setSelSKU(+e.target.value)} style={{fontSize:10,padding:'3px 6px',background:aggregateMode?'rgba(167,139,250,.12)':'inherit',color:aggregateMode?'var(--a3)':'inherit',fontWeight:aggregateMode?700:400}}>
        <option value={-1}>📊 ALL SKUs (aggregate)</option>
        {products.map((p,i)=><option key={i} value={i}>{p.name}</option>)}
      </select>}
      <span style={{fontSize:9,color:'var(--tx3)',marginLeft:4}}>🔒Frozen {frozenWk}wk | 🟡Slushy {slushyWk}wk | 🟢Open</span>
      {overrideCount>0&&<button className="btn btn-secondary btn-sm" onClick={clearOverrides} style={{marginLeft:'auto',fontSize:9}}>↺ Clear overrides</button>}
    </div>

    {/* P4 — Demand sensing summary with 2 alert-action buttons (rerun MILP / rolling-horizon adjust) */}
    {sensingNote&&<div style={{marginBottom:8,padding:'6px 10px',background:sensingNote.breach?'rgba(248,81,73,.08)':'rgba(56,189,248,.06)',border:`1px solid ${sensingNote.breach?'var(--dg)':'rgba(56,189,248,.2)'}`,borderRadius:4,fontSize:10}}>
      <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
        <span style={{color:sensingNote.breach?'var(--dg)':'var(--a2)',fontWeight:700}}>📡 Demand Sensing {sensingNote.breach?'BREACH':'active'} ({filledActuals.length} periods, window={sensingNote.window})</span>
        {sensingNote.consecutive>0&&<span className="badge" style={{background:sensingNote.recommendResolve?'rgba(248,81,73,.15)':'rgba(240,180,41,.12)',color:sensingNote.recommendResolve?'var(--dg)':'var(--a4)'}}>{sensingNote.consecutive} consecutive breach{sensingNote.consecutive>1?'es':''}</span>}
        <span style={{color:'var(--tx2)'}}>Bias: <strong style={{color:Math.abs(+sensingNote.bias)>10?'var(--dg)':'var(--gn)'}}>{+sensingNote.bias>0?'+':''}{sensingNote.bias}</strong></span>
        <span style={{color:'var(--tx2)'}}>|Δ| window: <strong style={{color:sensingNote.breach?'var(--dg)':'var(--tx)'}}>{sensingNote.absDev}</strong></span>
        <span style={{color:'var(--tx2)'}}>σ: {sensingNote.sigma}</span>
        <span style={{color:'var(--tx2)'}}>trigger: <strong>{sensingNote.threshold}</strong></span>
        <span style={{color:'var(--tx2)'}}>Next: {sensingNote.nextFcst} → <strong style={{color:'var(--ac)'}}>{sensingNote.sensedNext}</strong> (Δ{sensingNote.correction>0?'+':''}{sensingNote.correction})</span>
        <span style={{color:'var(--tx3)',fontSize:9}}>α={sensingAlpha} · k={senseK}·σ or {sensePct}%</span>
      </div>
      {/* P4 — TWO alert action buttons. Default policy: ≤ resolveAfter consecutive breaches → rolling-horizon (cheap, no full re-solve). > resolveAfter → full MILP re-run (structural shift). */}
      {sensingNote.breach&&sensingNote.breachStart!==null&&<div style={{marginTop:6,paddingTop:6,borderTop:'1px dashed var(--br)',display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
        <span style={{fontSize:9,color:'var(--tx3)',fontWeight:600}}>RECOMMENDED ACTION:</span>
        <span style={{fontSize:10,color:sensingNote.recommendResolve?'var(--dg)':'var(--a4)',fontWeight:700}}>
          {sensingNote.recommendResolve
            ? `🔁 Re-run MILP — ${sensingNote.consecutive} consecutive breaches indicate a structural shift (≥ ${senseResolveAfter}-period rule).`
            : `🩹 Rolling-horizon adjust — short drift (${sensingNote.consecutive}/${senseResolveAfter}). No need to re-solve full horizon.`}
        </span>
        <div style={{marginLeft:'auto',display:'flex',gap:6}}>
          <button className={`btn btn-sm ${sensingNote.recommendResolve?'btn-primary':'btn-secondary'}`} style={{fontSize:10,padding:'3px 8px'}}
            onClick={()=>{
              dispatch({type:'SET_PLANNING',payload:{replanFromPeriod:sensingNote.breachStart,sensingActionMode:'rerun-milp'}});
              alert(`Replan anchor set to period ${sensingNote.breachStart+1} (${MONTHS[sensingNote.breachStart]}).\n\nGo to Tab 9 (Solver Pipeline) and click "Run Procurement" — actuals through period ${sensingNote.breachStart} will be locked, and periods ${sensingNote.breachStart+1}..end will be re-optimised.`);
            }} title="Locks committed actuals up to the breach start; re-solves forward periods with updated demand. Best for structural shifts (≥4 consecutive breaches).">
            🔁 Re-run MILP from {MONTHS[sensingNote.breachStart].slice(0,3)}
          </button>
          <button className={`btn btn-sm ${sensingNote.recommendResolve?'btn-secondary':'btn-primary'}`} style={{fontSize:10,padding:'3px 8px'}}
            onClick={()=>{
              // Apply rolling-horizon patch: write sensed adjustment into next senseResolveAfter periods.
              const patch={};
              const adj=sensingNote.sensedNext-sensingNote.nextFcst;
              const startT=sensingNote.lastIdx+1;
              for(let dt=0;dt<senseResolveAfter;dt++){
                const t=startT+dt;
                if(t>=12)break;
                patch[t]=Math.max(0,(consensus[t]||0)+adj);
              }
              dispatch({type:'SET_MPS_ROLLING_PATCH',productId:prod.id,patch});
              alert(`Rolling-horizon patch applied to ${prod.name} (next ${Object.keys(patch).length} periods, +${adj} units each).\n\nPatched values are visible in the Monthly view "Δ from plan" column. No solver re-run needed.`);
            }} title="Updates only the next N periods of MPS in-place using exponentially-smoothed actual. Cheap; no full re-solve. Best for short-horizon drift (<4 consecutive breaches).">
            🩹 Rolling-horizon adjust ({senseResolveAfter}p)
          </button>
        </div>
      </div>}
      {replanFrom!==null&&replanFrom!==undefined&&<div style={{marginTop:4,padding:'4px 8px',background:'rgba(240,180,41,.08)',border:'1px solid var(--a4)',borderRadius:3,display:'flex',alignItems:'center',gap:8}}>
        <span style={{color:'var(--a4)',fontWeight:600}}>🔄 Replan anchor set: period {replanFrom+1} ({MONTHS[replanFrom]})</span>
        <span style={{color:'var(--tx3)',fontSize:9}}>Solver will lock periods 1..{replanFrom} (actuals committed) and re-optimise from period {replanFrom+1}.</span>
        <button className="btn btn-secondary btn-sm" style={{marginLeft:'auto',fontSize:9}} onClick={()=>dispatch({type:'SET_PLANNING',payload:{replanFromPeriod:null,sensingActionMode:null}})}>× clear</button>
      </div>}
      {Object.keys(rollingPatch).length>0&&<div style={{marginTop:4,padding:'4px 8px',background:'rgba(56,189,248,.08)',border:'1px solid var(--a2)',borderRadius:3,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
        <span style={{color:'var(--a2)',fontWeight:600}}>🩹 Rolling-horizon patch active: {Object.keys(rollingPatch).length} period{Object.keys(rollingPatch).length>1?'s':''}</span>
        <span style={{color:'var(--tx3)',fontSize:9}}>{Object.entries(rollingPatch).slice(0,4).map(([t,v])=>`${MONTHS[+t]?.slice(0,3)||'P'+(+t+1)}: ${Math.round(v)}u`).join(', ')}{Object.keys(rollingPatch).length>4?'…':''}</span>
        <button className="btn btn-secondary btn-sm" style={{marginLeft:'auto',fontSize:9}} onClick={()=>dispatch({type:'CLEAR_MPS_ROLLING_PATCH',productId:prod.id})}>× clear patch</button>
      </div>}
    </div>}
    {!sensingActive&&<div style={{marginBottom:8,padding:'4px 10px',background:'var(--bg3)',borderRadius:4,fontSize:9,color:'var(--tx3)'}}>
      📡 Demand Sensing inactive — enter {sensingMin} periods of actuals (in this card or in Tab 2 → Products & Demand) to activate. (α={sensingAlpha})
    </div>}

    {/* MONTHLY view — base plan + editable actuals row + auto-replan on miss (v3.5) */}
    {mpsGran==='monthly'&&<div style={{overflowX:'auto'}}>
      <div style={{fontSize:9,color:'var(--tx3)',marginBottom:4}}>
        T0 on-hand: <strong style={{color:'var(--a4)'}}>{(prod.initInventory||0).toLocaleString()}</strong> units (edit per-SKU in Tab 2). Enter Actual Produced per month to track against plan — misses roll forward into next period via the ⟳ Replan button.
      </div>
      <table className="data-table">
        <thead><tr><th>Month</th><th>Demand</th><th>Plan</th><th style={{color:'var(--a2)'}}>Adj Plan</th><th style={{color:'var(--a4)'}}>Actual ✏</th><th>Δ (Act−Plan)</th><th>End Inv.</th><th>Shortfall</th><th>Batches</th></tr></thead>
        <tbody>{mMPS.map((mo,i)=>{
          const actual=prod.actuals?.[i];
          const hasAct=actual!=null&&actual!=='';
          const patched=rollingPatch[i];
          const adjPlan=patched!==undefined?patched:mo.production;
          const delta=hasAct?(+actual-adjPlan):null;
          const missed=hasAct&&delta<-Math.max(5,adjPlan*0.05); // >5% miss
          return <tr key={i} style={{background:missed?'rgba(248,81,73,.05)':patched!==undefined?'rgba(56,189,248,.04)':undefined}}>
            <td style={{fontWeight:600}}>{mo.month}{i===0&&<span style={{fontSize:8,color:'var(--a4)',marginLeft:4}} title={`T0 on-hand = ${(prod.initInventory||0).toLocaleString()} units`}>T0</span>}</td>
            <td className="num">{mo.demand.toLocaleString()}</td>
            <td className="num" style={{color:'var(--ac)'}}>{mo.production.toLocaleString()}</td>
            <td className="num" style={{color:patched!==undefined?'var(--a2)':'var(--tx3)',fontWeight:patched!==undefined?700:400}} title={patched!==undefined?'Rolling-horizon patch overrides original plan for this period.':'No patch.'}>{patched!==undefined?Math.round(patched).toLocaleString():'—'}</td>
            <td className="num"><input type="number" placeholder="—" style={{width:62,textAlign:'right',fontSize:10,background:hasAct?'rgba(240,180,41,.06)':undefined}} value={actual??''} onChange={e=>{const v=e.target.value;const sku=products[aggregateMode?0:selSKU>=0?selSKU:0];if(!sku)return;dispatch({type:'UPDATE_ACTUAL',productId:sku.id,month:i,value:v===''?null:+v||0})}} title="Enter actual produced qty. Leave blank = no data yet (uncommitted)."/></td>
            <td className="num" style={{color:hasAct?(missed?'var(--dg)':Math.abs(delta)<=3?'var(--tx3)':delta>0?'var(--gn)':'var(--a4)'):'var(--tx3)'}}>{hasAct?(delta>0?'+':'')+delta:'—'}</td>
            <td className="num" style={{color:mo.inventory<10?'var(--dg)':mo.inventory<30?'var(--a4)':'var(--tx)'}}>{mo.inventory.toLocaleString()}</td>
            <td className="num" style={{color:mo.shortfall>0?'var(--dg)':'var(--tx3)'}}>{mo.shortfall>0?mo.shortfall.toLocaleString():'—'}</td>
            <td className="num" style={{fontSize:9,color:'var(--tx3)'}}>{mo.batches}</td>
          </tr>})}</tbody>
      </table>
      {(()=>{

function InventoryProjectionCard({state}){
  const products=state.products;
  const cur=state.config.currency;
  const z=zVal(+(state.config.serviceLevel||0.95));
  // v3.6 — prefer MPS from solver output when present; otherwise use monthly heuristic.
  // procurement.py emits per-product arrays at result.products[k].production / .inventory.
  const solverProducts=state.solverResults?.procurement?.products;
  const solverMPSByProd=Array.isArray(solverProducts)?products.map(p=>{const m=solverProducts.find(sr=>sr.name===p.name);return m?m.production:null;}):null;
  const solverInvByProd=Array.isArray(solverProducts)?products.map(p=>{const m=solverProducts.find(sr=>sr.name===p.name);return m?m.inventory:null;}):null;
  const solverMPS=solverMPSByProd&&solverMPSByProd.some(x=>Array.isArray(x))?solverMPSByProd:null;
  // Per-product safety stock + projection that builds up to SS
  const skuSS=products.map(p=>{
    const h=p.history||[];
    const mu=h.reduce((a,b)=>a+b,0)/Math.max(h.length,1);
    const sigma=Math.sqrt(h.reduce((s,v)=>s+Math.pow(v-mu,2),0)/Math.max(h.length,1));
    const maxLTwk=Math.max(...(p.bom||[{leadTime:1}]).map(b=>+(b.leadTime)||1));
    return Math.max(Math.round(z*sigma*Math.sqrt(maxLTwk/4.33)),1); // monthly SS units
  });
  const capacityWarnings=[];
  const projs=products.map((p,pi)=>{
    let inv=p.initInventory||0;
    const mc=(p.bom||[]).reduce((s,b)=>s+b.cost*b.qtyPer,0);
    const cr=(p.carryRate||24)/100/12;
    const ss=skuSS[pi];
    const monthlyCap=(p.capacity||50)*4;
    const avgDem=(p.history||[]).reduce((a,b)=>a+b,0)/Math.max((p.history||[]).length,1);
    if(monthlyCap<avgDem*0.95)capacityWarnings.push({name:p.name,cap:monthlyCap,dem:Math.round(avgDem)});
    return MONTHS.map((m,i)=>{
      const dem=(p.history||[])[i]||0;
      // If solver result is present, prefer its production schedule (collapsed to monthly).
      let produce;
      if(Array.isArray(solverMPS)&&Array.isArray(solverMPS[pi])){
        const periodsPerMonth=solverMPS[pi].length/12;
        const startIdx=Math.floor(i*periodsPerMonth);
        const endIdx=Math.floor((i+1)*periodsPerMonth);
        produce=solverMPS[pi].slice(startIdx,endIdx).reduce((a,b)=>a+(+b||0),0);
      }else{
        const ssDeficit=Math.max(0,ss-inv);
        produce=Math.min(Math.max(dem+ssDeficit,0),monthlyCap);
      }
      inv=Math.max(0,inv+produce-dem);
      const holdCost=Math.round(inv*mc*cr);
      return{name:m,[`${p.name}_inv`]:Math.round(inv),[`${p.name}_hold`]:holdCost,[`${p.name}_ss`]:ss,[`${p.name}_produce`]:Math.round(produce)};
    });
  });
  const chartData=MONTHS.map((m,i)=>{
    const row={name:m};
    products.forEach((p,pi)=>Object.assign(row,projs[pi][i]));
    return row;
  });
  const cols=['#00d4aa','#38bdf8','#a78bfa','#f0b429'];
  const maxInv=Math.max(...chartData.flatMap(row=>products.map(p=>row[`${p.name}_inv`]||0)),10);
  return <div className="card">
    <div className="card-title">📈 Inventory Projection — 12-Month
      <span className="badge" style={{background:'rgba(56,189,248,.1)',color:'var(--a2)',marginLeft:6}}>Holding cost tracked</span>
      <span className="badge" style={{background:'rgba(0,212,170,.1)',color:'var(--ac)',marginLeft:4}}>SS-aware production</span>
    </div>
    <div style={{fontSize:9,color:'var(--tx3)',marginBottom:4}}>
      {solverMPS?<span style={{color:'var(--gn)'}}>✓ Using last procurement-solver MPS output.</span>:'Heuristic projection (no solver run yet). Production targets safety stock (dashed line). SS = z×σ×√LT per SKU.'}
    </div>
    {capacityWarnings.length>0&&<div style={{fontSize:10,color:'var(--a4)',marginBottom:6,padding:'5px 8px',background:'rgba(240,180,41,.06)',border:'1px solid rgba(240,180,41,.3)',borderRadius:3}}>
      ⚠ <strong>Capacity-bound — inventory cannot build:</strong> {capacityWarnings.map(w=>`${w.name} (cap ${w.cap}/mo < avg demand ${w.dem}/mo)`).join('; ')}. Plan will show 0 inventory through the horizon. Fix in <strong>Production tab</strong> (raise capacity per period, add a shift, or check unit consistency between capacity and demand history).
    </div>}
    <div style={{height:200}}>
      <ResponsiveContainer width="100%" height="100%">
        <ComposedChart data={chartData} margin={{top:5,right:10,left:0,bottom:5}}>
          <CartesianGrid strokeDasharray="3 3" stroke="#21262d"/>
          <XAxis dataKey="name" tick={{fill:'#8b949e',fontSize:9}} stroke="#21262d"/>
          <YAxis tick={{fill:'#8b949e',fontSize:9}} stroke="#21262d" domain={[0,Math.ceil(maxInv*1.15)]}/>
          <Tooltip contentStyle={{background:'#1c2333',border:'1px solid #30363d',borderRadius:4,fontSize:10}}
            formatter={(val,name)=>[val.toLocaleString()+'u',name]}/>
          <Legend wrapperStyle={{fontSize:9,color:'#8b949e'}}/>
          {products.map((p,i)=><React.Fragment key={p.id}>
            <Line type="monotone" dataKey={`${p.name}_inv`} stroke={cols[i%4]} strokeWidth={2} dot={{r:2}} name={`${p.name} Inventory`}/>
            <Line type="monotone" dataKey={`${p.name}_ss`} stroke={cols[i%4]} strokeWidth={1} strokeDasharray="5 3" dot={false} name={`${p.name} SS (${skuSS[i]}u)`} opacity={0.5}/>
          </React.Fragment>)}
        </ComposedChart>
      </ResponsiveContainer>
    </div>
    <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:4,marginBottom:6}}>
      {products.map((p,i)=><div key={p.id} style={{fontSize:9,padding:'2px 8px',borderRadius:3,background:'var(--bg3)',border:`1px solid ${cols[i%4]}`,color:cols[i%4]}}>
        {p.name} SS={skuSS[i]}u &nbsp;|&nbsp; z={z.toFixed(3)} &nbsp;|&nbsp; SL={Math.round(state.config.serviceLevel*100)}%
      </div>)}
    </div>
    <div style={{overflowX:'auto',marginTop:2}}>
      <table className="data-table" style={{fontSize:9}}>
        <thead><tr><th>Month</th>{products.map(p=><React.Fragment key={p.id}><th style={{color:'var(--ac)'}}>{p.name} Produce</th><th style={{color:'var(--a2)'}}>Inventory</th><th style={{color:'var(--tx3)'}}>vs SS</th><th style={{color:'var(--a4)'}}>Hold Cost</th></React.Fragment>)}</tr></thead>
        <tbody>{chartData.map((row,i)=><tr key={i}>
          <td style={{fontWeight:600}}>{row.name}</td>
          {products.map((p,pi)=>{
            const inv=row[`${p.name}_inv`]||0;
            const ss=skuSS[pi];
            const delta=inv-ss;
            return <React.Fragment key={p.id}>
              <td className="num" style={{color:'var(--ac)'}}>{(row[`${p.name}_produce`]||0).toLocaleString()}</td>
              <td className="num" style={{color:inv<ss?'var(--dg)':inv<ss*1.5?'var(--a4)':'var(--tx)',fontWeight:inv<ss?700:400}}>{inv.toLocaleString()}</td>
              <td className="num" style={{color:delta>=0?'var(--gn)':'var(--dg)',fontSize:8}}>{delta>=0?'+':''}{delta}</td>
              <td className="num" style={{color:'var(--a4)'}}>{cur}{(row[`${p.name}_hold`]||0).toLocaleString()}</td>
            </React.Fragment>
          })}
        </tr>)}</tbody>
      </table>
    </div>
    <div style={{fontSize:9,color:'var(--tx3)',marginTop:4}}>
      SS formula: z(SL) × σ(demand) × √(LT_weeks/4.33) | Cap: monthly = weekly_capacity × 4 | Hold = inv × material_cost × carry_rate/12
    </div>
  </div>;
}

function MILPFormCard({state}){

  const WACC=state.config.wacc;

  const FORMS={
    procurement:{label:'② Procurement',color:'var(--ac)',content:()=>{
      const P=state.products;
      const allParts=P.flatMap(p=>p.bom.map(b=>({...b,skuName:p.name})));
