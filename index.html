function TransportAllocationCard({state,dispatch}){
  const cur=state.config.currency;
  const nodes=state.config.networkNodes||[];
  const warehouses=nodes.filter(n=>n.type==='warehouse'||n.type==='fg_store'||n.type==='dc');
  const customers=nodes.filter(n=>n.type==='customer');
  const [rates,setRates]=useState(()=>{const r={};warehouses.forEach(w=>customers.forEach(c=>{r[`${w.id}-${c.id}`]=Math.round(5+Math.random()*15)}));return r});
  const [supplies,setSupplies]=useState(()=>{const s={};warehouses.forEach(w=>{s[w.id]=100});return s});
  const [demands,setDemands]=useState(()=>{const d={};customers.forEach(c=>{d[c.id]=50});return d});
  const [allocation,setAllocation]=useState(null);
  const [totalCost,setTotalCost]=useState(null);

  const solve=async()=>{
    // Build shipments for the transport solver
    const shipments=[];
    warehouses.forEach(w=>customers.forEach(c=>{
      const rate=rates[`${w.id}-${c.id}`]||10;
      shipments.push({name:`${w.name}→${c.name}`,origin:w.loc||w.name,destination:c.loc||c.name,weight_kg:demands[c.id]||50,deadline_days:7,value:rate*(demands[c.id]||50),rate_per_unit:rate,w_id:w.id,c_id:c.id});
    }));
    // Simple greedy allocation: for each customer, find cheapest warehouse with supply
    const alloc={};let tc=0;const supLeft={...supplies};
    customers.forEach(c=>{
      let rem=demands[c.id]||0;
      const sources=warehouses.map(w=>({wId:w.id,rate:rates[`${w.id}-${c.id}`]||999})).sort((a,b)=>a.rate-b.rate);
      sources.forEach(s=>{
        if(rem<=0)return;
        const avail=supLeft[s.wId]||0;
        const qty=Math.min(rem,avail);
        if(qty>0){alloc[`${s.wId}-${c.id}`]=qty;supLeft[s.wId]-=qty;rem-=qty;tc+=qty*s.rate;}
      });
    });
    setAllocation(alloc);setTotalCost(tc);
  };

  if(warehouses.length===0||customers.length===0)return <div className="card">
    <div className="card-title">🚛 Transport Allocation Matrix</div>
    <div style={{fontSize:10,color:'var(--tx3)'}}>Add Warehouse/DC and Customer nodes in Setup → Network Topology to enable the transport allocation matrix.</div>
  </div>;

  return <div className="card">
    <div className="card-title">🚛 Transport Allocation Matrix <span className="badge" style={{background:'rgba(0,180,216,.1)',color:'var(--a2)'}}>Warehouse → Customer</span></div>
    <div style={{fontSize:10,color:'var(--tx3)',marginBottom:6}}>Set transport rate ({cur}/unit) between each warehouse-customer pair. Supply = available at warehouse. Demand = customer requirement. Solve allocates optimally by cheapest-first.</div>
    <div style={{overflowX:'auto'}}>
      <table className="data-table" style={{fontSize:9}}>
        <thead><tr>
          <th style={{background:'var(--bg4)'}}>From \ To</th>
          {customers.map(c=><th key={c.id} style={{color:'var(--a2)',textAlign:'center'}}>
            {c.name}<br/><span style={{fontSize:8,color:'var(--tx3)'}}>{c.loc}</span><br/>
            <span style={{fontSize:8}}>Dem:</span><input type="number" value={demands[c.id]||0} style={{width:40,fontSize:8,textAlign:'center'}} onChange={e=>setDemands(d=>({...d,[c.id]:+e.target.value}))}/>
          </th>)}
          <th style={{color:'var(--tx3)'}}>Supply</th>
        </tr></thead>
        <tbody>{warehouses.map(w=><tr key={w.id}>
          <td style={{fontWeight:600,color:'var(--dg)'}}>
            {w.name}<br/><span style={{fontSize:8,color:'var(--tx3)'}}>{w.loc}</span>
          </td>
          {customers.map(c=>{
            const key=`${w.id}-${c.id}`;const al=allocation?.[key];
            return <td key={c.id} style={{textAlign:'center'}}>
              <input type="number" value={rates[key]||0} style={{width:36,fontSize:8,textAlign:'center',color:'var(--a4)'}} onChange={e=>setRates(r=>({...r,[key]:+e.target.value}))}/><span style={{fontSize:7,color:'var(--tx3)'}}>{cur}/u</span>
              {al>0&&<div style={{color:'var(--ac)',fontWeight:700,fontSize:10}}>→{al}u</div>}
            </td>
          })}
          <td><input type="number" value={supplies[w.id]||0} style={{width:45,fontSize:9,textAlign:'center'}} onChange={e=>setSupplies(s=>({...s,[w.id]:+e.target.value}))}/>u</td>
        </tr>)}</tbody>
      </table>
    </div>
    <div style={{display:'flex',gap:8,marginTop:6,alignItems:'center'}}>
      <button className="btn btn-primary btn-sm" onClick={solve}>⚡ Solve Allocation</button>
      {totalCost!==null&&<span style={{fontSize:11,color:'var(--ac)',fontWeight:700}}>Total transport cost: {cur}{totalCost.toLocaleString()} | Avg {cur}{(totalCost/Math.max(Object.values(demands).reduce((a,b)=>a+b,0),1)).toFixed(1)}/unit</span>}
    </div>
  </div>;
}

function LiveCascadeIndicator({state}){
  const [flash,setFlash]=useState(false);
  const [lastHash,setLastHash]=useState('');
  const hash=useMemo(()=>{
    try{const d=state.products.map(p=>JSON.stringify({
      h:p.history,o:p.overrides,mape:p.mape,cap:p.capacity,bom:p.bom?.map(b=>b.cost)
    }));return d.join('|');}catch(e){return '';}
  },[state.products]);
  useEffect(()=>{
    if(hash&&hash!==lastHash){setLastHash(hash);if(lastHash){setFlash(true);setTimeout(()=>setFlash(false),800);}}
  },[hash]);
  const skuCount=state.products.length;
  const partCount=state.products.reduce((s,p)=>s+(p.bom||[]).length,0);
  const fcstCount=skuCount*17;
  return <div style={{display:'flex',alignItems:'center',gap:6,fontSize:9,color:'var(--tx3)',padding:'3px 8px',background:'var(--bg3)',border:'1px solid var(--br)',borderRadius:12,fontFamily:'JetBrains Mono',transition:'all .3s',boxShadow:flash?'0 0 8px var(--ac)':'none',borderColor:flash?'var(--ac)':'var(--br)'}}>
    <span style={{width:6,height:6,borderRadius:'50%',background:flash?'var(--ac)':'var(--gn)',display:'inline-block',boxShadow:flash?'0 0 6px var(--ac)':'none',transition:'all .3s'}}/>
    <span style={{color:flash?'var(--ac)':'var(--tx2)',transition:'color .3s'}}>{flash?'↻ Recalculating...':'Live ·'}</span>
    {!flash&&<span>{skuCount} SKU · {partCount} parts · {fcstCount} forecasts</span>}
  </div>;
}

// SAP Planning Runner — MD01/MD41 equivalent
// ════════════════════════════════════════════════
function SAPPlanningRunner({state}){
  const [runLog,setRunLog]=useState([]);
  const [running,setRunning]=useState(false);
  const [runMode,setRunMode]=useState('MD01'); // MD01 total MRP, MD41 MPS, MD02 single
  const [selectedSKU,setSelectedSKU]=useState(state.products[0]?.id);

  const runPlanning=async()=>{
    setRunning(true);
    const log=[];
    const startTs=new Date().toLocaleTimeString();
    log.push({ts:startTs,level:'info',msg:`[${runMode}] Run initiated on ${state.products.length} SKU(s)`});
    setRunLog([...log]);
    const targets=runMode==='MD02'?[state.products.find(p=>p.id===selectedSKU)].filter(Boolean):state.products;
    for(const p of targets){
      log.push({ts:new Date().toLocaleTimeString(),level:'info',msg:`▶ ${p.name}: demand=${(p.history||[]).slice(-12).reduce((a,b)=>a+b,0)} u/yr, ${p.bom.length} components`});
      setRunLog([...log]);
      try{
        const wd=state.planning.workDays||6;
        const weeks=[];const hist=(p.history||[]).slice(-12);
        for(let m=0;m<Math.min(state.planning.planMonths||12,hist.length);m++){const mo=hist[m]||0;const w1=Math.round(mo*0.27);const w2=Math.round(mo*0.27);const w3=Math.round(mo*0.23);weeks.push(w1,w2,w3,mo-w1-w2-w3);}
        const res=await fetch('/api/solve/procurement',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
          products:[{name:p.name,demand:weeks.slice(0,state.planning.periods),capacity:p.capacity,setup_cost:p.setupCost,variable_cost:p.variableCost,sell_price:p.sellPrice,yield_pct:p.yieldPct,init_inventory:p.initInventory,cost_events:(p.costEvents||[]).map(ev=>({from_month:ev.fromMonth,param:ev.paramKey,value:ev.paramValue})),parts:p.bom.map(b=>({name:b.name,cost:b.cost,qty_per:b.qtyPer,lead_time:b.leadTime,moq:b.moq,max_order:b.maxOrder||500,hold_pct:b.holdPct||24,ordering_cost:b.orderingCost||75,vol_disc:b.volDisc||[],trans_tiers:b.tiers||[]}))}],
          params:{periods:state.planning.periods,carry_rate:0.24,service_level:state.config.serviceLevel},
        })});
        const data=await res.json();
        if(data.error){log.push({ts:new Date().toLocaleTimeString(),level:'err',msg:`✗ ${p.name}: ${data.error}`});}
        else{log.push({ts:new Date().toLocaleTimeString(),level:'ok',msg:`✓ ${p.name}: total cost ${state.config.currency}${Math.round(data.total_cost||0).toLocaleString()}, ${(data.procurement_schedule||[]).length} POs, solve ${data.solve_time||0}s`});}
        setRunLog([...log]);
      }catch(e){log.push({ts:new Date().toLocaleTimeString(),level:'err',msg:`✗ ${p.name}: ${e.message}`});setRunLog([...log]);}
    }
    log.push({ts:new Date().toLocaleTimeString(),level:'info',msg:`[${runMode}] Run complete — ${targets.length} material(s) processed`});
    setRunLog([...log]);
    setRunning(false);
  };

  return <>
    <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:8,flexWrap:'wrap'}}>
      <select value={runMode} onChange={e=>setRunMode(e.target.value)} style={{fontSize:10,padding:'3px 6px'}}>
        <option value="MD01">MD01 — Total MRP Run</option>
        <option value="MD02">MD02 — Single Material</option>
        <option value="MD41">MD41 — MPS (Planned Orders)</option>
      </select>
      {runMode==='MD02'&&<select value={selectedSKU} onChange={e=>setSelectedSKU(e.target.value)} style={{fontSize:10}}>
        {state.products.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
      </select>}
      <button className="btn btn-primary btn-sm" disabled={running} onClick={runPlanning}>
        {running?'⏳ Running…':`▶ Execute ${runMode}`}
      </button>
      <span style={{fontSize:9,color:'var(--tx3)'}}>Equivalent to SAP T-code {runMode}</span>
    </div>
    {runLog.length>0&&<div style={{maxHeight:260,overflowY:'auto',background:'#000',color:'#0f0',fontFamily:'JetBrains Mono',fontSize:10,padding:8,borderRadius:4}}>
      {runLog.map((l,i)=><div key={i} style={{color:l.level==='err'?'#f85149':l.level==='ok'?'#3fb950':'#8b949e'}}>
        [{l.ts}] {l.msg}
      </div>)}
    </div>}
  </>;
}

function MRPExplosionPanel({state}){
  const prods=state.products||[];
  const rows=[];
  prods.slice(0,5).forEach(p=>{
    const demand=(p.history||[]).slice(-4).reduce((a,b)=>a+(+b||0),0)||0;
    const onHand=+(p.initInventory||0);
    const netReq=Math.max(0,demand-onHand);
    rows.push({lv:0,name:p.name,gross:demand,onHand,net:netReq,planned:netReq,action:netReq>0?'MAKE':'SKIP'});
    (p.bom||[]).slice(0,3).forEach(b=>{
      const rm=Math.ceil(netReq*(+b.qtyPer||1)*(1+(+b.scrapFactor||0)));
      const bomOH=+(b.onHand||0);
      const bomNet=Math.max(0,rm-bomOH);
      const plannedPO=Math.max(bomNet,bomNet>0?(+b.moq||1):0);
      rows.push({lv:1,name:b.name,gross:rm,onHand:bomOH,net:bomNet,planned:plannedPO,action:bomNet>0?'BUY':'HOLD'});
    });
  });
  return <Panel title="MRP Explosion" sub="Level-0 FG → Level-1 components · net requirements · planned orders" right={<span className="tag tag-ghost">{rows.length} LINES</span>}>
    <div className="mrp-row h"><div>ITEM</div><div className="num">GROSS</div><div className="num">ON-HAND</div><div className="num">NET REQ</div><div className="num">PLANNED</div><div className="num">ACTION</div></div>
    {rows.slice(0,25).map((r,i)=><div key={i} className={`mrp-row lv${r.lv}`}>
      <div className="tree">{r.lv===0?'◆ ':'↳ '}{r.name}</div>
      <div className="num">{r.gross.toLocaleString()}</div>
      <div className="num">{r.onHand.toLocaleString()}</div>
      <div className="num" style={{color:r.net>0?'var(--dg)':'var(--tx3)',fontWeight:700}}>{r.net.toLocaleString()}</div>
      <div className="num">{r.planned.toLocaleString()}</div>
      <div className="action">{r.action}</div>
    </div>)}
    {!rows.length&&<div style={{padding:20,textAlign:'center',color:'var(--tx3)',fontSize:11}}>Add products with BOM to see MRP explosion.</div>}
  </Panel>;
}

function CashflowWaterfallPanel({state}){
  const prods=state.products||[];
  const rev=prods.reduce((a,p)=>a+(p.history||[]).slice(-12).reduce((x,y)=>x+(+y||0),0)*(+p.sellPrice||0),0);
  const vcost=prods.reduce((a,p)=>a+(p.history||[]).slice(-12).reduce((x,y)=>x+(+y||0),0)*(+p.variableCost||0),0);
  const fixed=prods.reduce((a,p)=>a+(+p.fixedFactory||0)*12,0);
  const procurement=vcost*0.78;
  const tax=Math.max(0,(rev-vcost-fixed))*0.25;
  const capex=+(state.budget?.capex||0);
  const net=rev-procurement-fixed-tax-capex;
  const cur=state.config.currency||'₹';
  const bars=[
    {lbl:'Revenue',val:rev,cls:''},
    {lbl:'Procurement',val:-procurement,cls:'neg'},
    {lbl:'Fixed Opex',val:-fixed,cls:'neg'},
    {lbl:'Tax',val:-tax,cls:'neg'},
    {lbl:'Capex',val:-capex,cls:'neg'},
    {lbl:'Net Cash',val:net,cls:'tot'},
  ];
  const maxAbs=Math.max(...bars.map(b=>Math.abs(b.val)),1);
  const fmt=(v)=>{const a=Math.abs(v);return (a>=1e7?(a/1e7).toFixed(1)+'Cr':a>=1e5?(a/1e5).toFixed(1)+'L':a>=1e3?(a/1e3).toFixed(0)+'k':a.toFixed(0))};
  return <Panel title="Cashflow Waterfall" sub="TTM revenue → net cash · from products × history × prices" right={<span className="tag tag-ghost">FY 2026</span>}>
    <div className="wf-bar">
      {bars.map(b=><div key={b.lbl} className="wf-col">
        <div className="wf-val" style={{color:b.val<0?'var(--dg)':b.cls==='tot'?'var(--tx)':'var(--gn)'}}>{b.val<0?'−':''}{cur}{fmt(b.val)}</div>
        <div className={`wf-fill ${b.cls}`} style={{height:Math.max(3,Math.round((Math.abs(b.val)/maxAbs)*140))+'px'}}></div>
        <div className="wf-lbl">{b.lbl}</div>
      </div>)}
    </div>
    <div style={{marginTop:10,fontSize:10,color:'var(--tx3)',fontFamily:'var(--font-mono)'}}>Net margin {rev>0?((net/rev)*100).toFixed(1):'0'}% · Gross {rev>0?(((rev-vcost)/rev)*100).toFixed(1):'0'}% · EBITDA {rev>0?(((rev-vcost-fixed)/rev)*100).toFixed(1):'0'}%</div>
  </Panel>;
}

function ScenarioComparePanel({state}){
  const scs=(state.scenarios||[]).slice(0,2);
  if(scs.length<2)return <Panel title="Scenario Compare A vs B" sub="Save 2+ scenarios in Analysis tab to diff them"><div style={{padding:20,textAlign:'center',color:'var(--tx3)',fontSize:11}}>Need at least 2 saved scenarios — use <strong>SAVE_SCENARIO</strong> on the Analysis tab.</div></Panel>;
  const A=scs[0],B=scs[1];
  const metric=(sc,fn)=>fn(sc.data?.products||[]);
  const rev=(ps)=>ps.reduce((a,p)=>a+(p.history||[]).slice(-12).reduce((x,y)=>x+(+y||0),0)*(+p.sellPrice||0),0);
  const vcost=(ps)=>ps.reduce((a,p)=>a+(p.history||[]).slice(-12).reduce((x,y)=>x+(+y||0),0)*(+p.variableCost||0),0);
  const skus=(ps)=>ps.length;
  const rows=[
    {k:'Revenue (TTM)',f:rev},
    {k:'Variable Cost',f:vcost},
    {k:'Gross Profit',f:ps=>rev(ps)-vcost(ps)},
    {k:'SKU Count',f:skus},
  ];
  const cur=state.config.currency||'₹';
  const fmt=(v)=>{const a=Math.abs(v);return (a>=1e7?(a/1e7).toFixed(2)+'Cr':a>=1e5?(a/1e5).toFixed(1)+'L':a>=1e3?(a/1e3).toFixed(0)+'k':a.toFixed(0))};
  return <Panel title={`Scenario Compare · ${A.name} vs ${B.name}`} sub="Δ computed on saved snapshots">
    <div className="diff-row h"><div>METRIC</div><div className="num">A · {A.name.slice(0,10)}</div><div className="num">B · {B.name.slice(0,10)}</div><div className="num">Δ</div></div>
    {rows.map((r,i)=>{const a=metric(A,r.f),b=metric(B,r.f),d=b-a,pct=a?((d/a)*100).toFixed(1):'0';const isCur=r.k!=='SKU Count';return <div key={i} className="diff-row">
      <div>{r.k}</div>
      <div className="num">{isCur?cur:''}{isCur?fmt(a):a}</div>
      <div className="num">{isCur?cur:''}{isCur?fmt(b):b}</div>
      <div className={`num ${d>0?'pos':d<0?'neg':''}`}>{d>0?'+':''}{isCur?cur:''}{isCur?fmt(d):d} · {pct}%</div>
    </div>;})}
  </Panel>;
}

function IndiaSupplyMapPanel({state}){
  const nodes=state.network?.nodes||[];
  const lanes=state.network?.lanes||[];
  const sup=state._tataSuppliers||[];

  const bb={lat0:6,lat1:37,lon0:68,lon1:97};
  const proj=(lat,lon)=>{
    const x=((lon-bb.lon0)/(bb.lon1-bb.lon0))*520+30;
    const y=((bb.lat1-lat)/(bb.lat1-bb.lat0))*360+20;
    return {x,y};
  };
  const byId={};all.forEach(n=>byId[n.id]=n);
  return <Panel title="India Supply Network" sub={`${all.length} nodes · ${lanes.length} lanes · plants · DCs · customers · suppliers`} right={<span className="tag tag-ghost">GEO</span>}>
    <svg viewBox="0 0 580 400" className="in-map">
      <path className="land" d="M200 30 L280 20 L360 30 L430 55 L470 110 L490 170 L510 230 L470 290 L430 340 L360 370 L300 380 L250 360 L200 320 L170 260 L160 200 L170 130 L180 70 Z"/>
      {lanes.map(l=>{const a=byId[l.from],b=byId[l.to];if(!a||!b)return null;const p1=proj(a.lat,a.lon),p2=proj(b.lat,b.lon);return <line key={l.id} className="lane" x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y}/>;})}
      {all.map(n=>{const p=proj(n.lat,n.lon);const cls=n.role==='plant'?'plant':n.role==='dc'?'dc':n.role==='customer'?'cust':'';const r=n.role==='plant'?6:n.role==='dc'?5:4;return <g key={n.id}>
        <circle className={`node ${cls}`} cx={p.x} cy={p.y} r={r}/>
        <text className="lbl" x={p.x} y={p.y-r-3}>{n.name||n.location}</text>
      </g>;})}
    </svg>

      <span>▊ <span style={{color:'var(--a2)'}}>Plants</span></span>
      <span>▊ <span style={{color:'var(--a4)'}}>DCs</span></span>
      <span>▊ <span style={{color:'var(--a3)'}}>Customers</span></span>
      <span>▊ <span style={{color:'var(--ac)'}}>Suppliers</span></span>
    </div>
  </Panel>;
}

      <span>Solver <b>CBC·PuLP</b></span><span className="sep"></span>
      <span>Grain <b>{grain}</b></span><span className="sep"></span>
      <span>Horizon <b>{hz}{hzUnit}</b></span><span className="sep"></span>
      <span>SKUs <b>{skuCount}</b></span><span className="sep"></span>
      <span>Status <b>{connected?'ONLINE':'OFFLINE'}</b></span>
      <span style={{marginLeft:'auto',opacity:.7}}>
        <span className="kbd">⌘K</span>search · <span className="kbd">G+S</span>setup · <span className="kbd">?</span>help
      </span>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
