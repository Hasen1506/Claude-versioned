function LearningLab({state}){
  const [open,setOpen]=useState({});
  const toggle=(k)=>setOpen(o=>({...o,[k]:!o[k]}));
  const cur=state.config.currency;
  const prod=state.products[0];
  const bom0=prod?.bom?.[0];
  const annDemand=prod?prod.history.reduce((a,b)=>a+b,0):1800;
  const avgMonthly=Math.round(annDemand/12);
  const matCost=bom0?(bom0.cost*bom0.qtyPer):20;
  const holdRate=bom0?(bom0.holdPct/100):0.24;
  const ordCost=bom0?bom0.orderingCost:75;
  const eoq=Math.round(Math.sqrt(2*annDemand*ordCost/(matCost*holdRate)));
  const z95=1.645;
  const stdDem=prod?Math.round(Math.sqrt(prod.history.reduce((s,v)=>s+Math.pow(v-avgMonthly,2),0)/12)):15;
  const lt=bom0?bom0.leadTime:2;
  const ss=Math.round(z95*stdDem*Math.sqrt(lt));
  const rop=Math.round(avgMonthly/4*lt+ss);

  // Aliases so JSX below reads the same as before
  const S=({id,title,children,color})=><LearnSection id={id} title={title} color={color} openMap={open} onToggle={toggle}>{children}</LearnSection>;
  const F=({f,c})=><LearnFormula f={f} c={c}/>;

  return <div className="animate-in">
    <div style={{marginBottom:12,fontSize:13,color:'var(--tx2)'}}>Interactive reference using <strong style={{color:'var(--ac)'}}>your live data</strong>. Each section computes with your actual product parameters.</div>

    <S id="pipeline" title="🏗️ Your Supply Chain Pipeline" color="var(--ac)">
      <p>Your product <strong>{prod?.name||'—'}</strong> has <strong>{prod?.bom?.length||0}</strong> subparts feeding into {state.planning.periods} weeks of planning. Annual demand: <strong>{annDemand.toLocaleString()}</strong> units ({avgMonthly}/mo). Capacity: {prod?.capacity||0} units/week.</p>
      <p style={{marginTop:6}}>Unit material cost: <F f={`${cur}${matCost.toFixed(2)}`}/> | Selling price: <F f={`${cur}${prod?.sellPrice||0}`}/> | Margin: <F f={`${cur}${((prod?.sellPrice||0)-matCost-(prod?.variableCost||0)).toFixed(2)}`} c="var(--gn)"/> ({(((prod?.sellPrice||0)-matCost-(prod?.variableCost||0))/Math.max(prod?.sellPrice||1,1)*100).toFixed(0)}%)</p>
      <p style={{marginTop:6}}>The planning flow: <strong>Demand Forecast</strong> (17 models compete) → <strong>Consensus</strong> (weighted top-3) → <strong>MPS</strong> (production plan) → <strong>MRP</strong> (BOM explosion) → <strong>Procurement</strong> (MILP optimizes PO timing/qty) → <strong>Transport</strong> (mode selection) → <strong>Goods Receipt</strong> → <strong>Production</strong> → <strong>Delivery</strong></p>
    </S>

    <S id="forecast" title="📊 Forecasting — Why Models Compete" color="var(--a4)">
      <p>No single forecast model works for all demand patterns. That's why we run <strong>17 models simultaneously</strong> and let MAPE (Mean Absolute Percentage Error) pick the winner. The best model gets a MAPE badge; the top 3 form the consensus forecast via inverse-MAPE weighting.</p>
      <p style={{marginTop:6}}><strong>Model families:</strong></p>
      <p>• <strong>Naive methods</strong> (Simple Avg, Naive, Seasonal Naive): baselines — if your fancy model can't beat Naive, it's not adding value</p>
      <p>• <strong>Smoothing</strong> (SES, Adaptive SES, DES/Holt, Brown's): exponentially weight recent data. Alpha (α) controls how much weight goes to newest observation</p>
      <p>• <strong>Seasonal</strong> (HW Additive/Multiplicative, Seasonal LinReg, Auto-SARIMA): capture repeating patterns. Additive when seasonal swing is constant (±50u). Multiplicative when it's proportional (±30%)</p>
      <p>• <strong>Intermittent</strong> (Croston's): for spare parts / low-frequency demand where many periods have zero</p>
      <p style={{marginTop:6}}>Your avg demand is {avgMonthly}/mo with σ={stdDem}. CV = {(stdDem/avgMonthly*100).toFixed(0)}% — {stdDem/avgMonthly<0.5?'fairly stable demand (smoothing models likely win)':'variable demand (seasonal or adaptive models may win)'}.</p>
    </S>

    <S id="safety" title="🛡️ Safety Stock — Your Numbers" color="var(--a2)">
      <p><F f={`SS = Z × σ_d × √LT = ${z95} × ${stdDem} × √${lt} = ${ss} units`}/></p>
      <p style={{marginTop:6}}>Z = {z95} corresponds to {(state.config.serviceLevel*100).toFixed(0)}% service level. This means {(state.config.serviceLevel*100).toFixed(0)}% of demand cycles are met from stock. The remaining {((1-state.config.serviceLevel)*100).toFixed(0)}% may face shortages.</p>
      <p style={{marginTop:6}}>σ_d = {stdDem} is the standard deviation of your monthly demand. Higher variability → more safety stock needed. √LT = √{lt} = {Math.sqrt(lt).toFixed(2)} amplifies uncertainty over the lead time window.</p>
      <p style={{marginTop:6}}><strong>Reorder Point:</strong> <F f={`ROP = (avg_weekly × LT) + SS = (${Math.round(avgMonthly/4)} × ${lt}) + ${ss} = ${rop} units`}/></p>
      <p>When inventory drops to <strong>{rop} units</strong>, place a new order. The order arrives {lt} weeks later. During those {lt} weeks, you'll consume ~{Math.round(avgMonthly/4*lt)} units from safety stock + regular stock.</p>
      <p style={{marginTop:6,color:'var(--a4)'}}><strong>Advanced:</strong> This formula assumes demand variability only. The full formula includes supply variability: SS = Z × √(LT × σ²_d + d² × σ²_LT). If your supplier's lead time varies (CV = {(bom0?.ltCV||0.1)*100}%), safety stock should be higher.</p>
    </S>

    <S id="eoq" title="📦 EOQ — Your Procurement Math" color="var(--a3)">
      <p><F f={`EOQ = √(2DS/H) = √(2 × ${annDemand} × ${cur}${ordCost} / (${cur}${matCost} × ${(holdRate*100).toFixed(0)}%)) = ${eoq} units`}/></p>
      <p style={{marginTop:6}}>D = {annDemand} units/year (annual demand), S = {cur}{ordCost} (ordering cost per PO — admin + transport), H = {cur}{matCost} × {(holdRate*100).toFixed(0)}% = {cur}{(matCost*holdRate).toFixed(2)}/unit/year (holding cost).</p>
      <p style={{marginTop:6}}>Orders/year: {Math.ceil(annDemand/eoq)} | Total ordering cost: {cur}{Math.ceil(annDemand/eoq)*ordCost} | Avg inventory: {Math.round(eoq/2)} | Annual holding: {cur}{Math.round(eoq/2*matCost*holdRate)}</p>
      <p style={{marginTop:6,color:'var(--dg)'}}><strong>Why MILP beats EOQ:</strong> EOQ assumes constant demand, fixed costs, no capacity limits. Reality: demand fluctuates, suppliers have MOQs ({bom0?.moq||20}), warehouse has limits ({bom0?.rmCapacity||2000}), and shelf life ({prod?.shelfLife||52} weeks) forces expiry. MILP handles ALL of these simultaneously — that's why this app uses MILP as the primary solver, not EOQ.</p>
    </S>

    <S id="milp" title="🔬 MILP — What the Solver Actually Does" color="var(--ac)">
      <p>MILP = Mixed-Integer Linear Programming. "Mixed" because some variables are integers (batch yes/no), some are continuous (inventory level). "Linear" because the objective and constraints are all linear equations.</p>
      <p style={{marginTop:8}}><strong>The solver minimizes:</strong></p>
      <p style={{fontFamily:'JetBrains Mono',fontSize:10,padding:8,background:'var(--bg3)',borderRadius:4,marginTop:4}}>
        Total Cost = Σ(setup_cost × y[k,t]) + Σ(hold_cost × inv[k,t]) + Σ(var_cost × prod[k,t]) + Σ(shortage_penalty × short[k,t]) + Σ(material_cost × order[i,t]) + Σ(ordering_cost × order_flag[i,t])
      </p>
      <p style={{marginTop:8}}><strong>Subject to:</strong></p>
      <p>• Inventory balance: inv[t] = inv[t-1] + produced[t] - demand[t] + shortage[t]</p>
      <p>• Capacity: produced[t] ≤ capacity × active[t] (can't exceed line capacity)</p>
      <p>• BOM: raw_material_consumed[t] = produced[t] × qty_per × (1+scrap) / yield</p>
      <p>• RM balance: rm_inv[t] = rm_inv[t-1] + arrived[t] - consumed[t]</p>
      <p>• MOQ: order[t] ≥ MOQ × order_flag[t] (if ordering, order at least MOQ)</p>
      <p>• Lead time: material ordered at t arrives at t + LT</p>
      <p style={{marginTop:6}}>The CBC solver (open-source, by COIN-OR) uses branch-and-bound to explore millions of combinations and find the provably optimal solution. For 26-week problems with 2 SKUs: ~2 seconds. For 52 weeks: ~5-10 seconds.</p>
    </S>

    <S id="mc" title="🎲 Monte Carlo — How 1000 Futures Work" color="var(--dg)">
      <p>Run the entire supply chain simulation 1000 times. Each run randomizes demand (±MAPE%), lead times (±CV%), and material prices (±5%). Each run is one "possible future."</p>
      <p style={{marginTop:6}}>Sort the 1000 cost outcomes. The distribution tells you:</p>
      <p>• <strong>Average</strong> — expected cost (what you'd plan for)</p>
      <p>• <strong>P10/P90</strong> — 80% of outcomes fall between these (your likely range)</p>
      <p>• <strong>VaR₉₅</strong> — 95th percentile. "95% of the time, cost stays below this." This is your budget ceiling</p>
      <p>• <strong>CVaR₉₅</strong> — average of the WORST 5%. "When things go really bad, they cost this much on average." This is your catastrophe estimate</p>
      <p>• <strong>Fragility ratio</strong> = VaR₉₅ / Average. Measures how much worse worst-case is vs expected. Below 1.3× = robust. Above 1.8× = fragile (your supply chain is brittle)</p>
      <p style={{marginTop:6,color:'var(--a4)'}}>1000 runs is the minimum for stable VaR estimates. 500 gives ~5% variance in VaR. 1000 gives ~3%. 5000 gives ~1.5%. Diminishing returns after 2000 for most supply chains.</p>
    </S>

    <S id="var" title="⚠️ VaR & CVaR — Reading Risk Numbers" color="var(--dg)">
      <p>VaR₉₅ answers: "What's the worst cost I'll face 95% of the time?" It's the threshold. CVaR₉₅ answers: "Given that I'm in the worst 5%, how bad is it on average?" It's the severity.</p>
      <p style={{marginTop:6}}>Example: If VaR₉₅ = {cur}25,000 and CVaR₉₅ = {cur}28,000: your budget should be at least {cur}25,000 (covers 95% of scenarios). If you want to survive even the worst cases, budget {cur}28,000.</p>
      <p style={{marginTop:6}}>Banks use VaR for capital requirements. Supply chains use it for buffer stock/budget planning. CVaR is preferred by risk managers because it captures tail severity — VaR only tells you the threshold, not what happens beyond it.</p>
    </S>

    <S id="npv" title="💎 NPV / IRR — Investment Decisions" color="var(--gn)">
      <p><F f="NPV = Σ CF_t / (1 + WACC)^t"/></p>
      <p style={{marginTop:6}}>NPV {'>'} 0 means the investment creates value — the discounted future cash flows exceed the initial cost. IRR is the discount rate that makes NPV = 0. If IRR {'>'} WACC, the project returns more than its cost of capital.</p>
      <p style={{marginTop:6}}><strong>Decision rule:</strong> NPV {'>'} 0 AND IRR {'>'} WACC → INVEST. If multiple projects compete for limited budget, use the Capital Budget Optimizer (Tab 5) — it selects the combination that maximizes total portfolio NPV.</p>
      <p style={{marginTop:6}}><strong>WACC</strong> = E/V × Re + D/V × Rd × (1-T). Your WACC of {state.config.wacc}% means every project must return at least {state.config.wacc}% to justify the capital employed.</p>
    </S>

    <S id="depreciation" title="📉 Depreciation — 3 Methods Compared" color="var(--a2)">
      <p><strong>Straight-Line (SLM):</strong> (Cost - Residual) / Life. Same charge every year. Best for: civil infrastructure, quay walls — value declines evenly.</p>
      <p><strong>Written Down Value (WDV):</strong> Book Value × Rate%. High early charges, declining later. Best for: tech assets, DP systems — value drops fast initially. Front-loads tax shield.</p>
      <p><strong>Units of Production (UoP):</strong> (Cost - Residual) / Total Units × Annual Units. Matches cost to actual usage. Best for: cranes, engines, dredgers — depreciation tracks revenue generation.</p>
      <p style={{marginTop:6}}>Under IAS 16, major components with different useful lives must be depreciated separately (component accounting). A crane: structure (40yr SLM), hoisting mechanism (15yr SLM), electrical/controls (10yr SLM), crane trolley (20yr UoP).</p>
    </S>

    <S id="landed" title="🛃 Import Landed Cost — India Customs Math" color="var(--a4)">
      <p>For any imported material, the TOTAL cost is NOT just the purchase price:</p>
      <p style={{fontFamily:'JetBrains Mono',fontSize:10,padding:8,background:'var(--bg3)',borderRadius:4,marginTop:6}}>
        Landed = CIF + BCD (7.5-10%) + SWS (10% of BCD) + IGST (18%) + CHA (₹5K) + Port (₹8K) + Local Transport
      </p>
      <p style={{marginTop:6}}><strong>Key insight:</strong> IGST is recoverable as Input Tax Credit for GST-registered businesses. So effective duty ≈ BCD + SWS ≈ 8-11% of CIF value. The 18% IGST looks scary but nets to zero.</p>
      <p style={{marginTop:6}}>Customs ALWAYS calculates duty on CIF value regardless of Incoterm. If you bought FOB, customs adds notional freight + insurance to reach CIF. Use the Landed Cost Calculator in Tab 3 to compute exact numbers.</p>
    </S>

    <S id="incoterms" title="📖 Incoterms — Who Pays What" color="var(--a3)">
      <p><strong>EXW</strong> — You pay everything from seller's factory door. Maximum buyer responsibility. Use when you have a global freight forwarder.</p>
      <p><strong>FOB</strong> — Seller delivers to origin port, on board vessel. You pay freight + insurance + duties. Most common for Indian sea imports.</p>
      <p><strong>CIF</strong> — Seller pays cost + insurance + freight to destination port. You only pay duties + local transport. Simplest for first-time importers.</p>
      <p><strong>DDP</strong> — Seller handles everything including Indian import clearance. Rare unless seller has an Indian entity.</p>
      <p style={{marginTop:6,color:'var(--a4)'}}>Pro tip: FOB gives you control over freight costs (you can negotiate better rates with your own forwarder). CIF is simpler but the seller bakes their freight margin into the price. For high-volume imports, FOB saves 5-15% on logistics.</p>
    </S>

    <S id="sensing" title="📡 Demand Sensing — What's Wired, What's Not" color="var(--ac)">
      <p><strong>What IS implemented (v3.1):</strong> Classical exponential smoothing on the MPS — sensed_next = α × last_actual + (1 − α) × prior_forecast, with α tunable in Tab 2C (default 0.3). When the sensed forecast drifts from consensus by more than the sensing threshold, the MPS re-plans. The transport optimizer also consults the sensed forecast to decide air vs sea overrides.</p>
      <p style={{marginTop:6}}><strong>SPC tripwire (rule of thumb):</strong> When |actual − forecast| exceeds 2σ for 2+ consecutive periods, it's a genuine regime change (not noise) — trigger replan. This is a Shewhart/Western-Electric rule; false-alarm rate is ~0.25% vs 32% at 1σ.</p>
      <p style={{marginTop:6}}>The transport leg specifically: if sensed spike AND stock won't last sea freight arrival, compute:</p>
      <p style={{fontFamily:'JetBrains Mono',fontSize:10,padding:8,background:'var(--bg3)',borderRadius:4,marginTop:6}}>
        Stockout cost = gap_days × daily_consumption × unit_value × <em>stockoutRevenuePct</em> (default 0.3)<br/>
        Air premium = air_cost − sea_cost<br/>
        Decision: USE AIR if premium {'<'} stockout_cost, else ACCEPT RISK
      </p>
      <p style={{marginTop:6}}>Transit DB: Shanghai→Chennai 18d sea / 4d air, Hamburg→JNPT 26d sea / 5d air; customs green 2d, normal 4d, red 7d.</p>
      <div style={{marginTop:10,padding:8,background:'rgba(0,212,170,.08)',border:'1px solid var(--ac)',borderRadius:4}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--ac)',marginBottom:4}}>🗺️ SAP IBP-Style Pattern Sensing — v3.2 <span style={{background:'var(--ac)',color:'var(--bg)',padding:'1px 5px',borderRadius:3,fontSize:8,marginLeft:4}}>LIVE</span></div>
        <div style={{fontSize:10,color:'var(--tx)',lineHeight:1.5}}>
          All five SAP IBP Demand Sensing layers are now wired via <code>/api/demand/sense</code>:<br/>
          <strong>1. Multi-signal intake</strong> — actuals + promo_weeks + holiday_weeks external signals (POS/weather coming in v3.3).<br/>
          <strong>2. Pattern library</strong> — 7 parametric templates: promo_lift, holiday_ramp, weekend_dip, post_outage_bounce, trend_break_up/down, cannibalization.<br/>
          <strong>3. Cosine-similarity matching</strong> — residual shape vs each template; pattern with highest similarity drives the lift correction (confidence gate at 0.15).<br/>
          <strong>4. Horizon handoff</strong> — sensed owns weeks 0–6 (configurable), linear blend over 3 weeks, statistical owns 7+.<br/>
          <strong>5. Posterior uncertainty</strong> — σ from residual std; CV-scaled safety-stock multiplier z·(1+CV).<br/>
          <span style={{color:'var(--ac)',fontWeight:600}}>Use the "Run Pattern Sense" button below</span> with your actuals + baseline forecast to see matched patterns, blended curve, and propagated σ.
        </div>
      </div>
      <IbpSenseDemo cur={cur}/>
    </S>

    <S id="profitmix" title="💰 Profit Maximization — Shadow Prices" color="var(--gn)">
      <p>When capacity is limited and products have different margins, the LP determines the optimal mix. But the most valuable output isn't the quantities — it's the <strong>shadow prices</strong>.</p>
      <p style={{marginTop:6}}>A shadow price tells you: "If I relax this constraint by 1 unit, profit increases by $X." If Budget shadow = $3, every extra $1 of budget generates $3 of profit. If Warehouse shadow = $0, your warehouse isn't the bottleneck — adding space adds nothing.</p>
      <p style={{marginTop:6}}>Use shadow prices to prioritize investments: invest where the shadow price is highest. A shadow price of $0 means the constraint has slack (unused capacity). A high shadow price means that resource is the binding bottleneck limiting your profit.</p>
    </S>

    <S id="pipeline_learn" title="🔗 Solver Pipeline — Why Chaining Matters" color="var(--a3)">
      <p>Real enterprises don't solve procurement in isolation. The flow is:</p>
      <p style={{marginTop:6}}>1. <strong>Profit Mix</strong> → determines WHAT to produce and HOW MUCH (optimal quantities per product given capacity + demand ceiling)</p>
      <p>2. <strong>Procurement</strong> → takes those quantities as demand input → determines WHEN to order raw materials and HOW MUCH per PO</p>
      <p>3. <strong>Production</strong> → takes production requirements → determines the SEQUENCE on each line, minimizing setup + overtime</p>
      <p style={{marginTop:6}}>Each solver's output feeds the next solver's input. The Pipeline mode (Tab 5) chains all three automatically and shows the end-to-end result: Revenue - Procurement Cost - Production Cost = Net Profit.</p>
    </S>

    <S id="capital" title="🏗️ Capital Budgeting — Portfolio Selection" color="var(--a4)">
      <p>When you have multiple investment options but limited budget, the Capital Budget Optimizer selects the combination that maximizes total NPV. It handles:</p>
      <p>• <strong>Mutual exclusivity:</strong> Buy Machine A OR Lease Machine A (not both)</p>
      <p>• <strong>Dependencies:</strong> Investment B requires Investment A first</p>
      <p>• <strong>Profitability Index:</strong> PI = NPV/CAPEX + 1. Higher PI = more NPV per dollar invested. A $500K investment with NPV=$250K has PI=1.5 (50% return on capital)</p>
      <p style={{marginTop:6}}>The Budget shadow price tells you: if you could borrow $1 more for CAPEX, how much NPV would you gain? If shadow = 0.4, each extra $1 of budget creates $0.40 of value. If shadow = 0, you have budget slack — no need for more capital.</p>
    </S>

    <S id="newsvendor" title="📰 Newsvendor Problem" color="var(--a2)">
      <p>Classic: how many newspapers to stock when demand is uncertain? Order too many → waste (overage cost). Order too few → lost sales (underage cost).</p>
      <p><F f="Q* = F⁻¹(Cu / (Cu + Co))"/> where Cu = underage cost (selling price - cost), Co = overage cost (cost - salvage).</p>
      <p style={{marginTop:6}}>For your product: Cu = {cur}{(prod?.sellPrice||100) - matCost} (lost margin), Co = {cur}{(matCost * (1 - (prod?.yieldPct||0.8))).toFixed(1)} (waste after salvage). Critical ratio = {((prod?.sellPrice||100 - matCost) / ((prod?.sellPrice||100 - matCost) + matCost * 0.2)).toFixed(3)}</p>
    </S>

    <S id="clt" title="📐 Central Limit Theorem" color="var(--a3)">
      <p>The CLT says: regardless of the underlying distribution of individual demand days, the AVERAGE demand over N days approaches a normal distribution as N grows. This is why safety stock formulas use the normal distribution — even if daily demand isn't normal, weekly/monthly demand approximately is.</p>
      <p style={{marginTop:6}}>Practical implication: with lead time of {lt} weeks covering ~{lt*6} working days, the lead-time demand distribution is approximately Normal(μ={Math.round(avgMonthly/4*lt)}, σ={Math.round(stdDem/Math.sqrt(12)*Math.sqrt(lt*6))}). This is why the Z-score approach for safety stock works.</p>
    </S>

    <S id="markov" title="🔗 Markov Chains in Supply Chain" color="var(--ac)">
      <p>A Markov chain models transitions between states where the next state depends ONLY on the current state (not history). Applications:</p>
      <p>• <strong>Supplier reliability:</strong> States = {'{On-Time, Late, Failed}'}. Transition matrix captures probability of switching between states. Steady-state gives long-run OTD %.</p>
      <p>• <strong>Demand states:</strong> States = {'{Low, Normal, High}'}. If demand is High this month, what's the probability of High next month? Drives safety stock decisions.</p>
      <p>• <strong>Machine states:</strong> States = {'{Running, Degraded, Down}'}. Predicts maintenance schedules and capacity availability.</p>
    </S>

    <S id="hedge" title="🛡️ Currency Hedging Basics" color="var(--a4)">
      <p>If you import materials priced in USD/EUR/CNY, your costs fluctuate with exchange rates. A 5% INR depreciation against USD means your material costs jump 5% — wiping out procurement savings.</p>
      <p style={{marginTop:6}}><strong>Forward contract:</strong> Lock in today's exchange rate for a future date. Costs ~0.5-2% premium. Eliminates uncertainty. Use for 50-80% of known exposure; keep 20-50% unhedged to benefit from favorable movements.</p>
      <p style={{marginTop:6}}><strong>Natural hedge:</strong> Match currency of revenues and costs. If you export to USD markets AND import USD materials, the exposure cancels. No hedging cost.</p>
      <p style={{marginTop:6}}>Rule of thumb: hedge if currency exposure {'>'} 5% of COGS and you can't pass through cost increases to customers within 30 days.</p>
    </S>

    <S id="enterprise" title="🏢 Enterprise Comparison — This App vs SAP/Oracle" color="var(--ac)">
      <p><strong>What this app does that SAP IBP / Oracle ASCP don't:</strong></p>
      <p>• 17-model forecast competition with auto-selection (they offer 3-5 models)</p>
      <p>• Monte Carlo simulation with VaR/CVaR (they don't — they use deterministic planning)</p>
      <p>• Shadow prices on constraints (they compute but rarely surface to users)</p>
      <p>• Demand sensing → transport mode override (they separate demand sensing from transport)</p>
      <p>• Solver pipeline chaining (they do this but it requires complex configuration)</p>
      <p style={{marginTop:6}}><strong>What they do that this app doesn't (yet):</strong></p>
      <p>• Multi-echelon inventory optimization (warehouse → DC → retail)</p>
      <p>• ML-based demand sensing (gradient boosted trees on POS data)</p>
      <p>• Multi-plant coordination (this app handles one plant)</p>
      <p>• ERP integration (SAP MM/PP/WM, Oracle Procurement Cloud)</p>
      <p>• 10,000+ SKU scale (this app targets 1-50 SKUs)</p>
      <p style={{marginTop:6}}>Same underlying math (LP/MILP, safety stock, MRP explosion). Different deployment scale and integration depth.</p>
    </S>

    {/* Probability Lab */}
    <S id="prob_lab" title="🎲 Probability Lab — Interactive Distributions" color="var(--a2)">
      {(()=>{
        const mu=avgMonthly,sig=stdDem;
        const cv=mu>0?(sig/mu*100):0;
        const highCV=cv>25;
        const zVals=[{z:1.036,sl:85},{z:1.282,sl:90},{z:1.645,sl:95},{z:2.326,sl:99}];
        // Clip left tail to 0 — demand can't be negative
        const xMin=Math.max(0,mu-3.5*sig);
        const points=[];for(let x=xMin;x<=mu+3.5*sig;x+=sig/10){
          const pdf=1/(sig*Math.sqrt(2*Math.PI))*Math.exp(-0.5*Math.pow((x-mu)/sig,2));
          points.push({x:Math.round(x),y:+(pdf*1000).toFixed(2)});
        }
        return <div>
          <p>Your demand: μ = {mu} units/month, σ = {sig} (CV = {cv.toFixed(1)}%). The normal distribution N({mu}, {sig}²) describes the probability of different demand levels.</p>
          {highCV&&<div style={{padding:6,background:'rgba(248,81,73,.08)',border:'1px solid var(--dg)',borderRadius:4,fontSize:10,color:'var(--dg)',marginTop:4}}>
            ⚠ <strong>High variability (CV &gt; 25%):</strong> Normal approximation is weak — it assigns non-trivial probability to negative demand (impossible). X-axis is clipped to 0; for safety-stock accuracy consider <strong>lognormal</strong> or <strong>gamma</strong> distributions instead of normal.
          </div>}
          <div style={{height:160,marginTop:8}}>
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={points.filter((_,i)=>i%3===0)} margin={{top:5,right:5,left:0,bottom:5}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#21262d"/>
                <XAxis dataKey="x" tick={{fill:'#8b949e',fontSize:8}} stroke="#21262d"/>
                <YAxis tick={{fill:'#8b949e',fontSize:8}} stroke="#21262d" hide/>
                <Tooltip contentStyle={{background:'#1c2333',border:'1px solid #30363d',borderRadius:4,fontSize:10}}/>
                <Bar dataKey="y" fill="#38bdf8" opacity={0.6} name="PDF × 1000"/>
              </BarChart>
            </ResponsiveContainer>
          </div>
          <div style={{marginTop:8}}>
            <p><strong>Z-score table (your data):</strong></p>
            <table className="data-table" style={{marginTop:4}}>
              <thead><tr><th>Service Level</th><th>Z</th><th>Safety Stock</th><th>Reorder Point</th><th>Meaning</th></tr></thead>
              <tbody>{zVals.map(({z,sl})=>{
                const ss2=Math.round(z*sig*Math.sqrt(lt));
                const rop2=Math.round(mu/4*lt+ss2);
                return <tr key={sl} style={{fontWeight:sl===Math.round(state.config.serviceLevel*100)?700:400,color:sl===Math.round(state.config.serviceLevel*100)?'var(--ac)':'var(--tx)'}}>
                  <td>{sl}%{sl===Math.round(state.config.serviceLevel*100)?' ← your target':''}</td>
                  <td className="num">{z}</td>
                  <td className="num">{ss2} units</td>
                  <td className="num">{rop2} units</td>
                  <td style={{fontSize:10,color:'var(--tx2)'}}>{sl}% of demand cycles met from stock. {100-sl}% risk of stockout per cycle.</td>
                </tr>
              })}</tbody>
            </table>
          </div>
          <p style={{marginTop:8}}><strong>Confidence intervals:</strong></p>
          <p>68% of demand falls in [{mu-sig}, {mu+sig}] (μ ± 1σ)</p>
          <p>95% of demand falls in [{mu-2*sig}, {mu+2*sig}] (μ ± 2σ)</p>
          <p>99.7% of demand falls in [{mu-3*sig}, {mu+3*sig}] (μ ± 3σ)</p>
          <p style={{marginTop:8,color:'var(--a4)'}}><strong>Practical:</strong> If demand follows N({mu}, {sig}²) and your safety stock covers {(state.config.serviceLevel*100).toFixed(0)}% (z={z95}), you expect stockout in {Math.round((1-state.config.serviceLevel)*52)} out of 52 weeks per year.</p>
        </div>
      })()}
    </S>
  </div>
}

function IbpSenseDemo({cur}){

          <div style={{fontSize:8,color:'var(--tx3)'}}>POSTERIOR σ</div>

function MPSVizCard({state}){
  const [mpsGran,setMpsGran]=useState('weekly'); // monthly | weekly | daily
  const [dailyWeeks,setDailyWeeks]=useState(4); // how many weeks of daily granularity to show
  const [selSKU,setSelSKU]=useState(0);
  const [prodOverrides,setProdOverrides]=useState({}); // week/day index → user qty
  const products=state.products;
  const prod=products[selSKU]||products[0];
  if(!prod)return null;
  const cur=state.config.currency;
  const workDays=state.planning.workDays||6;
  const frozenWk=state.planning.frozenWeeks||4;
  const slushyWk=state.planning.slushyWeeks||12;
  const sensingAlpha=state.planning.sensingAlpha||0.3;
  const sensingMin=state.planning.sensingMinWeeks||2;

  // Build monthly base plan
  let inv=prod.initInventory||0;
  const mMPS=MONTHS.map((m,i)=>{
    const dem=(prod.history||[])[i]||0;
    const cap4=(prod.capacity||50)*4;
    const produce=Math.min(Math.max(dem-inv,0),cap4);
    const endInv=Math.max(0,inv+produce-dem);
    const short=Math.max(0,dem-produce-Math.max(0,inv));
    inv=endInv;
    return{month:m,demand:dem,production:produce,inventory:endInv,shortfall:short,batches:Math.ceil(produce/Math.max(prod.capacity||50,1))};
  });

  // Disaggregate to weeks — SAME weights as solver (0.27/0.27/0.23/remainder) to stay in sync
  const wMPS=mMPS.flatMap((mo,mi)=>Array.from({length:4},(_,wi)=>{
    const wIdx=mi*4+wi;
    // Match solver weeklyDemand: w1=27%, w2=27%, w3=23%, w4=remainder
    const baseWDem=wi===3
      ? mo.demand - Math.round(mo.demand*0.27)*2 - Math.round(mo.demand*0.23)
      : Math.round(mo.demand*(wi===2?0.23:0.27));
    const baseWProd=wi===3
      ? mo.production - Math.round(mo.production*0.27)*2 - Math.round(mo.production*0.23)
      : Math.round(mo.production*(wi===2?0.23:0.27));
    const key=`w${wIdx}`;
    const overrideStr=prodOverrides[key]; // kept as raw string so user can type freely
    const overrideProd=overrideStr!==undefined&&overrideStr!==''?+overrideStr:undefined;
    return{week:`W${wIdx+1}`,month:mo.month.slice(0,3),wIdx,isFirst:wi===0,
      demand:baseWDem,
      production:overrideProd!==undefined?overrideProd:baseWProd,
      productionInput:overrideStr!==undefined?overrideStr:String(baseWProd), // raw string for input
      baseProd:baseWProd,
      isOverridden:overrideProd!==undefined,
      isFrozen:wIdx<frozenWk,isSlushy:wIdx>=frozenWk&&wIdx<slushyWk};
  }));

  // Demand sensing summary for MPS card
  const filledActuals=(prod.actuals||[]).map((a,i)=>({a,i})).filter(x=>x.a!==null&&x.a!==undefined);
  const sensingActive=filledActuals.length>=sensingMin;
  const consensus=prod.overrides?.map((ov,i)=>ov!==null&&ov!==undefined?ov:(prod.history[i]||0))||prod.history||[];
  let sensingNote=null;
  if(sensingActive){
    const bias=filledActuals.reduce((s,{a,i})=>s+(a-(consensus[i]||0)),0)/filledActuals.length;
    const lastIdx=filledActuals[filledActuals.length-1].i;
    const lastActual=filledActuals[filledActuals.length-1].a;
    const nextFcst=consensus[Math.min(lastIdx+1,11)]||0;
    const sensedNext=Math.round(sensingAlpha*lastActual+(1-sensingAlpha)*nextFcst);
    sensingNote={bias:bias.toFixed(1),sensedNext,nextFcst,correction:sensedNext-nextFcst,lastIdx};
  }

  // Daily breakdown across first N weeks — respects workDays/week

function InventoryProjectionCard({state}){
  const products=state.products;
  const cur=state.config.currency;
  const z={0.85:1.036,0.90:1.282,0.95:1.645,0.99:2.326}[state.config.serviceLevel]||1.645;
  // Per-product safety stock + projection that builds up to SS
  const skuSS=products.map(p=>{
    const h=p.history||[];
    const mu=h.reduce((a,b)=>a+b,0)/Math.max(h.length,1);
    const sigma=Math.sqrt(h.reduce((s,v)=>s+Math.pow(v-mu,2),0)/Math.max(h.length,1));
    const maxLTwk=Math.max(...(p.bom||[{leadTime:1}]).map(b=>+(b.leadTime)||1));
    return Math.max(Math.round(z*sigma*Math.sqrt(maxLTwk/4.33)),1); // monthly SS units
  });
  const projs=products.map((p,pi)=>{
    let inv=p.initInventory||0;
    const mc=(p.bom||[]).reduce((s,b)=>s+b.cost*b.qtyPer,0);
    const cr=(p.carryRate||24)/100/12;
    const ss=skuSS[pi];
    return MONTHS.map((m,i)=>{
      const dem=(p.history||[])[i]||0;
      // Produce to cover demand + any SS deficit (bounded by monthly capacity)
      const ssDeficit=Math.max(0,ss-inv);
      const produce=Math.min(Math.max(dem+ssDeficit,0),(p.capacity||50)*4);
      inv=Math.max(0,inv+produce-dem);
      const holdCost=Math.round(inv*mc*cr);
      return{name:m,[`${p.name}_inv`]:Math.round(inv),[`${p.name}_hold`]:holdCost,[`${p.name}_ss`]:ss,[`${p.name}_produce`]:produce};
    });
  });
  const chartData=MONTHS.map((m,i)=>{
    const row={name:m};
    products.forEach((p,pi)=>Object.assign(row,projs[pi][i]));
    return row;
  });
  const cols=['#00d4aa','#38bdf8','#a78bfa','#f0b429'];
  const maxInv=Math.max(...chartData.flatMap(row=>products.map(p=>row[`${p.name}_inv`]||0)),10);
  return <div className="card">
    <div className="card-title">📈 Inventory Projection — 12-Month
      <span className="badge" style={{background:'rgba(56,189,248,.1)',color:'var(--a2)',marginLeft:6}}>Holding cost tracked</span>
      <span className="badge" style={{background:'rgba(0,212,170,.1)',color:'var(--ac)',marginLeft:4}}>SS-aware production</span>
    </div>
    <div style={{fontSize:9,color:'var(--tx3)',marginBottom:4}}>
      Production targets safety stock (dashed line). Inv builds up when below SS, holds at SS when demand is steady. SS = z×σ×√LT per SKU.
    </div>
    <div style={{height:200}}>
      <ResponsiveContainer width="100%" height="100%">
        <ComposedChart data={chartData} margin={{top:5,right:10,left:0,bottom:5}}>
          <CartesianGrid strokeDasharray="3 3" stroke="#21262d"/>
          <XAxis dataKey="name" tick={{fill:'#8b949e',fontSize:9}} stroke="#21262d"/>
          <YAxis tick={{fill:'#8b949e',fontSize:9}} stroke="#21262d" domain={[0,Math.ceil(maxInv*1.15)]}/>
          <Tooltip contentStyle={{background:'#1c2333',border:'1px solid #30363d',borderRadius:4,fontSize:10}}
            formatter={(val,name)=>[val.toLocaleString()+'u',name]}/>
          <Legend wrapperStyle={{fontSize:9,color:'#8b949e'}}/>
          {products.map((p,i)=><React.Fragment key={p.id}>
            <Line type="monotone" dataKey={`${p.name}_inv`} stroke={cols[i%4]} strokeWidth={2} dot={{r:2}} name={`${p.name} Inventory`}/>
            <Line type="monotone" dataKey={`${p.name}_ss`} stroke={cols[i%4]} strokeWidth={1} strokeDasharray="5 3" dot={false} name={`${p.name} SS (${skuSS[i]}u)`} opacity={0.5}/>
          </React.Fragment>)}
        </ComposedChart>
      </ResponsiveContainer>
    </div>
    <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:4,marginBottom:6}}>
      {products.map((p,i)=><div key={p.id} style={{fontSize:9,padding:'2px 8px',borderRadius:3,background:'var(--bg3)',border:`1px solid ${cols[i%4]}`,color:cols[i%4]}}>
        {p.name} SS={skuSS[i]}u &nbsp;|&nbsp; z={z.toFixed(3)} &nbsp;|&nbsp; SL={Math.round(state.config.serviceLevel*100)}%
      </div>)}
    </div>
    <div style={{overflowX:'auto',marginTop:2}}>
      <table className="data-table" style={{fontSize:9}}>
        <thead><tr><th>Month</th>{products.map(p=><React.Fragment key={p.id}><th style={{color:'var(--ac)'}}>{p.name} Produce</th><th style={{color:'var(--a2)'}}>Inventory</th><th style={{color:'var(--tx3)'}}>vs SS</th><th style={{color:'var(--a4)'}}>Hold Cost</th></React.Fragment>)}</tr></thead>
        <tbody>{chartData.map((row,i)=><tr key={i}>
          <td style={{fontWeight:600}}>{row.name}</td>
          {products.map((p,pi)=>{
            const inv=row[`${p.name}_inv`]||0;
            const ss=skuSS[pi];
            const delta=inv-ss;
            return <React.Fragment key={p.id}>
              <td className="num" style={{color:'var(--ac)'}}>{(row[`${p.name}_produce`]||0).toLocaleString()}</td>
              <td className="num" style={{color:inv<ss?'var(--dg)':inv<ss*1.5?'var(--a4)':'var(--tx)',fontWeight:inv<ss?700:400}}>{inv.toLocaleString()}</td>
              <td className="num" style={{color:delta>=0?'var(--gn)':'var(--dg)',fontSize:8}}>{delta>=0?'+':''}{delta}</td>
              <td className="num" style={{color:'var(--a4)'}}>{cur}{(row[`${p.name}_hold`]||0).toLocaleString()}</td>
            </React.Fragment>
          })}
        </tr>)}</tbody>
      </table>
    </div>
    <div style={{fontSize:9,color:'var(--tx3)',marginTop:4}}>
      SS formula: z(SL) × σ(demand) × √(LT_weeks/4.33) | Cap: monthly = weekly_capacity × 4 | Hold = inv × material_cost × carry_rate/12
    </div>
  </div>;
}

function MILPFormCard({state}){
  const [open,setOpen]=useState(false);
  const [activeForm,setActiveForm]=useState('procurement');
  const cur=state.config.currency;
  const nP=state.products.length;
  const T=state.planning.periods;
  const nI=state.products.reduce((s,p)=>s+p.bom.length,0);
  const SL=(state.config.serviceLevel*100).toFixed(0);
  const WACC=state.config.wacc;

  const FORMS={
    procurement:{label:'② Procurement',color:'var(--ac)',content:()=><div style={{fontFamily:'JetBrains Mono',fontSize:10,lineHeight:2}}>
      <div style={{color:'var(--a4)',fontWeight:700}}>SETS:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>k ∈ K = {'{'+state.products.map(p=>p.name).join(', ')+'}'} &nbsp;|&nbsp; t ∈ T = 1..{T} wks &nbsp;|&nbsp; i ∈ I = {nI} RM parts</div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>DECISION VARIABLES:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>
        y[k,t] ∈ {'{ 0,1 }'} — setup binary (produce k in period t?)<br/>
        x[k,t] ≥ 0 — FG production qty of SKU k in period t<br/>
        I[k,t] ≥ 0 — FG ending inventory of k at end of t<br/>
        s[k,t] ≥ 0 — shortage / backorder of k in t<br/>
        q[i,t] ≥ 0 — purchase order qty for RM i in period t<br/>
        z[i,t] ∈ {'{ 0,1 }'} — PO binary (place order for i in t?)<br/>
        R[i,t] ≥ 0 — RM ending inventory of i at end of t
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>OBJECTIVE — MINIMIZE:</div>
      <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:4,color:'var(--ac)'}}>
        Z = Σ_k Σ_t [ setup_cost[k]·y[k,t] + h_fg[k]·I[k,t] + var_cost[k]·x[k,t] + penalty[k]·s[k,t] ]<br/>
          + Σ_i Σ_t [ mat_cost[i]·q[i,t] + ord_cost[i]·z[i,t] + trans_cost[i,mode]·q[i,t] + h_rm[i]·R[i,t] ]
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>CONSTRAINTS:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>
        FG balance:&nbsp;&nbsp;&nbsp; I[k,t] = I[k,t-1] + x[k,t] − d[k,t] + s[k,t] &nbsp;&nbsp;∀ k,t<br/>
        Setup link:&nbsp;&nbsp;&nbsp; x[k,t] ≤ cap[k]·y[k,t] &nbsp;&nbsp;cap=[{state.products.map(p=>`${p.name}:${(p.capacity||50)*4}`).join(', ')}] u/mo<br/>
        Shared line:&nbsp; Σ_k (x[k,t]·cycle[k]/60) ≤ avail_hrs[t] &nbsp;&nbsp;∀ t<br/>
        BOM explode: consumed[i,t] = Σ_k x[k,t]·bom[i,k]·(1+scrap[i]) / yield[i] &nbsp;&nbsp;∀ i,t<br/>
        RM balance:&nbsp;&nbsp; R[i,t] = R[i,t-1] + q[i,t−LT[i]] − consumed[i,t] &nbsp;&nbsp;∀ i,t<br/>
        MOQ bound:&nbsp;&nbsp;&nbsp; MOQ[i]·z[i,t] ≤ q[i,t] ≤ MaxOrd[i]·z[i,t] &nbsp;&nbsp;∀ i,t<br/>

        Budget:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Σ_i Σ_t mat_cost[i]·q[i,t] ≤ Budget (if active)<br/>
        WH capacity: Σ_k I[k,t] ≤ WH_max &nbsp;&nbsp;∀ t<br/>
        Non-neg:&nbsp;&nbsp;&nbsp;&nbsp; x,I,s,q,R ≥ 0 &nbsp;;&nbsp; y,z ∈ {'{ 0,1 }'}
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>PARAMETERS FROM YOUR DATA:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)',fontSize:9}}>
        {state.products.map(p=>{const mc=p.bom.reduce((s,b)=>s+b.cost*b.qtyPer,0);const hfg=(mc*(p.carryRate||24)/100/52);return `${p.name}: cap=${p.capacity}u/wk, setup=${cur}${p.setupCost}, h_fg=${cur}${hfg.toFixed(4)}/u/wk, yield=${Math.round((p.yieldPct||0.95)*100)}%`}).join(' | ')}
      </div>
      <div style={{fontSize:9,color:'var(--tx3)',marginTop:6,padding:'4px 8px',background:'var(--bg3)',borderRadius:4}}>
        Solver: PuLP → CBC (COIN-OR) | ~{nP*T} FG vars + ~{nI*T} RM vars + {nP*T+nI*T} binary vars | {nP} SKUs × {T} periods × {nI} parts
      </div>
    </div>},

    production:{label:'③ Production',color:'var(--a2)',content:()=><div style={{fontFamily:'JetBrains Mono',fontSize:10,lineHeight:2}}>
      <div style={{color:'var(--a4)',fontWeight:700}}>SETS:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>k ∈ K = {'{'+state.products.map(p=>p.name).join(', ')+'}'} &nbsp;|&nbsp; l ∈ L = {'{'+state.production.lines.map(l=>l.name).join(', ')+'}'} &nbsp;|&nbsp; t ∈ T = 1..{T}</div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>DECISION VARIABLES:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>
        x[k,l,t] ≥ 0 — units of product k on line l in period t<br/>
        δ[k,l,t] ∈ {'{ 0,1 }'} — changeover binary (product k starts on line l at t?)<br/>
        OT[l,t] ≥ 0 — overtime hours on line l in period t<br/>
        idle[l,t] ≥ 0 — idle hours on line l in period t
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>OBJECTIVE — MINIMIZE:</div>
      <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:4,color:'var(--ac)'}}>
        Z = Σ_l Σ_t [ Σ_k (changeover_cost·δ[k,l,t]) + OT_rate·OT[l,t] + idle_cost·idle[l,t] ]
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>CONSTRAINTS:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>
        Demand coverage: Σ_l x[k,l,t] ≥ req_qty[k] / T &nbsp;&nbsp;∀ k,t<br/>
        Line capacity:&nbsp; Σ_k (cycle_time[k]·x[k,l,t]) ≤ avail_hrs[l,t] + OT[l,t] &nbsp;&nbsp;∀ l,t<br/>
        Net avail hrs:&nbsp; avail_hrs[l,t] = (hrs/shift·shifts − breaks) · work_days &nbsp;=&nbsp; [{state.production.lines.map(l=>`${l.name}:${(((l.hoursPerShift||8)*l.shiftsPerDay)-(l.breakMins||30)*l.shiftsPerDay/60).toFixed(1)}h/day`).join(', ')}]<br/>
        OT limit:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; OT[l,t] ≤ OT_max[l] (if threshold exceeded)<br/>
        Changeover:&nbsp;&nbsp;&nbsp; changeover time δ[k,l,t]·changeover_mins deducted from avail<br/>
        Yield adj:&nbsp;&nbsp;&nbsp;&nbsp; gross_x[k,l,t] = x[k,l,t] / yield[k] &nbsp;&nbsp;∀ k,l,t<br/>
        Non-neg: x,OT,idle ≥ 0 ; δ ∈ {'{ 0,1 }'}
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>LINE DATA:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)',fontSize:9}}>
        {state.production.lines.map(l=>`${l.name}: ${l.capacity}u/wk, ${l.shiftsPerDay}sh×${l.hoursPerShift||8}h, OT×${l.otMult||1.5}, CO=${l.changeoverMins||30}min`).join(' | ')}
      </div>
    </div>},

    profitmix:{label:'① Profit Max',color:'var(--gn)',content:()=><div style={{fontFamily:'JetBrains Mono',fontSize:10,lineHeight:2}}>
      <div style={{color:'var(--a4)',fontWeight:700}}>SETS:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>k ∈ K = {'{'+state.products.map(p=>p.name).join(', ')+'}'} (single planning horizon)</div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>DECISION VARIABLE:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>qty[k] ≥ 0 — annual units to produce of product k</div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>OBJECTIVE — MAXIMIZE:</div>
      <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:4,color:'var(--ac)'}}>
        Z = Σ_k [ (sell_price[k] − var_cost[k] − mat_cost[k]) · qty[k] ]<br/>
          = Σ_k margin[k] · qty[k]
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>CONSTRAINTS:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>
        Demand ceiling: qty[k] ≤ demand_ceiling[k] = forecast[k]·(1+MAPE[k]%) &nbsp;&nbsp;∀ k<br/>
        Shared capacity: Σ_k (cycle_time[k]/60·qty[k]) ≤ total_line_hours<br/>
        Non-negativity: qty[k] ≥ 0 &nbsp;&nbsp;∀ k
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>MARGIN RANKING (allocates bottleneck hours to highest margin/hr first):</div>
      <div style={{paddingLeft:10,color:'var(--tx2)',fontSize:9}}>
        {state.products.map(p=>{
          const mc=p.bom.reduce((s,b)=>s+b.cost*b.qtyPer,0);
          const mg=p.sellPrice-p.variableCost-mc;
          const ct=(p.cycleTime||19)/60;
          return `${p.name}: margin=${cur}${mg.toFixed(2)}/u, cycle=${p.cycleTime||19}min, margin_hr=${cur}${(mg/ct).toFixed(1)}/hr`
        }).join('\n')}
      </div>
      <div style={{fontSize:9,color:'var(--tx3)',marginTop:6,padding:'4px 8px',background:'var(--bg3)',borderRadius:4}}>
        Note: LP relaxation (qty continuous). Shadow prices show binding constraint value. Crossover analysis shows price at which excluded SKUs enter the mix.
      </div>
    </div>},

    transport:{label:'Transport',color:'var(--a3)',content:()=><div style={{fontFamily:'JetBrains Mono',fontSize:10,lineHeight:2}}>
      <div style={{color:'var(--a4)',fontWeight:700}}>PROBLEM TYPE: Multi-modal mode selection + LP allocation</div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>SETS:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>s ∈ S = shipments (BOM parts flagged import or LT {'>'} 2wk)<br/>m ∈ M = {'{ road, rail, sea, air, multimodal }'} &nbsp;|&nbsp; r ∈ R = 25 Indian route pairs</div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>DECISION VARIABLES:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>
        select[s,m] ∈ {'{ 0,1 }'} — assign shipment s to mode m<br/>
        alloc[w,c] ≥ 0 — units allocated from warehouse w to customer c (transport matrix)
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>MODE SELECTION OBJECTIVE — MINIMIZE (per shipment):</div>
      <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:4,color:'var(--ac)'}}>
        {'cost[s] = min_m { freight_rate[m]·weight[s] + handling[m] + insurance_pct·value[s] }'}<br/>
        subject to: transit_days[m,r] ≤ deadline_days[s]
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>ALLOCATION LP OBJECTIVE — MINIMIZE:</div>
      <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:4,color:'var(--ac)'}}>
        Z = Σ_w Σ_c rate[w,c] · alloc[w,c]
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>ALLOCATION CONSTRAINTS:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>
        Supply:&nbsp; Σ_c alloc[w,c] ≤ supply[w] &nbsp;&nbsp;∀ w (warehouse stock)<br/>
        Demand:&nbsp; Σ_w alloc[w,c] ≥ demand[c] &nbsp;&nbsp;∀ c (customer requirement)<br/>
        Non-neg: alloc[w,c] ≥ 0 &nbsp;&nbsp;∀ w,c
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>DEMAND SENSING OVERRIDE:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>
        If actual[t] {'>'} forecast[t]: spike_flag = True → override to fastest feasible mode (air/express), compute cost premium = cost_new − cost_base
      </div>
    </div>},

    montecarlo:{label:'Monte Carlo',color:'var(--dg)',content:()=><div style={{fontFamily:'JetBrains Mono',fontSize:10,lineHeight:2}}>
      <div style={{color:'var(--a4)',fontWeight:700}}>METHOD: Stochastic simulation (not MILP — parametric sampling)</div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>RANDOM VARIABLE DISTRIBUTIONS:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>
        Demand noise: &nbsp;&nbsp; d̃[k,t] = d[k,t] · (1 + ε_d) &nbsp;&nbsp;&nbsp; ε_d ~ N(0, MAPE[k]/100)<br/>
        Lead time noise: LT̃[i] = LT[i] · (1 + ε_lt) &nbsp;&nbsp; ε_lt ~ N(0, LT_CV[i]/100)<br/>
        Material price: &nbsp; c̃[i] = c[i] · (1 + ε_c) &nbsp;&nbsp;&nbsp;&nbsp; ε_c ~ N(0, cost_CV[i]/100)<br/>
        Yield noise: &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ỹ[k] = yield[k] · (1 + ε_y) &nbsp;ε_y ~ N(0, yield_CV[k]/100)<br/>
        Cap noise: &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; cap̃[k] = cap[k] · (1 + ε_cap) &nbsp;ε_cap ~ N(0, cap_CV[k]/100)
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>SIMULATION LOOP (n=1000 runs):</div>
      <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:4,color:'var(--ac)'}}>
        For run r = 1..n:<br/>
        &nbsp;&nbsp;Sample ε vectors for all k,i,t<br/>
        &nbsp;&nbsp;Run deterministic procurement MILP with noisy inputs<br/>
        &nbsp;&nbsp;Record total_cost[r], fill_rate[r], inv_level[r]
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>OUTPUT STATISTICS:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>
        VaR₉₅ = percentile(costs, 95) &nbsp;&nbsp;— worst cost in 95% of scenarios<br/>
        CVaR₉₅ = E[cost | cost {'>'} VaR₉₅] — avg cost in worst 5%<br/>
        Fragility = CVaR₉₅ / E[cost] &nbsp;&nbsp;&nbsp;— how bad is the tail vs average?<br/>
        Fill rate = E[units_fulfilled / demand] across all runs
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>NOISE PARAMETERS FROM YOUR DATA:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)',fontSize:9}}>
        {state.products.map(p=>`${p.name}: MAPE=${p.mape||15}%, yield_CV=${p.yieldCV||0}%, cap_CV=${p.capCV||5}%`).join(' | ')}<br/>
        Parts: {state.products.flatMap(p=>p.bom.map(b=>`${b.name}: LT_CV=${b.ltCV||10}%, cost_CV=${b.costCV||10}%`)).join(' | ')}
      </div>
    </div>},

    capital:{label:'Capital Budget',color:'var(--a4)',content:()=><div style={{fontFamily:'JetBrains Mono',fontSize:10,lineHeight:2}}>
      <div style={{color:'var(--a4)',fontWeight:700}}>PROBLEM TYPE: Binary (0-1) Knapsack LP</div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>SETS:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>j ∈ J = investment candidates (production line upgrades + asset register)</div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>DECISION VARIABLE:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>select[j] ∈ {'{ 0,1 }'} — include investment j in portfolio?</div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>OBJECTIVE — MAXIMIZE:</div>
      <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:4,color:'var(--ac)'}}>
        Z = Σ_j NPV[j] · select[j]<br/><br/>
        NPV[j] = −CAPEX[j] + Σ_t (CF[j] / (1+WACC)^t) + Residual[j]/(1+WACC)^n
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>CONSTRAINTS:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>
        Budget: &nbsp;&nbsp;Σ_j CAPEX[j]·select[j] ≤ Budget ({cur}{(state.budget.capex||1000000).toLocaleString()})<br/>
        Binary: &nbsp;&nbsp;select[j] ∈ {'{ 0,1 }'} &nbsp;&nbsp;∀ j
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>DERIVED METRICS (post-solve):</div>
      <div style={{paddingLeft:10,color:'var(--tx2)'}}>
        IRR[j] = r such that NPV[j]=0 (bisection search)<br/>
        Payback[j] = min t such that Σ_τ≤t CF[j,τ] ≥ CAPEX[j]<br/>
        PI[j] = (NPV[j]+CAPEX[j]) / CAPEX[j] (profitability index)<br/>
        Shadow price = marginal value of relaxing budget by 1 unit<br/>
        WACC used: {WACC}%
      </div>
    </div>},

    pipeline:{label:'🔗 Pipeline',color:'var(--a3)',content:()=><div style={{fontFamily:'JetBrains Mono',fontSize:10,lineHeight:2}}>
      <div style={{color:'var(--a4)',fontWeight:700}}>ARCHITECTURE: Sequential solver chain (output of each feeds next)</div>
      <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:4,color:'var(--tx)',marginTop:4}}>
        <span style={{color:'var(--gn)',fontWeight:700}}>Step 1 — PROFIT MIX LP</span><br/>
        max Σ_k margin[k]·qty[k] &nbsp;s.t.&nbsp; qty[k]≤demand[k], Σ cycle_time·qty ≤ shared_cap<br/>
        ↓ outputs: optimal_qty[k] for each SKU<br/><br/>
        <span style={{color:'var(--ac)',fontWeight:700}}>Step 2 — PROCUREMENT MILP</span><br/>
        Replaces demand vector with qty[k] from Step 1 (not forecast)<br/>
        min Σ [setup + holding + material + ordering + transport] costs<br/>
        ↓ outputs: PO schedule, RM inventory trajectory, total procurement cost<br/><br/>
        <span style={{color:'var(--a2)',fontWeight:700}}>Step 3 — PRODUCTION MILP</span><br/>
        Schedules qty[k] across lines to minimize makespan + changeovers + OT<br/>
        ↓ outputs: Gantt schedule, line utilization, completion periods<br/><br/>
        <span style={{color:'var(--a3)',fontWeight:700}}>Summary:</span> Net profit = Revenue(Step1) − Procurement(Step2) − Production(Step3)
      </div>
      <div style={{color:'var(--a4)',fontWeight:700,marginTop:4}}>DATA FLOW:</div>
      <div style={{paddingLeft:10,color:'var(--tx2)',fontSize:9}}>
        Pipeline uses annual demand from forecast (last 12 months history) as the ceiling for profit mix.<br/>
        Procurement receives weekly disaggregation of Step-1 quantities (÷52 per week, not forecast).<br/>
        Production receives total annual requirement from Step-1, schedules within {T}-period horizon.
      </div>
    </div>},
  };

  return <div className="card">
    <div onClick={()=>setOpen(o=>!o)} style={{cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div className="card-title" style={{marginBottom:0}}>📐 Complete MILP Formulations <span className="badge" style={{background:'rgba(167,139,250,.1)',color:'var(--a3)'}}>All 7 Solver Models</span></div>
      <span style={{color:'var(--tx3)',fontSize:18,marginLeft:8}}>{open?'▾':'▸'}</span>
    </div>
    {open&&<div style={{marginTop:10}}>
      {/* Mode tabs */}
      <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:10}}>
        {Object.entries(FORMS).map(([id,f])=><button key={id}
          onClick={()=>setActiveForm(id)}
          style={{padding:'4px 10px',borderRadius:4,fontSize:10,fontWeight:activeForm===id?700:500,
            border:`1px solid ${activeForm===id?f.color:'var(--br)'}`,
            background:activeForm===id?`rgba(0,0,0,0.15)`:'var(--bg3)',
            color:activeForm===id?f.color:'var(--tx2)',cursor:'pointer'}}>
          {f.label}
        </button>)}
      </div>
      {/* Active formulation */}
      <div style={{padding:'10px 12px',background:'var(--bg3)',borderRadius:6,border:`1px solid ${FORMS[activeForm]?.color||'var(--br)'}22`}}>
        {FORMS[activeForm]?.content()}
      </div>
    </div>}
  </div>;
}

function InsightEngineCard({state}){
  const [insights,setInsights]=useState(null);
  const [loading,setLoading]=useState(false);
  const cur=state.config.currency;
  const generate=async()=>{
    setLoading(true);setInsights(null);
    try{
      const P=state.products;
      const totRev=P.reduce((s,p)=>s+p.history.reduce((a,b)=>a+b,0)*p.sellPrice,0);
      const totMat=P.reduce((s,p)=>s+p.history.reduce((a,b)=>a+b,0)*p.bom.reduce((bs,b)=>bs+b.cost*b.qtyPer,0),0);
      const imp=P.flatMap(p=>p.bom.filter(b=>b.supplierType==='import'));
      const longLT=P.flatMap(p=>p.bom.filter(b=>b.leadTime>4));
      const noBack=P.flatMap(p=>p.bom.filter(b=>!b.backupSupplier));
      const avgMAPE=P.reduce((s,p)=>s+(p.mape||15),0)/Math.max(P.length,1);
      const ctx=`Supply chain for ${state.config.companyName}:
SKUs (${P.length}): ${P.map(p=>`${p.name}[dem:${p.history.reduce((a,b)=>a+b,0)}u/yr,px:${cur}${p.sellPrice},margin:${(((p.sellPrice-p.bom.reduce((s,b)=>s+b.cost*b.qtyPer,0)-p.variableCost)/p.sellPrice)*100).toFixed(0)}%,MAPE:${p.mape||15}%,cap:${p.capacity*4}u/mo,LT:${Math.max(...p.bom.map(b=>b.leadTime),0)}wk]`).join(' | ')}
Finance: Revenue=${cur}${Math.round(totRev).toLocaleString()} | MatCost=${cur}${Math.round(totMat).toLocaleString()} (${Math.round(totMat/Math.max(totRev,1)*100)}%) | WACC=${state.config.wacc}% | SL=${(state.config.serviceLevel*100).toFixed(0)}%
Supply risk: import_parts=${imp.length} | long_LT_parts(>4wk)=${longLT.length} | no_backup=${noBack.length} | avg_MAPE=${avgMAPE.toFixed(1)}%
Ops: ${state.production.lines.length} lines | ${state.planning.workDays}d/wk | ${state.planning.periods}wk horizon
Return ONLY a JSON array (no markdown fences): [{title,insight,recommendation,priority:"high"|"medium"|"low",category}] with 6 specific actionable insights using numbers from the data above.`;
      const res=await fetch('/api/ai/insights',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:ctx,system:'Return only a raw JSON array. No preamble. No code fences.',model:'claude-sonnet-4-20250514',max_tokens:1000})});
      const data=await res.json();
      if(data.error)throw new Error(data.error);
      const txt=data.text||'[]';
      setInsights(JSON.parse(txt.replace(/```json|```/g,'').trim()));
    }catch(e){setInsights([{title:'Parse Error',insight:e.message,recommendation:'Try again',priority:'high',category:'Error'}]);}
    setLoading(false);
  };
  const pc={high:'var(--dg)',medium:'var(--a4)',low:'var(--gn)'};
  return <div className="card" style={{borderColor:'rgba(167,139,250,.25)'}}>
    <div className="card-title">🧠 Live Insight Engine <span className="badge" style={{background:'rgba(167,139,250,.2)',color:'var(--a3)'}}>Claude AI · Real-time</span></div>
    <div style={{fontSize:10,color:'var(--tx3)',marginBottom:8}}>Analyzes your current supply chain configuration and returns 6 quantified, actionable insights specific to your data.</div>
    <button className="btn btn-primary" onClick={generate} disabled={loading} style={{background:loading?'var(--bg4)':'linear-gradient(135deg,#a78bfa,#00d4aa)',color:'#000'}}>
      {loading?'⏳ Generating insights...':'✨ Generate Insights'}
    </button>
    {insights&&<div style={{marginTop:10}}>
      {insights.map((ins,i)=><div key={i} style={{marginBottom:8,padding:'8px 12px',background:'var(--bg3)',borderRadius:6,borderLeft:`3px solid ${pc[ins.priority]||'var(--br)'}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:3}}>
          <div style={{fontSize:12,fontWeight:700}}>{ins.title}</div>
          <div style={{display:'flex',gap:4,flexShrink:0,marginLeft:8}}>
            <span style={{fontSize:8,padding:'2px 6px',borderRadius:10,background:pc[ins.priority]||'var(--br)',color:'#000',fontWeight:700}}>{(ins.priority||'').toUpperCase()}</span>
            <span style={{fontSize:8,padding:'2px 6px',borderRadius:10,background:'var(--bg4)',color:'var(--tx3)'}}>{ins.category}</span>
          </div>
        </div>
        <div style={{fontSize:11,color:'var(--tx2)',marginBottom:3}}>{ins.insight}</div>
        <div style={{fontSize:10,color:'var(--ac)',fontStyle:'italic'}}>→ {ins.recommendation}</div>
      </div>)}
    </div>}
  </div>;
}

function MultiSKU15({state}){
  const [openS,setOpenS]=useState({});
  const tog=(k)=>setOpenS(o=>({...o,[k]:!o[k]}));
  const P=state.products;const cur=state.config.currency;
  if(P.length<2)return <div className="card"><div className="card-title">📋 Multi-SKU 15-Section View</div><div style={{fontSize:10,color:'var(--tx3)'}}>Add 2+ products to enable multi-SKU comparison across 15 analytical dimensions.</div></div>;
  // Aliases so JSX below is unchanged
  const Sec=({id,title,children})=><MultiSec id={id} title={title} openS={openS} onToggle={tog}>{children}</MultiSec>;
  const T=({rows})=><MultiTable rows={rows} products={P}/>;
  const ad=p=>(p.history||[]).reduce((a,b)=>a+b,0);
  const mc=p=>(p.bom||[]).reduce((s,b)=>s+b.cost*b.qtyPer,0);
  const mg=p=>p.sellPrice-mc(p)-(p.variableCost||0)-(p.laborPerUnit||5);
  const sd=p=>{const h=p.history||[];const mu=h.reduce((a,b)=>a+b,0)/Math.max(h.length,1);return Math.sqrt(h.reduce((s,v)=>s+Math.pow(v-mu,2),0)/Math.max(h.length,1));};
  const z={0.85:1.036,0.90:1.282,0.95:1.645,0.99:2.326}[state.config.serviceLevel]||1.645;
  return <div className="card">
    <div className="card-title">📋 Multi-SKU 15-Section Analysis <span className="badge" style={{background:'rgba(0,212,170,.1)',color:'var(--ac)'}}>{P.length} products</span></div>
    <div style={{display:'flex',gap:6,marginBottom:8}}>
      <button className="btn btn-secondary btn-sm" onClick={()=>setOpenS(Object.fromEntries(Array.from({length:15},(_,i)=>[`s${i+1}`,true])))}>Expand All</button>
      <button className="btn btn-secondary btn-sm" onClick={()=>setOpenS({})}>Collapse All</button>
    </div>
    <Sec id="s1" title="1. Demand Profile"><T rows={[
      ['Annual Demand',p=>ad(p).toLocaleString()+'u'],
      ['Monthly Avg',p=>Math.round(ad(p)/12)],
      ['Peak Month',p=>Math.max(...(p.history||[0]))],
      ['Trough Month',p=>Math.min(...(p.history||[0]))],
      ['Std Dev σ',p=>Math.round(sd(p))],
      ['CV%',p=>(sd(p)/Math.max(ad(p)/12,1)*100).toFixed(1)+'%'],
      ['Trend',p=>{const h=p.history||[];const n=h.length;if(n<2)return '?';const sx=h.reduce((s,_,i)=>s+i,0),sy=h.reduce((s,v)=>s+v,0),sxy=h.reduce((s,v,i)=>s+i*v,0),sx2=h.reduce((s,_,i)=>s+i*i,0);const b=(n*sxy-sx*sy)/(n*sx2-sx*sx||1);return b>2?'↑ Growing':b<-2?'↓ Declining':'→ Stable';}],
    ]}/></Sec>
    <Sec id="s2" title="2. Cost Structure"><T rows={[
      ['Material Cost/u',p=>cur+mc(p).toFixed(2)],
      ['Variable Cost/u',p=>cur+(p.variableCost||0)],
      ['Labor/u',p=>cur+(p.laborPerUnit||5)],
      ['Setup/batch',p=>cur+(p.setupCost||50)],
      ['Total Unit Cost',p=>cur+(mc(p)+(p.variableCost||0)+(p.laborPerUnit||5)).toFixed(2)],
      ['Sell Price',p=>cur+p.sellPrice],
      ['Contribution/u',p=><span style={{color:mg(p)>0?'var(--gn)':'var(--dg)',fontWeight:700}}>{cur+mg(p).toFixed(2)}</span>],
      ['Margin%',p=>(mg(p)/Math.max(p.sellPrice,1)*100).toFixed(1)+'%'],
    ]}/></Sec>
    <Sec id="s3" title="3. Forecast Accuracy"><T rows={[
      ['MAPE%',p=><span style={{color:(p.mape||15)<15?'var(--gn)':(p.mape||15)<25?'var(--a4)':'var(--dg)'}}>{p.mape||15}%</span>],
      ['History Points',p=>(p.history||[]).length],
      ['Overrides',p=>(p.overrides||[]).filter(o=>o!==null).length],
      ['Actuals',p=>(p.actuals||[]).filter(a=>a!=null).length],
      ['Events/Promos',p=>(p.events||[]).length],
      ['MTO Orders',p=>(p.mtoOrders||[]).length],
    ]}/></Sec>
    <Sec id="s4" title="4. Inventory Parameters"><T rows={[
      ['Init Inventory',p=>p.initInventory||0],
      ['Shelf Life',p=>(p.shelfLife||52)+' days'],
      ['WH Max (u)',p=>p.whMaxUnits||500],
      ['Carry Rate',p=>(p.carryRate||24)+'%/yr'],
      ['Prod Mode',p=>(p.prodMode||'mts').toUpperCase()],
      ['Backorder',p=>p.backorderOn?'Yes':'No'],
      ['Salvage%',p=>Math.round((p.salvageRate||0.8)*100)+'%'],
    ]}/></Sec>
    <Sec id="s5" title="5. Production Parameters"><T rows={[
      ['Capacity (u/wk)',p=>p.capacity||50],
      ['Monthly Cap',p=>(p.capacity||50)*4],
      ['Cap Utilization',p=>Math.round(ad(p)/((p.capacity||50)*52)*100)+'%'],
      ['Cycle Time',p=>(p.cycleTime||19)+' min/u'],
      ['Yield%',p=>Math.round((p.yieldPct||0.95)*100)+'%'],
      ['Setup Cost',p=>cur+(p.setupCost||50)],
      ['OT Threshold',p=>(p.optUtil||85)+'%'],
      ['Cap CV%',p=>(p.capCV||5)+'%'],
    ]}/></Sec>
    <Sec id="s6" title="6. BOM Summary"><T rows={[
      ['# Parts',p=>(p.bom||[]).length],
      ['# Import Parts',p=>(p.bom||[]).filter(b=>b.supplierType==='import').length],
      ['Total Mat Cost/u',p=>cur+mc(p).toFixed(2)],
      ['Max Lead Time',p=>Math.max(...(p.bom||[]).map(b=>b.leadTime),0)+'wk'],
      ['Avg MOQ',p=>Math.round((p.bom||[]).reduce((s,b)=>s+b.moq,0)/Math.max((p.bom||[]).length,1))],
      ['Parts w/ Backup',p=>(p.bom||[]).filter(b=>b.backupSupplier).length],
      ['Vol Disc Tiers',p=>(p.bom||[]).reduce((s,b)=>s+(b.volDisc||[]).length,0)],
    ]}/></Sec>
    <Sec id="s7" title="7. Safety Stock & ROP"><T rows={[
      ['Avg Monthly',p=>Math.round(ad(p)/12)],
      ['Std Dev σ',p=>Math.round(sd(p))],
      ['LT (1st part)',p=>(p.bom||[])[0]?.leadTime+'wk'||'N/A'],
      ['Safety Stock',p=>{const lt=(p.bom||[])[0]?.leadTime||2;return Math.round(z*sd(p)*Math.sqrt(lt));}],
      ['Reorder Point',p=>{const lt=(p.bom||[])[0]?.leadTime||2;const ss=Math.round(z*sd(p)*Math.sqrt(lt));return Math.round(ad(p)/12/4*lt+ss);}],
      ['EOQ',p=>{const D=ad(p);const S=(p.bom||[])[0]?.orderingCost||75;const mc2=(p.bom||[])[0]?.cost||10;const H=mc2*((p.bom||[])[0]?.holdPct||24)/100;return D>0&&H>0?Math.round(Math.sqrt(2*D*S/H)):'N/A';}],
    ]}/></Sec>
    <Sec id="s8" title="8. Outbound Logistics"><T rows={[
      ['Out Rate/u',p=>cur+(p.outRate||2)],
      ['Out Mode',p=>p.outMode||'perUnit'],
      ['Ship Cost',p=>cur+(p.outShipCost||50)],
      ['DSO (days)',p=>p.dso||30],
      ['Annual Trans',p=>cur+Math.round((p.outRate||2)*ad(p)).toLocaleString()],
    ]}/></Sec>
    <Sec id="s9" title="9. Working Capital">
      {(()=>{const wc=P.map(p=>{const m2=ad(p)/12;const invV=m2/2*mc(p);const ap=(p.bom||[]).reduce((s,b)=>s+m2*b.qtyPer*b.cost*(b.payTermDays||30)/30,0);const ar=m2*p.sellPrice*(p.dso||30)/30;return{n:p.name,invV:Math.round(invV),ap:Math.round(ap),ar:Math.round(ar),nwc:Math.round(invV+ar-ap)};});
      return <table className="data-table"><thead><tr><th>WC Item</th>{P.map(p=><th key={p.id}>{p.name}</th>)}<th>Total</th></tr></thead>
      <tbody>
        <tr><td>Inventory Value</td>{wc.map(w=><td key={w.n} className="num">{cur}{w.invV.toLocaleString()}</td>)}<td className="num">{cur}{wc.reduce((s,w)=>s+w.invV,0).toLocaleString()}</td></tr>
        <tr><td>Accounts Receivable</td>{wc.map(w=><td key={w.n} className="num" style={{color:'var(--a2)'}}>{cur}{w.ar.toLocaleString()}</td>)}<td className="num">{cur}{wc.reduce((s,w)=>s+w.ar,0).toLocaleString()}</td></tr>
        <tr><td>Accounts Payable</td>{wc.map(w=><td key={w.n} className="num" style={{color:'var(--gn)'}}>{cur}{w.ap.toLocaleString()}</td>)}<td className="num">{cur}{wc.reduce((s,w)=>s+w.ap,0).toLocaleString()}</td></tr>
        <tr style={{fontWeight:700}}><td>Net Working Capital</td>{wc.map(w=><td key={w.n} className="num" style={{color:w.nwc<0?'var(--gn)':'var(--a4)'}}>{cur}{w.nwc.toLocaleString()}</td>)}<td className="num">{cur}{wc.reduce((s,w)=>s+w.nwc,0).toLocaleString()}</td></tr>
      </tbody></table>;})()}
    </Sec>
    <Sec id="s10" title="10. Risk Profile"><T rows={[
      ['Forecast Risk',p=><span style={{color:(p.mape||15)<15?'var(--gn)':(p.mape||15)<25?'var(--a4)':'var(--dg)'}}>{p.mape||15}% MAPE</span>],
      ['Import Exposure',p=>{const im=(p.bom||[]).filter(b=>b.supplierType==='import').length;const tot=Math.max((p.bom||[]).length,1);return <span style={{color:im/tot>0.5?'var(--dg)':im>0?'var(--a4)':'var(--gn)'}}>{Math.round(im/tot*100)}%</span>;}],
      ['Single-Source',p=><span style={{color:(p.bom||[]).filter(b=>!b.backupSupplier).length>0?'var(--a4)':'var(--gn)'}}>{(p.bom||[]).filter(b=>!b.backupSupplier).length} parts</span>],
      ['Max LT Risk',p=>{const mx=Math.max(...(p.bom||[]).map(b=>b.leadTime),0);return <span style={{color:mx>6?'var(--dg)':mx>4?'var(--a4)':'var(--gn)'}}>{mx}wk</span>;}],
      ['Expiry Risk',p=>{const s=p.shelfLife||52;return <span style={{color:s<30?'var(--dg)':s<90?'var(--a4)':'var(--gn)'}}>{s<30?'HIGH':s<90?'MEDIUM':'LOW'}</span>;}],
      ['Cap Utilization',p=>{const u=Math.round(ad(p)/((p.capacity||50)*52)*100);return <span style={{color:u>90?'var(--dg)':u>80?'var(--a4)':'var(--gn)'}}>{u}%</span>;}],
    ]}/></Sec>
    <Sec id="s11" title="11. Profitability Ranking">
      {(()=>{const ranked=[...P].map(p=>{const m2=mg(p);const ch=(p.cycleTime||19)/60;return{...p,m2,annP:m2*ad(p),mPct:(m2/Math.max(p.sellPrice,1)*100).toFixed(1),mPH:ch>0?(m2/ch).toFixed(1):'N/A'};}).sort((a,b)=>b.m2-a.m2);
      return <table className="data-table"><thead><tr><th>Rank</th><th>Product</th><th>Margin/u</th><th>Margin%</th><th>Margin/hr</th><th>Annual Profit</th></tr></thead>
      <tbody>{ranked.map((p,i)=><tr key={p.id}><td style={{fontWeight:700,color:i===0?'var(--ac)':'var(--tx)'}}>{i+1}</td><td style={{fontWeight:600}}>{p.name}</td>
        <td className="num" style={{color:p.m2>0?'var(--gn)':'var(--dg)',fontWeight:700}}>{cur}{p.m2.toFixed(2)}</td>
        <td className="num" style={{color:+p.mPct>20?'var(--gn)':+p.mPct>0?'var(--a4)':'var(--dg)'}}>{p.mPct}%</td>
        <td className="num" style={{color:'var(--a2)'}}>{cur}{p.mPH}/hr</td>
        <td className="num" style={{color:p.annP>0?'var(--gn)':'var(--dg)',fontWeight:700}}>{cur}{Math.round(p.annP).toLocaleString()}</td>
      </tr>)}</tbody></table>;})()}
    </Sec>
    <Sec id="s12" title="12. Supplier Concentration">
      {(()=>{const allP=P.flatMap(p=>(p.bom||[]).map(b=>({...b,pn:p.name})));const top=allP.map(b=>({name:b.name,pn:b.pn,val:b.cost*b.qtyPer,lt:b.leadTime,hb:!!b.backupSupplier})).sort((a,b)=>b.val-a.val).slice(0,8);
      return <><div style={{display:'flex',gap:16,marginBottom:6,fontSize:11}}>
        <span>Domestic: <strong style={{color:'var(--gn)'}}>{allP.filter(b=>b.supplierType!=='import').length}</strong></span>
        <span>Import: <strong style={{color:'var(--a4)'}}>{allP.filter(b=>b.supplierType==='import').length}</strong></span>
        <span>No backup: <strong style={{color:'var(--dg)'}}>{allP.filter(b=>!b.backupSupplier).length}</strong></span>
      </div>
      <table className="data-table"><thead><tr><th>Part (by value)</th><th>Product</th><th>Unit Value</th><th>LT</th><th>Backup?</th></tr></thead>
      <tbody>{top.map((b,i)=><tr key={i}><td style={{fontWeight:600}}>{b.name}</td><td style={{color:'var(--tx2)',fontSize:10}}>{b.pn}</td><td className="num">{cur}{b.val.toFixed(2)}</td><td className="num" style={{color:b.lt>4?'var(--dg)':'var(--tx)'}}>{b.lt}wk</td><td style={{color:b.hb?'var(--gn)':'var(--dg)',fontSize:9}}>{b.hb?'✓ Yes':'✗ No'}</td></tr>)}</tbody></table></>;})()}
    </Sec>
    <Sec id="s13" title="13. Capacity Utilization Matrix">
      <table className="data-table"><thead><tr><th>Line</th>{P.map(p=><th key={p.id}>{p.name}</th>)}<th>Combined</th></tr></thead>
      <tbody>{state.production.lines.map(line=>{
        const avH=(line.hoursPerShift||8)*(line.shiftsPerDay||1)*(state.planning.workDays||6)*4;
        const totR=P.reduce((s,p)=>s+(ad(p)/12)*(p.cycleTime||19)/60,0);
        return <tr key={line.id}><td style={{fontWeight:600}}>{line.name}</td>
          {P.map(p=>{const rh=(ad(p)/12)*(p.cycleTime||19)/60;const u=Math.round(rh/Math.max(avH,1)*100);return <td key={p.id} className="num" style={{color:u>100?'var(--dg)':u>80?'var(--a4)':'var(--gn)'}}>{u}%</td>;})}
          <td className="num" style={{fontWeight:700}}>{Math.round(totR/Math.max(avH,1)*100)}%</td>
        </tr>;
      })}</tbody></table>
    </Sec>
    <Sec id="s14" title="14. Annual P&L Summary">
      {(()=>{const pl=P.map(p=>{const d=ad(p);const rev=d*p.sellPrice;const mat=d*mc(p);const vr=d*(p.variableCost||0);const lab=d*(p.laborPerUnit||5);const tr=d*(p.outRate||2);const su=(p.setupCost||50)*Math.ceil(d/Math.max(p.capacity||50,1));const ho=mat*(p.carryRate||24)/100/2;const fx=(p.fixedFactory||100)*(state.planning.workDays||6)*52/P.length;const tc=mat+vr+lab+tr+su+ho+fx;return{n:p.name,rev,mat,vr,lab,tr,su,ho,fx,tc,ebit:rev-tc};});
      const tot=k=>pl.reduce((s,r)=>s+r[k],0);
      const rows=[['Revenue','rev','var(--gn)'],['Material','mat','var(--a4)'],['Variable','vr','var(--tx2)'],['Labor','lab','var(--tx2)'],['Transport','tr','var(--tx2)'],['Setup','su','var(--tx2)'],['Holding','ho','var(--tx2)'],['Fixed Overhead','fx','var(--tx3)'],['Total Cost','tc','var(--dg)'],['EBIT','ebit','var(--gn)']];
      return <table className="data-table"><thead><tr><th>P&L</th>{P.map(p=><th key={p.id}>{p.name}</th>)}<th style={{color:'var(--a3)'}}>Total</th></tr></thead>
      <tbody>{rows.map(([l,k,c])=><tr key={k} style={{fontWeight:k==='ebit'||k==='rev'?700:400}}><td style={{color:c}}>{l}</td>
        {pl.map(r=><td key={r.n} className="num" style={{color:k==='ebit'?(r[k]>0?'var(--gn)':'var(--dg)'):undefined}}>{cur}{Math.round(r[k]).toLocaleString()}</td>)}
        <td className="num" style={{fontWeight:700,color:k==='ebit'?(tot(k)>0?'var(--gn)':'var(--dg)'):c}}>{cur}{Math.round(tot(k)).toLocaleString()}</td>
      </tr>)}
      <tr><td style={{fontWeight:700}}>EBIT%</td>{pl.map(r=><td key={r.n} className="num" style={{fontWeight:700,color:r.ebit/Math.max(r.rev,1)*100>15?'var(--gn)':'var(--a4)'}}>{Math.round(r.ebit/Math.max(r.rev,1)*100)}%</td>)}<td className="num" style={{fontWeight:700}}>{Math.round(tot('ebit')/Math.max(tot('rev'),1)*100)}%</td></tr>
      </tbody></table>;})()}
    </Sec>
    <Sec id="s15" title="15. S&OP Recommendations">
      {(()=>{const recs=[];P.forEach(p=>{const u=Math.round(ad(p)/((p.capacity||50)*52)*100);const m2=mg(p);
        if(u>90)recs.push({s:p.name,t:'⚠️ Capacity Overload',a:`Utilization ${u}% — add OT, shift, or subcontract`,'pr':'high'});
        if(u<35)recs.push({s:p.name,t:'💡 Under-Utilization',a:`Only ${u}% utilized — find new orders or consolidate batches`,'pr':'low'});
        if((p.mape||15)>25)recs.push({s:p.name,t:'📊 High Forecast Error',a:`MAPE ${p.mape||15}% — add causal variables, events, or sensing actuals`,'pr':'high'});
        if((p.bom||[]).some(b=>b.leadTime>4))recs.push({s:p.name,t:'🕐 Long Lead Times',a:`Parts with LT>4wk — dual-source or hold more safety stock`,'pr':'medium'});
        if(m2<0)recs.push({s:p.name,t:'💸 Negative Margin',a:`Margin ${cur}${m2.toFixed(0)}/u — reprice, reduce mat cost, or discontinue`,'pr':'high'});
        if((p.bom||[]).filter(b=>!b.backupSupplier).length>(p.bom||[]).length/2)recs.push({s:p.name,t:'🛡️ Supply Risk',a:`${(p.bom||[]).filter(b=>!b.backupSupplier).length}/${(p.bom||[]).length} parts lack backup supplier`,'pr':'medium'});
      });
      if(!recs.length)return <div style={{color:'var(--gn)',fontSize:11,padding:8}}>✅ All products healthy — no critical S&OP gaps detected.</div>;
      return <table className="data-table"><thead><tr><th>SKU</th><th>Finding</th><th>Recommended Action</th><th>Priority</th></tr></thead>
      <tbody>{recs.map((r,i)=><tr key={i}><td style={{fontWeight:600}}>{r.s}</td><td>{r.t}</td><td style={{fontSize:10}}>{r.a}</td>
        <td><span style={{fontSize:8,padding:'2px 6px',borderRadius:10,fontWeight:700,background:r.pr==='high'?'rgba(248,81,73,.2)':r.pr==='medium'?'rgba(240,180,41,.2)':'rgba(63,185,80,.2)',color:r.pr==='high'?'var(--dg)':r.pr==='medium'?'var(--a4)':'var(--gn)'}}>{r.pr.toUpperCase()}</span></td>
      </tr>)}</tbody></table>;})()}
    </Sec>
  </div>;
}

// ── CommandCenterSec: extracted from CommandCenterTab to satisfy React's rules of hooks ──
function CommandCenterSec({title,color,children}){
  const [open,setOpen]=useState(true);
  return <div style={{marginBottom:6,border:'1px solid var(--br)',borderRadius:6,overflow:'hidden'}}>
    <div onClick={()=>setOpen(o=>!o)} style={{padding:'8px 12px',background:`rgba(${color},.04)`,cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:open?'1px solid var(--br)':'none'}}>
      <div style={{fontSize:12,fontWeight:700}}>{title}</div>
      <span style={{color:'var(--tx3)',fontSize:16}}>{open?'▾':'▸'}</span>

}

// ─── TAB: COMMAND CENTER ───
function CommandCenterTab({state,dispatch}){
  const P=state.products;const cur=state.config.currency;
  const [solving,setSolving]=useState(null);const [results,setResults]=useState({});
  const z={0.85:1.036,0.90:1.282,0.95:1.645,0.99:2.326}[state.config.serviceLevel]||1.645;
  const allParts=P.flatMap(p=>p.bom.map(b=>({...b,pn:p.name})));

  const runSolver=async(mode,endpoint,payload)=>{
    setSolving(mode);
    try{const r=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      const d=await r.json();setResults(prev=>({...prev,[mode]:d}));
    }catch(e){setResults(prev=>({...prev,[mode]:{error:e.message}}));}
    setSolving(null);
  };

  const weeklyDemand=p=>(p.history||[]).slice(-12).flatMap(m=>{const w=Math.round(m/4);return[w,w,w,m-3*w]}).slice(0,state.planning.periods);
  const annDem=p=>(p.history||[]).slice(-12).reduce((a,b)=>a+b,0);

  return <div className="animate-in">
    {/* ═══ SOLVER PIPELINE DIAGRAM ═══ */}
    <div className="card" style={{borderColor:'var(--ac)'}}>
      <div className="card-title">🎯 How the 7 Solvers Communicate</div>
      <div style={{fontSize:10,color:'var(--tx3)',marginBottom:8}}>Each solver has a specific objective. They chain: Profit Mix quantities → Disaggregation (seasonal) → Procurement demand → Production schedule. Capital budget sets the investment envelope. Monte Carlo stress-tests everything.</div>
      <div style={{display:'flex',flexWrap:'wrap',gap:4,alignItems:'center',justifyContent:'center',padding:'12px 0'}}>
        {[
          {n:'Profit Max',s:'💰',c:'#f0b429',d:'Max margin',f:'Capital Budget\n(sets budget)'},
          {n:'→',s:'',c:'',d:''},
          {n:'Disaggregate',s:'📅',c:'#38bdf8',d:'Annual→Monthly→Weekly→Daily'},
          {n:'→',s:'',c:'',d:''},
          {n:'Procurement',s:'📦',c:'#00d4aa',d:'Min total cost\n(ordering+holding+material)'},
          {n:'→',s:'',c:'',d:''},
          {n:'Production',s:'🏭',c:'#a78bfa',d:'Min makespan\n+setup+overtime'},
        ].map((s,i)=>s.n==='→'?<div key={i} style={{fontSize:18,color:'var(--br2)'}}>→</div>:
          <div key={i} style={{padding:'8px 10px',minWidth:90,textAlign:'center',borderRadius:6,background:`${s.c}12`,border:`1px solid ${s.c}40`,fontSize:9}}>
            <div style={{fontSize:20}}>{s.s}</div>
            <div style={{fontWeight:700,color:s.c,marginTop:2}}>{s.n}</div>
            <div style={{color:'var(--tx3)',whiteSpace:'pre-line',marginTop:2,fontSize:8}}>{s.d}</div>
          </div>
        )}
      </div>
      <div style={{display:'flex',justifyContent:'center',gap:16,marginTop:4}}>
        <div style={{padding:'6px 10px',borderRadius:6,background:'rgba(248,81,73,.08)',border:'1px solid rgba(248,81,73,.3)',textAlign:'center',fontSize:9}}>
          <span style={{fontSize:16}}>🎲</span><br/><strong style={{color:'var(--dg)'}}>Monte Carlo</strong><br/><span style={{color:'var(--tx3)'}}>Stress-tests all above<br/>1000 random scenarios</span>
        </div>
        <div style={{padding:'6px 10px',borderRadius:6,background:'rgba(56,189,248,.08)',border:'1px solid rgba(56,189,248,.3)',textAlign:'center',fontSize:9}}>
          <span style={{fontSize:16}}>🚛</span><br/><strong style={{color:'var(--a2)'}}>Transport</strong><br/><span style={{color:'var(--tx3)'}}>Mode selection per shipment<br/>Air override if demand spike</span>
        </div>
        <div style={{padding:'6px 10px',borderRadius:6,background:'rgba(167,139,250,.08)',border:'1px solid rgba(167,139,250,.3)',textAlign:'center',fontSize:9}}>
          <span style={{fontSize:16}}>🏗️</span><br/><strong style={{color:'var(--a3)'}}>Capital Budget</strong><br/><span style={{color:'var(--tx3)'}}>Max NPV of investments<br/>Sets CAPEX envelope</span>
        </div>
      </div>
    </div>

    {/* ═══ SOLVER READINESS ═══ */}

// ─── PARAMETER CASCADE TRACKER ───
function CascadeTracker({state}){
  const P=state.products;const cur=state.config.currency;
  if(!P.length)return null;
  const z={0.85:1.036,0.90:1.282,0.95:1.645,0.99:2.326}[state.config.serviceLevel]||1.645;
  const chains=P.map(p=>{
    const h=p.history||[];const n=h.length;const avg=h.reduce((a,b)=>a+b,0)/Math.max(n,1);
    const sigma=Math.sqrt(h.reduce((s,v)=>s+Math.pow(v-avg,2),0)/Math.max(n,1));
    const mape=p.mape||15;
    const maxLT=Math.max(...(p.bom||[]).map(b=>b.leadTime),1);
    const ss=Math.round(z*(mape/100)*avg*Math.sqrt(maxLT));
    const rop=Math.round(avg/4*maxLT+ss);
    const mc=(p.bom||[]).reduce((s,b)=>s+b.cost*b.qtyPer,0);
    const unitCost=mc+(p.variableCost||0)+(p.laborPerUnit||5);
    const margin=p.sellPrice-unitCost;
    const annDem=h.slice(-12).reduce((a,b)=>a+b,0);
    const annProfit=margin*annDem;
    const holdCostAnn=Math.round(mc*annDem/2*(p.carryRate||24)/100);
