                  <td style={{color:'var(--tx2)',fontSize:9}}>{m.product}</td>
                  <td style={{fontFamily:'JetBrains Mono',fontSize:9}}>W{po.period+1}</td>
                  <td style={{fontFamily:'JetBrains Mono',fontSize:9,color:'var(--ac)'}}>W{po.arrive_period+1}</td>
                  <td className="num" style={{color:'var(--ac)',fontWeight:700}}>{po.quantity.toLocaleString()}</td>
                  <td className="num">{cur}{(po.cost/Math.max(po.quantity,1)).toFixed(2)}</td>
                  <td className="num" style={{fontWeight:700}}>{cur}{Math.round(po.cost).toLocaleString()}</td>
                  <td style={{fontSize:9,color:'var(--tx2)'}}>{bomPart.supplierType||'—'}{bomPart.country?` / ${bomPart.country}`:''}</td>
                  <td style={{fontSize:9,color:'var(--tx3)'}}>{bomPart.transMode||'perUnit'}</td>
                </tr>);
              });
            });
            return rows.length?rows:[<tr key="empty"><td colSpan={10} style={{textAlign:'center',color:'var(--tx3)',padding:12}}>No POs issued in this plan</td></tr>];
          })()}</tbody>
        </table>
      </div>
    </div>}

    {/* ─── RM INVENTORY TIMELINE (Procurement mode) ─── */}
    {result&&result._mode==='procurement'&&result.materials?.length>0&&<div className="card">
      <div className="card-title">📊 Raw Material Timeline — Orders &amp; Inventory per Period</div>
      {result.materials.map((m,mi)=><div key={mi} style={{marginBottom:8}}>
        <div style={{fontSize:11,fontWeight:600,color:'var(--ac)',marginBottom:3}}>{m.name} <span style={{color:'var(--tx3)',fontWeight:400}}>for {m.product}</span></div>
        <div style={{overflowX:'auto'}}>
          <table className="data-table" style={{fontSize:9}}>
            <thead><tr><th>Series</th>{Array.from({length:Math.min(m.orders?.length||0,26)},(_,t)=><th key={t} style={{fontFamily:'JetBrains Mono',fontSize:8}}>W{t+1}</th>)}</tr></thead>
            <tbody>
              <tr><td style={{fontWeight:600,color:'var(--a2)'}}>Orders</td>{(m.orders||[]).slice(0,26).map((q,t)=><td key={t} className="num" style={{color:q>0?'var(--a2)':'var(--tx3)',fontWeight:q>0?700:400}}>{q||'·'}</td>)}</tr>
              <tr><td style={{fontWeight:600,color:'var(--a4)'}}>RM Inv</td>{(m.inventory||[]).slice(0,26).map((q,t)=><td key={t} className="num" style={{color:q<5?'var(--dg)':q<20?'var(--a4)':'var(--tx)'}}>{Math.round(q)||'·'}</td>)}</tr>
            </tbody>
          </table>
        </div>
      </div>)}
    </div>}

    {/* ─── MRP EXPLOSION ─── */}
    {result&&result._mode==='procurement'&&result.products&&<div className="card">
      <div className="card-title">🔄 MRP Explosion — Forecast → Gross Req → Net Req → PO</div>
      <div style={{fontSize:10,color:'var(--tx3)',marginBottom:6}}>Pipeline: consensus forecast → BOM explosion (qty×demand) → scrap/yield adjustment → net requirements → MILP PO schedule</div>
      {result.products?.map((p,pi)=>{
        const prod2=state.products[pi];if(!prod2)return null;
        const annDem=(prod2.history||[]).slice(-12).reduce((a,b)=>a+b,0);
        return <div key={pi} style={{marginBottom:6,padding:6,background:'var(--bg3)',borderRadius:4}}>
          <div style={{fontSize:11,fontWeight:600,color:'var(--ac)',marginBottom:3}}>{p.name} — {annDem.toLocaleString()} units/yr demand</div>
          <table className="data-table" style={{fontSize:9}}>
            <thead><tr><th>Subpart</th><th>Qty/U</th><th>Gross Req</th><th>+Scrap</th><th>÷Yield</th><th>Net Req</th><th>POs</th><th>Ordered</th><th>Mat Cost</th></tr></thead>
            <tbody>{(prod2.bom||[]).map((b,bi)=>{
              const gross=Math.round(annDem*b.qtyPer);
              const scrap=Math.round(gross*(1+(b.scrapFactor||0.05)));
              const yld=Math.round(scrap/((b.partYield||98)/100));
              const mr=result.materials?.[bi];
              return <tr key={bi}>
                <td style={{fontWeight:600}}>{b.name}</td>
                <td className="num">{b.qtyPer}</td>
                <td className="num">{gross.toLocaleString()}</td>
                <td className="num" style={{color:'var(--a4)'}}>{scrap.toLocaleString()}</td>
                <td className="num" style={{color:'var(--a4)'}}>{yld.toLocaleString()}</td>
                <td className="num" style={{color:'var(--ac)',fontWeight:700}}>{yld.toLocaleString()}</td>
                <td className="num">{mr?.num_orders||'—'}</td>
                <td className="num">{mr?.total_ordered?.toLocaleString()||'—'}</td>
                <td className="num">{cur}{mr?.total_cost?.toLocaleString()||'—'}</td>
              </tr>
            })}</tbody>
          </table>
        </div>
      })}
    </div>}

    {/* ─── PRODUCTION RESULTS ─── */}
    {result&&result._mode==='production'&&<div className="card">
      <div className="card-title">🏭 Production Schedule Results
        <span className="badge" style={{background:'rgba(0,212,170,.12)',color:'var(--ac)',marginLeft:6}}>{result.gantt?.length||0} production orders</span>
        <SectionInfo><strong>What it does:</strong> Detailed production-orders output from the solver: per-product, per-period quantities and the Gantt timeline.<br/><strong>Read-only</strong> — to change the plan, edit inputs (demand/capacity/budget) and re-solve.</SectionInfo>
      </div>
      <div className="kpi-row">
        <KPI label="Total Cost" value={`${cur}${result.total_cost?.toLocaleString()}`}/>
        <KPI label="Orders Issued" value={result.gantt?.length||0} color="var(--ac)"/>
        <KPI label="Total Changeovers" value={result.lines?.reduce((a,l)=>a+(l.changeovers||0),0)||0} color="var(--a4)"/>
        <KPI label="Total OT Hrs" value={`${result.lines?.reduce((a,l)=>a+(l.overtime_hours||0),0).toFixed(1)||0}h`} color="var(--a3)"/>
        <KPI label="Solve Time" value={`${result.solve_time}s`} color="var(--a2)"/>
      </div>
    </div>}

    {/* ─── PRODUCTION ORDERS REGISTER ─── */}
    {result&&result._mode==='production'&&result.gantt?.length>0&&<div className="card">
      <div className="card-title">📋 Production Order Register
        <span className="badge" style={{background:'rgba(79,168,240,.12)',color:'var(--a2)',marginLeft:6}}>Executable Schedule</span>
      </div>
      <div style={{fontSize:10,color:'var(--tx3)',marginBottom:6}}>Every production order the MILP decided to issue, sequenced by line & period. Dispatch these to the shop floor.</div>
      <div style={{overflowX:'auto',maxHeight:400}}>
        <table className="data-table" style={{fontSize:10}}>
          <thead style={{position:'sticky',top:0,background:'var(--bg2)'}}>
            <tr><th>Order #</th><th>Line</th><th>Period</th><th>Product</th><th className="num">Quantity</th><th className="num">Cycle (min)</th><th className="num">Run Hrs</th><th>Changeover?</th></tr>
          </thead>
          <tbody>{(()=>{
            const sorted=[...(result.gantt||[])].sort((a,b)=>a.line_idx-b.line_idx||a.period-b.period);
            let prevByLine={};
            return sorted.map((g,gi)=>{
              const prevProd=prevByLine[g.line_idx];
              const isChangeover=prevProd!==undefined&&prevProd!==g.product;
              prevByLine[g.line_idx]=g.product;
              const prod=state.products[g.product_idx]||{};
              const cycMin=prod.cycleTime||19;
              const runHrs=(g.quantity*cycMin/60).toFixed(1);
              return <tr key={gi} style={isChangeover?{background:'rgba(240,180,41,.05)'}:{}}>
                <td style={{fontFamily:'JetBrains Mono',fontSize:9,fontWeight:600,color:'var(--a2)'}}>MO-{String(gi+1).padStart(4,'0')}</td>
                <td style={{fontWeight:600}}>{g.line}</td>
                <td style={{fontFamily:'JetBrains Mono',fontSize:9,color:'var(--ac)'}}>W{g.period+1}</td>
                <td style={{fontWeight:600}}>{g.product}</td>
                <td className="num" style={{color:'var(--ac)',fontWeight:700}}>{g.quantity.toLocaleString()}</td>
                <td className="num">{cycMin}</td>
                <td className="num" style={{color:'var(--a3)'}}>{runHrs}h</td>
                <td style={{color:isChangeover?'var(--a4)':'var(--tx3)',fontWeight:isChangeover?700:400,fontSize:9}}>{isChangeover?'⚡ CHANGEOVER':'—'}</td>
              </tr>;
            });
          })()}</tbody>
        </table>
      </div>
    </div>}

    {/* ─── PER-PRODUCT DEMAND vs PRODUCED ─── */}
    {result&&result._mode==='production'&&result.products?.length>0&&<div className="card">
      <div className="card-title">📦 Product Fulfillment</div>
      <table className="data-table" style={{fontSize:10}}>
        <thead><tr><th>Product</th><th className="num">Required</th><th className="num">Produced</th><th className="num">Delta</th><th>Completes</th><th className="num">Active Periods</th><th className="num">Util %</th><th>Status</th></tr></thead>
        <tbody>{result.products.map((p,i)=>{
          const delta=p.produced-p.required;
          const ok=delta>=0;
          return <tr key={i}>
            <td style={{fontWeight:600,color:'var(--ac)'}}>{p.name}</td>
            <td className="num">{p.required?.toLocaleString()}</td>
            <td className="num" style={{color:ok?'var(--gn)':'var(--dg)',fontWeight:700}}>{p.produced?.toLocaleString()}</td>
            <td className="num" style={{color:ok?'var(--gn)':'var(--dg)'}}>{delta>=0?'+':''}{delta?.toLocaleString()}</td>
            <td style={{fontFamily:'JetBrains Mono',fontSize:9}}>W{p.completion_period}</td>
            <td className="num">{p.active_periods}</td>
            <td className="num">{p.utilization}%</td>
            <td style={{color:ok?'var(--gn)':'var(--dg)',fontWeight:600,fontSize:9}}>{ok?'✓ FULFILLED':'✗ SHORT'}</td>
          </tr>;
        })}</tbody>
      </table>
    </div>}

    {/* ─── PER-LINE UTILIZATION ─── */}
    {result&&result._mode==='production'&&result.lines?.length>0&&<div className="card">
      <div className="card-title">🏭 Line-Level Execution Summary</div>
      <table className="data-table" style={{fontSize:10}}>
        <thead><tr><th>Line</th><th className="num">Active Periods</th><th className="num">Util %</th><th className="num">Units Produced</th><th className="num">Changeovers</th><th className="num">OT Hours</th><th>Load Level</th></tr></thead>
        <tbody>{result.lines.map((l,i)=>{
          const heavy=l.utilization>80,light=l.utilization<30;
          return <tr key={i}>
            <td style={{fontWeight:600}}>{l.name}</td>
            <td className="num">{l.active_periods}</td>
            <td className="num" style={{color:heavy?'var(--dg)':light?'var(--a4)':'var(--gn)',fontWeight:700}}>{l.utilization}%</td>
            <td className="num" style={{color:'var(--ac)'}}>{l.total_produced?.toLocaleString()}</td>
            <td className="num" style={{color:'var(--a4)'}}>{l.changeovers}</td>
            <td className="num" style={{color:l.overtime_hours>0?'var(--dg)':'var(--tx2)'}}>{l.overtime_hours}h</td>
            <td style={{fontSize:9,color:heavy?'var(--dg)':light?'var(--a4)':'var(--gn)'}}>{heavy?'🔥 BOTTLENECK':light?'💤 UNDERLOADED':'✓ BALANCED'}</td>
          </tr>;
        })}</tbody>
      </table>
    </div>}

    {/* ─── PER-LINE PERIOD MATRIX ─── */}
    {result&&result._mode==='production'&&result.gantt?.length>0&&<div className="card">
      <div className="card-title">📊 Line × Period Schedule Matrix</div>
      <div style={{fontSize:10,color:'var(--tx3)',marginBottom:6}}>Each cell shows product code & qty produced. Empty = line idle.</div>
      <div style={{overflowX:'auto'}}>
        <table className="data-table" style={{fontSize:9}}>
          <thead><tr><th>Line</th>{Array.from({length:result.periods||26},(_,t)=><th key={t} style={{fontFamily:'JetBrains Mono',fontSize:8}}>W{t+1}</th>)}</tr></thead>
          <tbody>{(result.lines||[]).map((l,li)=><tr key={li}>
            <td style={{fontWeight:600,color:'var(--ac)',whiteSpace:'nowrap'}}>{l.name}</td>
            {Array.from({length:result.periods||26},(_,t)=>{
              const cell=result.gantt.find(g=>g.line_idx===li&&g.period===t);
              const colors=['#00d4aa','#38bdf8','#a78bfa','#f0b429','#f85149'];
              if(!cell)return <td key={t} style={{color:'var(--tx3)',textAlign:'center'}}>·</td>;
              return <td key={t} style={{background:`${colors[cell.product_idx%5]}22`,color:colors[cell.product_idx%5],fontWeight:700,textAlign:'center',fontSize:8,whiteSpace:'nowrap'}} title={`${cell.product} ${cell.quantity}u`}>
                P{cell.product_idx+1}<br/>{cell.quantity}
              </td>;
            })}
          </tr>)}</tbody>
        </table>
      </div>
      <div style={{display:'flex',marginTop:4,gap:8,flexWrap:'wrap'}}>{state.products.map((p,i)=>{const colors=['#00d4aa','#38bdf8','#a78bfa','#f0b429','#f85149'];return <span key={i} style={{fontSize:9,color:colors[i%5]}}>■ P{i+1} = {p.name}</span>})}</div>
    </div>}

    {/* ─── GANTT VISUAL ─── */}
    {result&&result._mode==='production'&&result.gantt?.length>0&&<div className="card">
      <div className="card-title">📅 Gantt Chart — Visual Timeline</div>
      <div style={{overflowX:'auto',position:'relative',background:'var(--bg3)',borderRadius:4,padding:8}}>
        {(result.lines||[]).map((l,li)=><div key={li} style={{display:'flex',alignItems:'center',marginBottom:3}}>

      {(()=>{
        const lines=state.production.lines;
        const conflicts=[];
        lines.forEach(line=>{
          const availHrs=(line.hoursPerShift||8)*line.shiftsPerDay*(state.planning.workDays||6)*4; // monthly hrs
          const breakHrs=(line.breakMins||30)/60*line.shiftsPerDay*(state.planning.workDays||6)*4;
          const netHrs=availHrs-breakHrs;
          let reqHrs=0;
          state.products.forEach(p=>{
            const monthlyDem=Math.round((p.history||[]).slice(-12).reduce((a,b)=>a+b,0)/12);
            const cycleHrs=(p.cycleTime||19)/60;
            reqHrs+=monthlyDem*cycleHrs;
          });
          const util=Math.round(reqHrs/Math.max(netHrs,1)*100);
          const overloaded=util>100;
          const otZone=util>(line.otThresh||80);
          conflicts.push({name:line.name,avail:Math.round(netHrs),required:Math.round(reqHrs),util,overloaded,otZone,
            gap:Math.round(netHrs-reqHrs),action:overloaded?'ADD SHIFT / SUBCONTRACT / OVERTIME':otZone?'OT active — monitor cost':'OK'});
        });
        return <table className="data-table">
          <thead><tr><th>Line</th><th>Avail (hrs/mo)</th><th>Required</th><th>Util %</th><th>Gap</th><th>Action</th></tr></thead>
